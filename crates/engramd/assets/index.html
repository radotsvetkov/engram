// ---- the trust spine (bottom status bar) ----
let _lastLedgerN=null;
async function poll(){
  try {
    const [v,m,h,pe] = await Promise.all([J('/v1/ledger/verify'),J('/v1/meter'),J('/health'),J('/v1/egress/pending').catch(()=>({pending:[]}))]);
    const lc=document.getElementById('ledgerChip'), spine=document.getElementById('sbSpine');
    if(v.ok){
      // Only write the aria-live region when the value CHANGED - rewriting identical innerHTML
      // every 3s made screen readers announce "ledger verified" in a loop, forever.
      const lcHtml='<span class="seal"></span>ledger verified · <b>'+v.entries+'</b>';
      if(lc.innerHTML!==lcHtml){ lc.className='chip ok sb-clk'; lc.innerHTML=lcHtml; }
      // Unattended agents that staged an out-of-policy egress surface here for async approval.
      const np = (pe&&pe.pending)?pe.pending.length:0;
      const bHtml = np>0
        ? `<div class="banner" role="alert" style="cursor:pointer;background:rgba(224,162,60,.12);border-color:rgba(224,162,60,.4);color:var(--warning)" onclick="openApprovals()">${np} egress action${np===1?'':'s'} awaiting your approval — click to review</div>`
        : '';
      const bEl=document.getElementById('banner');
      if(bEl.innerHTML!==bHtml) bEl.innerHTML=bHtml;   // role=alert: write only on change
      // a single teal breath when a new entry chains - confidence shown, never claimed
      if(_lastLedgerN!==null && v.entries!==_lastLedgerN && spine){ spine.classList.remove('flash'); void spine.offsetWidth; spine.classList.add('flash'); }
      _lastLedgerN=v.entries;
    } else { lc.className='chip bad'; lc.textContent='⚠ tamper detected';
      document.getElementById('banner').innerHTML='<div class="banner" role="alert">Tamper detected - the audit chain doesn\'t verify. Showing the last good state.</div>'; }
    { const cc=document.getElementById('costChip'), t='$'+(m.cost_usd||0).toFixed(4);
      if(cc.textContent!==t) cc.textContent=t; }   // aria-live: write only on change
    const wasOffline=state.offline; state.offline = !!h.offline;
    // The offline banner is baked into a view at render time, so re-render when it flips - but
    // not while the user is typing in the composer.
    if(state.offline!==wasOffline && (state.route==='Chat'||state.route==='Tasks')
       && document.activeElement!==document.getElementById('composer')) renderView();
    const dot=document.getElementById('sbDot'); if(dot) dot.classList.add('awake');
    const dn=document.getElementById('sbDaemon'); if(dn) dn.textContent = h.offline ? 'engramd · offline model' : ('engramd · v'+(h.version||''));
    document.getElementById('status').innerHTML = 'awake <span class="live">·</span> v'+h.version;
  } catch(e){
    const dot=document.getElementById('sbDot'); if(dot) dot.classList.remove('awake');
    const dn=document.getElementById('sbDaemon'); if(dn) dn.textContent='engramd · sleeping';
  }
}

// ---- Tasks board ----
async function loadTasks(){ state.tasks = await J('/v1/tasks'); }
const STATUS_COLS = { todo:'todo', doing:'doing', failed:'done', done:'done', scheduled:'todo' };
function offlineNotice(){ return state.offline ? '<div class="offline" role="status">Running in offline demo mode - <a href="#" onclick="engramOnboard();return false" style="color:inherit;font-weight:600;text-decoration:underline">connect a model</a> to think for real.</div>' : ''; }

function card(t){
  const running = t.status==='doing';
  const tags = (t.tool_tags||[]).map(x=>`<span class="tag ${x}">${x}</span>`).join('');
  // every finished run carries a glass-box receipt chip - its signed ledger slice.
  const rcpt = t.run ? `<span class="rcpt-chip" title="open the signed receipt for this run" onclick="openTaskReceipt('${t.id}',event)">◇ receipt</span>` : '';
  let foot='';
  if(running) foot=`<div class="meta"><span class="pulse"></span> ${esc(t.progress||'thinking...')}</div><div class="bar"></div>`;
  else if(t.status==='done' && t.run) foot=`<div class="meta"><span class="check">✓</span> ${(t.run.tokens_in+t.run.tokens_out)} tok · $${(t.run.cost_usd||0).toFixed(4)}${t.schedule_id?' · ⟳':''}${rcpt}</div>`;
  else if(t.status==='failed') foot=`<div class="meta"><span class="xmark">✕</span> stopped${rcpt}</div>`;
  else foot=`<div class="meta">${tags||'<span class="muted">queued</span>'}</div>`;
  // No HTML5 draggable - we use a pointer-based drag (see boardPointerDown) that actually works
  // in WKWebView and feels like Linear. Click vs drag is discriminated by a movement threshold.
  const agentBadge = t.agent ? `<span class="card-agent" title="runs as this agent">◇ ${esc((AGENTS.find(a=>a.id===t.agent)||{}).name||'agent')}</span>` : '';
  // Failed/stopped tasks live in the same 'Finished' column as done ones (STATUS_COLS maps
  // failed→done); a distinct class keeps them visually separable from healthy completions.
  // One-click Run on queued cards; one-click Stop on running ones (the panel has both too).
  const runBtn = t.status==='todo'
    ? `<button class="card-run" title="Run now" aria-label="Run this task now" onclick="event.stopPropagation();runWithReview('${t.id}')"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5.5v13l11-6.5z"/></svg></button>`
    : running
    ? `<button class="card-run card-stop" title="Stop this task at its next step (signed)" aria-label="Stop this task" onclick="event.stopPropagation();stopTask('${t.id}')"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="7" y="7" width="10" height="10" rx="2"/></svg></button>`
    : '';
  return `<div class="card ${running?'running':''}${t.status==='failed'?' failed':''}" data-id="${t.id}"
     role="button" tabindex="0" aria-label="${escAttr(t.title)}"
     onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openTask('${t.id}')}">
     ${runBtn}<div class="t">${esc(t.title)}</div>${agentBadge}${foot}</div>`;
}
function renderBoard(){
  // Load the team once so card badges can name the assigned agent (guarded; repaints once).
  if(!window._agentsLoaded){ window._agentsLoaded=true; J('/v1/agents').then(a=>{ AGENTS=a||[]; if(state.route==='Tasks') renderBoard(); }).catch(()=>{}); }
  const comp = document.getElementById('composer');
  const cv = comp?.value || '';                         // preserve in-progress typing
  const wasFocused = document.activeElement === comp;   // ...and focus + caret
  const selStart = comp?.selectionStart, selEnd = comp?.selectionEnd;
  const cols={todo:[],doing:[],done:[]};
  state.tasks.forEach(t=>cols[STATUS_COLS[t.status]||'todo'].push(t));
  const v=document.getElementById('view');
  if(state.tasks.length===0){
    v.innerHTML = `<div class="board-wrap">${offlineNotice()}
      <div class="empty"><span class="se-glyph" style="display:inline-block;opacity:.6">${ICONS.Tasks}</span>
        <b>Run work in the background</b>
        <div class="empty-sub">A task works on its own — researching, browsing, writing files — and lands here with a signed receipt. Chat is for talking; tasks are for doing.</div>
        <div class="examplechips">
          <button onclick="prefill('Summarize this week\'s top Rust news')">Summarize Rust news</button>
          <button onclick="prefill('Find me 3 quotes about curiosity')">Find 3 quotes</button>
          <button onclick="prefill('Research the best static site generators and write a comparison to compare.md')">Write a comparison file</button>
        </div></div>
      <div style="padding:16px">${composerHtml('tasks')}</div></div>`;
  } else {
    const colHtml=(key,label)=>`<div class="col" data-col="${key}">
       <h3>${label} <span>${cols[key].length}</span></h3><div class="cards">${cols[key].map(card).join('')}</div></div>`;
    v.innerHTML = `<div class="board-wrap">${offlineNotice()}
      <div class="board">${colHtml('todo','To do')}${colHtml('doing','Running')}${colHtml('done','Finished')}</div>
      <div style="padding:0 16px 16px">${composerHtml('tasks')}</div></div>`;
  }
  wireComposer();
  const c=document.getElementById('composer');
  if(c && cv){ c.value=cv; c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,160)+'px'; }
  if(c && wasFocused){ c.focus(); try{ c.setSelectionRange(selStart??c.value.length, selEnd??c.value.length); }catch(_){} }
}

// ---- composer + intent routing ----
// The composer adapts to its view: in Chat, Enter SENDS the message and the
// primary control is a send arrow; in the Tasks board, Enter creates a task. Shift+Enter is a
// newline in both. Task-making is still reachable from chat via Cmd+Enter.
function composerHtml(ctx){
  ctx = ctx==='tasks' ? 'tasks' : 'chat';
  const sendBtn = ctx==='chat'
    ? `<button id="sendBtn" class="send send-icon" title="Send (Enter)" aria-label="Send" onclick="converseInline(document.getElementById('composer').value)"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg></button>`
    : `<button class="send" onclick="submitComposer(false)">Create task</button>`;
  const hint = ctx==='chat'
    ? `<small id="composerHint"><kbd>↵</kbd> send <kbd>⇧↵</kbd> newline <kbd>⌘↵</kbd> task</small>`
    : `<small><kbd>↵</kbd> create <kbd>⌘↵</kbd> create &amp; run</small>`;
  // Add-context is a chat-only affordance; the tasks board composer creates tasks, not turns.
  const attachCtl = ctx==='chat'
    ? `<span class="attach-wrap" id="attachWrap"><button id="attachBtn" class="attach-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Add context" title="Add context or files" onclick="attachToggleMenu(event)"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5 12.5 21a5 5 0 0 1-7-7l8.5-8.5a3.3 3.3 0 0 1 4.7 4.7L9.6 18.7a1.6 1.6 0 0 1-2.3-2.3l8-8"/></svg></button><input id="attachFileInput" type="file" multiple hidden onchange="attachOnFiles(this)"></span>`
    : '';
  const pills = ctx==='chat' ? `<div class="attach-pills" id="attachPills"></div>` : '';
  return `<div class="composer">
    <div id="slashMenu" class="slash-menu" hidden></div>
    <div class="composer-top">${modelpickHtml()}${ctx==='chat'?`<span class="ctx-wrap" id="ctxWrap"><button class="ctx-chip" id="ctxChip" type="button" aria-haspopup="true" aria-expanded="false" title="What ships with your next message" onclick="ctxToggle(event)"><span class="cx-dot"></span>Context<span class="cx-n" id="ctxN"></span></button></span>`:''}</div>
    ${pills}<textarea id="composer" data-ctx="${ctx}" rows="1" placeholder="${ctx==='chat'?'Message Engram...':'Tell Engram what to do...'}"></textarea>
    <div class="hint">${hint}<div class="comp-actions">${attachCtl}<button id="voiceMic" class="voice-mic" type="button" aria-pressed="false" aria-label="Dictate" title="Dictate (push to talk)" onclick="voiceToggleDictation(this)">${voiceMicSvg()}</button>${sendBtn}</div></div></div>`;
}
function prefill(t){ const c=document.getElementById('composer'); if(c){ c.value=t; c.focus(); } }
function wireComposer(){
  const c=document.getElementById('composer'); if(!c) return;
  const ctx=c.dataset.ctx||'chat';
  // Repaint any pinned attachments from ATTACH so they survive a mid-compose re-render
  // (renderChat re-runs wireComposer); no-ops when #attachPills is absent (tasks ctx).
  if(typeof attachRenderPills==='function') attachRenderPills();
  c.addEventListener('input',()=>{ c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,180)+'px'; if(typeof slashSync==='function') slashSync(); if(typeof updateJumpBtn==='function') updateJumpBtn(); });
  c.addEventListener('blur',()=>{ setTimeout(()=>{ if(typeof slashHide==='function') slashHide(); },120); });
  c.addEventListener('keydown',e=>{
    if(typeof slashKeydown==='function' && slashKeydown(e)) return;   // slash menu owns nav keys when open
    if(e.key!=='Enter' || e.isComposing) return;   // let IME composition finish
    if(e.shiftKey && !(e.metaKey||e.ctrlKey)) return;   // Shift+Enter = newline; ⇧⌘↵ falls through
    e.preventDefault();
    if(typeof slashTrySubmit==='function' && slashTrySubmit()) return;  // '/cmd <arg>' + Enter runs the command
    if(ctx==='chat'){
      if((e.metaKey||e.ctrlKey)&&e.shiftKey) submitComposer(true);      // ⇧⌘↵ create & run as a task
      else if(e.metaKey||e.ctrlKey) submitComposer(false);              // ⌘↵ create a task
      else converseInline(c.value);
    }
    else { if(e.metaKey||e.ctrlKey) submitComposer(true); else submitComposer(false); }
  });
}
// While a chat is running the send button becomes a Stop button - clicking it aborts the request.
let _thinkTimer=0;
const _chatAborts=new Map();   // session_id -> AbortController, so chats run + stop independently
const _busySessions=new Set();   // session ids with an in-flight run -> blinking dot in the sidebar
// Scroll the chat feed to the newest message (the jump-to-latest button + after sending).
function feedToBottom(){ const f=document.getElementById('feed'); if(f) f.scrollTo({top:f.scrollHeight, behavior:'smooth'}); }
// Show the jump-to-latest button only when the reader has scrolled up away from the bottom.
function updateJumpBtn(){
  const f=document.getElementById('feed'), b=document.getElementById('jumpBottom'); if(!f||!b) return;
  // Anchor above the composer whatever its height - a grown multi-line draft used to swallow it.
  const comp=document.querySelector('.chat > .composer');
  if(comp) b.style.bottom=(comp.offsetHeight + 40)+'px';
  b.classList.toggle('show', (f.scrollHeight - f.scrollTop - f.clientHeight) > 120);
}
// Turn-level helpers: hover actions on every message, plus the activity fold's toggle.
const ICO_COPY='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2.5"/><path d="M5 15V6.5A1.5 1.5 0 0 1 6.5 5H15"/></svg>';
const ICO_EDIT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3.5 20.5 7 8.5 19H5v-3.5z"/></svg>';
function fmtDur(s){ s=Math.max(1,s|0); if(s<60) return s+'s'; const m=(s/60)|0, r=s%60; if(m<60) return r?`${m}m ${r}s`:`${m}m`; const h=(m/60)|0; return `${h}h ${m%60}m`; }
function actToggle(mi){
  const s=WS.byId[WS.activeSession]; const m=s&&s.messages&&s.messages[mi]; if(!m) return;
  m._actOpen=!m._actOpen; paintFeed(false);
}
function ribMore(mi){
  const s=WS.byId[WS.activeSession]; const m=s&&s.messages&&s.messages[mi]; if(!m) return;
  m._ribAll=true; paintFeed(false);
}
function copyTurn(mi,btn){
  const s=WS.byId[WS.activeSession]; const m=s&&s.messages&&s.messages[mi]; if(!m) return;
  (navigator.clipboard?navigator.clipboard.writeText(m.text||''):Promise.reject()).then(()=>{
    if(btn){ const old=btn.innerHTML; btn.innerHTML=ICO_COPY+' copied'; btn.classList.add('done'); setTimeout(()=>{ btn.innerHTML=old; btn.classList.remove('done'); },1200); }
  }).catch(()=>{});
}
function draftTurn(mi){
  const s=WS.byId[WS.activeSession]; const m=s&&s.messages&&s.messages[mi]; if(!m) return;
  const c=document.getElementById('composer'); if(!c) return;
  c.value=m.text||''; c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,180)+'px'; c.focus();
  try{ c.setSelectionRange(c.value.length,c.value.length); }catch(_){}
}
function tickThinking(){
  let any=false;
  document.querySelectorAll('.ct-secs[data-t0]').forEach(el=>{ any=true; const t0=+el.getAttribute('data-t0')||Date.now(); el.textContent=(((Date.now()-t0)/1000)|0)+'s'; });
  if(!any && _thinkTimer){ clearInterval(_thinkTimer); _thinkTimer=0; }
}
// The Stop/Send button reflects whether the ACTIVE session has an in-flight run; the thinking timer
// ticks while ANY session is busy. State is per-session (_busySessions / _chatAborts), so multiple
// chats run at once and the button + sidebar dots track each independently.
function refreshSendBtn(){
  if(_busySessions.size){ if(!_thinkTimer) _thinkTimer=setInterval(tickThinking,1000); }
  else if(_thinkTimer){ clearInterval(_thinkTimer); _thinkTimer=0; }
  if(typeof updateHaltBtn==='function') updateHaltBtn();
  const b=document.getElementById('sendBtn'); if(!b) return;
  // While a run is in flight, the keys change meaning - say so where the keys are documented.
  const hint=document.getElementById('composerHint');
  if(_busySessions.has(WS.activeSession)){
    if(hint) hint.innerHTML='<kbd>↵</kbd> queue a follow-up <kbd>↵</kbd> with empty box stops';
    b.classList.add('is-stop'); b.title='Stop this chat'; b.setAttribute('aria-label','Stop the run');
    b.innerHTML='<svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
  } else {
    if(hint) hint.innerHTML='<kbd>↵</kbd> send <kbd>⇧↵</kbd> newline <kbd>⌘↵</kbd> task';

// Stop ONE session's run — abort its request + halt just that run server-side. Other chats keep going.
// The halt flag is LATCHED on ({on:true}) and never cleared here: the daemon registers a FRESH
// per-run Arc<AtomicBool> for every run (main.rs), so a set flag can't leak into the next run and
// nothing needs resetting. The old 300ms {on:false} un-halt raced the agent's step-boundary check —
// the flag was almost always back to false before the detached run ever read it, so Stop silently
// did nothing while the run kept burning tokens and running tools. Leaving it latched fixes that.
function stopChat(sid){
  sid = sid || WS.activeSession;
  const ac=_chatAborts.get(sid); if(ac){ try{ ac.abort(); }catch(_){} }
  try{ J('/v1/halt',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({session:sid, on:true})}).catch(()=>{}); }catch(_){}
  _busySessions.delete(sid); _chatAborts.delete(sid); refreshSendBtn(); renderSidebar();
}
// Follow-ups typed while a run is in flight are QUEUED here (per session) and auto-sent when that
// run finishes. An Enter with an EMPTY composer while busy still means
// Stop (the button's stop affordance); an Enter with text never kills the run.
const _queued=new Map();   // session_id -> [{text, attachments}] waiting for the current run to end
async function converseInline(text){
  text=(text||'').trim();
  // Snapshot any pinned context BEFORE the empty-text guard so an attachment-only send is
  // still possible, and BEFORE the re-render below clears the pills element.
  const attachments = (typeof attachTake==='function') ? attachTake() : [];
  if(_busySessions.has(WS.activeSession)){
    // Empty composer -> the send button is acting as Stop; abort the active chat.
    if(!text && !attachments.length){ stopChat(WS.activeSession); return; }
    // There IS a follow-up: queue it (don't abort the run), clear the composer, and show it as
    // pending so the user sees it was captured. It sends automatically when the run completes.
    const sid=WS.activeSession, q=_queued.get(sid)||[]; q.push({text, attachments}); _queued.set(sid, q);
    const c=document.getElementById('composer'); if(c){ c.value=''; c.style.height='auto'; }
    renderQueued(sid);
    return;
  }
  if(!text && !attachments.length) return;
  const c=document.getElementById('composer'); c.value=''; c.style.height='auto';
  // Settle on one session BEFORE switching/rendering, so go()->renderChat and chatSay don't
  // each create their own (the empty-state race).
  if(!WS.activeSession){ if(WS.sessions.length) WS.activeSession=WS.sessions[0].id; else await newSession(false); }
  if(state.route!=='Chat') go('Chat'); else renderChat();
  // Keep the composer focused after a send (Claude-style) — clicking the send button moved focus to
  // <body>, forcing a click back into the input before the next message.
  const c2=document.getElementById('composer'); if(c2) c2.focus();
  chatSay(text, attachments);
}
async function submitComposer(run){
  const c=document.getElementById('composer'); const title=c.value.trim(); if(!title) return;
  c.value=''; c.style.height='auto';

  // no error shown). Restore it and toast so the user can retry.
  let t;
  try{ t = await J('/v1/tasks',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({title,origin:'chat'})}); }
  catch(e){ c.value=title; c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,160)+'px'; notify('Couldn\'t create the task - '+((e&&e.message)||'try again')); return; }
  await loadTasks(); if(state.route==='Tasks') renderBoard();
  if(run){ runTask(t.id); }
}

// Watch the agent work: stream each tool step into the detail panel live (the glass box filling

let liveRunId=null;
async function runTaskLive(id, approved){
  openTask(id);                          // make sure the panel is open and focused on this task
  liveRunId=id;

  body.innerHTML = `<div class="liverun">
    <div class="lr-head"><span class="pulse"></span><span id="lrStatus">Engram is working...</span><span id="lrMeter" class="lr-meter"></span></div>
    <div id="lrSteps" class="lr-steps"></div>
    <div id="lrAnswer" class="lr-answer"></div></div>`;
  const stepsEl=document.getElementById('lrSteps');
  const t0=Date.now(); let lrTokens=0, lrCost=0;
  const lrMeter=()=>{ const el=document.getElementById('lrMeter'); if(!el) return; const n=stepsEl?stepsEl.children.length:0;
    el.textContent = `${n?n+(n===1?' step':' steps')+' · ':''}${lrTokens?lrTokens+' tok · ':''}${lrCost?'$'+lrCost.toFixed(4)+' · ':''}${((Date.now()-t0)/1000).toFixed(1)}s`; };
  const tick=setInterval(lrMeter,250);
  let lrEnded=false;
  const finish=async()=>{ if(lrEnded) return; lrEnded=true; clearInterval(tick); lrMeter(); liveRunId=null; await loadTasks(); if(state.route==='Tasks') renderBoard(); };
  try{
    const r=await fetch('/v1/tasks/'+encodeURIComponent(id)+'/run/stream'+(approved?'?approved=1':''),{method:'POST',headers:{...AUTH}});
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    const reader=r.body.getReader(), dec=new TextDecoder(); let buf='';
    for(;;){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        let ev='message'; const dl=[];
        for(const line of frame.split('\n')){ if(line.startsWith('event:')) ev=line.slice(6).trim(); else if(line.startsWith('data:')) dl.push(line.slice(5).replace(/^ /,'')); }
        const data=dl.join('\n');
        if(ev==='step'){ let s; try{ s=JSON.parse(data); }catch(_){ continue; }
          const stamp = s.seq ? `◇ ${s.seq} · ${(s.hash||'').slice(0,8)}` : '';
          const row=document.createElement('div'); row.className='step lr-step'+(s.ok?'':' bad');
          row.innerHTML=`<div class="top"><span class="lr-n">${s.index}</span><span class="verb">${esc(s.tool)}</span><span class="lr-ok">${s.ok?'✓':'✕'}</span>${stamp?`<span class="stamp" title="this step's signed ledger entry" onclick="openReceipt()">${esc(stamp)}</span>`:''}</div>${s.observation?`<div class="obs">${esc(String(s.observation).slice(0,700))}</div>`:''}${stepShotHtml(s)}`;
          if(stepsEl){ stepsEl.appendChild(row); stepsEl.scrollTop=stepsEl.scrollHeight; }
          if(typeof s.tokens==='number') lrTokens=s.tokens; if(typeof s.cost==='number') lrCost=s.cost; lrMeter();
        }
        else if(ev==='done'){ let t; try{ t=JSON.parse(data); }catch(_){}
          document.querySelector('.lr-head .pulse')?.remove();
          const st=document.getElementById('lrStatus'); if(st) st.textContent=(t&&t.status==='done')?'Done':'Stopped';
          if(t&&t.run){ lrTokens=(t.run.tokens_in||0)+(t.run.tokens_out||0); if(typeof t.run.cost_usd==='number') lrCost=t.run.cost_usd; }
          if(stepsEl && !stepsEl.children.length) stepsEl.innerHTML='<div class="lr-none">No tools were needed - Engram answered directly.</div>';
          if(t&&t.run&&t.run.answer){ const a=document.getElementById('lrAnswer'); if(a) a.innerHTML=mdToHtml(t.run.answer); }
          await finish();
          setTimeout(()=>{ if(panelId===id) openTask(id, false); }, 2200);   // settle into the full receipt
        }
        else if(ev==='error'){ const st=document.getElementById('lrStatus'); if(st) st.textContent='Run failed'; await finish(); }
      }
    }
    await finish();   // stream ended without a terminal event (close / partial final frame): still clear the timer and unstick liveRunId
  }catch(e){ const st=document.getElementById('lrStatus'); if(st) st.textContent='Couldn\'t run - '+(e.message||'error'); document.querySelector('.lr-head .pulse')?.remove(); await finish(); }

// ---- pointer-based kanban drag ----
// HTML5 drag-and-drop is unreliable in WKWebView (and can't be driven by assistive tooling), so
// we implement dragging directly on pointer events: a floating ghost that follows the cursor,
// live column hit-testing with a highlighted drop target, a click/drag discriminator (so a tap
// still opens the card), and an optimistic move that PATCHes the new status.
// ---- kanban drag: pointer-captured, with a live insertion placeholder --------------------------
// The old drag left the card dimly in place and teleported it on drop, lost the pointer when it
// left the window, and gave no hint of WHERE the card would land. This version: captures the
// pointer, hides the original, moves a same-size placeholder to the exact landing slot as you
// drag, auto-scrolls a hovered column near its edges, animates the ghost into the slot on drop,
// and cancels cleanly on Escape or pointer loss (ghost flies home).
let kdrag=null;
function boardPointerDown(e){
  if(e.button!==0) return;
  const cardEl=e.target.closest('.card'); if(!cardEl) return;
  if(e.target.closest('.rcpt-chip,.card-run,button,a')) return;   // controls keep their clicks
  const board=cardEl.closest('.board'); if(!board) return;
  const r=cardEl.getBoundingClientRect();
  kdrag={ id:cardEl.dataset.id, cardEl, startX:e.clientX, startY:e.clientY,
          offX:e.clientX-r.left, offY:e.clientY-r.top, w:r.width, h:r.height,
          moved:false, ghost:null, ph:null, homeCol:cardEl.closest('.col'), scrollRAF:0 };
  try{ cardEl.setPointerCapture(e.pointerId); }catch(_){}
  window.addEventListener('pointermove', boardPointerMove);
  window.addEventListener('pointerup', boardPointerUp, { once:true });
  window.addEventListener('pointercancel', boardPointerUp, { once:true });
  window.addEventListener('keydown', boardDragKey, true);
}
function boardDragKey(e){ if(e.key==='Escape' && kdrag && kdrag.moved){ e.preventDefault(); boardDragCancel(); } }
function columnUnder(x,y){
  for(const el of document.elementsFromPoint(x,y)){ const c=el.closest&&el.closest('.col'); if(c) return c; }
  return null;
}
// The card the pointer would insert BEFORE in this column (by vertical midpoint), skipping the
// placeholder itself and the hidden original.
function slotBefore(col, y){
  const cards=[...col.querySelectorAll('.card')].filter(c=>c!==kdrag.cardEl && !c.classList.contains('card-slot'));
  for(const c of cards){ const r=c.getBoundingClientRect(); if(y < r.top + r.height/2) return c; }
  return null;
}
function boardPointerMove(e){
  const d=kdrag; if(!d) return;
  if(!d.moved){
    if(Math.hypot(e.clientX-d.startX, e.clientY-d.startY) < 6) return;   // still a click
    d.moved=true;
    const g=d.cardEl.cloneNode(true);
    g.className='card card-ghost'; g.style.width=d.w+'px';
    document.body.appendChild(g); d.ghost=g;
    d.ph=document.createElement('div'); d.ph.className='card card-slot'; d.ph.style.height=d.h+'px';
    d.cardEl.after(d.ph); d.cardEl.classList.add('card-hidden');
    document.body.classList.add('dragging-active');
  }
  d.ghost.style.left=(e.clientX-d.offX)+'px';
  d.ghost.style.top=(e.clientY-d.offY)+'px';
  const col=columnUnder(e.clientX, e.clientY);
  document.querySelectorAll('.col').forEach(c=>c.classList.toggle('drop-target', c===col));
  if(col){
    const cards=col.querySelector('.cards');
    const before=slotBefore(col, e.clientY);
    if(before) cards.insertBefore(d.ph, before); else cards.appendChild(d.ph);
    // Edge auto-scroll: keep dragging usable in a column longer than its viewport.
    const cr=cards.getBoundingClientRect();
    const dy = e.clientY < cr.top+44 ? -9 : (e.clientY > cr.bottom-44 ? 9 : 0);
    if(dy) cards.scrollTop += dy;
  }
}
function boardDragTeardown(d){
  window.removeEventListener('pointermove', boardPointerMove);
  window.removeEventListener('keydown', boardDragKey, true);
  document.querySelectorAll('.col').forEach(c=>c.classList.remove('drop-target'));
  document.body.classList.remove('dragging-active');
}
// Fly the ghost to a target rect, then finish. 150ms of physicality instead of a teleport.
function ghostFlyTo(d, rect, after){
  if(!d.ghost){ after(); return; }
  const g=d.ghost;
  g.style.transition='left .15s cubic-bezier(.22,.61,.36,1), top .15s cubic-bezier(.22,.61,.36,1), transform .15s';
  g.style.transform='none'; g.style.left=rect.left+'px'; g.style.top=rect.top+'px';
  setTimeout(()=>{ g.remove(); after(); }, 160);
}
function boardDragCancel(){
  const d=kdrag; kdrag=null; if(!d) return;
  boardDragTeardown(d);
  const home=d.cardEl.getBoundingClientRect();
  ghostFlyTo(d, home, ()=>{ if(d.ph) d.ph.remove(); d.cardEl.classList.remove('card-hidden'); });
}
async function boardPointerUp(e){
  const d=kdrag; kdrag=null; if(!d) return;
  boardDragTeardown(d);
  if(!d.moved){ openTask(d.id); return; }                // no movement => it was a click
  const col=columnUnder(e.clientX, e.clientY);
  if(!col || !d.ph){ // dropped outside the board -> fly home, no change
    const home=d.cardEl.getBoundingClientRect();
    ghostFlyTo(d, home, ()=>{ if(d.ph) d.ph.remove(); d.cardEl.classList.remove('card-hidden'); });
    return;
  }
  const slot=d.ph.getBoundingClientRect();
  ghostFlyTo(d, slot, async ()=>{
    // Land the real card in the slot instantly (optimistic), THEN persist + re-render.
    d.ph.replaceWith(d.cardEl); d.cardEl.classList.remove('card-hidden');
    d.cardEl.classList.add('just-dropped'); setTimeout(()=>d.cardEl.classList.remove('just-dropped'),420);
    await moveTask(d.id, col.dataset.col);
  });
}
async function moveTask(id, key){
  const t=state.tasks.find(x=>x.id===id);
  if(t && STATUS_COLS[t.status]===key) return;            // dropped back in the same column - no-op
  if(key==='doing'){ runTask(id); return; }
  const status = key==='done' ? 'done' : 'todo';
  if(t){ t.status=status; if(state.route==='Tasks'){ renderBoard(); const el=document.querySelector(`.card[data-id="${id}"]`); if(el){ el.classList.add('just-dropped'); setTimeout(()=>el.classList.remove('just-dropped'),420); } } }   // optimistic, with a settle animation
  try{ await J('/v1/tasks/'+id,{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify({status})}); }catch(_){}
  await loadTasks(); if(state.route==='Tasks') renderBoard();
}

      }).join('');
      html+=`<div class="muted" style="font-size:11px;margin:14px 0 6px">artifacts · ${n} file${n===1?'':'s'} this run produced</div><div class="artifact-grid">${cards}</div>`;
    }
    // What the run CHANGED on disk - computed from the pre-run checkpoint, no git required.
    // Loaded async so the panel opens instantly; hidden when there's no checkpoint.
    html+=`<div id="chgBox"></div>`;
    if(t.status!=='doing') setTimeout(()=>taskChangesLoad(id), 30);
    // The agent's own plan (latest update_plan call), as a live checklist - glass-box intent.
    const planStep=[...(t.run.steps||[])].reverse().find(s=>s.tool==='update_plan'&&s.args&&Array.isArray(s.args.steps));
    if(planStep){
      const items=planStep.args.steps.map(st=>{

        return `<div style="padding:2px 0;color:${c}">${m} ${esc(st.title||'')}</div>`;
      }).join('');

    }
    // Each step carries its own signed ledger seq+hash (captured inline at run time), so
    // the receipt pairs to the exact ledger entry even if other tasks ran concurrently.
    const stepRows = (t.run.steps||[]).map(s=>{
      const stamp = s.ledger_seq ? `${s.ledger_seq} · ${(s.ledger_hash||'').slice(0,8)}` : '';
      return `<div class="step ${s.ok?'':'bad'}"><div class="top"><span class="verb">${esc(s.tool)}</span>
        <span class="${s.ok?'check':'xmark'}">${s.ok?'✓':'✕'}</span>
        <span class="stamp" onclick="navigator.clipboard.writeText('${s.ledger_hash||''}')">${stamp}</span></div>
        ${s.ok?'':`<div class="obs">${esc(s.observation)}</div>`}${stepDiffHtml(s,(s.args&&(s.args.path||s.args.file))||'')}${stepShotHtml(s)}</div>`;
    }).join('');
    html+=`<div class="muted" style="font-size:11px;margin-bottom:6px">audit trail - signed</div>${stepRows||'<div class="muted">no tools used</div>'}`;
    html+=`<div class="muted" style="font-size:11px;margin-top:12px;font-family:var(--mono)">head ${t.run.ledger_head_hash.slice(0,12)}</div>`;
  } else if(t.status==='doing'){ html+=`<div class="muted">${esc(t.progress||'running...')}</div>`; }
  html+=`<div id="schedbox" style="margin-top:14px"><div class="muted" style="font-size:11px;margin-bottom:4px">repeat this task</div>
    <div class="row"><input id="pwhen" placeholder="every weekday at 9am" oninput="schedPreview('pwhen','pwhenprev')"><button onclick="scheduleTask('${id}')">Schedule</button></div>
    <div id="pwhenprev" class="sub"></div></div>`;
  html+=`<div class="row" style="margin-top:14px"><button onclick="delTask('${id}')" style="background:var(--surface-2);color:var(--danger)">Delete</button></div>`;
  body.innerHTML=html;
}
// Fetch + render the run's file changes (checkpoint delta) into the open panel.
const _taskChanges={};
async function taskChangesLoad(id){
  if(!document.getElementById('chgBox') || panelId!==id) return;
  let r=_taskChanges[id];
  if(!r){ try{ r=_taskChanges[id]=await J('/v1/tasks/'+encodeURIComponent(id)+'/changes'); }catch(_){ r=_taskChanges[id]={files:[]}; } }
  // Re-query AFTER the await: a concurrent openTask repaint (the agents lazy-load, a poll) swaps
  // the panel body, and writing into the captured node lands in a detached tree - silently blank.
  const box=document.getElementById('chgBox'); if(!box || panelId!==id) return;
  const files=r.files||[];
  if(!files.length){ box.innerHTML=''; return; }
  const adds=files.reduce((s,f)=>s+(f.adds||0),0), dels=files.reduce((s,f)=>s+(f.dels||0),0);
  box.innerHTML=`<div class="muted" style="font-size:11px;margin:14px 0 5px">changes this run made · ${files.length} file${files.length===1?'':'s'} <span style="color:var(--accent)">+${adds}</span> <span style="color:var(--danger)">−${dels}</span>${r.more?` · ${r.more} more not shown`:''}</div>`
    + files.map((f,i)=>`<div class="chg-row st-${esc(f.status)}" title="${escAttr(f.path)} · ${esc(f.status)} — click for the diff" onclick="chgOpenDiff('${escAttr(id)}',${i})">
        <span class="git-dot"></span><span class="chg-path">${esc(f.path)}</span>
        <span class="chg-counts"><span class="a">+${f.adds||0}</span> <span class="d">−${f.dels||0}</span></span></div>`).join('');
}

// ---- markdown + code rendering for replies ----
// Engram's replies are model output, so they're untrusted: we escape EVERYTHING first, then
// transform the escaped text. Code fences are pulled out before escaping and re-inserted as
// highlighted blocks, so markdown inside them isn't mangled.
const HL_KW = {
  js:'const let var function return if else for while do class extends new await async import from export default try catch finally throw typeof instanceof of in this true false null undefined yield switch case break continue',
  ts:'const let var function return if else for while class interface type enum new await async import from export default try catch throw typeof of in this true false null undefined public private readonly extends implements',
  rust:'fn let mut pub use struct enum impl trait match if else for while loop return self Self async await move ref const static where as dyn box type mod crate true false Some None Ok Err unsafe',
  python:'def class return if elif else for while import from as with try except finally lambda True False None and or not in is pass yield async await raise global nonlocal',
  bash:'if then else elif fi for do done while case esac function echo export local return cd set source then',
  json:'true false null',
};
function hl(code, lang){
  // Diffs/patches get real +/- line colouring - the way changes SHOULD read in a chat about code.
  if(lang==='diff'||lang==='patch'){
    return code.split('\n').map(l=>{
      const e=esc(l);
      if(/^(\+\+\+|---) /.test(l)) return `<span class="t-fh">${e}</span>`;
      if(l.startsWith('@@')) return `<span class="t-hunk">${e}</span>`;
      if(l[0]==='+') return `<span class="t-add">${e}</span>`;
      if(l[0]==='-') return `<span class="t-del">${e}</span>`;
      return e;
    }).join('\n');
  }
  const hashComment = ['python','py','bash','sh','shell','yaml','yml','toml','ruby','rb'].includes(lang);
  const cp = hashComment ? '(#[^\\n]*)' : '(\\/\\/[^\\n]*|\\/\\*[\\s\\S]*?\\*\\/)';
  const re = new RegExp(cp + '|("(?:[^"\\\\]|\\\\.)*"|\'(?:[^\'\\\\]|\\\\.)*\'|`(?:[^`\\\\]|\\\\.)*`)|(\\b\\d[\\d_.eExXa-fA-F]*\\b)|([A-Za-z_$][\\w$]*)|([\\s\\S])', 'g');
  const kw = new Set((HL_KW[lang]||HL_KW.js).split(' '));
  let out='';

// markdown on every prior message plus the code-block scan - was the source of the flicker, the
// lost text selection, and the scroll thrash.
let _streamRAF=0;
function streamTick(msg){
  if(_streamRAF) return;                       // coalesce: at most one DOM write per frame
  _streamRAF=requestAnimationFrame(()=>{
    _streamRAF=0;
    if(!msg.streaming) return;                 // the final full paint already ran
    // A pending frame can fire AFTER a session switch: #streamMsg then belongs to the newly
    // painted session, and writing msg's tokens into it bled one chat's reply into another.
    const cur=WS.byId[WS.activeSession];
    if(!cur || !cur.messages || cur.messages.indexOf(msg)===-1) return;
    const el=document.getElementById('streamMsg'), f=document.getElementById('feed');
    if(!el){ paintFeedSticky(); return; }      // structure changed -> full (sticky, no force-scroll)
    // Sticky bottom: only auto-scroll when the reader is already near the end, so a long reply
    // doesn't yank them back down while they've scrolled up to read.
    const stick = !f || (f.scrollHeight - f.scrollTop - f.clientHeight) < 160;
    el.innerHTML = mdStream(msg.text||'');
    // The run footer is a sibling of #streamMsg so it survives token repaints; just keep its label
    // current as the answer starts streaming (its seconds tick independently via tickThinking).
    if(msg.text){ const lb=document.querySelector('#thinkFoot .ct-label'); if(lb) lb.textContent='Writing the answer'; }
    if(stick && f) f.scrollTop=f.scrollHeight;
    updateJumpBtn();
  });
}
async function chatSay(text, attachments, sidOverride){
  attachments = Array.isArray(attachments) ? attachments : [];

  // user may have switched chats or projects by the time the queue drains, and resolving the
  // session at drain time posted the follow-up into the wrong thread - with the wrong project's
  // memory scope and workdir.
  let sid=sidOverride||WS.activeSession, sess=WS.byId[sid];
  if(!sess){
    if(sid){
      // The active session's thread just isn't cached (a transient fetch failure). Re-hydrate it
      // instead of forking a NEW session — forking silently split the conversation and dropped its
      // history. Fall back to an empty local shell (openSession's pattern) so the send still lands
      // in THIS session.
      try{ sess=WS.byId[sid]=await J('/v1/sessions/'+encodeURIComponent(sid)); }catch(_){ sess=WS.byId[sid]={id:sid,messages:[]}; }
    } else {
      const s=await newSession(false);
      if(!s){ // nowhere to put the message — don't lose it: restore to the composer and tell the user
        const c=document.getElementById('composer'); if(c && text){ c.value=text; c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,180)+'px'; }
        notify('Couldn\'t start a chat — your message is still in the box, try again'); return;
      }
      sid=s.id; sess=WS.byId[sid];
    }
  }
  if(!sess.messages) sess.messages=[];
  sess.messages.push({role:'user',text,ts:Date.now()});
  const meta=WS.sessions.find(x=>x.id===sid);
  if(meta && (!meta.title || meta.title==='New chat')){ meta.title=text.replace(/\s+/g,' ').slice(0,42); if(state.route==='Chat' && WS.activeSession===sid) document.getElementById('viewname').textContent=meta.title; }
  if(meta){ WS.sessions=[meta, ...WS.sessions.filter(x=>x.id!==sid)]; }   // bump to top
  _busySessions.add(sid); renderSidebar();
  const msg={role:'engram',text:'',streaming:true,t0:Date.now(),ts:Date.now(),model:(CFG&&CFG.model_in_use)||''}; sess.messages.push(msg); if(WS.activeSession===sid) paintFeed();
  const ac=new AbortController(); _chatAborts.set(sid, ac); refreshSendBtn();
  try {
    const r = await fetch('/v1/converse/stream',{method:'POST',headers:{...AUTH,'content-type':'application/json'},body:JSON.stringify({text, session:sid, attachments}), signal:ac.signal});
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
    for(;;){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        let ev='message'; const dl=[];
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')) dl.push(line.slice(5).replace(/^ /,''));
        }
        const data=dl.join('\n');
        // The reply text always lands in its own session's object; only repaint if that session
        // is still on screen (so a mid-stream switch doesn't render into the wrong feed).
        const live = WS.activeSession===sid;
        if(ev==='token'){ msg.text+=data; if(live) streamTick(msg); }
        else if(ev==='step'){ try{ const d=JSON.parse(data); (msg.steps=msg.steps||[]).push(d); if(live) liveFoldTick(msg); }catch(_){} }
        else if(ev==='narration'){ try{ const d=JSON.parse(data); if(d.text&&d.text.trim()){ (msg.notes=msg.notes||[]).push(d.text.trim()); if(live) liveFoldTick(msg); } }catch(_){} }
        // done/error use the STICKY repaint (like token/step) so a reader scrolled up to an earlier
        // answer isn't snapped to the bottom the instant a long run completes.
        else if(ev==='done'){ try{const d=JSON.parse(data); if(d.reply) msg.text=d.reply; msg.recalled=d.recalled; msg.recalled_refs=d.recalled_refs; msg.learned=d.learned; if(d.steps) msg.steps=d.steps;}catch(_){} if(typeof _artifacts==='object') _artifacts.items=null; if(live) paintFeedSticky(); }
        else if(ev==='error'){ msg.text=friendlyChatError(data); if(live) paintFeedSticky(); }
      }
    }
    if(!msg.text) msg.text='(no reply)';
    msg.streaming=false; msg.dur=Date.now()-msg.t0; if(typeof _artifacts==='object') _artifacts.items=null; if(WS.activeSession===sid) paintFeedSticky();
  } catch(e){
    const stopped = e && e.name==='AbortError';
    _stoppedSession = stopped;
    msg.text = stopped ? (msg.text || '(stopped)') : (msg.text || friendlyChatError(e.message||'try again'));
    msg.streaming=false; msg.dur=Date.now()-msg.t0; if(WS.activeSession===sid) paintFeedSticky();
  } finally {
    _chatAborts.delete(sid); _busySessions.delete(sid);
    refreshSendBtn(); renderSidebar();   // stop the sidebar blink + reset the button for this session
    drainQueued(sid, _stoppedSession);   // auto-send any follow-ups typed while this run was in flight
    _stoppedSession=false;
  }
}
// Send the next follow-up queued for this session while its run was busy. If the run was STOPPED by
// the user, we don't fire the queue — a Stop should end the exchange, not silently launch a follow-up.
let _stoppedSession=false;
function drainQueued(sid, wasStopped){
  const q=_queued.get(sid);
  if(!q||!q.length){ if(WS.activeSession===sid) renderQueued(sid); return; }
  if(wasStopped){ _queued.delete(sid); if(WS.activeSession===sid) renderQueued(sid); return; }
  const next=q.shift(); if(!q.length) _queued.delete(sid); else _queued.set(sid, q);
  if(WS.activeSession===sid) renderQueued(sid);
  chatSay(next.text, next.attachments||[], sid);   // pin to the thread it was written for
}
// A small "queued" strip under the feed showing follow-ups waiting for the current run to finish.
function renderQueued(sid){
  if(WS.activeSession!==sid) return;
  const feed=document.getElementById('feed'); if(!feed) return;
  let strip=document.getElementById('queuedStrip');
  const q=_queued.get(sid)||[];
  if(!q.length){ if(strip) strip.remove(); return; }
  if(!strip){ strip=document.createElement('div'); strip.id='queuedStrip'; strip.className='queued-strip'; feed.parentNode.insertBefore(strip, feed.nextSibling); }
  strip.innerHTML = q.map((m,i)=>`<div class="queued-msg" title="Queued — sends when the current reply finishes"><span class="q-dot">⏳</span><span class="q-txt">${esc((m.text||'').slice(0,120))}</span><button class="q-x" title="Remove" onclick="unqueue('${escAttr(sid)}',${i})">✕</button></div>`).join('');
}
function unqueue(sid, i){ const q=_queued.get(sid); if(!q) return; q.splice(i,1); if(!q.length) _queued.delete(sid); else _queued.set(sid,q); renderQueued(sid); }
// Turn a raw provider/transport error into a clear, actionable message instead of a scary dump.
function friendlyChatError(data){
  const s=String(data||'');
  if(/429|rate.?limit|too many requests/i.test(s)) return '⚠️ Your model provider is rate-limiting requests (429). Wait a few seconds and try again — or switch to a less limited model in Settings (e.g. a paid Anthropic key). Mistral\'s free tier limits requests per minute.';
  if(/\b401\b|\b403\b|invalid.*key|unauthor/i.test(s)) return '⚠️ The provider rejected the API key. Check it in Settings › Gateways (where the model + key live).';
  if(/timeout|timed out/i.test(s)) return '⚠️ The model took too long to respond. Try again, or pick a faster model.';
  return '⚠️ Couldn\'t complete the request — '+s;
}

// SETTLES - forces cool to rest (alpha decay) so nodes stop moving: no eye-jitter, and they stay put
// to click. Anatomy is not claimed: regions cluster and depth is for exploration, not a lobe map.
const BRAIN_ANCH = {            // unit tetrahedron - four well-separated region anchors in 3D space
  identity:   [0, 0.9, 0],
  semantic:   [0.92, -0.32, 0.10],
  episodic:   [-0.46, -0.32, 0.80],

function brainNode(n, born){
  const reg=BRAIN_REGIONS[n.region]?n.region:'semantic', a=BRAIN_ANCH[reg];
  const tierA=n.tier==='hot'?1:n.tier==='warm'?0.72:0.5;
  const r=3.2+(n.importance||0.3)*4.5+Math.min(6,Math.log2((n.access||0)+1)*1.4);
  const h=n.id*2.3999632;       // stable pseudo-random offset around the anchor (not re-random per load)
  return { ...n, reg, r, tierA, born,
    x:a[0]+Math.cos(h)*0.32, y:a[1]+Math.sin(h*1.7)*0.32, z:a[2]+Math.cos(h*2.3)*0.32,

function brainMergeGraph(raw){
  const B=BRAIN; if(!B) return 0;
  const byId=new Map(B.nodes.map(n=>[n.id,n])); const fresh=new Set(); let added=0;
  for(const n of raw){ fresh.add(n.id);

    const r=3.2+(n.importance||0.3)*4.5+Math.min(6,Math.log2((n.access||0)+1)*1.4);

    if(ex){ ex.tier=n.tier; ex.access=n.access; ex.importance=n.importance; ex.tierA=tierA; ex.r=r; continue; }

  // any change to the node set must invalidate the cache or the next frame draws edges to wrong/gone

      for(let j=0;j<ns.length;j++){ if(i===j)continue; const m=ns[j];

  }

// Orbit (drag), zoom (wheel), click-to-open. A drag rotates the camera; a press that barely moves is

function brainWireInput(canvas){
  canvas.onmousemove=e=>{ const r=canvas.getBoundingClientRect(); BRAIN.mouse.x=e.clientX-r.left; BRAIN.mouse.y=e.clientY-r.top; };
  canvas.onmouseleave=()=>{ if(BRAIN && !BRAIN.drag){ BRAIN.mouse.x=-1; BRAIN.mouse.y=-1; } };
  canvas.onmousedown=e=>{ if(BRAIN) BRAIN.drag={lx:e.clientX, ly:e.clientY, moved:0}; brainFadeHint(); };
  canvas.onwheel=e=>{ e.preventDefault(); if(!BRAIN) return; const z=BRAIN.cam.zoom*(1-e.deltaY*0.0014); BRAIN.cam.zoom=Math.max(0.45,Math.min(4,z)); brainFadeHint(); };
  canvas.style.cursor='grab';
  function brainFadeHint(){ document.querySelector('.brain-hint')?.classList.add('faded'); }
  if(!window._brainDragWired){ window._brainDragWired=true;
    window.addEventListener('mousemove', e=>{ const B=BRAIN; if(!B||!B.drag) return;
      const dx=e.clientX-B.drag.lx, dy=e.clientY-B.drag.ly; B.drag.moved+=Math.abs(dx)+Math.abs(dy); B.drag.lx=e.clientX; B.drag.ly=e.clientY;
      B.cam.yaw+=dx*0.008; B.cam.pitch=Math.max(-1.4,Math.min(1.4, B.cam.pitch+dy*0.008));
      if(B.canvas) B.canvas.style.cursor='grabbing'; });
    window.addEventListener('mouseup', ()=>{ const B=BRAIN; if(!B||!B.drag) return; const wasClick=B.drag.moved<5; B.drag=null;
      if(B.canvas) B.canvas.style.cursor='grab';
      if(wasClick){ B.hover?brainShowDetail(B.hover):brainCloseDetail(); } });
  }
}

async function renderMind(){

  if(panel){ let col='0'; try{ col=localStorage.getItem('engram.mindCollapsed')||'0'; }catch(_){}
    panel.classList.toggle('collapsed', col==='1'); const tg=panel.querySelector('.mind-toggle'); if(tg) tg.textContent=col==='1'?'▸':'▾'; }
  const wrap=document.getElementById('mindLines'); if(!wrap) return;
  let st; try{ st=await J('/v1/consciousness'); }catch(_){ st={lines:[]}; }
  MIND=st;
  const ver=document.getElementById('mindVer'); if(ver) ver.textContent=(st.lines||[]).length?`${st.lines.length}/9 lines`:'';
  const lines=st.lines||[];
  if(!lines.length){ wrap.innerHTML=`<div class="mind-empty"><b>Working memory is empty.</b><br>Distill it from your brain, or add a line you want loaded into every answer.</div>`; return; }
  wrap.innerHTML = lines.map(l=>{
    const reg=BRAIN_REGIONS[l.region]||BRAIN_REGIONS.semantic;
    const isMem=l.source&&l.source.kind==='memory';
    const src = isMem
      ? `<span class="ml-src mem" onclick="mindFocus(${(l.source.id|0)})" title="Open the source memory in the brain">◇ #${l.source.id}</span>`
      : `<span class="ml-src">✎ yours</span>`;
    const pin = l.pinned ? `<span class="ml-pin" title="Pinned - kept when you re-distill">📌</span>` : '';
    return `<div class="mind-line" style="--lc:${reg.color}">
      <div class="ml-act"><button onclick="mindEdit('${escAttr(l.id)}')" title="Edit">✎</button><button onclick="mindRemove('${escAttr(l.id)}')" title="Remove">×</button></div>
      <div class="ml-t">${esc(l.text)}</div>
      <div class="ml-b"><i style="color:${reg.color}">${esc(reg.label)}</i>${src}${pin}</div>
    </div>`;
  }).join('');
}
function mindApply(st){ MIND=st; renderMind(); }
const MIND_JSON={'content-type':'application/json'};
async function mindDistill(){
  try{ mindApply(await J('/v1/consciousness/distill',{method:'POST'})); notify('Re-distilled from your brain · signed','ok'); }
  catch(e){ notify('Couldn\'t distill - '+e.message); }
}
async function mindRevert(){
  try{ mindApply(await J('/v1/consciousness/revert',{method:'POST'})); notify('Reverted to the previous version · signed','ok'); }
  catch(e){ notify('Nothing to revert to'); }
}
async function mindAdd(){
  const v=await askInput({title:'Add to working memory',label:'A durable fact you want loaded into every answer. Saved as yours, and signed.',placeholder:'e.g. I work in Europe/Sofia time',ok:'Add'});
  if(v===null) return; const t=v.trim(); if(!t) return;
  try{ mindApply(await J('/v1/consciousness/add',{method:'POST',headers:MIND_JSON,body:JSON.stringify({text:t})})); notify('Added to working memory · signed','ok'); }
  catch(e){ notify('Couldn\'t add - '+e.message); }
}
async function mindEdit(id){
  const l=(MIND.lines||[]).find(x=>x.id===id); if(!l) return;
  const v=await askInput({title:'Edit working memory',label:'Always loaded into every answer. Editing pins this line, so re-distilling keeps it.',value:l.text,ok:'Save'});
  if(v===null) return; const t=v.trim(); if(!t) return;
  try{ mindApply(await J('/v1/consciousness/edit',{method:'POST',headers:MIND_JSON,body:JSON.stringify({id,text:t})})); notify('Updated · pinned · signed','ok'); }
  catch(e){ notify('Couldn\'t edit - '+e.message); }
}
async function mindRemove(id){
  if(!await askConfirm({title:'Remove this line?',message:'It stops loading into answers. You can Revert to undo.',ok:'Remove',danger:true})) return;
  try{ mindApply(await J('/v1/consciousness/remove',{method:'POST',headers:MIND_JSON,body:JSON.stringify({id})})); notify('Removed · signed (Revert to undo)','ok'); }
  catch(e){ notify('Couldn\'t remove - '+e.message); }
}
function mindFocus(memId){
  const B=BRAIN; if(!B) return;
  const node=B.nodes.find(n=>n.id===memId);
  if(!node){ notify('That memory isn\'t in the current graph view'); return; }
  brainShowDetail(node);
  const orig=node.r; node.r=orig*1.9; setTimeout(()=>{ if(node) node.r=orig; }, 900);
}
// A recall-ribbon chip under a chat answer: jump to the Memory view and focus the memory that
// grounded the reply, so "what backed this answer" is one click from the answer itself.
function recallOpen(id){
  // Already looking at the brain (e.g. browsing the Recent list): focus in place - re-running
  // renderMemory would close the list, reset the camera, and replay the birth animation.
  if(state.route==='Memory' && BRAIN && BRAIN.nodes && BRAIN.nodes.length){ mindFocus(id); return; }
  go('Memory');
  // Poll until the brain has loaded (the graph fetch can be slower than any fixed delay), then focus.
  let tries=0;
  const tick=()=>{ tries++;
    if(BRAIN && BRAIN.nodes && BRAIN.nodes.length){ if(typeof mindFocus==='function') mindFocus(id); return; }
    if(tries<25) setTimeout(tick, 120);
  };
  setTimeout(tick, 200);
}

function openTeach(){
  let m=document.getElementById('teachOverlay');
  if(!m){ m=document.createElement('div'); m.id='teachOverlay'; m.className='overlay teach'; document.body.appendChild(m); }
  const regs=Object.entries(BRAIN_REGIONS).map(([k,r],i)=>`<button class="seg ${i===0?'on':''}" data-r="${k}" onclick="teachPick('${k}',this)" style="--rc:${r.color}">${r.label}</button>`).join('');
  // Scope is a first-class, VISIBLE choice: silently writing every taught fact user-global was the
  // exact cross-project bleed this release closes for automatic captures.
  const proj=curProject();
  m.innerHTML=`<div class="teach-card">
    <h3>Teach Engram</h3>
    <div class="teach-sub">Add something to its memory. Pick the region, then write it the way you'd say it.</div>
    <div class="seg-row">${regs}</div>
    <textarea id="teachText" placeholder="e.g. I prefer concise answers. · I'm building Engram in Rust. · The launch is in September."></textarea>
    <div class="seg-row teach-scope" title="Where this fact lives. Project facts stay out of your other projects' recall; global facts follow you everywhere.">
      <button class="seg on" data-s="project" onclick="teachScope('project',this)">In ${esc(proj.name)}</button>
      <button class="seg" data-s="global" onclick="teachScope('global',this)">Everywhere</button>
    </div>
    <div class="teach-foot">
      <label class="teach-imp">Importance <input type="range" id="teachImp" min="0" max="1" step="0.05" value="0.7"></label>
      <div class="teach-actions"><button class="ghost" onclick="closeTeach()">Cancel</button><button class="primary" onclick="saveTeach()">Remember</button></div>
    </div></div>`;
  m.hidden=false; m._region='identity'; m._scope='project'; m.onclick=e=>{ if(e.target===m) closeTeach(); };
  setTimeout(()=>document.getElementById('teachText')?.focus(),30);
}
function teachPick(k,btn){ document.querySelectorAll('#teachOverlay .seg-row:not(.teach-scope) .seg').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); document.getElementById('teachOverlay')._region=k; }
function teachScope(s,btn){ document.querySelectorAll('#teachOverlay .teach-scope .seg').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); document.getElementById('teachOverlay')._scope=s; }
function closeTeach(){ const m=document.getElementById('teachOverlay'); if(m) m.hidden=true; }
async function saveTeach(){
  const m=document.getElementById('teachOverlay'), text=(document.getElementById('teachText').value||'').trim(); if(!text) return;
  const region=m._region||'identity', importance=parseFloat(document.getElementById('teachImp').value);
  // "In <project>" routes the write through the active session's scope (the daemon classifies it
  // into the project ring); "Everywhere" keeps the user-global default.
  const body={region,text,importance};
  if(m._scope!=='global' && WS.activeSession) body.session=WS.activeSession;
  try{ await J('/v1/remember',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)}); }
  catch(e){ notify('Couldn\'t save - '+e.message); return; }
  closeTeach(); notify(m._scope==='global'?'Remembered — everywhere':'Remembered — in '+curProject().name,'ok');
  // Merge the new node in calmly; a full renderMemory teardown reset the camera + replayed the
  // birth animation for one added fact.
  if(state.route==='Memory' && typeof brainPoll==='function') brainPoll();
  if(document.getElementById('brainRecent')) brainRecentLoad();
}

let _skills=[], _skFilter={q:'',cat:'all'};
// Which skill cards are expanded. Collapsed-by-default turns 43 tall cards into a scannable list;

const _skOpen=new Set();

  if(e.target.closest('button,input,label,select,textarea,a,.vchip,.sk-rt')) return;   // real controls keep their clicks

function skillCardHTML(s){
    const active=s.active, runs=s.runs||0, verified=runs>0, proposed=!!s.proposed;
    const ladder=(s.versions||[]).map(v=>`<span class="vchip${v===active?' active':''}" title="Activate v${v}" onclick="skillActivate('${esc(s.id)}',${v})">v${v}</span>`).join('<span class="varr">→</span>');
    const statusPill = proposed
      ? `<span class="sk-pill warn" title="Engram distilled this skill from real use. It is NOT active yet — Adopt replays it against its recorded examples and activates it only if it reproduces them.">proposed · not active</span>`
      : verified
      ? `<span class="sk-pill ok" title="Improvements are scored by exact match against ${runs} recorded (input, accepted-output) pair${runs===1?'':'s'}.">verified · ${runs} scored run${runs===1?'':'s'}</span>`
      : `<span class="sk-pill dim" title="No recorded (input, accepted-output) pairs to score against yet - so an improvement can't be measured. Add an example to make it scoreable. Honest signal, not a guess.">unverified</span>`;
    const events=(s.learn||[]).slice().reverse().map(e=>{
      const inc=(+e.incumbent_score||0), cand=(+e.candidate_score||0), reps=e.replays||0;
      const seq=e.seq?`<span class="sk-seq" title="copy the signed ledger hash" onclick="navigator.clipboard.writeText('${escAttr(e.hash||'')}')">◇ ${e.seq|0}</span>`:'';
      if(e.promoted) return `<div class="sk-ev promoted">✓ <b>v${e.from|0} → v${e.to|0}</b> beat the incumbent · <b>${inc.toFixed(2)} → ${cand.toFixed(2)}</b> on ${reps} replay${reps===1?'':'s'} ${seq}</div>`;
      return `<div class="sk-ev rejected">↺ <b>v${e.candidate|0} rejected</b> · ${cand.toFixed(2)} ≤ ${inc.toFixed(2)} on ${reps} replay${reps===1?'':'s'} - kept v${e.active|0} ${seq}</div>`;
    }).join('');
    const evBlock = events ? `<div class="sk-events">${events}</div>`
      : (verified && !proposed ? `<div class="sk-muted">No promotions yet - v${active} is the best on ${runs} run${runs===1?'':'s'}.</div>` : '');
    const rt = s.runtime==='process' ? esc(s.interpreter||'script') : 'wasm';
    const rtBadge = `<span class="sk-rt" title="${s.runtime==='process'?'A small program the agent wrote, run in your shell sandbox':'A WASM transform run in the fuel-bounded sandbox'}">${rt}</span>`;
    const catBadge = s.category ? `<span class="sk-rt" style="background:var(--surface-3);color:var(--text-muted)" title="category" data-cat="${escAttr(s.category)}" onclick="setSkillCat(this.dataset.cat)">${esc(s.category)}</span>` : '';
    const caps = (s.capabilities||[]).length ? `<span class="sk-caps" title="capabilities this skill is signed for">${(s.capabilities||[]).map(c=>esc(c)).join(' · ')}</span>` : '';
    const enabled = s.enabled !== false;
    const toggle = `<label class="sk-toggle" title="${enabled?'On — the agent can use this skill':'Off — hidden from the agent'}"><input type="checkbox" ${enabled?'checked':''} onchange="skillToggle('${esc(s.id)}',this.checked)"><span class="sk-sw"></span></label>`;
    const body = !enabled ? `<div class="sk-muted">Disabled — turn it on to use, test, or improve it.</div>`
      : proposed ? `
      <div class="sk-actions">
        <button class="sbtn" onclick="skillAdopt('${esc(s.id)}')" title="Replay this skill against its recorded examples and activate it ONLY if it reproduces them — the verified way to put a proposed skill into use.">✓ Adopt</button>
        <button class="sbtn ghost" onclick="skillTeach('${esc(s.id)}')" title="Record a correct input→output example to verify against before adopting.">+ Add example</button>
      </div>
      <div class="sk-muted">${runs?`Has ${runs} recorded example${runs===1?'':'s'} — Adopt replays them, then activates if they all pass.`:'No examples recorded — add one, then Adopt.'}</div>` : `
      <div class="sk-try">
        <div class="sk-lbl" title="Run the skill on an input to see what it returns">Try it</div>
        <div class="sk-run"><input id="in_${esc(s.id)}" placeholder="give it an input and press Run..." onkeydown="if(event.key==='Enter')runSkill('${esc(s.id)}')"><button class="sbtn" onclick="runSkill('${esc(s.id)}')">Run</button><span id="out_${esc(s.id)}" class="sk-out"></span></div>
      </div>
      <div class="sk-actions">
        <button class="sbtn ghost" onclick="skillTeach('${esc(s.id)}')" title="Record a correct input→output example. These become the gold set the agent measures improvements against.">+ Add example</button>
        <button class="sbtn ghost" onclick="skillImprove('${esc(s.id)}')" title="Let the agent rewrite the skill. The new version is replayed against your examples and kept ONLY if it scores better — every change signed.">Improve ↑</button>
        ${(s.versions||[]).length>1?`<button class="sbtn ghost" onclick="skillRevert('${esc(s.id)}')" title="Roll back to the previous version">Revert</button>`:''}
      </div>`;
    // Proposed skills stay open — they're waiting on a decision (Adopt / add an example) and
    // hiding the CTA behind a click would bury exactly the thing that needs attention.
    const open = proposed || _skOpen.has(s.id);
    return `<div class="sk-card${enabled?'':' off'}${proposed?' proposed':''}${open?' open':''}" onclick="skCardClick(event,'${esc(s.id)}')">
      <div class="sk-head">${toggle}<span class="sk-name">${esc(s.id)}</span>${rtBadge}${catBadge}<span class="vladder">${ladder}</span><span class="grow"></span>${statusPill}<span class="sk-chev" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span></div>
      ${s.description?`<div class="sk-desc">${esc(s.description)}${caps?' — '+caps:''}</div>`:''}
      <div class="sk-more">${evBlock}${body}</div>
    </div>`;
}
async function renderSkills(){
  document.getElementById('viewname').textContent='Skills';
  let sk={skills:[]}, loadErr=null; try{ sk=await J('/v1/skills'); }catch(e){ loadErr=(e&&e.message)||'couldn\'t load'; }
  _skills=sk.skills||[];
  const headBtns = `<button class="sbtn ghost" onclick="downloadBoilerplate()" title="Download a ready-to-edit skill template">↓ Template</button>
        <button class="sbtn" onclick="skillUpload()" title="Write or upload your own skill">+ New skill</button>`;
  // Distinguish a FETCH FAILURE from a genuinely empty library — with 40+ seeded skills, "No skills
  // yet" on a transient error told the user their data was gone.
  if(loadErr){
    document.getElementById('view').innerHTML = `<div class="skills-wrap">
      <div class="skills-head"><div class="sh-row"><h2>Skills</h2><span class="grow"></span>${headBtns}</div></div>
      <div class="sk-empty"><b>Couldn't load skills.</b><span>${esc(loadErr)}</span><div class="row" style="justify-content:center;margin-top:6px"><button class="sbtn" onclick="renderSkills()">Retry</button></div></div></div>`;
    return;
  }
  if(!_skills.length){
    document.getElementById('view').innerHTML = `<div class="skills-wrap">
      <div class="skills-head"><div class="sh-row"><h2>Skills</h2><span class="grow"></span>${headBtns}</div></div>
      <div class="sk-empty"><b>No skills yet.</b><span>Skills are small, signed programs Engram runs and improves. Add your own, or download the template to start.</span><div class="row" style="justify-content:center;margin-top:6px"><button class="sbtn ghost" onclick="downloadBoilerplate()">↓ Template</button><button class="sbtn" onclick="skillUpload()">+ New skill</button></div></div></div>`;
    return;
  }
  // category counts over the full set (independent of the search box)
  const counts={}; _skills.forEach(s=>{ const c=s.category||'other'; counts[c]=(counts[c]||0)+1; });
  const cats=Object.keys(counts).sort();
  if(_skFilter.cat!=='all' && !counts[_skFilter.cat]) _skFilter.cat='all';
  // category comes from the skill manifest and is NOT charset-validated server-side, so it can
  // contain quotes — never interpolate it into an inline JS string. Read it from data-cat instead.
  const chip=(key,label,n)=>`<span class="sk-cat${_skFilter.cat===key?' active':''}" data-cat="${escAttr(key)}" onclick="setSkillCat(this.dataset.cat)">${esc(label)}<span class="n">${n}</span></span>`;
  const chips=[chip('all','all',_skills.length)].concat(cats.map(c=>chip(c,c,counts[c]))).join('');
  document.getElementById('view').innerHTML = `<div class="skills-wrap">
    <div class="skills-head"><div class="sh-row"><h2>Skills</h2><span class="grow"></span>${headBtns}
        <button class="sbtn ghost" onclick="openPipeline()" title="Chain skills so each one's output feeds the next">+ Pipeline</button></div>
      <div class="sub"><b>Try</b> a skill with an input · <b>Add examples</b> of the right input→output · <b>Improve</b> lets the agent rewrite it and keep the new version only when it scores better on your examples. Every program and every change is signed and verifiable. Toggle one off to hide it from the agent.</div></div>
    <div class="sk-filter">
      <label class="sk-search"><span class="sk-mag">⌕</span><input id="skq" placeholder="Search skills by name or description…" value="${escAttr(_skFilter.q)}" oninput="onSkillSearch(this.value)"></label>
      <div class="sk-cats">${chips}</div>
    </div>
    <div class="skills-list" id="skills-list"></div></div>`;
  renderSkillList();
}
function renderSkillList(){
  const q=_skFilter.q.trim().toLowerCase(), cat=_skFilter.cat;
  const list=_skills.filter(s=>{
    if(cat!=='all' && (s.category||'other')!==cat) return false;
    if(!q) return true;
    return (s.id||'').toLowerCase().includes(q) || (s.description||'').toLowerCase().includes(q)
        || (s.category||'').toLowerCase().includes(q) || (s.when_to_use||'').toLowerCase().includes(q);
  });
  // Surface PROPOSED (distilled, not-yet-active) skills first so they don't get lost — they're the
  // ones waiting on a decision (Adopt / add an example).
  list.sort((a,b)=>(b.proposed?1:0)-(a.proposed?1:0));
  const el=document.getElementById('skills-list'); if(!el) return;
  // Rebuilding the list wiped every card's in-progress Try-it input and run output the moment any
  // OTHER card was expanded/toggled. Snapshot them and put them back after the repaint.
  const keep={};
  el.querySelectorAll('input[id^="in_"]').forEach(x=>{ if(x.value) keep[x.id]={v:x.value}; });
  el.querySelectorAll('[id^="out_"]').forEach(x=>{ if(x.innerHTML) (keep[x.id]=keep[x.id]||{}).h=x.innerHTML; });
  el.innerHTML = list.length ? list.map(skillCardHTML).join('')
    : `<div class="sk-none">No skills match <b>${esc(_skFilter.q||cat)}</b>.</div>`;
  for(const id in keep){ const x=document.getElementById(id); if(!x) continue;
    if(keep[id].v!=null) x.value=keep[id].v; if(keep[id].h!=null) x.innerHTML=keep[id].h; }
}
function setSkillCat(c){ _skFilter.cat=c;
  document.querySelectorAll('.sk-cat').forEach(el=>el.classList.toggle('active', el.dataset.cat===c));
  renderSkillList();
}
function onSkillSearch(v){ _skFilter.q=v; renderSkillList(); }
async function runSkill(id){
  const inEl=document.getElementById('in_'+id), out=document.getElementById('out_'+id);
  const input=inEl?inEl.value:'';
  const btn=out?out.parentNode.querySelector('button'):null;
  if(out) out.textContent='…';
  if(btn){ btn.disabled=true; }
  // J() throws on any non-2xx (e.g. run refused because the shell tool is off — a common state).
  // Without this try/catch the rejection was swallowed by the global unhandledrejection handler
  // whenever the daemon was healthy, so clicking Run did nothing at all.
  try{
    const r=await J('/v1/skills/'+encodeURIComponent(id)+'/run',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({input})});
    if(out) out.textContent = r.error?('error: '+r.error):('→ '+r.output);
  }catch(e){ if(out) out.textContent='error: '+((e&&e.message)||'run failed'); }
  finally{ if(btn) btn.disabled=false; }
}

function skillLoadFile(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ const ov=input.closest('.overlay');
    ov.querySelector('#suSrc').value=r.result;
    ov.querySelector('#suFileName').textContent=f.name;
    if(!ov.querySelector('#suId').value) ov.querySelector('#suId').value=f.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,64);
    const ext=(f.name.split('.').pop()||'').toLowerCase(), map={py:'python3',js:'node',sh:'bash',rb:'ruby',php:'php',pl:'perl'};
    if(map[ext]) ov.querySelector('#suInterp').value=map[ext];
  };
  r.readAsText(f);
}
async function skillUploadSave(btn){

// Adopt a proposed (distilled) skill: the daemon replays it against its recorded examples and
// activates it ONLY if it reproduces them — the verified alternative to a raw activate.
async function skillAdopt(id){
  try{
    const r=await J('/v1/skills/'+encodeURIComponent(id)+'/adopt',{method:'POST',headers:MIND_JSON,body:'{}'});
    const d=r&&r.decision;
    if(d==='adopted') notify('Adopted "'+id+'" · verified & active · signed','ok');
    else if(d==='approved') notify('Approved "'+id+'" · active — network skill (can\'t be replay-verified) · signed','ok');
    else if(d==='needs_approval') notify('"'+id+'" is a network skill — click Adopt to approve & activate it');
    else if(d==='no_data') notify('Add at least one example first, then Adopt');
    else if(d==='already_active') notify('"'+id+'" is already active','ok');
    else if(d==='needs_shell') notify('Turn on the shell tool (Settings → Tools) so this script skill can be run & verified');
    else notify('Not adopted — it didn\'t reproduce its examples'+(r&&r.score!=null?' (score '+(+r.score).toFixed(2)+')':''));
    renderSkills();

  catch(e){ notify('Couldn\'t adopt - '+((e&&e.message)||'error')); }

// Improve: author a new version. The daemon dispatches on the ACTIVE version's runtime — a WASM
// skill takes `wat` (compiled here), a process skill takes `source` (its interpreter). The old modal
// only ever offered WAT, so Improve failed on every process skill (41 of 43 seed skills, and every
// agent-authored one) with "this is a process skill — provide `source`". Branch on s.runtime.
function skillImprove(id){
  const s=(_skills||[]).find(x=>x.id===id)||{runtime:'wasm'};
  const isProc = s.runtime==='process';
  const interp = s.interpreter||'python3';
  const ov=document.createElement('div'); ov.className='overlay ask';
  ov.innerHTML=`<div class="ask-card" style="width:min(660px,94vw)">
    <div class="ask-title">Improve ${esc(id)}</div>
    ${isProc
      ? `<div class="ask-msg">Paste a new version of the <b>${esc(interp)}</b> source (reads a JSON request on stdin, writes a JSON result on stdout). It is replayed against the recorded examples and promoted only if it measurably beats the current version — the before/after signed to the ledger.</div>
    <textarea class="ask-input" id="impSrc" rows="12" placeholder="paste the new skill source…" style="resize:vertical;font:12px var(--mono);line-height:1.5"></textarea>`
      : `<div class="ask-msg">Paste a new version as WebAssembly Text (WAT). It is compiled here, replayed against the recorded examples, and promoted only if it measurably beats the current version — the before/after signed to the ledger.</div>
    <textarea class="ask-input" id="impWat" rows="10" placeholder="(module ... )" style="resize:vertical;font:12px var(--mono);line-height:1.5"></textarea>`}
    <div class="ask-actions"><button class="ask-ghost" onclick="this.closest('.overlay').remove()">Cancel</button><button class="ask-ok" onclick="skillImproveSave(${attrJson(id)},this,${isProc?'true':'false'},${attrJson(interp)})">Submit improvement</button></div>
  </div>`;
  document.body.appendChild(ov); setTimeout(()=>{ const t=ov.querySelector(isProc?'#impSrc':'#impWat'); if(t)t.focus(); },20);
}
async function skillImproveSave(id,btn,isProc,interp){
  const ov=btn.closest('.overlay');
  let body;
  if(isProc){ const src=ov.querySelector('#impSrc').value; if(!src.trim()){ notify('Paste the new skill source'); return; }
    body=JSON.stringify({source:src, interpreter:interp||'python3'}); }
  else { const wat=ov.querySelector('#impWat').value.trim(); if(!wat){ notify('Paste the new version as WAT source'); return; }
    body=JSON.stringify({wat}); }
  const ok=ov.querySelector('.ask-ok'); if(ok){ ok.disabled=true; ok.textContent='Replaying...'; }
  try{ const r=await J('/v1/skills/'+encodeURIComponent(id)+'/improve',{method:'POST',headers:MIND_JSON,body}); ov.remove();
    notify(r.promoted?('Promoted to v'+(r.to||'?')+' - it won on replay'):'Submitted - it did not beat the current version, so the active one is kept','ok'); renderSkills(); }
  catch(e){ if(ok){ ok.disabled=false; ok.textContent='Submit improvement'; } notify('Couldn\'t improve - '+((e&&e.message)||'error')); }
}
// Skill pipeline (swarm): chain skills so each one's output feeds the next. POSTs /v1/swarm.
let _pipeline=[];
async function openPipeline(){
  _pipeline=[];
  let ids=[]; try{ const sk=await J('/v1/skills'); ids=(sk.skills||[]).map(s=>s.id); }catch(_){}
  const ov=document.createElement('div'); ov.className='overlay ask';
  ov.innerHTML=`<div class="ask-card" style="width:min(560px,93vw)">
    <div class="ask-title">Run a skill pipeline</div>
    <div class="ask-msg">Chain skills so each one's output feeds the next. Click skills to build the chain, give it an input, and run - every step signed.</div>
    <div class="pl-pool">${ids.length?ids.map(id=>`<button class="pl-chip" onclick="pipelineAdd('${escAttr(id)}')">${esc(id)}</button>`).join(''):'<span class="rp-empty">no skills yet</span>'}</div>
    <div class="pl-chain" id="plChain"><span class="pl-empty">click skills above to build the chain</span></div>
    <textarea class="ask-input" id="plInput" rows="2" placeholder="input for the first skill" style="resize:vertical;font:inherit"></textarea>
    <div id="plOut" class="pl-out" hidden></div>
    <div class="ask-actions"><button class="ask-ghost" onclick="this.closest('.overlay').remove()">Close</button><button class="ask-ok" onclick="pipelineRun(this)">Run pipeline</button></div>
  </div>`;
  document.body.appendChild(ov);
}
function pipelineAdd(id){ _pipeline.push(id); pipelineRender(); }
function pipelineDel(i){ _pipeline.splice(i,1); pipelineRender(); }
function pipelineRender(){ const c=document.getElementById('plChain'); if(!c) return;
  c.innerHTML = _pipeline.length ? _pipeline.map((id,i)=>`<span class="pl-step">${esc(id)}<button onclick="pipelineDel(${i})" aria-label="remove">×</button></span>`).join('<span class="pl-arr">→</span>') : '<span class="pl-empty">click skills above to build the chain</span>';
}
async function pipelineRun(btn){
  if(!_pipeline.length){ notify('Add at least one skill to the chain'); return; }
  const ov=btn.closest('.overlay'); const input=ov.querySelector('#plInput').value;
  const out=ov.querySelector('#plOut'); btn.disabled=true; btn.textContent='Running...';
  out.hidden=false; out.innerHTML=`<div class="pl-running">${thinkingDots} running pipeline...</div>`;
  try{ const r=await J('/v1/swarm',{method:'POST',headers:MIND_JSON,body:JSON.stringify({steps:_pipeline,input})});
    out.innerHTML=`<div class="pl-lbl">Output after ${(_pipeline.length)} step${_pipeline.length===1?'':'s'}</div><pre class="pl-pre">${esc(String(r.output||''))}</pre>`;
  }catch(e){ out.innerHTML=`<div class="pl-err">Pipeline failed - ${esc((e&&e.message)||'error')}</div>`; }
  finally{ btn.disabled=false; btn.textContent='Run again'; }
}

    max_actions: parseInt(ov.querySelector('#apMax').value,10)||0,

    const r = await J('/v1/agents/'+id+'/policy',{method:'POST',headers:MIND_JSON,body});
    const i=AGENTS.findIndex(x=>x.id===id); if(i>=0) AGENTS[i]=r;
    notify('Autonomy policy signed · saved','ok');

// Export the non-secret settings as a portable JSON file. The /v1/config view is already
// redacted (no keys), so a backup can never leak a secret; restoring re-enters keys by hand.
async function exportSettings(){
  try{
    const c = await J('/v1/config');
    const out = {
      _engram_settings: 1,
      provider: { kind:c.provider?.kind, base_url:c.provider?.base_url, model:c.provider?.model },
      embed: c.embed, cost: c.cost, mcp: c.mcp || [],
    };
    const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'engram-settings.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);

  }catch(e){ notify('Export failed: '+e.message); }
}
async function importSettings(input){
  const file = input.files && input.files[0]; input.value='';
  if(!file) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    // Only ever apply the known non-secret fields - never trust arbitrary keys from a file.
    const patch = {};
    if(data.provider && typeof data.provider==='object'){
      patch.provider = { kind:data.provider.kind||'mock', base_url:data.provider.base_url||'', model:data.provider.model||'' };
    }
    if(data.embed && typeof data.embed==='object') patch.embed = { kind:data.embed.kind||'trigram', model_dir:data.embed.model_dir||'' };
    if(data.cost && typeof data.cost==='object' && data.cost.task_token_budget) patch.cost = { task_token_budget: parseInt(data.cost.task_token_budget,10)||250000 };
    if(Array.isArray(data.mcp)) patch.mcp = data.mcp.filter(s=>s&&s.name&&s.command).map(s=>({name:String(s.name),command:String(s.command),args:Array.isArray(s.args)?s.args.map(String):[]}));
    if(!Object.keys(patch).length){ notify('No recognizable settings in that file'); return; }
    await J('/v1/config',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(patch)});
    await ccReload();
    notify('Settings imported - re-enter any API keys','ok');
  }catch(e){ notify('Import failed: '+e.message); }
}
