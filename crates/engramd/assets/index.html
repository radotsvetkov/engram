<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Engram</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5.4' fill='%23181c20'/%3E%3Cg fill='none' stroke='%23eef2f0' stroke-width='1.55' stroke-linecap='round' stroke-linejoin='round' transform='translate(2.4 4) scale(.8)'%3E%3Cpath d='M12 9V5.5'/%3E%3Cpath d='M14.6 13.5 17.6 15.2'/%3E%3Cpath d='M9.4 13.5 6.4 15.2'/%3E%3Ccircle cx='12' cy='12' r='3'/%3E%3Ccircle cx='12' cy='3.9' r='1.6'/%3E%3Ccircle cx='5' cy='16' r='1.6'/%3E%3C/g%3E%3Cg transform='translate(2.4 4) scale(.8)'%3E%3Ccircle cx='12' cy='12' r='.95' fill='%23eef2f0'/%3E%3Ccircle cx='19' cy='16' r='1.6' fill='%2345c8a8'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root {
    /* surfaces - cooled graphite, monotonic luminance steps; the rail is the darkest, so the
       three columns separate without relying on a hairline. */
    --rail:#08090b; --surface-0:#0c0d10; --surface-1:#111316; --surface-2:#181b1f; --surface-3:#21242a;
    --border:rgba(255,255,255,.06); --border-strong:rgba(255,255,255,.10);
    --border-hi:inset 0 1px 0 rgba(255,255,255,.05);
    --text-primary:#e8e9ec; --text-secondary:#a3a7af; --text-muted:#6c7078;
    --accent:#45c8a8; --accent-ink:#04342c; --accent-soft:rgba(69,200,168,.12); --ring:rgba(69,200,168,.5);
    --glow:drop-shadow(0 0 6px rgba(69,200,168,.45));
    --hover:rgba(255,255,255,.045); --active:rgba(255,255,255,.075);
    --warning:#e0a23c; --danger:#e2675f;
    --web:#85b7eb; --web-bg:#101a24; --files:#ef9f27; --files-bg:#1a1812;
    /* elevation - deep, soft, top-lit */
    --e1:0 1px 2px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
    --e2:0 2px 8px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    --e3:0 8px 28px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    --e4:0 24px 70px rgba(0,0,0,.62), 0 2px 8px rgba(0,0,0,.4);
    --r-chip:7px; --r-card:12px; --r-modal:16px; --radius:8px;
    /* motion - calm and physical */
    --ease-out:cubic-bezier(.22,.61,.36,1); --ease-spring:cubic-bezier(.34,1.4,.5,1); --ease-inout:cubic-bezier(.65,0,.35,1);
    --dur-1:90ms; --dur-2:160ms; --dur-3:260ms; --dur-4:420ms;
    --font-voice:Georgia, 'Times New Roman', serif;
    --sans:-apple-system,'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--surface-0); color:var(--text-primary); font:13px/1.5 var(--sans);
    -webkit-font-smoothing:antialiased; }
  button,input,textarea { font:inherit; color:inherit; }
  ::placeholder { color:var(--text-muted); }
  ::-webkit-scrollbar { width:9px; height:9px; } ::-webkit-scrollbar-thumb { background:var(--surface-3); border-radius:6px; }

  .app { display:grid; grid-template-columns:56px 252px 1fr; height:calc(100vh - 26px); }

  /* Rail */
  .rail { background:var(--rail); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:14px 8px; }
  .brand { display:flex; align-items:center; gap:8px; padding:4px 8px 14px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); }
  .brand .mark { display:flex; color:var(--text-primary); }
  .brand .mark svg { width:21px; height:21px; }
  .brand b { font-weight:600; }
  .nav { display:flex; flex-direction:column; gap:2px; }
  .nav a { position:relative; display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:var(--radius);
    color:var(--text-secondary); cursor:pointer; text-decoration:none; }
  .nav a:hover { background:var(--hover); color:var(--text-primary); }
  .nav a.active { background:var(--active); color:var(--text-primary); }
  .nav a.active::before { content:''; position:absolute; left:-8px; top:50%; transform:translateY(-50%); width:3px; height:18px;
    background:var(--accent); border-radius:0 3px 3px 0; box-shadow:0 0 8px rgba(69,200,168,.5); }
  .nav a svg { width:16px; height:16px; opacity:.6; transition:opacity .15s, color .15s, filter .15s; }
  .nav a:hover svg { opacity:.9; }
  .nav a.active svg { opacity:1; color:var(--accent); filter:var(--glow); }
  .rail .spacer { flex:1; }
  .nav.tools::before { content:''; display:block; height:1px; background:var(--border); margin:0 7px 8px; }
  .status { font-size:11px; color:var(--text-muted); padding:8px; line-height:1.4; }
  .status .live { color:var(--accent); }

  /* Main */
  .main { display:flex; flex-direction:column; min-width:0; }
  .topbar { height:44px; flex:none; display:flex; align-items:center; gap:10px; padding:0 16px;
    border-bottom:1px solid var(--border); }
  .topbar h1 { font-size:15px; font-weight:500; margin:0; }
  .topbar .right { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .chip { font-size:12px; color:var(--text-secondary); background:var(--surface-2);
    border:1px solid var(--border); border-radius:var(--radius); padding:4px 9px; cursor:default; transition:color .4s; }
  .chip.ok b { color:var(--accent); font-weight:500; }
  .chip.bad { color:var(--danger); border-color:rgba(226,103,95,.4); }
  .stopbtn { display:inline-flex; align-items:center; gap:5px; background:var(--surface-2); color:var(--text-secondary);
    border:1px solid var(--border); border-radius:var(--radius); padding:4px 9px; font-size:12px; cursor:pointer; transition:.15s; }
  .stopbtn:hover { color:var(--danger); border-color:rgba(226,103,95,.45); background:rgba(226,103,95,.08); }
  .stopbtn svg { width:13px; height:13px; }
  .banner { background:rgba(226,103,95,.12); color:var(--danger); border-bottom:1px solid rgba(226,103,95,.3);
    padding:8px 16px; font-size:12px; }
  .offline { background:rgba(224,162,60,.1); color:var(--warning); border-bottom:1px solid rgba(224,162,60,.25);
    padding:7px 16px; font-size:12px; }
  .view { flex:1; min-height:0; overflow:auto; }

  /* Composer */
  .composer { background:var(--surface-1); border:1px solid var(--border-strong); border-radius:14px; padding:11px 13px;
    transition:border-color .16s, box-shadow .16s; }
  .composer:focus-within { border-color:rgba(69,200,168,.4); box-shadow:0 0 0 3px var(--accent-soft); }
  .composer textarea { width:100%; background:none; border:none; resize:none; outline:none; min-height:22px; max-height:160px; }
  .composer .hint { display:flex; align-items:center; margin-top:7px; gap:10px; }
  .composer .hint small { color:var(--text-muted); font-size:11px; display:inline-flex; align-items:center; gap:5px; }
  .composer .hint small kbd { font:10px var(--mono); background:var(--surface-2); border:1px solid var(--border); border-radius:4px; padding:1px 5px; color:var(--text-secondary); }
  .composer .comp-actions { margin-left:auto; display:flex; align-items:center; gap:7px; }
  .composer .send { background:var(--accent); color:var(--accent-ink); border:none;
    border-radius:20px; padding:6px 15px; font-weight:600; font-size:12px; cursor:pointer; transition:filter .15s, transform .1s; }
  .composer .send:active { transform:translateY(1px); }
  .composer .send:hover { filter:brightness(1.06); }
  .composer .send.send-icon { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; padding:0; border-radius:50%; }
  .composer .send.send-icon:disabled { opacity:.4; cursor:default; }

  /* Board */
  .board-wrap { display:flex; flex-direction:column; height:100%; }
  .board { flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:16px; overflow:auto; }
  .col { background:var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:10px;
    display:flex; flex-direction:column; gap:8px; min-height:0; }
  .col { transition:background var(--dur-1) var(--ease-out), box-shadow var(--dur-1) var(--ease-out), border-color var(--dur-1) var(--ease-out); }
  .col.drop-target { border-color:transparent; background:var(--accent-soft); box-shadow:inset 0 0 0 1.5px rgba(69,200,168,.45); }
  .col.drop-target h3, .col.drop-target h3 span { color:var(--accent); }
  .card { cursor:grab; }
  .card:active { cursor:grabbing; }
  .card.card-dragging { opacity:.32; box-shadow:none; }   /* the placeholder left behind */
  .card-ghost { position:fixed; left:0; top:0; z-index:300; margin:0; pointer-events:none;
    background:var(--surface-3); box-shadow:var(--e4); transform:rotate(2deg) scale(1.03);
    cursor:grabbing; will-change:left,top; }
  body.dragging-active { cursor:grabbing; user-select:none; }
  .card.just-dropped { animation:drop-in .4s var(--ease-out); }
  @keyframes drop-in { 0% { transform:scale(.95); box-shadow:0 0 0 2px var(--accent), var(--e2); } 100% { transform:scale(1); } }
  .rcpt-chip { margin-left:auto; display:inline-flex; align-items:center; gap:3px; font:11px var(--mono); color:var(--text-secondary);
    background:var(--surface-1); border:1px solid var(--border-strong); border-radius:6px; padding:1px 7px; cursor:pointer; transition:.12s; }
  .rcpt-chip:hover { border-color:var(--ring); color:var(--accent); }
  .col h3 { margin:2px 4px 6px; font-size:12px; color:var(--text-secondary); font-weight:500;
    text-transform:uppercase; letter-spacing:.06em; display:flex; gap:6px; }
  .col h3 span { color:var(--text-muted); }
  .cards { display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .card { background:var(--surface-2); border:1px solid var(--border-strong); border-radius:var(--r-card); padding:11px 12px; cursor:pointer; box-shadow:var(--e1); }
  .card:hover { background:var(--surface-3); box-shadow:var(--e2); }
  .card.running { box-shadow:var(--e2), 0 0 0 1px var(--accent), 0 0 18px -4px rgba(69,200,168,.5); }
  .card .t { line-height:1.35; }
  .card .meta { display:flex; gap:6px; align-items:center; margin-top:8px; flex-wrap:wrap; font-size:11px; color:var(--text-muted); }
  .tag { font-size:11px; padding:1px 6px; border-radius:6px; }
  .tag.web { color:var(--web); background:var(--web-bg); } .tag.files { color:var(--files); background:var(--files-bg); }
  .tag.browser { color:var(--web); background:var(--web-bg); } .tag.shell { color:var(--files); background:var(--files-bg); }
  .pulse { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .bar { height:3px; border-radius:3px; background:linear-gradient(90deg,transparent,var(--accent),transparent);
    background-size:200% 100%; animation:shimmer 1.4s linear infinite; margin-top:8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .check { color:var(--accent); } .xmark { color:var(--danger); }
  .empty { text-align:center; color:var(--text-muted); padding:48px 16px; }
  .empty b { color:var(--text-secondary); font-weight:500; display:block; margin-bottom:12px; font-size:15px; }
  .examplechips { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .examplechips button { background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary);
    border-radius:16px; padding:5px 12px; cursor:pointer; transition:border-color var(--dur-1) var(--ease-out), color var(--dur-1), background var(--dur-1); }
  .examplechips button:hover { border-color:var(--ring); color:var(--text-primary); background:var(--surface-3); }

  /* Detail panel */
  .panel { position:fixed; top:0; right:0; width:340px; height:100vh; background:var(--surface-1);
    border-left:1px solid var(--border-strong); transform:translateX(100%); transition:transform .2s ease-out;
    display:flex; flex-direction:column; z-index:20; }
  .panel.open { transform:translateX(0); }
  .panel header { display:flex; align-items:center; gap:8px; padding:14px; border-bottom:1px solid var(--border); }
  .panel header .x { margin-left:auto; cursor:pointer; color:var(--text-muted); background:none; border:none; font-size:16px; transition:color var(--dur-1); }
  .panel header .x:hover { color:var(--text-primary); }
  .panel .body { flex:1; overflow:auto; padding:14px; }
  .pill { font-size:11px; padding:2px 8px; border-radius:6px; background:var(--surface-2); color:var(--text-secondary); }
  .pill.done { color:var(--accent); } .pill.failed { color:var(--danger); } .pill.doing { color:var(--accent); }
  .approval { background:rgba(224,162,60,.1); border:1px solid rgba(224,162,60,.35); border-radius:10px; padding:11px 12px; margin-bottom:14px; }
  .approval b { color:var(--warning); }
  .approval button { background:var(--accent); color:var(--accent-ink); border:none; border-radius:6px; padding:6px 12px; font-weight:500; cursor:pointer; }
  .approval button.ghost { background:var(--surface-2); color:var(--text-secondary); }
  .answer { font-family:var(--font-voice); font-size:15px; line-height:1.5; margin:14px 0; }
  .step { padding:8px 0; border-bottom:1px solid var(--border); }
  .step .top { display:flex; gap:8px; align-items:center; }
  .step .verb { flex:1; } .step .stamp { font-family:var(--mono); font-size:11px; color:var(--text-muted); cursor:pointer; }
  .step.bad .verb { color:var(--danger); }
  .step .obs { margin-top:6px; font-size:12px; color:var(--text-secondary); white-space:pre-wrap;
    background:var(--surface-2); border-radius:6px; padding:8px; max-height:160px; overflow:auto; }
  /* live run - watch the agent work */
  .liverun { display:flex; flex-direction:column; gap:10px; }
  .lr-head { display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; color:var(--text-primary); }
  .lr-meter { margin-left:auto; font:11px var(--mono); font-weight:400; color:var(--text-muted); white-space:nowrap; }
  .lr-steps { display:flex; flex-direction:column; }
  .lr-step { animation:lr-in .26s var(--ease-out); }
  @keyframes lr-in { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
  .lr-step .lr-n { width:18px; height:18px; flex:none; display:inline-flex; align-items:center; justify-content:center;
    font:11px var(--mono); color:var(--text-muted); background:var(--surface-2); border:1px solid var(--border); border-radius:50%; }
  .lr-step .lr-ok { font-size:12px; color:var(--accent); }
  .lr-step.bad .lr-ok { color:var(--danger); }
  .lr-none { font-size:12px; color:var(--text-muted); padding:6px 0; }
  .lr-answer:not(:empty) { margin-top:6px; padding-top:12px; border-top:1px solid var(--border); font-size:14px; line-height:1.6; color:var(--text-primary); }
  /* activity - the signed ledger */
  .activity { max-width:840px; margin:0 auto; padding:22px 24px 60px; height:100%; overflow-y:auto; }
  .act-title { font-size:19px; font-weight:600; }
  .act-sub { color:var(--text-muted); font-size:13px; margin:3px 0 16px; max-width:600px; line-height:1.55; }
  .act-sub code { background:var(--surface-2); padding:1px 5px; border-radius:4px; font:11px var(--mono); }
  .act-verify { display:flex; align-items:center; gap:12px; background:var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:13px 16px; margin-bottom:14px; }
  .act-verify.ok .act-seal { color:var(--accent); }
  .act-verify.bad { border-color:var(--danger); } .act-verify.bad .act-seal { color:var(--danger); }
  .act-seal { flex:none; display:inline-flex; filter:drop-shadow(0 0 8px currentColor); }
  .av-text { min-width:0; }
  .av-status { font-weight:600; font-size:14px; }
  .av-meta { font-size:12px; color:var(--text-muted); margin-top:1px; }
  .av-key { font-family:var(--mono); cursor:pointer; } .av-key:hover { color:var(--text-secondary); }
  .act-reverify { margin-left:auto; background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary); border-radius:8px; padding:7px 13px; font-size:12px; cursor:pointer; transition:.12s; }
  .act-reverify:hover { border-color:var(--border-strong); color:var(--text-primary); }
  .act-controls { display:flex; gap:10px; align-items:center; margin-bottom:8px; }
  .act-search { flex:1; background:var(--surface-1); border:1px solid var(--border-strong); border-radius:9px; padding:8px 12px; outline:none; color:var(--text-primary); font-size:13px; }
  .act-search:focus { border-color:var(--ring); box-shadow:0 0 0 3px var(--accent-soft); }
  .act-filters { display:flex; gap:4px; }
  .act-filters button { background:var(--surface-1); border:1px solid var(--border); color:var(--text-secondary); border-radius:7px; padding:7px 11px; font-size:12px; cursor:pointer; transition:.12s; }
  .act-filters button.on { border-color:var(--ring); color:var(--accent); background:var(--accent-soft); }
  .act-list { display:flex; flex-direction:column; }
  .act-row { display:flex; gap:12px; padding:11px 2px; border-bottom:1px solid var(--border); }
  .act-dot { width:9px; height:9px; border-radius:50%; flex:none; margin-top:5px; box-shadow:0 0 7px currentColor; }
  .act-main { flex:1; min-width:0; }
  .act-kind { font-size:13px; font-weight:500; color:var(--text-primary); }
  .act-summary { font-size:12px; color:var(--text-secondary); margin-top:2px; white-space:pre-wrap; word-break:break-word; font-family:var(--mono); }
  .act-meta2 { display:flex; gap:11px; align-items:center; margin-top:5px; }
  .act-meta2 > span { font-size:11px; color:var(--text-muted); }
  .act-by { text-transform:capitalize; }
  .act-hash { font-family:var(--mono); cursor:pointer; }
  .act-hash:hover { color:var(--accent); }

  /* Generic chat/list */
  .chat { max-width:720px; margin:0 auto; padding:24px 16px; display:flex; flex-direction:column; gap:14px; height:100%; }
  .feed { flex:1; overflow:auto; display:flex; flex-direction:column; gap:14px; }
  .msg.user { align-self:flex-end; background:var(--surface-2); border:1px solid var(--border); border-radius:16px 16px 5px 16px; padding:10px 14px; max-width:78%; line-height:1.5; white-space:pre-wrap; }
  .msg.engram { font-family:var(--sans); font-size:14.5px; line-height:1.65; max-width:72ch; color:var(--text-primary); }
  /* rendered markdown in replies */
  .msg.engram > :first-child { margin-top:0; } .msg.engram > :last-child { margin-bottom:0; }
  .msg.engram p { margin:0 0 11px; }
  .msg.engram .md-h { font-weight:600; margin:16px 0 8px; line-height:1.3; }
  .msg.engram .md-h1 { font-size:19px; } .msg.engram .md-h2 { font-size:16px; } .msg.engram .md-h3 { font-size:14.5px; } .msg.engram .md-h4 { font-size:13px; color:var(--text-secondary); }
  .msg.engram .md-list { margin:0 0 11px; padding-left:22px; } .msg.engram .md-list li { margin:3px 0; }
  .msg.engram blockquote { margin:0 0 11px; padding:2px 0 2px 14px; border-left:2px solid var(--accent); color:var(--text-secondary); }
  .msg.engram hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
  .msg.engram a { color:var(--web); text-decoration:none; border-bottom:1px solid rgba(133,183,235,.35); }
  .msg.engram a:hover { border-bottom-color:var(--web); }
  .msg.engram code.ic { font:12.5px var(--mono); background:var(--surface-2); border:1px solid var(--border); border-radius:5px; padding:1px 5px; }
  .msg.engram strong { font-weight:650; } .msg.engram em { font-style:italic; }
  .cb { background:var(--surface-3); border:1px solid var(--border-strong); border-radius:var(--r-card); margin:0 0 12px; overflow:hidden; }
  .cb-head { display:flex; align-items:center; justify-content:space-between; padding:6px 10px 6px 12px; border-bottom:1px solid var(--border);
    font:11px var(--mono); color:var(--text-muted); text-transform:lowercase; }
  .cb-copy { background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary); border-radius:6px; padding:2px 9px; font:11px var(--sans); cursor:pointer; transition:.12s; }
  .cb-copy:hover { border-color:var(--border-strong); color:var(--text-primary); }
  .cb-copy.done { color:var(--accent); border-color:var(--ring); }
  .cb pre { margin:0; padding:12px 14px; overflow-x:auto; }
  .cb code { font:12.5px/1.55 var(--mono); color:var(--text-primary); }
  .cb .t-kw { color:var(--accent); } .cb .t-st { color:var(--web); } .cb .t-co { color:var(--text-muted); font-style:italic; } .cb .t-nu { color:var(--warning); }
  .caret { display:inline-block; width:2px; height:1em; background:var(--accent); margin-left:1px; vertical-align:text-bottom; animation:blink .9s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .thinking { display:inline-flex; gap:4px; align-items:center; padding:3px 0; }
  .thinking i { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:tpulse 1.1s ease-in-out infinite; }
  .thinking i:nth-child(2){ animation-delay:.18s; } .thinking i:nth-child(3){ animation-delay:.36s; }

/* ===================== VOICE: dictation mic + conversation overlay ===================== */

/* (1) composer dictation mic — matches the .send-icon 34px circle, secondary weight */
.composer .voice-mic {
  display:inline-flex; align-items:center; justify-content:center;
  width:34px; height:34px; padding:0; border-radius:50%;
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--text-secondary); cursor:pointer; position:relative;
  transition:background var(--dur-1) var(--ease-out), border-color var(--dur-1), color var(--dur-1);
}
.composer .voice-mic svg { width:17px; height:17px; }
.composer .voice-mic:hover { border-color:var(--border-strong); color:var(--text-primary); background:var(--active); }
.composer .voice-mic:active { transform:translateY(1px); }
.composer .voice-mic.rec { color:var(--accent); border-color:var(--ring); background:var(--accent-soft); }
.composer .voice-mic.rec::after {
  content:''; position:absolute; inset:-1px; border-radius:50%;
  border:1.5px solid var(--accent); animation:voice-pulse 1.4s var(--ease-out) infinite;
}
@keyframes voice-pulse {
  0%   { transform:scale(1);    opacity:.7; }
  70%  { transform:scale(1.35); opacity:0; }
  100% { transform:scale(1.35); opacity:0; }
}

/* Chat-header entry button (built on .kbtn; SVG needs explicit sizing) */

/* (2) full-surface conversation overlay */
.voice-ov {
  position:fixed; inset:0; z-index:120;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(120% 120% at 50% 38%, rgba(18,21,25,.86), rgba(8,9,11,.97));
  backdrop-filter:blur(14px) saturate(1.05); -webkit-backdrop-filter:blur(14px) saturate(1.05);
  opacity:0; transition:opacity var(--dur-3) var(--ease-out);
}
.voice-ov.in { opacity:1; }
.voice-close {
  position:absolute; top:16px; right:18px; width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface-2); border:1px solid var(--border); border-radius:50%;
  color:var(--text-secondary); font-size:15px; cursor:pointer; line-height:1;
  transition:.15s;
}
.voice-close:hover { color:var(--text-primary); border-color:var(--border-strong); background:var(--active); }

.voice-stage {
  display:flex; flex-direction:column; align-items:center; gap:18px;
  width:min(560px,90vw); padding:24px; text-align:center;
  transform:translateY(8px); transition:transform var(--dur-4) var(--ease-spring);
}
.voice-ov.in .voice-stage { transform:translateY(0); }

#voiceOrb { width:300px; height:300px; max-width:74vw; max-height:74vw; }

.voice-status {
  font:13px var(--mono); letter-spacing:.06em; text-transform:uppercase;
  color:var(--text-muted); min-height:18px; transition:color var(--dur-2);
}
.voice-ov[data-phase="listening"] .voice-status { color:var(--accent); }
.voice-ov[data-phase="speaking"]  .voice-status { color:var(--web); }
.voice-ov[data-phase="thinking"]  .voice-status { color:var(--warning); }

.voice-transcript {
  font:300 20px/1.5 var(--font-voice);
  color:var(--text-primary); max-width:46ch; min-height:1.5em;
  margin:0 auto; word-break:break-word;

.voice-transcript.is-you    { color:var(--text-secondary); font-style:italic; }

.voice-mute:hover, .voice-end:hover { color:var(--text-primary); border-color:var(--border-strong); background:var(--active); }

<script>
// The API token is kept in the browser, never embedded in the page the daemon serves (that
// "/" route is unauthenticated, so embedding the token would leak it). Set from Settings, it
// persists in localStorage and is sent on the dashboard's own calls; a fresh client is prompted.
let TOKEN = (()=>{ try{ return localStorage.getItem('engram.tok')||''; }catch(_){ return ''; } })();
let AUTH = TOKEN ? {Authorization:'Bearer '+TOKEN} : {};
const tok = u => TOKEN ? (u + (u.includes('?')?'&':'?') + 'token=' + encodeURIComponent(TOKEN)) : u;
function setClientToken(t){ TOKEN=t||''; AUTH = TOKEN ? {Authorization:'Bearer '+TOKEN} : {};
  try{ if(TOKEN) localStorage.setItem('engram.tok',TOKEN); else localStorage.removeItem('engram.tok'); }catch(_){} }
let _askedToken=false;
const J = async (u,o={}) => {
  let r;
  try { r = await fetch(u,{...o, headers:{...AUTH, ...(o.headers||{})}}); }
  catch(_){ throw new Error('network unreachable'); }
  if(r.status===401 && !TOKEN && !_askedToken){ _askedToken=true;
    const t=await askInput({title:'API token required',label:'This Engram requires an API token to continue.',placeholder:'paste your token',ok:'Continue'});
    if(t&&t.trim()){ setClientToken(t.trim()); location.reload(); return new Promise(()=>{}); } }
  if(!r.ok){ let m='HTTP '+r.status; try{ const b=await r.json(); if(b&&b.error) m=b.error; }catch(_){} throw new Error(m); }
  return r.json();
};
const esc = s => String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
// For values placed inside a double-quoted HTML attribute, quotes must be escaped too, or a
// stored config value (an MCP name, a model id) could break out of the attribute.
const escAttr = s => String(s??'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
// In-app input / confirm dialogs. The desktop shell is a WKWebView, where window.prompt() is
// unsupported and returns null - which silently broke "new project", rename, the Telegram connect
// flow, and more. These replace prompt()/confirm() with real, themed, awaitable modals.
function askInput(o){ o=o||{};
  return new Promise(resolve=>{
    const ov=document.createElement('div'); ov.className='overlay ask';
    ov.innerHTML=`<div class="ask-card"><div class="ask-title">${esc(o.title||'')}</div>${o.label?`<div class="ask-msg">${esc(o.label)}</div>`:''}
      <input class="ask-input" id="askInput" placeholder="${escAttr(o.placeholder||'')}" value="${escAttr(o.value||'')}" autocomplete="off">
      <div class="ask-actions"><button class="ask-ghost" data-act="x">Cancel</button><button class="ask-ok" data-act="ok">${esc(o.ok||'OK')}</button></div></div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector('#askInput'); setTimeout(()=>{ inp.focus(); inp.select(); },20);
    const done=v=>{ ov.remove(); document.removeEventListener('keydown',key,true); resolve(v); };
    const key=e=>{ if(e.key==='Escape'){ e.preventDefault(); done(null); } else if(e.key==='Enter'){ e.preventDefault(); done(inp.value); } };
    document.addEventListener('keydown',key,true);
    ov.addEventListener('click',e=>{ if(e.target===ov) return done(null); const a=e.target.closest('[data-act]'); if(a) done(a.dataset.act==='ok'?inp.value:null); });
  });
}
function askConfirm(o){ o=o||{};
  return new Promise(resolve=>{
    const ov=document.createElement('div'); ov.className='overlay ask';
    ov.innerHTML=`<div class="ask-card"><div class="ask-title">${esc(o.title||'Are you sure?')}</div>${o.message?`<div class="ask-msg">${esc(o.message)}</div>`:''}
      <div class="ask-actions"><button class="ask-ghost" data-act="x">Cancel</button><button class="ask-ok ${o.danger?'danger':''}" data-act="ok">${esc(o.ok||'Confirm')}</button></div></div>`;
    document.body.appendChild(ov);
    setTimeout(()=>ov.querySelector('[data-act="ok"]').focus(),20);
    const done=v=>{ ov.remove(); document.removeEventListener('keydown',key,true); resolve(v); };
    const key=e=>{ if(e.key==='Escape'){ e.preventDefault(); done(false); } else if(e.key==='Enter'){ e.preventDefault(); done(true); } };
    document.addEventListener('keydown',key,true);
    ov.addEventListener('click',e=>{ if(e.target===ov) return done(false); const a=e.target.closest('[data-act]'); if(a) done(a.dataset.act==='ok'); });
  });
}
// Non-clobbering toast for action failures (keeps the persistent tamper/offline banner).
function notify(msg, kind){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface-2);color:var(--text-primary);padding:9px 14px;border-radius:8px;border:1px solid var(--danger);z-index:60;font-size:13px;transition:opacity .3s';
    document.body.appendChild(t); }
  t.style.borderColor = kind==='ok' ? 'var(--accent)' : 'var(--danger)';
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._h); t._h=setTimeout(()=>{ t.style.opacity='0'; }, 4000);
}
window.addEventListener('unhandledrejection', e=>{ notify('Couldn’t reach Engram - '+((e.reason&&e.reason.message)||'try again')); });
// Emergency stop: halts every running task at its next step boundary; toggles to Resume.
let halted=false;
async function toggleHalt(){
  const next=!halted;
  try{ await J('/v1/halt',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({on:next})}); halted=next; }
  catch(_){ notify('Couldn’t reach Engram'); return; }
  const lbl=document.getElementById('haltLabel'); if(lbl) lbl.textContent = halted?'Resume':'Stop';
  notify(halted?'Emergency stop engaged - running tasks will halt':'Resumed');
}

const SVG = p => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
const ICONS = {

};
const VIEWS = ['Chat','Tasks','Schedule','Memory','Skills'];
const TOOLS = ['Activity','Terminal'];       // power tools - pinned to the bottom of the rail
const ALL_VIEWS = [...VIEWS, ...TOOLS];
let state = { route:'Tasks', tasks:[], offline:false };

function renderNav(){

  const item=v=>`<a class="${state.route===v?'active':''}" href="#${v}" title="${v}"${state.route===v?' aria-current="page"':''}>${ICONS[v]}<span class="lbl">${v}</span></a>`;

  const tn=document.getElementById('navTools'); if(tn) tn.innerHTML = TOOLS.map(item).join('');
}
function go(v){ if(typeof voiceCloseConversation==='function' && v!=='Chat') voiceCloseConversation(); if(typeof voiceStopRecog==='function' && v!=='Chat') voiceStopRecog(); state.route=v; if(location.hash.slice(1)!==v) location.hash=v; document.getElementById('viewname').textContent=v; renderNav(); renderView(); }
window.addEventListener('hashchange',()=>{ const v=location.hash.slice(1); if(ALL_VIEWS.includes(v)&&v!==state.route) go(v); });

// ---- the trust spine (bottom status bar) ----
let _lastLedgerN=null;
async function poll(){
  try {
    const [v,m,h] = await Promise.all([J('/v1/ledger/verify'),J('/v1/meter'),J('/health')]);
    const lc=document.getElementById('ledgerChip'), spine=document.getElementById('sbSpine');
    if(v.ok){
      lc.className='chip ok'; lc.innerHTML='<span class="seal"></span>ledger verified · <b>'+v.entries+'</b>'; document.getElementById('banner').innerHTML='';
      // a single teal breath when a new entry chains - confidence shown, never claimed
      if(_lastLedgerN!==null && v.entries!==_lastLedgerN && spine){ spine.classList.remove('flash'); void spine.offsetWidth; spine.classList.add('flash'); }
      _lastLedgerN=v.entries;
    } else { lc.className='chip bad'; lc.textContent='⚠ tamper detected';
      document.getElementById('banner').innerHTML='<div class="banner" role="alert">Tamper detected - the audit chain doesn’t verify. Showing the last good state.</div>'; }
    document.getElementById('costChip').textContent='$'+(m.cost_usd||0).toFixed(4);
    const wasOffline=state.offline; state.offline = !!h.offline;
    // The offline banner is baked into a view at render time, so re-render when it flips - but
    // not while the user is typing in the composer.
    if(state.offline!==wasOffline && (state.route==='Chat'||state.route==='Tasks')
       && document.activeElement!==document.getElementById('composer')) renderView();
    const dot=document.getElementById('sbDot'); if(dot) dot.classList.add('awake');
    const dn=document.getElementById('sbDaemon'); if(dn) dn.textContent = h.offline ? 'engramd · offline model' : ('engramd · v'+(h.version||''));
    document.getElementById('status').innerHTML = 'awake <span class="live">·</span> v'+h.version;
  } catch(e){
    const dot=document.getElementById('sbDot'); if(dot) dot.classList.remove('awake');
    const dn=document.getElementById('sbDaemon'); if(dn) dn.textContent='engramd · sleeping';
  }
}

// ---- Tasks board ----
async function loadTasks(){ state.tasks = await J('/v1/tasks'); }
const STATUS_COLS = { todo:'todo', doing:'doing', failed:'done', done:'done', scheduled:'todo' };
function offlineNotice(){ return state.offline ? '<div class="offline" role="status">Running in offline demo mode - add a model key to think for real.</div>' : ''; }

function card(t){
  const running = t.status==='doing';
  const tags = (t.tool_tags||[]).map(x=>`<span class="tag ${x}">${x}</span>`).join('');
  // every finished run carries a glass-box receipt chip - its signed ledger slice.
  const rcpt = t.run ? `<span class="rcpt-chip" title="open the signed receipt for this run" onclick="openTaskReceipt('${t.id}',event)">◇ receipt</span>` : '';
  let foot='';
  if(running) foot=`<div class="meta"><span class="pulse"></span> ${esc(t.progress||'thinking…')}</div><div class="bar"></div>`;
  else if(t.status==='done' && t.run) foot=`<div class="meta"><span class="check">✓</span> ${(t.run.tokens_in+t.run.tokens_out)} tok · $${(t.run.cost_usd||0).toFixed(4)}${t.schedule_id?' · ⟳':''}${rcpt}</div>`;
  else if(t.status==='failed') foot=`<div class="meta"><span class="xmark">✕</span> stopped${rcpt}</div>`;
  else foot=`<div class="meta">${tags||'<span class="muted">queued</span>'}</div>`;
  // No HTML5 draggable - we use a pointer-based drag (see boardPointerDown) that actually works
  // in WKWebView and feels like Linear. Click vs drag is discriminated by a movement threshold.
  const agentBadge = t.agent ? `<span class="card-agent" title="runs as this agent">◇ ${esc((AGENTS.find(a=>a.id===t.agent)||{}).name||'agent')}</span>` : '';
  return `<div class="card ${running?'running':''}" data-id="${t.id}"
     role="button" tabindex="0" aria-label="${escAttr(t.title)}"
     onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openTask('${t.id}')}">
     <div class="t">${esc(t.title)}</div>${agentBadge}${foot}</div>`;
}
function renderBoard(){
  // Load the team once so card badges can name the assigned agent (guarded; repaints once).
  if(!window._agentsLoaded){ window._agentsLoaded=true; J('/v1/agents').then(a=>{ AGENTS=a||[]; if(state.route==='Tasks') renderBoard(); }).catch(()=>{}); }
  const comp = document.getElementById('composer');
  const cv = comp?.value || '';                         // preserve in-progress typing
  const wasFocused = document.activeElement === comp;   // …and focus + caret
  const selStart = comp?.selectionStart, selEnd = comp?.selectionEnd;
  const cols={todo:[],doing:[],done:[]};
  state.tasks.forEach(t=>cols[STATUS_COLS[t.status]||'todo'].push(t));
  const v=document.getElementById('view');
  if(state.tasks.length===0){
    v.innerHTML = `<div class="board-wrap">${offlineNotice()}
      <div class="empty"><b>Tell Engram what to do.</b>
        <div class="examplechips">
          <button onclick="prefill('Summarize this week\'s top Rust news')">Summarize Rust news</button>
          <button onclick="prefill('Find me 3 quotes about curiosity')">Find 3 quotes</button>
        </div></div>
      <div style="padding:16px">${composerHtml('tasks')}</div></div>`;
  } else {
    const colHtml=(key,label)=>`<div class="col" data-col="${key}">
       <h3>${label} <span>${cols[key].length}</span></h3><div class="cards">${cols[key].map(card).join('')}</div></div>`;
    v.innerHTML = `<div class="board-wrap">${offlineNotice()}
      <div class="board">${colHtml('todo','To do')}${colHtml('doing','Running')}${colHtml('done','Done')}</div>

  }

// ---- composer + intent routing ----
// The composer adapts to its view: in Chat, Enter SENDS the message (like Claude) and the
// primary control is a send arrow; in the Tasks board, Enter creates a task. Shift+Enter is a
// newline in both. Task-making is still reachable from chat via Cmd+Enter.
function composerHtml(ctx){
  ctx = ctx==='tasks' ? 'tasks' : 'chat';
  const sendBtn = ctx==='chat'
    ? `<button class="send send-icon" title="Send (Enter)" aria-label="Send" onclick="converseInline(document.getElementById('composer').value)"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg></button>`
    : `<button class="send" onclick="submitComposer(false)">Create task</button>`;
  const hint = ctx==='chat'
    ? `<small><kbd>↵</kbd> send <kbd>⇧↵</kbd> newline <kbd>⌘↵</kbd> task</small>`
    : `<small><kbd>↵</kbd> create <kbd>⌘↵</kbd> create &amp; run</small>`;
  // Add-context is a chat-only affordance; the tasks board composer creates tasks, not turns.
  const attachCtl = ctx==='chat'
    ? `<span class="attach-wrap" id="attachWrap"><button id="attachBtn" class="attach-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Add context" title="Add context or files" onclick="attachToggleMenu(event)"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5 12.5 21a5 5 0 0 1-7-7l8.5-8.5a3.3 3.3 0 0 1 4.7 4.7L9.6 18.7a1.6 1.6 0 0 1-2.3-2.3l8-8"/></svg></button><input id="attachFileInput" type="file" multiple hidden onchange="attachOnFiles(this)"></span>`
    : '';
  const pills = ctx==='chat' ? `<div class="attach-pills" id="attachPills"></div>` : '';
  return `<div class="composer">
    <div id="slashMenu" class="slash-menu" hidden></div>
    <div class="composer-top">${modelpickHtml()}</div>
    ${pills}<textarea id="composer" data-ctx="${ctx}" rows="1" placeholder="${ctx==='chat'?'Message Engram…':'Tell Engram what to do…'}"></textarea>
    <div class="hint">${hint}<div class="comp-actions">${attachCtl}<button id="voiceMic" class="voice-mic" type="button" aria-pressed="false" aria-label="Dictate" title="Dictate (push to talk)" onclick="voiceToggleDictation(this)">${voiceMicSvg()}</button>${sendBtn}</div></div></div>`;
}
function prefill(t){ const c=document.getElementById('composer'); if(c){ c.value=t; c.focus(); } }
function wireComposer(){
  const c=document.getElementById('composer'); if(!c) return;
  const ctx=c.dataset.ctx||'chat';
  // Repaint any pinned attachments from ATTACH so they survive a mid-compose re-render
  // (renderChat re-runs wireComposer); no-ops when #attachPills is absent (tasks ctx).
  if(typeof attachRenderPills==='function') attachRenderPills();
  c.addEventListener('input',()=>{ c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,180)+'px'; if(typeof slashSync==='function') slashSync(); });
  c.addEventListener('blur',()=>{ setTimeout(()=>{ if(typeof slashHide==='function') slashHide(); },120); });
  c.addEventListener('keydown',e=>{
    if(typeof slashKeydown==='function' && slashKeydown(e)) return;   // slash menu owns nav keys when open
    if(e.key!=='Enter' || e.isComposing) return;   // let IME composition finish
    if(e.shiftKey) return;                          // Shift+Enter = newline
    e.preventDefault();
    if(typeof slashTrySubmit==='function' && slashTrySubmit()) return;  // '/cmd <arg>' + Enter runs the command
    if(ctx==='chat'){ if(e.metaKey||e.ctrlKey) submitComposer(false); else converseInline(c.value); }
    else { if(e.metaKey||e.ctrlKey) submitComposer(true); else submitComposer(false); }
  });
}
async function converseInline(text){
  text=text.trim();
  // Snapshot any pinned context BEFORE the empty-text guard so an attachment-only send is
  // still possible, and BEFORE the re-render below clears the pills element.
  const attachments = (typeof attachTake==='function') ? attachTake() : [];
  if(!text && !attachments.length) return;
  const c=document.getElementById('composer'); c.value=''; c.style.height='auto';
  // Settle on one session BEFORE switching/rendering, so go()->renderChat and chatSay don't
  // each create their own (the empty-state race).
  if(!WS.activeSession){ if(WS.sessions.length) WS.activeSession=WS.sessions[0].id; else await newSession(false); }
  if(state.route!=='Chat') go('Chat'); else renderChat();
  chatSay(text, attachments);
}
async function submitComposer(run){
  const c=document.getElementById('composer'); const title=c.value.trim(); if(!title) return;
  c.value=''; c.style.height='auto';
  const t = await J('/v1/tasks',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({title,origin:'chat'})});
  await loadTasks(); if(state.route==='Tasks') renderBoard();
  if(run){ runTask(t.id); }
}
async function runTask(id){
  await loadTasks(); if(state.route==='Tasks') renderBoard();
  J('/v1/tasks/'+id+'/run',{method:'POST'}).then(async()=>{ await loadTasks(); if(state.route==='Tasks') renderBoard(); if(panelId===id) openTask(id, true); });
  setTimeout(async()=>{ await loadTasks(); if(state.route==='Tasks') renderBoard(); }, 600);
}
// Watch the agent work: stream each tool step into the detail panel live (the glass box filling
// in), then settle into the finished receipt. Falls back gracefully if streaming isn't available.
let liveRunId=null;
async function runTaskLive(id){
  openTask(id);                          // make sure the panel is open and focused on this task
  liveRunId=id;
  const body=document.getElementById('pBody'); if(!body){ liveRunId=null; return; }
  body.innerHTML = `<div class="liverun">
    <div class="lr-head"><span class="pulse"></span><span id="lrStatus">Engram is working…</span><span id="lrMeter" class="lr-meter"></span></div>
    <div id="lrSteps" class="lr-steps"></div>
    <div id="lrAnswer" class="lr-answer"></div></div>`;
  const stepsEl=document.getElementById('lrSteps');
  const t0=Date.now(); let lrTokens=0, lrCost=0;
  const lrMeter=()=>{ const el=document.getElementById('lrMeter'); if(!el) return; const n=stepsEl?stepsEl.children.length:0;
    el.textContent = `${n?n+(n===1?' step':' steps')+' · ':''}${lrTokens?lrTokens+' tok · ':''}${lrCost?'$'+lrCost.toFixed(4)+' · ':''}${((Date.now()-t0)/1000).toFixed(1)}s`; };
  const tick=setInterval(lrMeter,250);
  let lrEnded=false;
  const finish=async()=>{ if(lrEnded) return; lrEnded=true; clearInterval(tick); lrMeter(); liveRunId=null; await loadTasks(); if(state.route==='Tasks') renderBoard(); };
  try{
    const r=await fetch('/v1/tasks/'+encodeURIComponent(id)+'/run/stream',{method:'POST',headers:{...AUTH}});
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    const reader=r.body.getReader(), dec=new TextDecoder(); let buf='';
    for(;;){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        let ev='message'; const dl=[];
        for(const line of frame.split('\n')){ if(line.startsWith('event:')) ev=line.slice(6).trim(); else if(line.startsWith('data:')) dl.push(line.slice(5).replace(/^ /,'')); }
        const data=dl.join('\n');
        if(ev==='step'){ let s; try{ s=JSON.parse(data); }catch(_){ continue; }
          const stamp = s.seq ? `◇ ${s.seq} · ${(s.hash||'').slice(0,8)}` : '';
          const row=document.createElement('div'); row.className='step lr-step'+(s.ok?'':' bad');
          row.innerHTML=`<div class="top"><span class="lr-n">${s.index}</span><span class="verb">${esc(s.tool)}</span><span class="lr-ok">${s.ok?'✓':'✕'}</span>${stamp?`<span class="stamp" title="this step's signed ledger entry" onclick="openReceipt()">${esc(stamp)}</span>`:''}</div>${s.observation?`<div class="obs">${esc(String(s.observation).slice(0,700))}</div>`:''}`;
          if(stepsEl){ stepsEl.appendChild(row); stepsEl.scrollTop=stepsEl.scrollHeight; }
          if(typeof s.tokens==='number') lrTokens=s.tokens; if(typeof s.cost==='number') lrCost=s.cost; lrMeter();
        }
        else if(ev==='done'){ let t; try{ t=JSON.parse(data); }catch(_){}
          document.querySelector('.lr-head .pulse')?.remove();
          const st=document.getElementById('lrStatus'); if(st) st.textContent=(t&&t.status==='done')?'Done':'Stopped';
          if(t&&t.run){ lrTokens=(t.run.tokens_in||0)+(t.run.tokens_out||0); if(typeof t.run.cost_usd==='number') lrCost=t.run.cost_usd; }
          if(stepsEl && !stepsEl.children.length) stepsEl.innerHTML='<div class="lr-none">No tools were needed — Engram answered directly.</div>';
          if(t&&t.run&&t.run.answer){ const a=document.getElementById('lrAnswer'); if(a) a.innerHTML=mdToHtml(t.run.answer); }
          await finish();
          setTimeout(()=>{ if(panelId===id) openTask(id, false); }, 2200);   // settle into the full receipt
        }
        else if(ev==='error'){ const st=document.getElementById('lrStatus'); if(st) st.textContent='Run failed'; await finish(); }
      }
    }
    await finish();   // stream ended without a terminal event (close / partial final frame): still clear the timer and unstick liveRunId
  }catch(e){ const st=document.getElementById('lrStatus'); if(st) st.textContent='Couldn’t run — '+(e.message||'error'); document.querySelector('.lr-head .pulse')?.remove(); await finish(); }
}
// Dry-run preview: shows what the agent would do without executing any side-effecting tool.
async function previewTask(id){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  const out=document.getElementById('previewOut'); if(out) out.textContent='Previewing…';
  const prompt=(t.detail&&t.detail.trim())?(t.title+'\n\n'+t.detail):t.title;
  try{
    const run=await J('/v1/agent',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({task:prompt,dry_run:true})});
    const steps=(run.steps||[]).map(s=>`<div class="step ${s.ok?'':'bad'}"><div class="top"><span class="verb">${esc(s.tool)}</span></div><div class="obs">${esc(s.observation)}</div></div>`).join('');
    if(out) out.innerHTML=`<div class="muted" style="font-size:11px;margin:8px 0 4px">preview - nothing was executed</div>${steps||'<div class="muted">no actions planned</div>'}<div class="answer">${esc(run.answer||'')}</div>`;
  }catch(e){ if(out) out.textContent='(preview failed - '+(e.message||'try again')+')'; }
}

// ---- pointer-based kanban drag ----
// HTML5 drag-and-drop is unreliable in WKWebView (and can't be driven by assistive tooling), so
// we implement dragging directly on pointer events: a floating ghost that follows the cursor,
// live column hit-testing with a highlighted drop target, a click/drag discriminator (so a tap
// still opens the card), and an optimistic move that PATCHes the new status.
let kdrag=null;
function boardPointerDown(e){
  if(e.button!==0) return;
  const cardEl=e.target.closest('.card'); if(!cardEl) return;
  if(e.target.closest('.rcpt-chip')) return;            // let the receipt chip take its own click
  const board=cardEl.closest('.board'); if(!board) return;
  const r=cardEl.getBoundingClientRect();
  kdrag={ id:cardEl.dataset.id, cardEl, startX:e.clientX, startY:e.clientY,
          offX:e.clientX-r.left, offY:e.clientY-r.top, w:r.width, moved:false, ghost:null };
  window.addEventListener('pointermove', boardPointerMove);
  window.addEventListener('pointerup', boardPointerUp, { once:true });
  window.addEventListener('pointercancel', boardPointerUp, { once:true });
}
function columnUnder(x,y){
  for(const el of document.elementsFromPoint(x,y)){ const c=el.closest&&el.closest('.col'); if(c) return c; }
  return null;
}
function boardPointerMove(e){
  if(!kdrag) return;
  if(!kdrag.moved){
    if(Math.hypot(e.clientX-kdrag.startX, e.clientY-kdrag.startY) < 5) return;   // still a click
    kdrag.moved=true;
    const g=kdrag.cardEl.cloneNode(true);
    g.className='card card-ghost'; g.style.width=kdrag.w+'px';
    document.body.appendChild(g); kdrag.ghost=g;
    kdrag.cardEl.classList.add('card-dragging');
    document.body.classList.add('dragging-active');
  }
  kdrag.ghost.style.left=(e.clientX-kdrag.offX)+'px';
  kdrag.ghost.style.top=(e.clientY-kdrag.offY)+'px';
  const col=columnUnder(e.clientX, e.clientY);
  document.querySelectorAll('.col').forEach(c=>c.classList.toggle('drop-target', c===col));
}
async function boardPointerUp(e){
  window.removeEventListener('pointermove', boardPointerMove);
  const d=kdrag; kdrag=null; if(!d) return;
  if(!d.moved){ openTask(d.id); return; }                // no movement => it was a click
  const col=columnUnder(e.clientX, e.clientY);
  document.querySelectorAll('.col').forEach(c=>c.classList.remove('drop-target'));
  if(d.ghost) d.ghost.remove();
  d.cardEl.classList.remove('card-dragging');
  document.body.classList.remove('dragging-active');
  if(col) await moveTask(d.id, col.dataset.col);
}
async function moveTask(id, key){
  const t=state.tasks.find(x=>x.id===id);
  if(t && STATUS_COLS[t.status]===key) return;            // dropped back in the same column - no-op
  if(key==='doing'){ runTask(id); return; }
  const status = key==='done' ? 'done' : 'todo';
  if(t){ t.status=status; if(state.route==='Tasks'){ renderBoard(); const el=document.querySelector(`.card[data-id="${id}"]`); if(el){ el.classList.add('just-dropped'); setTimeout(()=>el.classList.remove('just-dropped'),420); } } }   // optimistic, with a settle animation
  try{ await J('/v1/tasks/'+id,{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify({status})}); }catch(_){}
  await loadTasks(); if(state.route==='Tasks') renderBoard();
}
document.addEventListener('pointerdown', boardPointerDown);   // inert unless the press lands on a card

// ---- detail panel + audit ----
let panelId=null;
async function openTask(id, fromPoll){
  // If the task vanished (deleted out-of-band), close the panel instead of leaving it stale.
  const t=state.tasks.find(x=>x.id===id); if(!t){ if(panelId===id) closePanel(); return; }
  if(fromPoll && liveRunId===id) return;   // a live run is streaming into this panel - don't clobber it
  if(fromPoll && _pendingDissent && _pendingDissent.id===id) return;   // a specialist note is awaiting the user's signed choice - never let a poll wipe it
  // A background refresh must not destroy what the user is typing in the panel (the schedule
  // field, a dry-run preview) or yank focus. Skip the rebuild while a panel field has focus.
  if(fromPoll && panelId===id && document.getElementById('panel').contains(document.activeElement)
     && document.activeElement!==document.getElementById('panel')) return;
  panelId=id;
  const panel=document.getElementById('panel');
  panel.classList.add('open');
  if(!fromPoll) panel.querySelector('.x')?.focus();   // focus the dialog only on first open
  document.getElementById('pTitle').textContent=t.title;
  const ps=document.getElementById('pStatus'); ps.textContent=t.status; ps.className='pill '+t.status;
  const body=document.getElementById('pBody');
  // Load the team once, then repaint so the picker shows the agents (lazy; cached after).
  if(!window._agentsLoaded){ window._agentsLoaded=true; J('/v1/agents').then(a=>{ AGENTS=a||[]; if(panelId===id) openTask(id,true); }).catch(()=>{}); }
  let html='';
  { const agentOpts=['<option value="">Default agent</option>'].concat(AGENTS.map(a=>`<option value="${escAttr(a.id)}"${t.agent===a.id?' selected':''}>${esc(a.name)}</option>`)).join('');
    const handoffBtn = AGENTS.length ? `<button class="ghost agent-manage" onclick="handoffModal('${id}')">Hand off →</button>` : '';
    html+=`<div class="agent-row"><span class="muted" style="font-size:11px">agent</span><select class="agent-pick" onchange="assignAgent('${id}',this.value)">${agentOpts}</select><span style="flex:1"></span>${handoffBtn}<button class="ghost agent-manage" onclick="openCC('agents')">Manage team</button></div>`;
    if(t.handoffs && t.handoffs.length){
      html+=`<div class="handoff-trail"><div class="ht-lbl">hand-off trail · signed</div>${t.handoffs.map(h=>`<div class="ht-row"><span class="ht-from">${esc(h.from||'Default')}</span><span class="ht-arr">→</span><span class="ht-to">${esc(h.to)}</span>${h.note?`<div class="ht-note">${esc(h.note)}</div>`:''}</div>`).join('')}</div>`;
    }
  }
  if(t.status==='todo') html+=`<div class="row"><button onclick="runWithReview('${id}')">Run now</button><button class="ghost" onclick="previewTask('${id}')" title="see what the agent would do - nothing is executed">Preview</button></div><div id="previewOut" class="sub"></div>`;
  if(t.run){
    const denied=(t.run.steps||[]).find(s=>!s.ok && /shell/i.test(s.tool) && /disabled|refused/i.test(s.observation));
    if(denied){
      html+=`<div class="approval"><b>Wants to run shell</b>
        <div class="sub">Runs a command in the work folder · writes nothing outside it</div>
        <div class="row" style="margin-top:8px"><button onclick="approveShell('${id}')">Allow &amp; re-run</button>
          <button class="ghost" onclick="closePanel()">Skip</button></div></div>`;
    }
    html+=`<div class="answer">${esc(t.run.answer)}</div>`;
    // The agent's own plan (latest update_plan call), as a live checklist - glass-box intent.
    const planStep=[...(t.run.steps||[])].reverse().find(s=>s.tool==='update_plan'&&s.args&&Array.isArray(s.args.steps));
    if(planStep){
      const items=planStep.args.steps.map(st=>{
        const m=st.status==='done'?'✓':(st.status==='doing'?'◐':'○');
        const c=st.status==='done'?'var(--text-secondary)':'var(--text)';
        return `<div style="padding:2px 0;color:${c}">${m} ${esc(st.title||'')}</div>`;
      }).join('');
      html+=`<div class="muted" style="font-size:11px;margin:10px 0 4px">plan</div>${items}`;
    }
    // Each step carries its own signed ledger seq+hash (captured inline at run time), so
    // the receipt pairs to the exact ledger entry even if other tasks ran concurrently.
    const stepRows = (t.run.steps||[]).map(s=>{
      const stamp = s.ledger_seq ? `${s.ledger_seq} · ${(s.ledger_hash||'').slice(0,8)}` : '';
      return `<div class="step ${s.ok?'':'bad'}"><div class="top"><span class="verb">${esc(s.tool)}</span>
        <span class="${s.ok?'check':'xmark'}">${s.ok?'✓':'✕'}</span>
        <span class="stamp" onclick="navigator.clipboard.writeText('${s.ledger_hash||''}')">${stamp}</span></div>
        ${s.ok?'':`<div class="obs">${esc(s.observation)}</div>`}</div>`;
    }).join('');
    html+=`<div class="muted" style="font-size:11px;margin-bottom:6px">audit trail - signed</div>${stepRows||'<div class="muted">no tools used</div>'}`;
    html+=`<div class="muted" style="font-size:11px;margin-top:12px;font-family:var(--mono)">head ${t.run.ledger_head_hash.slice(0,12)}</div>`;
  } else if(t.status==='doing'){ html+=`<div class="muted">${esc(t.progress||'running…')}</div>`; }
  html+=`<div id="schedbox" style="margin-top:14px"><div class="muted" style="font-size:11px;margin-bottom:4px">repeat this task</div>
    <div class="row"><input id="pwhen" placeholder="every weekday at 9am" oninput="schedPreview('pwhen','pwhenprev')"><button onclick="scheduleTask('${id}')">Schedule</button></div>
    <div id="pwhenprev" class="sub"></div></div>`;
  html+=`<div class="row" style="margin-top:14px"><button onclick="delTask('${id}')" style="background:var(--surface-2);color:var(--danger)">Delete</button></div>`;
  body.innerHTML=html;
}

// ---- markdown + code rendering for replies ----
// Engram's replies are model output, so they're untrusted: we escape EVERYTHING first, then
// transform the escaped text. Code fences are pulled out before escaping and re-inserted as
// highlighted blocks, so markdown inside them isn't mangled.
const HL_KW = {
  js:'const let var function return if else for while do class extends new await async import from export default try catch finally throw typeof instanceof of in this true false null undefined yield switch case break continue',
  ts:'const let var function return if else for while class interface type enum new await async import from export default try catch throw typeof of in this true false null undefined public private readonly extends implements',
  rust:'fn let mut pub use struct enum impl trait match if else for while loop return self Self async await move ref const static where as dyn box type mod crate true false Some None Ok Err unsafe',
  python:'def class return if elif else for while import from as with try except finally lambda True False None and or not in is pass yield async await raise global nonlocal',
  bash:'if then else elif fi for do done while case esac function echo export local return cd set source then',
  json:'true false null',
};
function hl(code, lang){
  const hashComment = ['python','py','bash','sh','shell','yaml','yml','toml','ruby','rb'].includes(lang);
  const cp = hashComment ? '(#[^\\n]*)' : '(\\/\\/[^\\n]*|\\/\\*[\\s\\S]*?\\*\\/)';
  const re = new RegExp(cp + '|("(?:[^"\\\\]|\\\\.)*"|\'(?:[^\'\\\\]|\\\\.)*\'|`(?:[^`\\\\]|\\\\.)*`)|(\\b\\d[\\d_.eExXa-fA-F]*\\b)|([A-Za-z_$][\\w$]*)|([\\s\\S])', 'g');
  const kw = new Set((HL_KW[lang]||HL_KW.js).split(' '));
  let out='';
  code.replace(re,(m,comment,str,num,word,other)=>{
    if(comment!=null) out+=`<span class="t-co">${esc(comment)}</span>`;
    else if(str!=null) out+=`<span class="t-st">${esc(str)}</span>`;
    else if(num!=null) out+=`<span class="t-nu">${esc(num)}</span>`;
    else if(word!=null) out+= kw.has(word)?`<span class="t-kw">${esc(word)}</span>`:esc(word);
    else out+=esc(other);
    return '';
  });
  return out;
}
let _cbN=0; const _cbStore={};
function codeBlock(code, lang){
  lang=(lang||'').toLowerCase(); const id='cb'+(_cbN++); _cbStore[id]=code;
  return `<div class="cb"><div class="cb-head"><span>${esc(lang||'code')}</span><button class="cb-copy" onclick="copyCode('${id}',this)">Copy</button></div><pre><code>${hl(code,lang)}</code></pre></div>`;
}
function copyCode(id,btn){ const t=_cbStore[id]||''; (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(()=>{ btn.textContent='Copied'; btn.classList.add('done'); setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('done'); },1200); }).catch(()=>{}); }
function mdInline(t){ // t is already escaped
  // Pull inline-code out FIRST (behind a NUL-delimited placeholder that cannot occur in escaped
  // text) so emphasis/link rules never run inside literal code spans, then restore it.
  const codes=[], S=String.fromCharCode(0);
  t = t.replace(/`([^`]+)`/g,(m,c)=>{ codes.push(c); return S+(codes.length-1)+S; });
  t = t
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,(m,txt,url)=>`<a href="${url.replace(/"/g,'%22').replace(/'/g,'%27')}" target="_blank" rel="noopener">${txt}</a>`);
  return t.replace(new RegExp(S+'(\\d+)'+S,'g'),(m,i)=>`<code class="ic">${codes[+i]}</code>`);
}
function mdToHtml(raw){
  const blocks=[];
  const text=String(raw).replace(/```([\w+#-]*)\n?([\s\S]*?)```/g,(m,lang,code)=>{ blocks.push(codeBlock(code.replace(/\n$/,''),lang)); return `␀B${blocks.length-1}␀`; });
  const lines=text.split('\n'); const out=[]; let i=0;
  const isBlock=l=>/^\s*$/.test(l)||/^␀B\d+␀$/.test(l)||/^#{1,4}\s/.test(l)||/^\s*([-*]|\d+\.)\s+/.test(l)||/^\s*>\s?/.test(l)||/^---+\s*$/.test(l);
  while(i<lines.length){
    const ln=lines[i];
    const bm=ln.match(/^␀B(\d+)␀$/); if(bm){ out.push(blocks[+bm[1]]); i++; continue; }
    if(/^\s*$/.test(ln)){ i++; continue; }
    const hm=ln.match(/^(#{1,4})\s+(.*)$/); if(hm){ out.push(`<div class="md-h md-h${hm[1].length}">${mdInline(esc(hm[2]))}</div>`); i++; continue; }
    if(/^---+\s*$/.test(ln)){ out.push('<hr>'); i++; continue; }
    if(/^\s*>\s?/.test(ln)){ const buf=[]; while(i<lines.length&&/^\s*>\s?/.test(lines[i])){ buf.push(mdInline(esc(lines[i].replace(/^\s*>\s?/,'')))); i++; } out.push(`<blockquote>${buf.join('<br>')}</blockquote>`); continue; }
    if(/^\s*([-*]|\d+\.)\s+/.test(ln)){ const ol=/^\s*\d+\./.test(ln); const buf=[]; while(i<lines.length&&/^\s*([-*]|\d+\.)\s+/.test(lines[i])){ buf.push(`<li>${mdInline(esc(lines[i].replace(/^\s*([-*]|\d+\.)\s+/,'')))}</li>`); i++; } out.push(`<${ol?'ol':'ul'} class="md-list">${buf.join('')}</${ol?'ol':'ul'}>`); continue; }
    const buf=[]; while(i<lines.length&&!isBlock(lines[i])){ buf.push(mdInline(esc(lines[i]))); i++; } out.push(`<p>${buf.join('<br>')}</p>`);
  }
  return out.join('');
}

  const msg={role:'engram',text:'',streaming:true}; sess.messages.push(msg); paintFeed();
  try {
    const r = await fetch('/v1/converse/stream',{method:'POST',headers:{...AUTH,'content-type':'application/json'},body:JSON.stringify({text, session:sid, attachments})});
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
    for(;;){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        let ev='message'; const dl=[];
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')) dl.push(line.slice(5).replace(/^ /,''));
        }
        const data=dl.join('\n');
        // The reply text always lands in its own session's object; only repaint if that session
        // is still on screen (so a mid-stream switch doesn't render into the wrong feed).
        const live = WS.activeSession===sid;
        if(ev==='token'){ msg.text+=data; if(live) paintFeed(); }
        else if(ev==='done'){ try{const d=JSON.parse(data); if(d.reply) msg.text=d.reply; msg.recalled=d.recalled; msg.recalled_refs=d.recalled_refs; msg.learned=d.learned;}catch(_){} if(live) paintFeed(); }
        else if(ev==='error'){ msg.text='(couldn’t reach Engram - '+data+')'; if(live) paintFeed(); }
      }
    }
    if(!msg.text) msg.text='(no reply)';
    msg.streaming=false; if(WS.activeSession===sid) paintFeed();
  } catch(e){
    msg.text=msg.text||'(couldn’t reach Engram - '+(e.message||'try again')+')'; msg.streaming=false; if(WS.activeSession===sid) paintFeed();
  }
}

function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
// 3D brain: a force-directed graph in space you can ORBIT (drag) and ZOOM (wheel). The layout
// SETTLES - forces cool to rest (alpha decay) so nodes stop moving: no eye-jitter, and they stay put
// to click. Anatomy is not claimed: regions cluster and depth is for exploration, not a lobe map.
const BRAIN_ANCH = {            // unit tetrahedron - four well-separated region anchors in 3D space
  identity:   [0, 0.9, 0],
  semantic:   [0.92, -0.32, 0.10],
  episodic:   [-0.46, -0.32, 0.80],
  procedural: [-0.46, -0.32, -0.80],
};
// Respect the OS "reduce motion" setting: skip the formation/birth animation (nodes appear at rest).
const BRAIN_REDUCED = (()=>{ try{ return matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(_){ return false; } })();
function brainNode(n, born){
  const reg=BRAIN_REGIONS[n.region]?n.region:'semantic', a=BRAIN_ANCH[reg];
  const tierA=n.tier==='hot'?1:n.tier==='warm'?0.72:0.5;
  const r=3.2+(n.importance||0.3)*4.5+Math.min(6,Math.log2((n.access||0)+1)*1.4);
  const h=n.id*2.3999632;       // stable pseudo-random offset around the anchor (not re-random per load)
  return { ...n, reg, r, tierA, born,
    x:a[0]+Math.cos(h)*0.32, y:a[1]+Math.sin(h*1.7)*0.32, z:a[2]+Math.cos(h*2.3)*0.32,
    vx:0, vy:0, vz:0, sx:0, sy:0, depth:0, ps:1 };
}
function brainInit(raw){
  if(BRAIN && BRAIN.raf) cancelAnimationFrame(BRAIN.raf);
  const canvas=document.getElementById('brainCanvas'); if(!canvas) return;
  const B = BRAIN = { canvas, ctx:canvas.getContext('2d'), nodes:[], hover:null, sel:null,
    mouse:{x:-1,y:-1}, dim:new Set(), matched:null, t:0, raf:0, w:0,h:0,cx:0,cy:0, R:200,
    dpr:Math.min(2,window.devicePixelRatio||1), cam:{yaw:0.6, pitch:-0.30, zoom:1}, drag:null, alpha:1 };
  B.nodes = raw.map((n,i)=>brainNode(n, BRAIN_REDUCED?1:-i*0.016));   // stagger the birth so the brain assembles (unless reduce-motion)
  brainResize();
  brainWireInput(canvas);
  if(!window._brainResizeWired){ window._brainResizeWired=true; window.addEventListener('resize', ()=>brainResize()); }
  if(!window._brainPollWired){ window._brainPollWired=true; setInterval(brainPoll, 3500); }
  brainLoop();
}
// Merge a fresh graph into the LIVE brain without resetting it: new memories arrive with born:0 (so
// they animate in), existing nodes refresh their tier/size, and forgotten nodes drop.
function brainMergeGraph(raw){
  const B=BRAIN; if(!B) return 0;
  const byId=new Map(B.nodes.map(n=>[n.id,n])); const fresh=new Set(); let added=0;
  for(const n of raw){ fresh.add(n.id);
    const tierA=n.tier==='hot'?1:n.tier==='warm'?0.72:0.5;
    const r=3.2+(n.importance||0.3)*4.5+Math.min(6,Math.log2((n.access||0)+1)*1.4);
    const ex=byId.get(n.id);
    if(ex){ ex.tier=n.tier; ex.access=n.access; ex.importance=n.importance; ex.tierA=tierA; ex.r=r; continue; }
    B.nodes.push(brainNode(n, BRAIN_REDUCED?1:0)); added++;
  }
  if(raw.length) B.nodes=B.nodes.filter(n=>fresh.has(n.id));
  // Deliberately do NOT re-warm the settled layout: a new memory appears at its own anchor spot
  // (with the birth animation) without shaking every other node - the brain stays calm to read.
  return added;
}
async function brainPoll(){
  if(state.route!=='Memory' || !BRAIN || document.hidden) return;
  let data; try{ data=await J('/v1/memory/graph?n=80'); }catch(_){ return; }
  brainMergeGraph(data.nodes||[]);
  const stats=data.stats||{}, total=stats.total ?? (data.nodes||[]).length;
  const cnt=document.querySelector('.brain-count');
  if(cnt) cnt.textContent=`${total} ${total===1?'memory':'memories'} · ${(stats.by_tier?.warm||0)} warm · ${(stats.by_tier?.cold||0)} cold`;
  document.querySelectorAll('.brain-legend .lg').forEach(el=>{ const b=el.querySelector('b'); if(b) b.textContent=stats.by_region?.[el.dataset.region]||0; });
}
function brainResize(){
  const B=BRAIN; if(!B) return; const c=B.canvas;
  const w=c.clientWidth,h=c.clientHeight; if(!w||!h) return; B.w=w; B.h=h;
  c.width=w*B.dpr; c.height=h*B.dpr; B.ctx.setTransform(B.dpr,0,0,B.dpr,0,0);
  B.cx=w/2; B.cy=h/2; B.R=Math.min(w,h)*0.34;
}
function brainLoop(){ const B=BRAIN; if(!B) return;
  if(state.route!=='Memory' || !document.getElementById('brainCanvas')){ B.raf=0; return; }
  B.t++; brainStep(); brainDraw(); B.raf=requestAnimationFrame(brainLoop); }
function brainStep(){
  const B=BRAIN, ns=B.nodes;
  for(const n of ns){ if(n.born<1) n.born=Math.min(1,n.born+0.03); }   // birth ramp (always)
  if(B.alpha>0.015){ const al=B.alpha;                                  // forces fade out -> settle
    for(let i=0;i<ns.length;i++){ const n=ns[i], a=BRAIN_ANCH[n.reg];
      let fx=(a[0]-n.x)*0.022, fy=(a[1]-n.y)*0.022, fz=(a[2]-n.z)*0.022;
      for(let j=0;j<ns.length;j++){ if(i===j)continue; const m=ns[j];
        let dx=n.x-m.x,dy=n.y-m.y,dz=n.z-m.z,d2=dx*dx+dy*dy+dz*dz; if(d2<0.0004)d2=0.0004;
        if(d2<0.55){ const f=(n.reg===m.reg?0.00035:0.00062)/d2; fx+=dx*f; fy+=dy*f; fz+=dz*f; } }
      n.vx=(n.vx+fx)*0.80; n.vy=(n.vy+fy)*0.80; n.vz=(n.vz+fz)*0.80;
      n.x+=n.vx*al; n.y+=n.vy*al; n.z+=n.vz*al;
    }

  }
}
function brainDraw(){
  const B=BRAIN, ctx=B.ctx, c=B.cam; ctx.clearRect(0,0,B.w,B.h);

  const cyw=Math.cos(c.yaw), syw=Math.sin(c.yaw), cp=Math.cos(c.pitch), sp=Math.sin(c.pitch), F=3.0;
  const pr=(x,y,z)=>{ const x1=x*cyw+z*syw, z1=-x*syw+z*cyw, y2=y*cp-z1*sp, z2=y*sp+z1*cp, persp=F/(F-z2);
    return [B.cx+x1*B.R*persp*c.zoom, B.cy+y2*B.R*persp*c.zoom, z2, persp*c.zoom]; };
  for(const n of B.nodes){ const p=pr(n.x,n.y,n.z); n.sx=p[0]; n.sy=p[1]; n.depth=p[2]; n.ps=p[3]; }
  const ap={}; for(const k in BRAIN_ANCH){ const a=BRAIN_ANCH[k]; ap[k]=pr(a[0],a[1],a[2]); }
  // hover: nearest projected node to the cursor (reliable now that nodes are settled)
  if(B.mouse.x>=0 && !(B.drag&&B.drag.moved>4)){ let best=1e9, hv=null;
    for(const n of B.nodes){ const dx=n.sx-B.mouse.x, dy=n.sy-B.mouse.y, d2=dx*dx+dy*dy, rr=(n.r*n.ps+7);
      if(d2<rr*rr && d2<best){ best=d2; hv=n; } }
    B.hover=hv;
  } else B.hover=null;
  const order=[...B.nodes].sort((a,b)=>a.depth-b.depth);   // back-to-front (painter's)
  for(const n of order){ const a=ap[n.reg], reg=BRAIN_REGIONS[n.reg], dim=B.dim.has(n.reg)||(B.matched&&!B.matched.has(n.id));
    ctx.strokeStyle=hexA(reg.color, dim?0.02:0.05); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(n.sx,n.sy); ctx.lineTo(a[0],a[1]); ctx.stroke(); }
  for(const k in BRAIN_REGIONS){ const a=ap[k], reg=BRAIN_REGIONS[k], dim=B.dim.has(k);
    ctx.beginPath(); ctx.arc(a[0],a[1],5*a[3],0,7); ctx.fillStyle=hexA(reg.color,dim?0.3:0.9); ctx.fill();
    ctx.fillStyle=hexA(reg.color,dim?0.3:0.72); ctx.font='600 11px ui-sans-serif,system-ui'; ctx.textAlign='center'; ctx.fillText(reg.label.toUpperCase(), a[0], a[1]-13); }
  for(const n of order){ const reg=BRAIN_REGIONS[n.reg], dim=B.dim.has(n.reg)||(B.matched&&!B.matched.has(n.id)), hit=B.matched&&B.matched.has(n.id);
    const b=Math.max(0,Math.min(1,n.born==null?1:n.born)), grow=1-Math.pow(1-b,3);

}
function brainTip(){
  const tip=document.getElementById('brainTip'); if(!tip) return; const B=BRAIN, n=B.hover;
  if(!n){ tip.hidden=true; return; } const reg=BRAIN_REGIONS[n.reg];

// Orbit (drag), zoom (wheel), click-to-open. A drag rotates the camera; a press that barely moves is
// treated as a click on the node under the cursor.
function brainWireInput(canvas){
  canvas.onmousemove=e=>{ const r=canvas.getBoundingClientRect(); BRAIN.mouse.x=e.clientX-r.left; BRAIN.mouse.y=e.clientY-r.top; };
  canvas.onmouseleave=()=>{ if(BRAIN && !BRAIN.drag){ BRAIN.mouse.x=-1; BRAIN.mouse.y=-1; } };
  canvas.onmousedown=e=>{ if(BRAIN) BRAIN.drag={lx:e.clientX, ly:e.clientY, moved:0}; brainFadeHint(); };
  canvas.onwheel=e=>{ e.preventDefault(); if(!BRAIN) return; const z=BRAIN.cam.zoom*(1-e.deltaY*0.0014); BRAIN.cam.zoom=Math.max(0.45,Math.min(4,z)); brainFadeHint(); };

    window.addEventListener('mousemove', e=>{ const B=BRAIN; if(!B||!B.drag) return;
      const dx=e.clientX-B.drag.lx, dy=e.clientY-B.drag.ly; B.drag.moved+=Math.abs(dx)+Math.abs(dy); B.drag.lx=e.clientX; B.drag.ly=e.clientY;

}
function brainToggleRegion(k){ const B=BRAIN; if(!B) return;

async function brainRecall(){

  }catch(e){ if(note) note.textContent='recall failed'; }
}
function brainClearRecall(){ if(BRAIN) BRAIN.matched=null; const i=document.getElementById('brainQ'); if(i) i.value=''; const n=document.getElementById('brainNote'); if(n) n.textContent=''; }
function brainShowDetail(n){

let MIND={lines:[]};
function mindToggle(){
  const p=document.getElementById('mindPanel'); if(!p) return;
  const collapsed=p.classList.toggle('collapsed');
  try{ localStorage.setItem('engram.mindCollapsed', collapsed?'1':'0'); }catch(_){}

}
async function renderMind(){
  const panel=document.getElementById('mindPanel');
  if(panel){ let col='0'; try{ col=localStorage.getItem('engram.mindCollapsed')||'0'; }catch(_){}
    panel.classList.toggle('collapsed', col==='1'); const tg=panel.querySelector('.mind-toggle'); if(tg) tg.textContent=col==='1'?'▸':'▾'; }
  const wrap=document.getElementById('mindLines'); if(!wrap) return;
  let st; try{ st=await J('/v1/consciousness'); }catch(_){ st={lines:[]}; }
  MIND=st;
  const ver=document.getElementById('mindVer'); if(ver) ver.textContent=(st.lines||[]).length?`${st.lines.length}/9 lines`:'';
  const lines=st.lines||[];
  if(!lines.length){ wrap.innerHTML=`<div class="mind-empty"><b>Working memory is empty.</b><br>Distill it from your brain, or add a line you want loaded into every answer.</div>`; return; }
  wrap.innerHTML = lines.map(l=>{
    const reg=BRAIN_REGIONS[l.region]||BRAIN_REGIONS.semantic;
    const isMem=l.source&&l.source.kind==='memory';
    const src = isMem
      ? `<span class="ml-src mem" onclick="mindFocus(${(l.source.id|0)})" title="Open the source memory in the brain">◇ #${l.source.id}</span>`
      : `<span class="ml-src">✎ yours</span>`;
    const pin = l.pinned ? `<span class="ml-pin" title="Pinned — kept when you re-distill">📌</span>` : '';
    return `<div class="mind-line" style="--lc:${reg.color}">
      <div class="ml-act"><button onclick="mindEdit('${escAttr(l.id)}')" title="Edit">✎</button><button onclick="mindRemove('${escAttr(l.id)}')" title="Remove">×</button></div>
      <div class="ml-t">${esc(l.text)}</div>
      <div class="ml-b"><i style="color:${reg.color}">${esc(reg.label)}</i>${src}${pin}</div>
    </div>`;
  }).join('');
}
function mindApply(st){ MIND=st; renderMind(); }

async function mindDistill(){

}

async function mindEdit(id){

function mindFocus(memId){
  const B=BRAIN; if(!B) return;
  const node=B.nodes.find(n=>n.id===memId);
  if(!node){ notify('That memory isn’t in the current graph view'); return; }
  brainShowDetail(node);
  const orig=node.r; node.r=orig*1.9; setTimeout(()=>{ if(node) node.r=orig; }, 900);
}
// A recall-ribbon chip under a chat answer: jump to the Memory view and focus the memory that
// grounded the reply, so "what backed this answer" is one click from the answer itself.
function recallOpen(id){
  go('Memory');
  // Poll until the brain has loaded (the graph fetch can be slower than any fixed delay), then focus.
  let tries=0;
  const tick=()=>{ tries++;
    if(BRAIN && BRAIN.nodes && BRAIN.nodes.length){ if(typeof mindFocus==='function') mindFocus(id); return; }
    if(tries<25) setTimeout(tick, 120);
  };
  setTimeout(tick, 200);
}

async function renderSkills(){
  document.getElementById('viewname').textContent='Skills';
  let sk={skills:[]}; try{ sk=await J('/v1/skills'); }catch(_){}
  const skills=sk.skills||[];
  const cards = skills.length ? skills.map(s=>{
    const active=s.active, runs=s.runs||0, verified=runs>0;
    const ladder=(s.versions||[]).map(v=>`<span class="vchip${v===active?' active':''}">v${v}</span>`).join('<span class="varr">→</span>');
    const statusPill = verified
      ? `<span class="sk-pill ok" title="Improvements are scored by exact match against ${runs} recorded (input, accepted-output) pair${runs===1?'':'s'}.">verified · ${runs} scored run${runs===1?'':'s'}</span>`
      : `<span class="sk-pill warn" title="No recorded (input, accepted-output) pairs to score against yet — so an improvement can't be measured. Honest signal, not a guess.">unverified — no scored runs yet</span>`;
    const events=(s.learn||[]).slice().reverse().map(e=>{
      const inc=(+e.incumbent_score||0), cand=(+e.candidate_score||0), reps=e.replays||0;
      const seq=e.seq?`<span class="sk-seq" title="copy the signed ledger hash" onclick="navigator.clipboard.writeText('${escAttr(e.hash||'')}')">◇ ${e.seq|0}</span>`:'';
      if(e.promoted) return `<div class="sk-ev promoted">✓ <b>v${e.from|0} → v${e.to|0}</b> beat the incumbent · <b>${inc.toFixed(2)} → ${cand.toFixed(2)}</b> on ${reps} replay${reps===1?'':'s'} ${seq}</div>`;
      return `<div class="sk-ev rejected">↺ <b>v${e.candidate|0} rejected</b> · ${cand.toFixed(2)} ≤ ${inc.toFixed(2)} on ${reps} replay${reps===1?'':'s'} — kept v${e.active|0} ${seq}</div>`;
    }).join('');
    const evBlock = events ? `<div class="sk-events">${events}</div>`
      : (verified ? `<div class="sk-muted">No promotions yet — v${active} is the best on ${runs} run${runs===1?'':'s'}.</div>` : '');
    return `<div class="sk-card">
      <div class="sk-head"><span class="sk-name">${esc(s.id)}</span><span class="vladder">${ladder}</span><span class="grow"></span>${statusPill}</div>
      ${evBlock}
      <div class="sk-run"><input id="in_${esc(s.id)}" placeholder="try an input…" onkeydown="if(event.key==='Enter')runSkill('${esc(s.id)}')"><button class="sbtn" onclick="runSkill('${esc(s.id)}')">Run</button><span id="out_${esc(s.id)}" class="sk-out"></span></div>
    </div>`;
  }).join('') : `<div class="sk-empty"><b>No skills yet.</b><span>Skills are small, signed programs Engram grows. Each improvement is replayed against past runs and promoted only when it measurably wins — and you can verify it.</span></div>`;
  document.getElementById('view').innerHTML = `<div class="skills-wrap">
    <div class="skills-head"><h2>Skills</h2><div class="sub">Procedural memory — expertise that improves only when it measurably wins on replay, with the before/after signed. Where there's no scored signal yet, it says so.</div></div>
    <div class="skills-list">${cards}</div></div>`;
}
async function runSkill(id){ const input=document.getElementById('in_'+id).value;
  const r=await J('/v1/skills/'+encodeURIComponent(id)+'/run',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({input})});
  document.getElementById('out_'+id).textContent = r.error?('error: '+r.error):('→ '+r.output); }

// Only one settings category is mounted at a time, so collect just the fields that exist -
// the daemon merges a partial patch and leaves the rest untouched.
function collectSettings(){
  const has=id=>!!document.getElementById(id), patch={};
  if(has('pkind')){ patch.provider={ kind:gv('pkind'), model:gv('pmodel'), base_url:gv('pbase') }; const k=gv('pkey'); if(k) patch.provider.api_key=k; }
  if(has('ekind')) patch.embed={ kind:gv('ekind'), model_dir:gv('edir') };
  if(has('sshell')||has('stok')||has('ssec')){ patch.security={}; if(has('sshell')) patch.security.allow_shell=document.getElementById('sshell').checked;
    const t=gv('stok'); if(t) patch.security.api_token=t; const s=gv('ssec'); if(s) patch.security.channel_secret=s; }
  if(has('cbudget')) patch.cost={ task_token_budget: Math.max(1000, parseInt(gv('cbudget'),10)||250000) };
  if(has('mcplist')) patch.mcp=collectMcpV2();
  return patch;
}

async function saveSettings(){
  const patch=collectSettings();
  try{
    const res=await J('/v1/config',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(patch)});
    // Stay authenticated if the API token was just set/changed, so we don't 401 ourselves.
    if(patch.security && patch.security.api_token) setClientToken(patch.security.api_token);
    const mcpShort = typeof res.mcp_requested==='number' && res.mcp_connected<res.mcp_requested;
    let msg='Saved';

let _restarting=false;
async function restartDaemon(){
  if(_restarting) return;
  if(!await askConfirm({title:'Restart Engram?',message:'This applies embeddings changes and leaves it unavailable for a few seconds. Any running task is interrupted.',ok:'Restart'})) return;
  _restarting=true; notify('Restarting…','ok');
  try{ await J('/v1/restart',{method:'POST',headers:{'content-type':'application/json'},body:'{}'}); }catch(_){/* the connection drops as it exits — expected */}
  let n=0; const iv=setInterval(async()=>{
    n++;
    try{ const h=await fetch('/health'); if(h.ok){ clearInterval(iv); _restarting=false; notify('Engram is back','ok'); ccReload(); poll(); return; } }catch(_){}
    if(n>40){ clearInterval(iv); _restarting=false; notify('Engram didn’t come back on its own — relaunch the app or start the daemon.'); }
  }, 500);
}
