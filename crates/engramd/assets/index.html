// ---- Terminal - the glass-box shell (your commands signed into the ledger, like the agent's) ----
let TERM = { cwd:null, parent:null, tree:[], log:[], hist:[], hi:-1, busy:false };
function termShort(p){ if(!p) return ''; const s=p.split('/').filter(Boolean); return (s.length>2?'…/':'/')+s.slice(-2).join('/'); }
const attrJson = x => escAttr(JSON.stringify(x));
async function loadTree(path){
  try{ return await J(tok('/v1/fs'+(path?('?path='+encodeURIComponent(path)):''))); }catch(_){ return null; }
}
async function renderTerminal(){
  const v=document.getElementById('view'); if(!v) return;
  document.getElementById('viewname').textContent='Terminal';
  const fs=await loadTree(TERM.cwd);
  if(!fs || fs.denied){
    v.innerHTML=`<div class="term-gate"><div class="tg-card">
      <div class="tg-ic">${ICONS.Terminal}</div>
      <h2>A terminal that keeps no secrets</h2>
      <p>Engram signs every command — the agent's and your own — into one tamper-evident ledger, so even the lines you type by hand stay auditable. No human-shaped hole in the glass box.</p>
      <button class="primary" onclick="enableShell()">Enable shell access</button>
      <div class="tg-fine">You can turn this off any time in Settings › Security.</div>
    </div></div>`;
    return;
  }
  TERM.cwd=fs.path; TERM.parent=fs.parent; TERM.tree=fs.entries||[];
  if(!TERM.log.length) TERM.log=[{k:'sys',t:'Engram terminal — every command you run is signed into the ledger. Try ls, git status, pwd. Type clear to reset.'}];
  v.innerHTML=`<div class="term-wrap">
    <aside class="ftree" id="ftree"></aside>
    <div class="term" id="term">
      <div class="term-out" id="termOut"></div>
      <div class="term-in"><span class="term-prompt" id="termPrompt">${esc(termShort(TERM.cwd))} $</span><input id="termCmd" class="term-cmd" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="run a command…"></div>
    </div></div>`;
  renderTree(); paintTerm();
  const inp=document.getElementById('termCmd'); inp.onkeydown=termKey; inp.focus();
  document.getElementById('term').addEventListener('mousedown', e=>{ if(e.target.tagName!=='INPUT' && (''+window.getSelection()).length===0) setTimeout(()=>inp.focus(),0); });
}
function renderTree(){
  const el=document.getElementById('ftree'); if(!el) return;
  const up = TERM.parent ? `<div class="ft-row dir" onclick="termCd(${attrJson(TERM.parent)})"><span class="fi">↰</span><span class="fname">..</span></div>` : '';
  const rows = (TERM.tree||[]).map(e=>{
    const full=(TERM.cwd.endsWith('/')?TERM.cwd:TERM.cwd+'/')+e.name;
    return e.dir
      ? `<div class="ft-row dir" onclick="termCd(${attrJson(full)})"><span class="fi">▸</span><span class="fname">${esc(e.name)}</span></div>`
      : `<div class="ft-row file" onclick="termInsert(${attrJson(e.name)})"><span class="fi">·</span><span class="fname">${esc(e.name)}</span></div>`;
  }).join('') || '<div class="ft-row" style="color:var(--text-muted);cursor:default">empty</div>';
  el.innerHTML=`<div class="ft-head" title="${escAttr(TERM.cwd)}">Files</div>${up}${rows}`;
}
function paintTerm(){
  const o=document.getElementById('termOut'); if(!o) return;
  o.innerHTML=TERM.log.map(e=>{
    if(e.k==='sys') return `<div class="t-sys">${esc(e.t)}</div>`;
    if(e.k==='cmd'){ const sig=e.hash?`<span class="t-sig" onclick="openReceipt()" title="signed into the ledger · seq ${esc(String(e.seq))}">◇ ${esc(String(e.hash).slice(0,8))}</span>`:''; return `<div class="t-cmd"><span class="t-prompt">${esc(termShort(e.cwd))} $</span><span class="t-text">${esc(e.t)}</span>${sig}</div>`; }
    if(e.k==='out' && e.t) return `<pre class="t-out">${esc(e.t)}</pre>`;
    if(e.k==='err' && e.t) return `<pre class="t-out t-err">${esc(e.t)}</pre>`;
    return '';
  }).join('');
  o.scrollTop=o.scrollHeight;
}
function termKey(e){
  if(e.key==='Enter'){ e.preventDefault(); if(TERM.busy) return; const c=e.target.value; e.target.value=''; runTermCmd(c); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); if(TERM.hist.length){ TERM.hi=Math.min(TERM.hi+1,TERM.hist.length-1); e.target.value=TERM.hist[TERM.hist.length-1-TERM.hi]||''; } }
  else if(e.key==='ArrowDown'){ e.preventDefault(); if(TERM.hi>0){ TERM.hi--; e.target.value=TERM.hist[TERM.hist.length-1-TERM.hi]||''; } else { TERM.hi=-1; e.target.value=''; } }
}
async function runTermCmd(cmd){
  cmd=(cmd||'').trim(); if(!cmd) return;
  TERM.hist.push(cmd); TERM.hi=-1;
  if(cmd==='clear'){ TERM.log=[]; paintTerm(); return; }
  TERM.log.push({k:'cmd', cwd:TERM.cwd, t:cmd}); const entry=TERM.log[TERM.log.length-1]; paintTerm();
  TERM.busy=true; const inp=document.getElementById('termCmd'); if(inp) inp.classList.add('term-busy');
  try{
    const r=await J('/v1/shell',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({command:cmd, cwd:TERM.cwd})});
    if(r.denied){ TERM.busy=false; renderTerminal(); return; }
    entry.seq=r.seq; entry.hash=r.hash;
    if(r.cwd) TERM.cwd=r.cwd;
    if(r.stdout) TERM.log.push({k:'out',t:String(r.stdout).replace(/\n+$/,'')});
    if(r.stderr) TERM.log.push({k:'err',t:String(r.stderr).replace(/\n+$/,'')});
    const pr=document.getElementById('termPrompt'); if(pr) pr.textContent=termShort(TERM.cwd)+' $';
    const fs=await loadTree(TERM.cwd); if(fs && !fs.denied){ TERM.parent=fs.parent; TERM.tree=fs.entries||[]; renderTree(); }
    paintTerm();
  }catch(e){ TERM.log.push({k:'err',t:'(could not run — '+(e.message||'error')+')'}); paintTerm(); }
  finally{ TERM.busy=false; const i2=document.getElementById('termCmd'); if(i2){ i2.classList.remove('term-busy'); i2.focus(); } }
}
async function termCd(path){
  // Browsing the tree changes the working directory (a read, not a recorded command); typing
  // `cd` is what lands a signed line. Keeps the ledger about intent, not every folder click.
  const fs=await loadTree(path); if(!fs || fs.denied) return;
  TERM.cwd=fs.path; TERM.parent=fs.parent; TERM.tree=fs.entries||[]; renderTree();
  const pr=document.getElementById('termPrompt'); if(pr) pr.textContent=termShort(TERM.cwd)+' $';
  const inp=document.getElementById('termCmd'); if(inp) inp.focus();
}
function termInsert(name){ const inp=document.getElementById('termCmd'); if(!inp) return; inp.value=(inp.value?inp.value+' ':'')+name; inp.focus(); }

    if(typeof CFG!=='undefined' && CFG && CFG.security) CFG.security.allow_shell=true; renderTerminal(); }
  catch(e){ notify('Couldn’t enable shell — '+e.message); }
}
// ---- Activity: the full, browsable, verifiable signed ledger ----
const ACT={ entries:[], filter:'all', verify:{}, pubkey:{} };
const ACT_SEAL_OK='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.4-7 8.9C8 17.4 5 14.4 5 10V6l7-3Z"/><path d="m9 11.7 2 2 4-4.2"/></svg>';
const ACT_SEAL_BAD='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.4-7 8.9C8 17.4 5 14.4 5 10V6l7-3Z"/><path d="M9.5 9.5l5 5M14.5 9.5l-5 5"/></svg>';
function actShortJson(p){ try{ const s=JSON.stringify(p); return s==='{}'?'':s; }catch(_){ return ''; } }
function fmtAgo(ms){ const d=Date.now()-ms; const s=Math.max(0,Math.floor(d/1000));
  if(s<60) return s+'s ago'; const m=Math.floor(s/60); if(m<60) return m+'m ago';
  const h=Math.floor(m/60); if(h<24) return h+'h ago'; const dy=Math.floor(h/24);
  return dy<7 ? dy+'d ago' : new Date(ms).toLocaleDateString(); }
function actEntry(e){
  const k=e.kind||'', p=e.payload||{}; let label=k, summary='';
  if(k==='core.boot'){ label='Daemon started'; summary='v'+(p.version||'')+(p.addr?(' · '+p.addr):''); }
  else if(k==='core.sleep'){ label='Daemon slept to zero'; summary='idle - released to nothing'; }
  else if(k==='llm.call'){ label='Model call'; summary=(p.model||'model')+' · '+((p.tokens_in||0)+(p.tokens_out||0))+' tok · $'+(+(p.cost_usd||0)).toFixed(4); }
  else if(k==='policy.set'){ label='Policy changed'; summary='shell access '+(p.allow_shell?'enabled':'disabled'); }
  else if(k==='terminal.exec'){ label='Terminal command'; summary='$ '+(p.command||''); }
  else if(k.startsWith('agent.')){ label='Agent · '+(k.slice(6)||'step'); summary=p.command||p.tool||actShortJson(p); }
  else if(k==='channel.in'){ label='Inbound message'; summary='via '+(p.platform||'a channel'); }
  else if(k==='config.set'){ label='Settings updated'; summary=Object.keys(p).join(', ')||'config'; }
  else if(k.startsWith('task.')){ label='Task '+(k.slice(5)); summary=(p.id||'')+(p.status?(' · '+p.status):''); }
  else if(['memory','identity','episodic','semantic','procedural'].some(x=>k.startsWith(x))){ label='Memory'; summary=p.text||actShortJson(p); }
  else { summary=actShortJson(p); }
  const actor=e.actor||'core';
  const color = actor==='agent'?'#45c8a8':(actor==='user'?'#85b7eb':'#b58cff');
  return { label, summary, actor, color };
}

// ===== ARTIFACTS (Open in canvas) =====
// Client-side detection of substantial code/doc blocks in Engram replies, surfaced as an
// "Open in canvas" chip that splits the chat into a feed + right-hand artifact pane.
// No backend: we scan the rendered feed after each paintFeed() and reuse _cbStore raw code.
// Model output is untrusted, so everything rendered here goes through esc()/escAttr()/hl().
const ARTS = { open:false, current:null, byKey:{}, order:[], _sig:'' };

// Stable identity for an artifact across streaming repaints: short FNV-1a hash of lang+content.

// codeBlock() renders an *unlabeled* fence's header as the literal word "code" (esc(lang||'code')),
// so when we read it back from .cb-head span we must fold "code"/"text" to '' — otherwise a
// heading-only markdown block (lang reported as "code") would never qualify and the language tag
// would read a bogus "CODE".
function artNormLang(l){ l=(l||'').toLowerCase().trim(); return (l==='code'||l==='text')?'':l; }

const ART_EXT = { js:'js',jsx:'jsx',ts:'ts',tsx:'tsx',rust:'rs',rs:'rs',python:'py',py:'py',bash:'sh',sh:'sh',shell:'sh',json:'json',yaml:'yml',yml:'yml',toml:'toml',html:'html',css:'css',sql:'sql',go:'go',ruby:'rb',rb:'rb',java:'java',c:'c',cpp:'cpp',md:'md',markdown:'md','':'txt' };
const ART_LANGNAME = { js:'JavaScript',jsx:'JSX',ts:'TypeScript',tsx:'TSX',rust:'Rust',rs:'Rust',python:'Python',py:'Python',bash:'Shell',sh:'Shell',shell:'Shell',json:'JSON',yaml:'YAML',yml:'YAML',toml:'TOML',html:'HTML',css:'CSS',sql:'SQL',go:'Go',ruby:'Ruby',rb:'Ruby',md:'Markdown',markdown:'Markdown' };

// Derive a human title from the content (leading comment / heading / declaration), else the language.
function artTitle(code, lang){
  const lines=String(code).split('\n').map(l=>l.trim()).filter(Boolean);
  for(const l of lines.slice(0,4)){
    let m=l.match(/^(?:\/\/|#|--|;)\s*(.+)$/);            // leading comment
    if(m && m[1].length<=64) return m[1].replace(/\s+/g,' ');
    m=l.match(/^#{1,3}\s+(.+)$/);                          // markdown heading
    if(m) return m[1].replace(/\s+/g,' ').slice(0,64);
    m=l.match(/^(?:export\s+)?(?:async\s+)?(?:fn|function|def|class|struct|interface|enum|impl|type)\s+([A-Za-z_$][\w$]*)/);
    if(m) return m[1];
  }
  const ln=artNormLang(lang);
  return ART_LANGNAME[ln] || (ln ? ln : 'Snippet');
}

// Does this code block clear the bar for an artifact? >=6 lines, or markdown w/ headings.
function artQualifies(code, lang){
  const lines=String(code).replace(/\n+$/,'').split('\n');
  if(lines.length>=6) return true;
  const l=artNormLang(lang);
  if((l==='md'||l==='markdown'||l==='') && /^#{1,3}\s+\S/m.test(code)) return true;
  return false;
}

// Register (or refresh) an artifact, returning its stable key.
function artRegister(code, lang, key){
  lang=artNormLang(lang);
  // key is a stable positional id passed by the caller (NOT a content hash) so a block streaming
  // token-by-token keeps the same identity and an open artifact isn't orphaned each repaint.
  const ext=ART_EXT[lang]!=null?ART_EXT[lang]:'txt';
  if(!ARTS.byKey[key]){ ARTS.order.push(key); }
  ARTS.byKey[key]={ key, code, lang, ext, title:artTitle(code,lang), langName:ART_LANGNAME[lang]||(lang?lang.toUpperCase():'Text'), lines:code.replace(/\n+$/,'').split('\n').length };
  return key;
}

// Mark the chip for the active artifact (without re-rendering the pane).
function artMarkChip(){
  document.querySelectorAll('.art-open.active').forEach(b=>b.classList.remove('active'));
  const a=ARTS.byKey[ARTS.current]; if(!a) return;
  const chip=document.querySelector('.art-open[data-k="'+a.key+'"]'); if(chip) chip.classList.add('active');
}

// Scan the freshly-painted feed: register qualifying blocks, inject "Open in canvas" chips.
// Called at the end of paintFeed(). Rebuilds the registry from on-screen blocks so it stays
// in sync with session switches and streaming repaints. Raw code is recovered from _cbStore via
// the per-block copyCode('cbN',...) onclick id, so it survives codeBlock() regenerating ids.
function artsAfterPaint(){
  const f=document.getElementById('feed'); if(!f) return;
  ARTS.byKey={}; ARTS.order=[]; let artN=0;
  f.querySelectorAll('.cb').forEach(cb=>{
    const copyBtn=cb.querySelector('.cb-copy'); if(!copyBtn) return;
    const m=(copyBtn.getAttribute('onclick')||'').match(/copyCode\('([^']+)'/);
    const codeEl=cb.querySelector('code');
    const raw=(m && typeof _cbStore!=='undefined' && _cbStore[m[1]]!=null) ? _cbStore[m[1]] : (codeEl?codeEl.textContent:'');
    const langEl=cb.querySelector('.cb-head span');
    const lang=(langEl?langEl.textContent:'').trim();
    if(!artQualifies(raw,lang)) return;
    const key=artRegister(raw,lang,'art'+(artN++));
    if(cb.querySelector('.art-open')) return;
    const head=cb.querySelector('.cb-head'); if(!head) return;
    const btn=document.createElement('button');
    btn.className='art-open'; btn.type='button'; btn.dataset.k=key; btn.title='Open in canvas';
    btn.innerHTML='<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="14" y1="3" x2="14" y2="21"/></svg><span>Open in canvas</span>';
    btn.addEventListener('click',()=>artOpen(key));
    head.insertBefore(btn, copyBtn);
  });
  if(ARTS.open){
    if(ARTS.current && ARTS.byKey[ARTS.current]){
      // Only repaint the pane when the active artifact's content actually changed, so a
      // token-by-token streaming repaint doesn't clobber the Copy "Copied" state or tab focus.
      const a=ARTS.byKey[ARTS.current];
      const sig=ARTS.current+'#'+ARTS.order.length+'#'+a.code.length;
      if(sig!==ARTS._sig) artRenderPane(); else artMarkChip();
    }
    else if(ARTS.order.length) artOpen(ARTS.order[ARTS.order.length-1]);
    else artClose();
  }
}

function artShell(){ return document.querySelector('.chat-shell'); }

function artOpen(key){
  if(!ARTS.byKey[key]) return;
  ARTS.current=key; ARTS.open=true;
  const shell=artShell(); if(shell) shell.classList.add('arts-open');

}

function artClose(){
  ARTS.open=false; ARTS.current=null; ARTS._sig='';

function artRenderPane(){
  const pane=document.getElementById('artPane'); if(!pane) return;
  const a=ARTS.byKey[ARTS.current]; if(!a){ artClose(); return; }
  ARTS._sig=ARTS.current+'#'+ARTS.order.length+'#'+a.code.length;
  const multi=ARTS.order.length>1;
  const tabs=multi ? `<div class="art-tabs">${ARTS.order.map(k=>{ const x=ARTS.byKey[k]; return `<button class="art-tab${k===ARTS.current?' on':''}" data-k="${escAttr(k)}" title="${escAttr(x.title)}"><span class="art-dot"></span><span>${esc(x.title)}</span></button>`; }).join('')}</div>` : '';
  pane.innerHTML = `
    <div class="art-bar">

        <span class="art-sub">${a.lines} ${a.lines===1?'line':'lines'}</span>

      <div class="art-actions">

        <button class="art-btn" id="artDl" title="Download file">Download</button>
        <button class="art-x" id="artX" title="Close canvas (Esc)" aria-label="Close canvas">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

  pane.querySelector('#artCopy').addEventListener('click', e=>{
    const btn=e.currentTarget;

      .then(()=>{ btn.textContent='Copied'; btn.classList.add('ok'); setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('ok'); },1200); })
      .catch(()=>notify('Couldn’t copy to clipboard'));
  });
  pane.querySelector('#artDl').addEventListener('click', ()=>artDownload(a));
  pane.querySelectorAll('.art-tab').forEach(t=> t.addEventListener('click',()=>artOpen(t.dataset.k)) );
  artMarkChip();
}

function artDownload(a){
  const safe=(a.title||'artifact').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40)||'artifact';
  const name=safe+'.'+(a.ext||'txt');
  const blob=new Blob([a.code], {type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a'); el.href=url; el.download=name;
  document.body.appendChild(el); el.click(); el.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
  notify('Downloaded '+name,'ok');

// ── Schedule: cadence + premium cards ────────────────────────────
// Glyphs on the 24px line grid (match the rail's stroke language).
const CAD_GLYPH = {
  once:     SVG('<circle cx="12" cy="12" r="8.5"/><path d="M12 8v4.2l2.8 1.7"/>'),
  interval: SVG('<path d="M3.5 12a8.5 8.5 0 0 1 14.5-6M20.5 12a8.5 8.5 0 0 1-14.5 6"/><path d="M18 3v3.2h-3.2M6 21v-3.2h3.2"/>'),
  daily:    SVG('<circle cx="12" cy="12" r="4"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5.2 5.2l1.4 1.4M17.4 17.4l1.4 1.4M5.2 18.8l1.4-1.4M17.4 6.6l1.4-1.4"/>'),
  weekdays: SVG('<rect x="3" y="5" width="18" height="16" rx="2.4"/><path d="M3 9.5h18M8 3v3.5M16 3v3.5"/><path d="M8.5 14h7"/>'),
  weekly:   SVG('<rect x="3" y="5" width="18" height="16" rx="2.4"/><path d="M3 9.5h18M8 3v3.5M16 3v3.5"/><circle cx="12" cy="15" r="1.7"/>'),
};
const CAD_DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];   // recur.rs: 0=Mon … 6=Sun
function cadHM(h, m){
  h = (h|0); m = (m|0);
  // hour/min are the user's local wall-clock now (recur.rs schedules in local time), so the
  // badge shows exactly what was typed: '5pm' → '5:00 PM' and it fires at 5pm local.
  const ap = h < 12 ? 'AM' : 'PM';
  let hr = h % 12; if(hr === 0) hr = 12;
  return m ? `${hr}:${String(m).padStart(2,'0')} ${ap}` : `${hr}:00 ${ap}`;
}
function cadDur(secs){
  secs = Math.max(1, secs|0);
  if(secs % 86400 === 0){ const d = secs/86400; return d===1?'day':`${d} days`; }
  if(secs % 3600  === 0){ const h = secs/3600;  return h===1?'hour':`${h} hr`; }
  if(secs % 60    === 0){ const m = secs/60;    return m===1?'min':`${m} min`; }
  return `${secs} sec`;
}
// Turn a Recurrence (serde tag "kind", snake_case) into { label, glyph, kind }.
// Field names verified against crates/engram-sched/src/recur.rs.
function cadenceSchedule(rec){
  if(!rec || !rec.kind) return { kind:'once', label:'—', glyph:CAD_GLYPH.once };
  switch(rec.kind){
    case 'once': {
      const d = new Date(rec.at_ms);
      const label = 'Once ' + d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + (
        (d.getHours()||d.getMinutes()) ? ' ' + cadHM(d.getHours(), d.getMinutes()) : '');
      return { kind:'once', label, glyph:CAD_GLYPH.once };
    }
    case 'interval':
      return { kind:'interval', label:'Every ' + cadDur(rec.secs), glyph:CAD_GLYPH.interval };
    case 'daily':
      return { kind:'daily', label:'Daily ' + cadHM(rec.hour, rec.min), glyph:CAD_GLYPH.daily };
    case 'weekdays':
      return { kind:'weekdays', label:'Mon–Fri ' + cadHM(rec.hour, rec.min), glyph:CAD_GLYPH.weekdays };
    case 'weekly':
      return { kind:'weekly', label:(CAD_DOW[(rec.weekday|0)%7]) + ' ' + cadHM(rec.hour, rec.min), glyph:CAD_GLYPH.weekly };
    default:
      return { kind:String(rec.kind), label:String(rec.kind), glyph:CAD_GLYPH.once };
  }
}
// Compact relative duration: "4h 12m", "23h", "2d 3h", "now".
function schedRel(ms){
  ms = Math.abs(ms);
  const s = Math.round(ms/1000);
  if(s < 60) return s <= 1 ? 'now' : s + 's';
  const m = Math.floor(s/60);
  if(m < 60) return m + 'm';
  const h = Math.floor(m/60), rm = m % 60;
  if(h < 24) return rm ? `${h}h ${rm}m` : `${h}h`;
  const d = Math.floor(h/24), rh = h % 24;
  return rh ? `${d}d ${rh}h` : `${d}d`;
}
function schedNextLabel(job){
  const now = Date.now(), dt = job.next_fire_ms - now;
  if(dt <= 0) return '<b>due</b> now';
  return 'next in <b>' + schedRel(dt) + '</b>';
}
// Fraction of the cycle elapsed (last/created fire → next fire), clamped [0.04,1].
function schedProgress(job){
  const now = Date.now();
  const start = job.last_fire_ms || job.created_ms || (job.next_fire_ms - 60000);
  const span = job.next_fire_ms - start;
  if(span <= 0) return 1;
  return Math.max(0.04, Math.min(1, (now - start) / span));
}
const SCHED_RUNNING = new Set();   // job ids currently firing from the UI

function schedCardHtml(job){
  const cad = cadenceSchedule(job.recurrence);
  const soon = (job.next_fire_ms - Date.now()) < 3600000;   // within the hour
  const badge = `<span class="cadence-badge cad-${esc(cad.kind)}${soon?' cad-soon':''}" title="${escAttr(cad.label)}"><span class="cad-glyph">${cad.glyph}</span>${esc(cad.label)}</span>`;
  const running = SCHED_RUNNING.has(job.id);
  // attrJson() (= escAttr(JSON.stringify(x))) is the house idiom for passing values into an
  // inline handler: double-quote-safe and apostrophe-safe through HTML decoding, unlike a
  // bare '${escAttr(x)}' which a job name like "it's" would break out of (job.name is untrusted).
  const runBtn = running
    ? `<button class="sc-btn sc-run" disabled aria-label="Running"><span class="sc-spin"></span></button>`
    : `<button class="sc-btn sc-run" onclick="runJobNow(${attrJson(job.id)},event)" title="Run now" aria-label="Run now">${SVG('<path d="M7 5.5v13l11-6.5-11-6.5Z"/>')}</button>`;
  const delBtn = `<button class="sc-btn sc-del" onclick="deleteJob(${attrJson(job.id)},${attrJson(job.name)},event)" title="Delete schedule" aria-label="Delete schedule">${SVG('<path d="M5 7h14M9.5 7V5.4A1.4 1.4 0 0 1 10.9 4h2.2a1.4 1.4 0 0 1 1.4 1.4V7M7 7l.8 11.3A1.6 1.6 0 0 0 9.4 20h5.2a1.6 1.6 0 0 0 1.6-1.5L17 7"/>')}</button>`;
  const pct = Math.round(schedProgress(job) * 100);
  const due = job.next_fire_ms <= Date.now();
  let last = '';
  if(job.last_fire_ms){
    const lbl = 'last run ' + schedRel(Date.now() - job.last_fire_ms) + ' ago';
    last = job.last_task_id
      ? `<span class="sc-last sc-link" title="open the signed receipt for the last run" onclick="openTaskReceipt(${attrJson(job.last_task_id)},event)">◇ ${esc(lbl)}</span>`
      : `<span class="sc-last">${esc(lbl)}</span>`;
  } else {
    last = `<span class="sc-last">never run</span>`;
  }
  return `<div class="sched-card${running?' is-running':''}" data-job="${escAttr(job.id)}">
    <div class="sc-top">
      <span class="sc-name">${esc(job.name)}</span>
      ${badge}
      <span class="sc-actions">${runBtn}${delBtn}</span>
    </div>
    <div class="sc-meter${due?' sc-due':''}"><i style="width:${pct}%"></i></div>
    <div class="sc-foot"><span class="sc-next">${schedNextLabel(job)}</span>${last}</div>
  </div>`;
}

async function renderScheduleView(){
  let jobs = [];

// Live cadence preview in the composer: renders the parsed badge + glyph, not just a date.
let schedPrevTimer = null;
function schedPreviewCadence(){
  clearTimeout(schedPrevTimer);
  schedPrevTimer = setTimeout(async ()=>{
    const inp = document.getElementById('swhen'), out = document.getElementById('swhenprev');
    if(!inp || !out) return;
    const when = inp.value.trim();
    if(!when){ out.className = 'sched-preview empty'; out.innerHTML = ''; return; }
    let r;
    // /v1/schedule/preview answers 200 with {ok:false} for an unparseable phrase, so J() only
    // throws here on a real network error.
    try { r = await J('/v1/schedule/preview?when=' + encodeURIComponent(when)); }
    catch(_){ r = { ok:false }; }
    if(r.ok && r.recurrence){
      const cad = cadenceSchedule(r.recurrence);
      const next = r.next_fire_ms ? schedRel(r.next_fire_ms - Date.now()) : null;
      out.className = 'sched-preview';
      out.innerHTML = `<span class="cadence-badge cad-${esc(cad.kind)}"><span class="cad-glyph">${cad.glyph}</span>${esc(cad.label)}</span>`
        + (next ? `<span style="color:var(--text-muted)">first run in ${esc(next)}</span>` : '');
    } else {
      out.className = 'sched-preview';
      out.innerHTML = `<span style="color:var(--text-muted)">${esc(when)} — not a cadence I understand</span>`;
    }
  }, 200);
}

async function addJobPro(){
  const nameEl = document.getElementById('sname'), whenEl = document.getElementById('swhen');
  const name = (nameEl?.value.trim()) || 'job';
  const when = whenEl?.value.trim();

      body: JSON.stringify({ name, when, payload:{ title:name } }) });

}

// Run-now: create+run a task from the job payload via the new endpoint; opens its receipt.
async function runJobNow(id, e){
  if(e) e.stopPropagation();
  if(SCHED_RUNNING.has(id)) return;
  SCHED_RUNNING.add(id);
  const card = document.querySelector(`.sched-card[data-job="${CSS.escape(id)}"]`);
  if(card){ const b = card.querySelector('.sc-run'); if(b){ b.disabled = true; b.innerHTML = '<span class="sc-spin"></span>'; } card.classList.add('is-running'); }
  try {
    const r = await J('/v1/schedule/' + encodeURIComponent(id) + '/run', { method:'POST' });

// Delete: wired to the existing DELETE /v1/schedule/{id}.

// ===================== VOICE: dictation + hands-free conversation =====================
// Browser-only v1: webkitSpeechRecognition (STT, may be missing in WKWebView) + speechSynthesis
// (TTS, available). Routes transcripts through the existing chat path. Graceful fallback when
// recognition is unavailable: TTS still speaks replies and a typed input keeps the loop usable.
// PREMIUM PATH (already wired in the backend): POST /v1/voice (audio_b64 -> transcript+reply+audio_b64)
// and the /v1/voice/stream WebSocket give server-side STT/TTS for WKWebView where the Web Speech
// API is absent; the frontend can later record mic audio and pump it through those endpoints.

const VOICE = {
  recog: null,            // active SpeechRecognition instance (dictation OR conversation)
  mode: null,             // 'dictate' | 'converse' | null
  supported: (typeof window !== 'undefined') && !!(window.SpeechRecognition || window.webkitSpeechRecognition),
  speakOn: true,          // speak replies in conversation mode
  voice: null,            // chosen SpeechSynthesisVoice
  open: false,
  phase: 'idle',          // idle | listening | thinking | speaking
  raf: 0,
  level: 0,               // smoothed input "loudness" proxy for the orb (0..1)
  finalText: '',
  interim: '',
};

function voiceSpeechCtor(){ return window.SpeechRecognition || window.webkitSpeechRecognition || null; }

// Pick a pleasant English voice once the list is ready (it loads async in some engines).
function voicePickVoice(){
  if(!('speechSynthesis' in window)) return;
  const vs = window.speechSynthesis.getVoices() || [];
  if(!vs.length) return;
  const pref = vs.find(v=>/en[-_]US/i.test(v.lang) && /(Samantha|Ava|Allison|Google US|Natural)/i.test(v.name))
            || vs.find(v=>/en[-_]US/i.test(v.lang))
            || vs.find(v=>/^en/i.test(v.lang)) || vs[0];
  VOICE.voice = pref || null;
}
if(typeof window!=='undefined' && 'speechSynthesis' in window){
  try{ window.speechSynthesis.onvoiceschanged = voicePickVoice; voicePickVoice(); }catch(_){}
}

// --------------------------- (1) PUSH-TO-TALK DICTATION ---------------------------
function voiceToggleDictation(btn){
  const c = document.getElementById('composer');
  if(!c){ return; }
  if(VOICE.mode==='dictate'){ voiceStopRecog(); return; }
  if(!VOICE.supported){
    notify('Voice input isn’t available in this window. You can still hear replies in voice chat.');
    return;
  }
  voiceStopRecog(); // ensure clean slate (e.g. a conversation session)
  const Ctor = voiceSpeechCtor(); const r = new Ctor();
  r.lang = 'en-US'; r.continuous = true; r.interimResults = true;
  // Preserve whatever (incl. newlines) is already typed; only the dictated tail is normalized.
  const base = c.value ? (c.value.replace(/[ \t]+$/,'') + (c.value.endsWith('\n')?'':' ')) : '';
  let settled = '';
  r.onresult = (e)=>{
    let interim = '';
    for(let i=e.resultIndex; i<e.results.length; i++){
      const txt = e.results[i][0].transcript;
      if(e.results[i].isFinal) settled += txt; else interim += txt;
    }
    const tail = (settled + interim).replace(/\s+/g,' ').replace(/^\s/,'');
    c.value = base + tail;
    c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,160)+'px';
  };
  r.onerror = (e)=>{
    if(e.error==='not-allowed' || e.error==='service-not-allowed')
      notify('Microphone permission was denied. Allow it in System Settings → Privacy → Microphone.');
    else if(e.error!=='aborted' && e.error!=='no-speech')
      notify('Dictation stopped: '+(e.error||'unknown'));
  };
  r.onend = ()=>{ if(VOICE.mode==='dictate' && VOICE.recog===r){ VOICE.mode=null; VOICE.recog=null; voiceSyncDictateUI(); c.focus(); } };
  VOICE.recog = r; VOICE.mode='dictate';
  let started=true;
  try{ r.start(); }catch(_){ VOICE.mode=null; VOICE.recog=null; started=false; }
  voiceSyncDictateUI();
  if(started) notify('Listening… speak, then tap the mic to stop.', 'ok');
}

function voiceStopRecog(){
  const r = VOICE.recog; if(!r) return;
  VOICE.recog=null; const wasMode=VOICE.mode; VOICE.mode=null;
  try{ r.onend=null; r.onresult=null; r.onerror=null; r.stop(); }catch(_){ try{ r.abort(); }catch(__){} }
  if(wasMode==='dictate') voiceSyncDictateUI();
}

function voiceSyncDictateUI(){
  const b = document.getElementById('voiceMic');
  if(!b) return;
  const on = VOICE.mode==='dictate';
  b.classList.toggle('rec', on);
  b.setAttribute('aria-pressed', on ? 'true' : 'false');
  b.title = on ? 'Stop dictation' : (VOICE.supported ? 'Dictate (push to talk)' : 'Voice input unavailable in this window');
}

function voiceMicSvg(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>';
}
function voiceWaveSvg(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 13v-1a8 8 0 0 1 16 0v1"/><rect x="3" y="13" width="4" height="6" rx="1.6"/><rect x="17" y="13" width="4" height="6" rx="1.6"/><path d="M19 19v.5a3 3 0 0 1-3 3h-3"/></svg>';
}

// ------------------------- (2) HANDS-FREE CONVERSATION MODE -------------------------
function voiceOpenConversation(){
  if(VOICE.open) return;
  VOICE.open = true; VOICE.finalText=''; VOICE.interim='';
  const ov = document.createElement('div');
  ov.id = 'voiceOverlay'; ov.className = 'voice-ov';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true'); ov.setAttribute('aria-label','Voice conversation');
  const noStt = !VOICE.supported;
  ov.innerHTML = `
    <button class="voice-close" onclick="voiceCloseConversation()" aria-label="Close voice (Esc)">✕</button>
    <div class="voice-stage">
      <canvas id="voiceOrb" width="320" height="320" aria-hidden="true"></canvas>
      <div class="voice-status" id="voiceStatus">Connecting…</div>
      <div class="voice-transcript" id="voiceTranscript" aria-live="polite"></div>
      ${noStt ? `<div class="voice-fallnote">Speech input isn’t available in this window — Engram will still <b>speak its replies</b>. Type below to talk.</div>` : ''}
      <div class="voice-controls">
        <button class="voice-mute" id="voiceMute" onclick="voiceToggleSpeak()" title="Mute replies" aria-label="Mute replies">${voiceSpeakerSvg(true)}</button>
        <button class="voice-orb-btn" id="voiceBarge" onclick="voiceBargeIn()" aria-label="${noStt?'Restart':'Tap to interrupt and talk'}" title="${noStt?'Restart':'Tap to interrupt / talk'}">${voiceMicSvg()}</button>
        <button class="voice-end" onclick="voiceCloseConversation()">End</button>
      </div>
      <form class="voice-typed" id="voiceTypedRow" onsubmit="voiceTypedSubmit(event)">
        <input id="voiceTypedInput" placeholder="${noStt?'Type your message…':'…or type instead'}" autocomplete="off" spellcheck="false">
        <button type="submit" aria-label="Send">↵</button>
      </form>
    </div>`;
  document.body.appendChild(ov);
  document.addEventListener('keydown', voiceOvKey);
  requestAnimationFrame(()=>ov.classList.add('in'));
  voiceOrbLoop();
  voiceSetPhase('idle');
  if(noStt){
    voiceSetStatus('Voice replies ready — type to begin.');
    const ti=document.getElementById('voiceTypedInput'); if(ti) ti.focus();
  } else {
    voiceStartListening();
  }
}

function voiceCloseConversation(){
  if(!VOICE.open) return;
  VOICE.open=false;
  voiceStopRecog();
  clearInterval(_voiceEndTimer); _voiceEndTimer=0;
  try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(_){}
  cancelAnimationFrame(VOICE.raf); VOICE.raf=0;
  document.removeEventListener('keydown', voiceOvKey);
  const ov=document.getElementById('voiceOverlay');
  if(ov){ ov.classList.remove('in'); setTimeout(()=>ov.remove(), 240); }
}

function voiceOvKey(e){
  if(e.key==='Escape'){ e.preventDefault(); voiceCloseConversation(); }
}

function voiceToggleSpeak(){
  VOICE.speakOn = !VOICE.speakOn;
  const b=document.getElementById('voiceMute');
  if(b) b.innerHTML = voiceSpeakerSvg(VOICE.speakOn);
  if(!VOICE.speakOn){ try{ window.speechSynthesis.cancel(); }catch(_){} if(VOICE.phase==='speaking') voiceAfterSpeak(); }
}

// Barge-in: tapping the orb interrupts whatever Engram is saying and re-opens the mic.
function voiceBargeIn(){
  try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(_){}
  clearInterval(_voiceEndTimer); _voiceEndTimer=0;
  if(!VOICE.supported){
    const ti=document.getElementById('voiceTypedInput'); if(ti) ti.focus();
    voiceSetStatus('Type your message…');
    return;
  }
  voiceStartListening();
}

function voiceStartListening(){
  if(!VOICE.open || !VOICE.supported) return;
  voiceStopRecog();
  const Ctor=voiceSpeechCtor(); const r=new Ctor();
  r.lang='en-US'; r.continuous=false; r.interimResults=true;
  VOICE.finalText=''; VOICE.interim='';
  r.onresult=(e)=>{
    let interim='', fin='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) fin+=t; else interim+=t;
    }
    if(fin) VOICE.finalText+=fin;
    VOICE.interim=interim;
    voiceRenderTranscript((VOICE.finalText+' '+interim).trim(), 'you');
  };
  r.onerror=(e)=>{
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      notify('Microphone permission denied — switch to typing.');
      voiceSetPhase('idle'); voiceSetStatus('Mic blocked — type below.');
      const ti=document.getElementById('voiceTypedInput'); if(ti) ti.focus();
    } else if(e.error==='no-speech'){
      if(VOICE.open && VOICE.phase==='listening') voiceStartListening();
    }
  };
  r.onend=()=>{
    if(VOICE.recog!==r) return;
    VOICE.recog=null; VOICE.mode=null;
    const said=(VOICE.finalText||VOICE.interim||'').trim();
    if(VOICE.open && VOICE.phase==='listening'){
      if(said) voiceSendTurn(said);
      else voiceStartListening();
    }
  };
  VOICE.recog=r; VOICE.mode='converse';
  try{ r.start(); voiceSetPhase('listening'); voiceSetStatus('Listening…'); }
  catch(_){ /* a start() race; ignore */ }
}

// Push a finished utterance through the existing streaming chat path, then speak the reply.
async function voiceSendTurn(text){
  voiceStopRecog();
  voiceSetPhase('thinking'); voiceSetStatus('Thinking…');
  voiceRenderTranscript(text, 'you');
  // Settle on a real session AND hydrate WS.byId[sid] the way chatSay does, so the turn-mirror
  // below can't silently no-op when the session object isn't loaded yet.
  if(!WS.activeSession){
    if(WS.sessions.length) WS.activeSession=WS.sessions[0].id;
    else { const s=await newSession(false); if(s) WS.activeSession=s.id; }
  }
  const sid = WS.activeSession;
  if(sid && !WS.byId[sid]){
    try{ WS.byId[sid]=await J('/v1/sessions/'+encodeURIComponent(sid)); }catch(_){ WS.byId[sid]={id:sid,messages:[]}; }
  }
  let reply=''; _voiceSpoken='';
  try{
    const r = await fetch('/v1/converse/stream',{method:'POST',headers:{...AUTH,'content-type':'application/json'},body:JSON.stringify({text, session:sid})});
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
    voiceSetPhase('speaking'); voiceSetStatus('Engram');
    for(;;){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        let ev='message'; const dl=[];
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')) dl.push(line.slice(5).replace(/^ /,''));
        }
        const data=dl.join('\n');
        if(ev==='token'){ reply+=data; voiceRenderTranscript(reply,'engram'); voiceSpeakStreaming(reply,false); }
        else if(ev==='done'){ try{const d=JSON.parse(data); if(d.reply) reply=d.reply;}catch(_){} voiceRenderTranscript(reply,'engram'); }
        else if(ev==='error'){ reply='(couldn’t reach Engram - '+data+')'; voiceRenderTranscript(reply,'engram'); }
      }
    }
  }catch(e){
    reply = reply || '(couldn’t reach Engram — '+(e.message||'try again')+')';
    voiceRenderTranscript(reply,'engram');
  }
  // Mirror the turn into the live in-memory session so the Chat feed stays in sync. (The server
  // already persists the turn via append_turn on /v1/converse/stream, so this is display-only.)
  try{
    const sess=WS.byId[sid];
    if(sess){ if(!sess.messages) sess.messages=[]; sess.messages.push({role:'user',text}); sess.messages.push({role:'engram',text:reply}); if(state.route==='Chat') paintFeed(); }
  }catch(_){}
  voiceSpeakStreaming(reply, true);
}

// Speak reply text as it streams: split on sentence boundaries and only queue the new tail.
let _voiceSpoken = '';
function voiceSpeakStreaming(full, flush){
  if(!VOICE.speakOn || !('speechSynthesis' in window)) { if(flush) voiceAfterSpeak(); return; }
  const pending = full.slice(_voiceSpoken.length);
  let upto = pending.length;
  if(!flush){
    const m = pending.match(/[\s\S]*[.!?…]\s/);
    upto = m ? m[0].length : 0;
  }
  const chunk = pending.slice(0, upto).replace(/\s+/g,' ').trim();
  if(!chunk){ if(flush){ _voiceSpoken=full; voiceWatchSpeechEnd(); } return; }
  _voiceSpoken += pending.slice(0, upto);
  const clean = chunk.replace(/```[\s\S]*?```/g,' code block ').replace(/[`*_#>\[\]()]/g,'').trim();
  if(clean){
    const u=new SpeechSynthesisUtterance(clean);
    if(VOICE.voice) u.voice=VOICE.voice;
    u.rate=1.02; u.pitch=1.0;
    try{ window.speechSynthesis.speak(u); }catch(_){}
  }
  if(flush){ _voiceSpoken=full; voiceWatchSpeechEnd(); }
}

let _voiceEndTimer=0;
function voiceWatchSpeechEnd(){
  clearInterval(_voiceEndTimer);
  if(!('speechSynthesis' in window)){ voiceAfterSpeak(); return; }
  _voiceEndTimer=setInterval(()=>{
    if(!VOICE.open){ clearInterval(_voiceEndTimer); _voiceEndTimer=0; return; }
    if(!window.speechSynthesis.speaking && !window.speechSynthesis.pending){
      clearInterval(_voiceEndTimer); _voiceEndTimer=0; voiceAfterSpeak();
    }
  }, 220);
}
function voiceAfterSpeak(){
  _voiceSpoken='';
  if(!VOICE.open) return;
  if(VOICE.supported){ voiceStartListening(); }
  else { voiceSetPhase('idle'); voiceSetStatus('Type your reply…'); const ti=document.getElementById('voiceTypedInput'); if(ti) ti.focus(); }
}

function voiceTypedSubmit(e){
  e.preventDefault();
  const inp=document.getElementById('voiceTypedInput'); if(!inp) return;
  const t=inp.value.trim(); if(!t) return;
  inp.value='';
  voiceStopRecog();
  try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(_){}
  clearInterval(_voiceEndTimer); _voiceEndTimer=0;
  voiceSendTurn(t);
}

// ---- overlay view helpers (transcript uses textContent — model output is untrusted) ----
function voiceSetPhase(p){ VOICE.phase=p; const ov=document.getElementById('voiceOverlay'); if(ov) ov.dataset.phase=p; }
function voiceSetStatus(s){ const el=document.getElementById('voiceStatus'); if(el) el.textContent=s; }
function voiceRenderTranscript(text, who){
  const el=document.getElementById('voiceTranscript'); if(!el) return;
  el.className='voice-transcript '+(who==='engram'?'is-engram':'is-you');
  el.textContent = text || '';
}

// ---- the animated listening orb (hand-drawn Canvas, no libraries) ----
function voiceOrbLoop(){
  const cv=document.getElementById('voiceOrb'); if(!cv){ return; }
  const ctx=cv.getContext('2d'); const W=cv.width, H=cv.height, cx=W/2, cy=H/2;
  const accent='#45c8a8', web='#85b7eb', warn='#e0a23c';
  const draw=(t)=>{
    if(!VOICE.open) return;
    let target = VOICE.phase==='listening' ? (0.45+0.4*Math.abs(Math.sin(t/220)))
               : VOICE.phase==='speaking' ? (0.55+0.45*Math.abs(Math.sin(t/120)*Math.sin(t/77)))
               : VOICE.phase==='thinking' ? 0.3 : 0.18;
    VOICE.level += (target - VOICE.level)*0.12;
    const lvl=VOICE.level;
    const col = VOICE.phase==='speaking'?web : VOICE.phase==='thinking'?warn : accent;
    ctx.clearRect(0,0,W,H);
    const baseR=78;
    const g=ctx.createRadialGradient(cx,cy,baseR*0.4,cx,cy,baseR*2.0);
    g.addColorStop(0, col+'33'); g.addColorStop(1, col+'00');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,baseR*2.0,0,Math.PI*2); ctx.fill();
    for(let k=0;k<3;k++){
      const ph=(t/900 + k/3)%1;
      ctx.beginPath();
      ctx.arc(cx,cy, baseR + ph*(60+50*lvl), 0, Math.PI*2);
      ctx.strokeStyle = col + Math.round((1-ph)*120).toString(16).padStart(2,'0');
      ctx.lineWidth=1.4; ctx.stroke();
    }
    ctx.beginPath();
    const N=72;
    for(let i=0;i<=N;i++){
      const a=(i/N)*Math.PI*2;
      const wob = Math.sin(a*3 + t/260)*4 + Math.sin(a*5 - t/190)*3*lvl + Math.sin(a*2+t/140)*2;
      const rr = baseR + wob + lvl*16;
      const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr;
      i? ctx.lineTo(x,y) : ctx.moveTo(x,y);
    }
    ctx.closePath();
    const cg=ctx.createRadialGradient(cx-18,cy-18,8,cx,cy,baseR+18);
    cg.addColorStop(0, col); cg.addColorStop(1, col+'22');
    ctx.fillStyle=cg; ctx.globalAlpha=0.92; ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.stroke();
    if(VOICE.phase==='listening' || VOICE.phase==='speaking'){
      const bars=14;
      ctx.strokeStyle='#04342c'; ctx.lineWidth=2.4; ctx.lineCap='round';
      for(let i=0;i<bars;i++){
        const bx=cx-(bars-1)*4 + i*8;
        const amp=(8+ Math.abs(Math.sin(t/120 + i*0.7))*22*(0.4+lvl));
        ctx.beginPath(); ctx.moveTo(bx, cy-amp/2); ctx.lineTo(bx, cy+amp/2); ctx.stroke();
      }
    } else if(VOICE.phase==='thinking'){
      ctx.fillStyle='#04342c';
      for(let i=0;i<3;i++){ const a=t/300+i*2.1; ctx.beginPath(); ctx.arc(cx+(i-1)*14, cy+Math.sin(a)*5, 3.2,0,Math.PI*2); ctx.fill(); }
    }
    VOICE.raf=requestAnimationFrame(draw);
  };
  VOICE.raf=requestAnimationFrame(draw);
}

function voiceSpeakerSvg(on){
  return on
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4Z"/><path d="M16 9.5a3.5 3.5 0 0 1 0 5M18.5 7a7 7 0 0 1 0 10"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4Z"/><path d="m16 9 5 5M21 9l-5 5"/></svg>';
}

// Topbar entry button, injected only on the Chat route. Called from renderView() so it is present
// on first load (boot calls renderView directly, not go()), on hashchange, and on go().
function voiceMaybeMountHeaderBtn(){
  const right=document.querySelector('.topbar .right'); if(!right) return;
  const existing=document.getElementById('voiceHeaderBtn');

// ===== Composer attachments: add-context + file upload ============================
// Context the user pins to their next message. Each item is {kind:'file'|'url'|'memory',
// name, text, size, ref}. On send it becomes the request's `attachments` array, which the
// daemon prepends to the model context as a "The user attached:" system message.
// Module-level only; no top-level code that can throw. boot() already runs after this.
// IMPORTANT: `text` is data sent verbatim to the model -- it is NEVER HTML-escaped here.
// Escaping is applied only at render time (attachRenderPills) for innerHTML safety.
const ATTACH = { items: [] };
const ATTACH_MAX_TEXT = 200000; // 200KB of inlined text per file is plenty of context
function attachIsTextType(file){
  const n=(file.name||'').toLowerCase(), t=(file.type||'').toLowerCase();
  if(t.startsWith('text/')) return true;
  if(/^(application\/(json|xml|javascript|x-sh|x-yaml|toml)|application\/.*\+xml)$/.test(t)) return true;
  return /\.(txt|md|markdown|csv|tsv|log|json|ya?ml|toml|ini|cfg|conf|env|rs|py|js|ts|tsx|jsx|go|java|c|h|cpp|hpp|rb|php|html?|css|scss|sh|bash|zsh|sql|xml|svg|diff|patch|gitignore|dockerfile)$/.test(n)
    || /^(dockerfile|makefile|readme|license)$/.test(n);
}
function attachSvg(kind){
  if(kind==='url') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>';
  if(kind==='memory') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M12 12v9"/><path d="M12 12L4 7.5"/><path d="M12 12l8-4.5"/></svg>';
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5 12.5 21a5 5 0 0 1-7-7l8.5-8.5a3.3 3.3 0 0 1 4.7 4.7L9.6 18.7a1.6 1.6 0 0 1-2.3-2.3l8-8"/></svg>';
}
function attachFmtSize(n){
  if(n==null) return '';
  if(n<1024) return n+' B';
  if(n<1048576) return (n/1024).toFixed(n<10240?1:0)+' KB';
  return (n/1048576).toFixed(1)+' MB';
}
// Render the removable pills above the textarea. Always escape names/meta (innerHTML).
function attachRenderPills(){
  const box=document.getElementById('attachPills'); if(!box) return;
  box.innerHTML = ATTACH.items.map((it,i)=>{
    const meta = it.kind==='memory' ? 'memory' : (it.kind==='url' ? 'link' : (it.ref?'uploaded':attachFmtSize(it.size)));
    return `<span class="attach-pill kind-${esc(it.kind)} ${it.busy?'busy':''}" title="${escAttr(it.name)}">
      <span class="ap-ic">${attachSvg(it.kind)}</span>
      <span class="ap-name">${esc(it.name)}</span>
      ${meta?`<span class="ap-meta">${esc(meta)}</span>`:''}
      <button class="ap-x" type="button" aria-label="Remove" title="Remove" onclick="attachRemove(${i})">&times;</button></span>`;
  }).join('');
}
function attachRemove(i){ ATTACH.items.splice(i,1); attachRenderPills(); }
function attachClear(){ ATTACH.items.length=0; attachRenderPills(); }
// Snapshot of the pinned context to send with a message; called from converseInline.
function attachTake(){
  if(!ATTACH.items.length) return [];
  const out = ATTACH.items.map(it=>({
    kind: it.kind, name: it.name,
    text: (it.text||'').slice(0, ATTACH_MAX_TEXT),
    size: it.size, ref: it.ref||null,
  }));
  attachClear();
  return out;
}
// ---- menu ----
function attachToggleMenu(ev){
  if(ev) ev.stopPropagation();
  if(document.getElementById('attachMenu')){ attachCloseMenu(); return; }
  attachCloseRecall();
  const wrap=document.getElementById('attachWrap'); if(!wrap) return;
  const btn=document.getElementById('attachBtn'); if(btn) btn.setAttribute('aria-expanded','true');
  const m=document.createElement('div'); m.id='attachMenu'; m.className='attach-menu'; m.setAttribute('role','menu');
  m.innerHTML=`
    <button class="am-i" type="button" role="menuitem" onclick="attachPickFiles()">${attachSvg('file')}<span>Attach files</span><span class="am-sub">text or binary</span></button>
    <button class="am-i" type="button" role="menuitem" onclick="attachAddUrl()">${attachSvg('url')}<span>Add a URL</span></button>
    <button class="am-i" type="button" role="menuitem" onclick="attachOpenRecall()">${attachSvg('memory')}<span>Pin a memory</span></button>`;
  wrap.appendChild(m);
}
function attachCloseMenu(){ const m=document.getElementById('attachMenu'); if(m) m.remove();
  const btn=document.getElementById('attachBtn'); if(btn) btn.setAttribute('aria-expanded','false'); }
// Dismiss the menu / recall popovers on any outside click (mirrors the model-menu pattern).
document.addEventListener('click', e=>{
  if(!e.target.closest || !e.target.closest('#attachWrap')){ attachCloseMenu(); attachCloseRecall(); }
});
// Escape closes the attach popovers (mirrors other dismissable overlays).
document.addEventListener('keydown', e=>{
  if(e.key==='Escape' && (document.getElementById('attachMenu')||document.getElementById('attachRecall'))){
    attachCloseMenu(); attachCloseRecall();
  }
});
// ---- files ----
function attachPickFiles(){ attachCloseMenu(); const inp=document.getElementById('attachFileInput'); if(inp){ inp.value=''; inp.click(); } }
async function attachOnFiles(input){
  const files = Array.from(input.files||[]); if(!files.length) return;
  for(const f of files){
    if(attachIsTextType(f)){
      try{
        const text = await f.text();
        ATTACH.items.push({ kind:'file', name:f.name, size:f.size, text });
      }catch(_){ notify('Couldn’t read '+f.name); }
      attachRenderPills();
    } else {
      // Binary: stash a placeholder pill, upload, then fill in the server ref.
      const it={ kind:'file', name:f.name, size:f.size, text:'', busy:true };
      ATTACH.items.push(it); attachRenderPills();
      try{
        const b64 = await uplFileToBase64(f);
        const res = await J('/v1/upload',{method:'POST',headers:{'content-type':'application/json'},
          body:JSON.stringify({ name:f.name, content_b64:b64, mime:f.type||'application/octet-stream' })});
        it.ref = res.ref || res.path || f.name;
        // NOTE: raw text for the model context -- do NOT esc() here, only at render time.
        it.text = `(binary file uploaded — ${attachFmtSize(f.size)}, ${f.type||'unknown type'}, ref ${it.ref})`;
      }catch(e){
        it.text = `(binary file ${f.name} — could not be uploaded: ${(e&&e.message)||'error'})`;
        notify('Upload failed: '+((e&&e.message)||f.name));
      } finally { it.busy=false; attachRenderPills(); }
    }
  }
  input.value='';
}
// FileReader -> bare base64 (strip the data: prefix) for the JSON upload endpoint.
function uplFileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{ const s=String(r.result||''); const i=s.indexOf(','); resolve(i>=0?s.slice(i+1):s); };
    r.onerror=()=>reject(new Error('read failed'));
    r.readAsDataURL(file);
  });
}
// ---- url ----
async function attachAddUrl(){
  attachCloseMenu();
  const u=((await askInput({title:'Add a URL as context',placeholder:'https://…',ok:'Add'}))||'').trim(); if(!u) return;
  let name=u; try{ const x=new URL(u); name=x.hostname + (x.pathname!=='/'?x.pathname:''); }catch(_){ }
  ATTACH.items.push({ kind:'url', name, text:'URL: '+u });
  attachRenderPills();
}
// ---- pin a memory (reuses /v1/recall) ----
let _attachRecallSeq=0;
function attachOpenRecall(){
  attachCloseMenu(); attachCloseRecall();
  const wrap=document.getElementById('attachWrap'); if(!wrap) return;
  const p=document.createElement('div'); p.id='attachRecall'; p.className='attach-recall';
  p.innerHTML=`<input id="attachRecallQ" placeholder="Search your memory to pin…" autocomplete="off" oninput="attachRecallSearch(this.value)">
    <div class="ar-list" id="attachRecallList"><div class="ar-empty">type to search</div></div>`;
  wrap.appendChild(p);
  const i=document.getElementById('attachRecallQ'); if(i) i.focus();
}
function attachCloseRecall(){ const p=document.getElementById('attachRecall'); if(p) p.remove(); }
async function attachRecallSearch(q){
  q=(q||'').trim(); const list=document.getElementById('attachRecallList'); if(!list) return;
  if(!q){ list.innerHTML='<div class="ar-empty">type to search</div>'; return; }
  const seq=++_attachRecallSeq;
  try{
    const hits=await J('/v1/recall?k=8&q='+encodeURIComponent(q));
    if(seq!==_attachRecallSeq) return; // a newer keystroke won
    if(!hits.length){ list.innerHTML='<div class="ar-empty">no matches</div>'; return; }
    list.innerHTML=hits.map(h=>{
      const t=(h.record&&h.record.text)||''; const id=(h.record&&h.record.id)||0;
      return `<div class="ar-i" data-id="${escAttr(String(id))}" data-text="${escAttr(t)}" onclick="attachPinMemory(this)">${esc(t.replace(/\s+/g,' ').slice(0,160))}</div>`;
    }).join('');
  }catch(_){ if(seq===_attachRecallSeq) list.innerHTML='<div class="ar-empty">recall failed</div>'; }
}
function attachPinMemory(el){
  const text=el.getAttribute('data-text')||''; const id=el.getAttribute('data-id')||'';
  ATTACH.items.push({ kind:'memory', name:'memory #'+id, text:'Memory #'+id+': '+text });
  attachCloseRecall(); attachRenderPills();
}

// ---- inline slash-command menu (composer) -----------------------------------
// Mirrors the command-palette (renderPalette/palMove/palRun) but lives inline above the
// composer. Activates only while the textarea value starts with "/" and the command token is
// still being typed (no space yet) - so normal typing and Enter-to-send are never touched.
// Every cross-call is feature-detected so module load order is irrelevant (boot runs last).
let _slashSel = 0, _slashItems = [];
function slashCommands(){
  const I = (typeof ICONS!=='undefined') ? ICONS : {};
  // arg:true  -> command takes trailing text; selecting it completes "/cmd " and waits.
  // run(arg)  -> arg is the trimmed text after the command (string, may be '').
  return [
    { cmd:'/task',     t:'Turn this message into a task',     ic:I.Tasks,    arg:true,
      run:(a)=>{ const c=document.getElementById('composer'); if(c) c.value=a; if(typeof submitComposer==='function') submitComposer(false); } },
    { cmd:'/run',      t:'Create the task and run it now',    ic:I.Tasks,    arg:true,
      run:(a)=>{ const c=document.getElementById('composer'); if(c) c.value=a; if(typeof submitComposer==='function') submitComposer(true); } },
    { cmd:'/recall',   t:'Search memory for a phrase',        ic:I.Memory,   arg:true,
      run:(a)=>{ slashClear(); if(typeof go==='function') go('Memory');
        const q=document.getElementById('brainQ'); if(q){ q.value=a; }
        if(typeof brainRecall==='function') brainRecall(); } },
    { cmd:'/model',    t:'Pick the model',                    ic:I.Skills,   arg:false,
      run:()=>{ slashClear(); if(document.getElementById('modelMenu') && typeof toggleModelMenu==='function') toggleModelMenu();
        else if(typeof notify==='function') notify('Model picker unavailable here','warn'); } },
    { cmd:'/clear',    t:'Start a new chat',                  ic:I.Chat,     arg:false,
      run:async()=>{ slashClear(); if(typeof newSession==='function') await newSession(true);  // newSession(true) navigates to Chat itself
        else if(typeof go==='function') go('Chat'); } },
    { cmd:'/schedule', t:'Open scheduled runs',               ic:I.Schedule, arg:false,
      run:()=>{ slashClear(); if(typeof go==='function') go('Schedule'); } },
    { cmd:'/terminal', t:'Open the glass-box terminal',       ic:I.Terminal, arg:false,
      run:()=>{ slashClear(); if(typeof go==='function') go('Terminal'); } },
    { cmd:'/settings', t:'Open settings',                     ic:I.Settings, arg:false,
      run:()=>{ slashClear(); if(typeof openCC==='function') openCC(); } },
    { cmd:'/help',     t:'List slash commands',               ic:I.Chat,     arg:false,
      run:()=>{ if(typeof notify==='function') notify('Commands: '+slashCommands().map(c=>c.cmd).join('  '),'ok'); slashClear(); } },
  ];
}
function slashEl(){ return document.getElementById('slashMenu'); }
function slashOpen(){ const m=slashEl(); return !!(m && !m.hidden); }
function slashClear(){ const c=document.getElementById('composer'); if(c){ c.value=''; c.style.height='auto'; } slashHide(); }
function slashHide(){ const m=slashEl(); if(m){ m.hidden=true; m.innerHTML=''; } _slashItems=[]; _slashSel=0; }
// Decide whether the current textarea text should drive the menu. Returns the query token
// (the part after "/") when the menu should be open, or null to keep it closed.
function slashToken(val){
  if(!val || val[0]!=='/') return null;        // must START with "/"
  if(val.indexOf(' ') !== -1) return null;      // a space ends command-name typing -> close
  return val.slice(1);                          // text after the leading "/"
}
function slashSync(){
  const c=document.getElementById('composer'); if(!c){ slashHide(); return; }
  const tok = slashToken(c.value);
  if(tok===null){ slashHide(); return; }
  slashRender(tok);
}
function slashRender(token){
  const q=(token||'').toLowerCase();
  const all=slashCommands();
  _slashItems = q ? all.filter(c=>c.cmd.slice(1).toLowerCase().startsWith(q)) : all;
  _slashSel=0;
  const m=slashEl(); if(!m) return;
  if(!_slashItems.length){ m.hidden=false; m.innerHTML='<div class="slash-empty">no command matches</div>'; return; }
  let html='<div class="slash-hd">Commands</div>';
  _slashItems.forEach((c,i)=>{
    html += `<div class="slash-item ${i===0?'sel':''}" data-i="${i}"`
         +  ` onmousemove="slashHover(${i})" onmousedown="event.preventDefault()" onclick="slashRun(${i})">`
         +  `<span class="slash-ic">${c.ic||''}</span>`
         +  `<span class="slash-cmd">${esc(c.cmd)}</span>`
         +  `<span class="slash-t">${esc(c.t)}</span></div>`;
  });
  m.innerHTML=html; m.hidden=false;
}
function slashHover(i){ _slashSel=i; document.querySelectorAll('#slashMenu .slash-item').forEach(el=>el.classList.toggle('sel', +el.dataset.i===i)); }
function slashMove(d){
  if(!_slashItems.length) return;
  _slashSel=(_slashSel+d+_slashItems.length)%_slashItems.length;
  document.querySelectorAll('#slashMenu .slash-item').forEach(el=>el.classList.toggle('sel', +el.dataset.i===_slashSel));
  document.querySelector('#slashMenu .slash-item.sel')?.scrollIntoView({block:'nearest'});
}
function slashRun(i){
  const c=_slashItems[i]; if(!c) return;
  const ta=document.getElementById('composer');
  if(c.arg){
    // Complete to "/cmd " and keep typing the argument; Enter then runs it via slashTrySubmit.
    if(ta){ ta.value=c.cmd+' '; ta.focus(); ta.dispatchEvent(new Event('input',{bubbles:true})); }
    slashHide();
    return;
  }
  slashHide();
  try{ c.run(''); }catch(err){ if(typeof notify==='function') notify('Command failed','err'); }
}
// Called from the composer keydown handler. Returns true if it consumed the event (menu open).
// When it consumes, it ALSO stops propagation so the window-level keydown (palette/Esc/panel
// handlers) does not double-act on the same key - otherwise Esc would close the menu AND any
// open side panel/modal in one press.
function slashKeydown(e){
  if(!slashOpen()) return false;
  const k=(e.key||'').toLowerCase();
  const eat=()=>{ e.preventDefault(); e.stopPropagation(); };
  if(k==='arrowdown'){ eat(); slashMove(1); return true; }
  if(k==='arrowup'){ eat(); slashMove(-1); return true; }
  if(k==='escape'){ eat(); slashHide(); return true; }
  if(k==='tab'){ eat(); if(_slashItems.length) slashRun(_slashSel); return true; }
  if(k==='enter' && !e.shiftKey && !e.isComposing){
    if(!_slashItems.length){ slashHide(); return false; }  // nothing to pick -> fall through to send
    eat(); slashRun(_slashSel); return true;
  }
  return false;
}
// When the composer holds "/cmd <arg>" and the user presses Enter, run that command instead
// of sending raw text. Returns true if handled. Called from the composer Enter path.
function slashTrySubmit(){
  const c=document.getElementById('composer'); if(!c) return false;
  const v=c.value; if(!v || v[0]!=='/') return false;
  const sp=v.indexOf(' ');
  const name = sp===-1 ? v : v.slice(0,sp);
  const arg  = sp===-1 ? '' : v.slice(sp+1).trim();
  const cmd  = slashCommands().find(x=>x.cmd===name);
  if(!cmd) return false;
  slashHide();
  try{ cmd.run(arg); }catch(err){ if(typeof notify==='function') notify('Command failed','err'); }
  return true;
}
</script>
