<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Engram</title>
<style>
  :root {
    --surface-0:#0c0d0f; --surface-1:#131417; --surface-2:#181a1e;
    --border:rgba(255,255,255,.07); --border-strong:rgba(255,255,255,.12);
    --text-primary:#e8e9ec; --text-secondary:#a3a7af; --text-muted:#6c7078;
    --accent:#45c8a8; --accent-ink:#04342c;
    --warning:#e0a23c; --danger:#e2675f;
    --web:#85b7eb; --web-bg:#101a24; --files:#ef9f27; --files-bg:#1a1812;
    --radius:8px; --font-voice:Georgia, 'Times New Roman', serif;
    --sans:-apple-system,'Inter',system-ui,sans-serif; --mono:ui-monospace,Menlo,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--surface-0); color:var(--text-primary); font:13px/1.5 var(--sans);
    -webkit-font-smoothing:antialiased; }
  button,input,textarea { font:inherit; color:inherit; }
  ::placeholder { color:var(--text-muted); }
  ::-webkit-scrollbar { width:9px; height:9px; } ::-webkit-scrollbar-thumb { background:#23262c; border-radius:6px; }

  .app { display:grid; grid-template-columns:148px 1fr; height:100vh; }

  /* Rail */
  .rail { background:var(--surface-1); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:14px 8px; }
  .brand { display:flex; align-items:center; gap:8px; padding:4px 8px 14px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); }
  .brand b { font-weight:500; letter-spacing:.3px; }
  .nav { display:flex; flex-direction:column; gap:2px; }
  .nav a { display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:var(--radius);
    color:var(--text-secondary); cursor:pointer; text-decoration:none; }
  .nav a:hover { background:var(--surface-2); color:var(--text-primary); }
  .nav a.active { background:var(--surface-2); color:var(--text-primary); }
  .nav a svg { width:15px; height:15px; opacity:.85; }
  .rail .spacer { flex:1; }
  .status { font-size:11px; color:var(--text-muted); padding:8px; line-height:1.4; }
  .status .live { color:var(--accent); }

  /* Main */
  .main { display:flex; flex-direction:column; min-width:0; }
  .topbar { height:44px; flex:none; display:flex; align-items:center; gap:10px; padding:0 16px;
    border-bottom:1px solid var(--border); }
  .topbar h1 { font-size:15px; font-weight:500; margin:0; }
  .topbar .right { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .chip { font-size:12px; color:var(--text-secondary); background:var(--surface-2);
    border:1px solid var(--border); border-radius:var(--radius); padding:4px 9px; cursor:default; transition:color .4s; }
  .chip.ok b { color:var(--accent); font-weight:500; }
  .chip.bad { color:var(--danger); border-color:rgba(226,103,95,.4); }
  .banner { background:rgba(226,103,95,.12); color:var(--danger); border-bottom:1px solid rgba(226,103,95,.3);
    padding:8px 16px; font-size:12px; }
  .offline { background:rgba(224,162,60,.1); color:var(--warning); border-bottom:1px solid rgba(224,162,60,.25);
    padding:7px 16px; font-size:12px; }
  .view { flex:1; min-height:0; overflow:auto; }

  /* Composer */
  .composer { background:var(--surface-1); border:1px solid var(--border-strong); border-radius:12px; padding:10px 12px; }
  .composer textarea { width:100%; background:none; border:none; resize:none; outline:none; min-height:22px; max-height:160px; }
  .composer .hint { display:flex; align-items:center; margin-top:6px; }
  .composer .hint small { color:var(--text-muted); font-size:11px; }
  .composer .send { margin-left:auto; background:var(--accent); color:var(--accent-ink); border:none;
    border-radius:6px; padding:5px 12px; font-weight:500; cursor:pointer; }
  .composer .send:hover { filter:brightness(1.06); }

  /* Board */
  .board-wrap { display:flex; flex-direction:column; height:100%; }
  .board { flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:16px; overflow:auto; }
  .col { background:var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:10px;
    display:flex; flex-direction:column; gap:8px; min-height:0; }
  .col.dragover { border-color:var(--accent); }
  .col h3 { margin:2px 4px 6px; font-size:12px; color:var(--text-secondary); font-weight:500;
    text-transform:uppercase; letter-spacing:.6px; display:flex; gap:6px; }
  .col h3 span { color:var(--text-muted); }
  .cards { display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .card { background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:11px 12px; cursor:pointer; }
  .card:hover { border-color:var(--border-strong); }
  .card.running { border:1.5px solid var(--accent); border-radius:0; }
  .card .t { line-height:1.35; }
  .card .meta { display:flex; gap:6px; align-items:center; margin-top:8px; flex-wrap:wrap; font-size:11px; color:var(--text-muted); }
  .tag { font-size:11px; padding:1px 6px; border-radius:6px; }
  .tag.web { color:var(--web); background:var(--web-bg); } .tag.files { color:var(--files); background:var(--files-bg); }
  .tag.browser { color:var(--web); background:var(--web-bg); } .tag.shell { color:var(--files); background:var(--files-bg); }
  .pulse { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .bar { height:3px; border-radius:3px; background:linear-gradient(90deg,transparent,var(--accent),transparent);
    background-size:200% 100%; animation:shimmer 1.4s linear infinite; margin-top:8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .check { color:var(--accent); } .xmark { color:var(--danger); }
  .empty { text-align:center; color:var(--text-muted); padding:48px 16px; }
  .empty b { color:var(--text-secondary); font-weight:500; display:block; margin-bottom:12px; font-size:15px; }
  .examplechips { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .examplechips button { background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary);
    border-radius:16px; padding:5px 12px; cursor:pointer; }

  /* Detail panel */
  .panel { position:fixed; top:0; right:0; width:340px; height:100vh; background:var(--surface-1);
    border-left:1px solid var(--border-strong); transform:translateX(100%); transition:transform .2s ease-out;
    display:flex; flex-direction:column; z-index:20; }
  .panel.open { transform:translateX(0); }
  .panel header { display:flex; align-items:center; gap:8px; padding:14px; border-bottom:1px solid var(--border); }
  .panel header .x { margin-left:auto; cursor:pointer; color:var(--text-muted); background:none; border:none; font-size:16px; }
  .panel .body { flex:1; overflow:auto; padding:14px; }
  .pill { font-size:11px; padding:2px 8px; border-radius:6px; background:var(--surface-2); color:var(--text-secondary); }
  .pill.done { color:var(--accent); } .pill.failed { color:var(--danger); } .pill.doing { color:var(--accent); }
  .approval { background:rgba(224,162,60,.1); border:1px solid rgba(224,162,60,.35); border-radius:10px; padding:11px 12px; margin-bottom:14px; }
  .approval b { color:var(--warning); }
  .approval button { background:var(--accent); color:var(--accent-ink); border:none; border-radius:6px; padding:6px 12px; font-weight:500; cursor:pointer; }
  .approval button.ghost { background:var(--surface-2); color:var(--text-secondary); }
  .answer { font-family:var(--font-voice); font-size:15px; line-height:1.5; margin:14px 0; }
  .step { padding:8px 0; border-bottom:1px solid var(--border); }
  .step .top { display:flex; gap:8px; align-items:center; }
  .step .verb { flex:1; } .step .stamp { font-family:var(--mono); font-size:11px; color:var(--text-muted); cursor:pointer; }
  .step.bad .verb { color:var(--danger); }
  .step .obs { margin-top:6px; font-size:12px; color:var(--text-secondary); white-space:pre-wrap;
    background:var(--surface-2); border-radius:6px; padding:8px; max-height:160px; overflow:auto; }

  /* Generic chat/list */
  .chat { max-width:720px; margin:0 auto; padding:24px 16px; display:flex; flex-direction:column; gap:14px; height:100%; }
  .feed { flex:1; overflow:auto; display:flex; flex-direction:column; gap:14px; }
  .msg.user { align-self:flex-end; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:9px 12px; max-width:80%; }
  .msg.engram { font-family:var(--font-voice); font-size:15px; line-height:1.55; max-width:90%; }
  .msg .note { font-size:11px; color:var(--text-muted); margin-top:4px; }
  .panes { padding:16px; display:flex; flex-direction:column; gap:14px; max-width:920px; }
  .pane { background:var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .pane h2 { margin:0 0 10px; font-size:13px; color:var(--text-secondary); font-weight:500; }
  .row { display:flex; gap:8px; margin-bottom:8px; }
  .row input,.row select { flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:7px 9px; outline:none; }
  .row button { background:var(--accent); color:var(--accent-ink); border:none; border-radius:6px; padding:7px 12px; font-weight:500; cursor:pointer; }
  .item { padding:8px 0; border-bottom:1px solid var(--border); }
  .item .sub { font-size:11px; color:var(--text-muted); }
  .muted { color:var(--text-muted); }
  @media (prefers-reduced-motion: reduce) { .pulse,.bar { animation:none; } }
</style>
</head>
<body>
<div class="app">
  <nav class="rail">
    <div class="brand"><span class="dot"></span><b>engram</b></div>
    <div class="nav" id="nav"></div>
    <div class="spacer"></div>
    <div class="status" id="status">waking…</div>
  </nav>
  <div class="main">
    <div id="banner"></div>
    <header class="topbar">
      <h1 id="viewname">Tasks</h1>
      <div class="right">
        <span class="chip ok" id="ledgerChip" title="every action is signed into a hash-chained ledger">ledger …</span>
        <span class="chip" id="costChip" title="model spend today">$0.00</span>
      </div>
    </header>
    <div class="view" id="view"></div>
  </div>
</div>
<div class="panel" id="panel"><header><span class="pill" id="pStatus"></span><b id="pTitle"></b><button class="x" onclick="closePanel()">✕</button></header><div class="body" id="pBody"></div></div>

<script>
// When the daemon is deployed with ENGRAM_API_TOKEN, it injects the token here so the
// first-party dashboard authenticates; locally it's empty and everything is open.
const TOKEN = window.__ENGRAM_TOKEN || '';
const AUTH = TOKEN ? {Authorization:'Bearer '+TOKEN} : {};
const tok = u => TOKEN ? (u + (u.includes('?')?'&':'?') + 'token=' + encodeURIComponent(TOKEN)) : u;
const J = (u,o={}) => fetch(u,{...o, headers:{...AUTH, ...(o.headers||{})}}).then(r=>r.json());
const esc = s => String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const ICONS = {
  Chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8 8 0 0 1-11.5 7.2L3 21l1.8-6.5A8 8 0 1 1 21 12z"/></svg>',
  Tasks:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="10" rx="1"/><rect x="17" y="4" width="4" height="13" rx="1"/></svg>',
  Schedule:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  Memory:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a4 4 0 0 0-4 4 4 4 0 0 0-2 7 3 3 0 0 0 3 4 3 3 0 0 0 6 0 3 3 0 0 0 3-4 4 4 0 0 0-2-7 4 4 0 0 0-4-4z"/></svg>',
  Skills:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 5 5.6.5-4.2 3.7 1.3 5.5L12 19l-5.1 2.7 1.3-5.5L4 12.5 9.6 12z"/></svg>',
};
const VIEWS = ['Chat','Tasks','Schedule','Memory','Skills'];
let state = { route:'Tasks', tasks:[], offline:false };

function renderNav(){
  document.getElementById('nav').innerHTML = VIEWS.map(v=>
    `<a class="${state.route===v?'active':''}" onclick="go('${v}')">${ICONS[v]} ${v}</a>`).join('');
}
function go(v){ state.route=v; if(location.hash.slice(1)!==v) location.hash=v; document.getElementById('viewname').textContent=v; renderNav(); renderView(); }
window.addEventListener('hashchange',()=>{ const v=location.hash.slice(1); if(VIEWS.includes(v)&&v!==state.route) go(v); });

// ---- top bar trust spine ----
let lastLedger='', lastCost='';
async function poll(){
  try {
    const [v,m,h] = await Promise.all([J('/v1/ledger/verify'),J('/v1/meter'),J('/health')]);
    const lc=document.getElementById('ledgerChip');
    if(v.ok){ lc.className='chip ok'; lc.innerHTML='ledger verified · <b>'+v.entries+'</b>'; document.getElementById('banner').innerHTML=''; }
    else { lc.className='chip bad'; lc.textContent='tamper detected';
      document.getElementById('banner').innerHTML='<div class="banner">Tamper detected — the audit chain doesn’t verify. Showing the last good state.</div>'; }
    document.getElementById('costChip').textContent='$'+(m.cost_usd||0).toFixed(4)+' today';
    state.offline = !!h.offline;
    document.getElementById('status').innerHTML = 'awake <span class="live">·</span> v'+h.version;
    if(state.offline && state.route!=='Tasks' && state.route!=='Chat'){} // notice shown per-view
  } catch(e){}
}

// ---- Tasks board ----
async function loadTasks(){ state.tasks = await J('/v1/tasks'); }
const STATUS_COLS = { todo:'todo', doing:'doing', failed:'done', done:'done', scheduled:'todo' };
function offlineNotice(){ return state.offline ? '<div class="offline">Running in offline demo mode — add a model key to think for real.</div>' : ''; }

function card(t){
  const running = t.status==='doing';
  const tags = (t.tool_tags||[]).map(x=>`<span class="tag ${x}">${x}</span>`).join('');
  let foot='';
  if(running) foot=`<div class="meta"><span class="pulse"></span> ${esc(t.progress||'thinking…')}</div><div class="bar"></div>`;
  else if(t.status==='done' && t.run) foot=`<div class="meta"><span class="check">✓</span> ${(t.run.tokens_in+t.run.tokens_out)} tok · $${(t.run.cost_usd||0).toFixed(4)} ${t.schedule_id?'· ⟳':''}</div>`;
  else if(t.status==='failed') foot=`<div class="meta"><span class="xmark">✕</span> stopped at the step limit</div>`;
  else foot=`<div class="meta">${tags||'<span class="muted">queued</span>'}</div>`;
  return `<div class="card ${running?'running':''}" draggable="true" data-id="${t.id}"
     ondragstart="drag(event,'${t.id}')" onclick="openTask('${t.id}')">
     <div class="t">${esc(t.title)}</div>${foot}</div>`;
}
function renderBoard(){
  const cv = document.getElementById('composer')?.value || '';  // preserve in-progress typing
  const cols={todo:[],doing:[],done:[]};
  state.tasks.forEach(t=>cols[STATUS_COLS[t.status]||'todo'].push(t));
  const v=document.getElementById('view');
  if(state.tasks.length===0){
    v.innerHTML = `<div class="board-wrap">${offlineNotice()}
      <div class="empty"><b>Tell Engram what to do.</b>
        <div class="examplechips">
          <button onclick="prefill('Summarize this week\\'s top Rust news')">Summarize Rust news</button>
          <button onclick="prefill('Find me 3 quotes about curiosity')">Find 3 quotes</button>
        </div></div>
      <div style="padding:16px">${composerHtml()}</div></div>`;
  } else {
    const colHtml=(key,label)=>`<div class="col" data-col="${key}" ondragover="dover(event)" ondragleave="dleave(event)" ondrop="drop(event,'${key}')">
       <h3>${label} <span>${cols[key].length}</span></h3><div class="cards">${cols[key].map(card).join('')}</div></div>`;
    v.innerHTML = `<div class="board-wrap">${offlineNotice()}
      <div class="board">${colHtml('todo','To do')}${colHtml('doing','Running')}${colHtml('done','Done')}</div>
      <div style="padding:0 16px 16px">${composerHtml()}</div></div>`;
  }
  wireComposer();
  const c=document.getElementById('composer'); if(c && cv){ c.value=cv; c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,160)+'px'; }
}

// ---- composer + intent routing ----
function composerHtml(){
  return `<div class="composer">
    <textarea id="composer" rows="1" placeholder="Tell Engram what to do…"></textarea>
    <div class="hint"><small>↵ answer · ⌘↵ task · ⇧⌘↵ task &amp; run</small>
      <button class="send" onclick="submitComposer(false)">Create task</button></div></div>`;
}
function prefill(t){ const c=document.getElementById('composer'); if(c){ c.value=t; c.focus(); } }
function wireComposer(){
  const c=document.getElementById('composer'); if(!c) return;
  c.addEventListener('input',()=>{ c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,160)+'px'; });
  c.addEventListener('keydown',e=>{
    if(e.key!=='Enter') return;
    e.preventDefault();
    if(e.metaKey||e.ctrlKey) submitComposer(e.shiftKey); // ⌘ create, ⇧⌘ create+run
    else converseInline(c.value);                         // ↵ answer
  });
}
async function converseInline(text){
  text=text.trim(); if(!text) return;
  const c=document.getElementById('composer'); c.value=''; c.style.height='auto';
  go('Chat'); chatSay(text);
}
async function submitComposer(run){
  const c=document.getElementById('composer'); const title=c.value.trim(); if(!title) return;
  c.value=''; c.style.height='auto';
  const t = await J('/v1/tasks',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({title,origin:'chat'})});
  await loadTasks(); if(state.route==='Tasks') renderBoard();
  if(run){ runTask(t.id); }
}
async function runTask(id){
  await loadTasks(); if(state.route==='Tasks') renderBoard();
  J('/v1/tasks/'+id+'/run',{method:'POST'}).then(async()=>{ await loadTasks(); if(state.route==='Tasks') renderBoard(); if(panelId===id) openTask(id); });
  setTimeout(async()=>{ await loadTasks(); if(state.route==='Tasks') renderBoard(); }, 600);
}

// ---- drag ----
let dragId=null;
function drag(e,id){ dragId=id; }
function dover(e){ e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function dleave(e){ e.currentTarget.classList.remove('dragover'); }
async function drop(e,col){
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  if(!dragId) return; const id=dragId; dragId=null;
  if(col==='doing'){ runTask(id); return; }
  const status = col==='done' ? 'done' : 'todo';
  await J('/v1/tasks/'+id,{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify({status})});
  await loadTasks(); renderBoard();
}

// ---- detail panel + audit ----
let panelId=null;
async function openTask(id){
  panelId=id; const t=state.tasks.find(x=>x.id===id); if(!t) return;
  document.getElementById('panel').classList.add('open');
  document.getElementById('pTitle').textContent=t.title;
  const ps=document.getElementById('pStatus'); ps.textContent=t.status; ps.className='pill '+t.status;
  const body=document.getElementById('pBody');
  let html='';
  if(t.status==='todo') html+=`<div class="row"><button onclick="runTask('${id}')">Run now</button></div>`;
  if(t.run){
    const denied=(t.run.steps||[]).find(s=>!s.ok && /shell/i.test(s.tool) && /disabled|refused/i.test(s.observation));
    if(denied){
      html+=`<div class="approval"><b>Wants to run shell</b>
        <div class="sub">Runs a command in the work folder · writes nothing outside it</div>
        <div class="row" style="margin-top:8px"><button onclick="approveShell('${id}')">Allow &amp; re-run</button>
          <button class="ghost" onclick="closePanel()">Skip</button></div></div>`;
    }
    html+=`<div class="answer">${esc(t.run.answer)}</div>`;
    const audit = await J('/v1/tasks/'+id+'/audit').catch(()=>({entries:[]}));
    const stepRows = (t.run.steps||[]).map((s,i)=>{
      const e=(audit.entries||[]).filter(x=>x.kind&&x.kind.startsWith('agent.tool'))[i];
      const stamp = e ? `${e.seq} · ${e.hash.slice(0,8)}` : '';
      return `<div class="step ${s.ok?'':'bad'}"><div class="top"><span class="verb">${esc(s.tool)}</span>
        <span class="${s.ok?'check':'xmark'}">${s.ok?'✓':'✕'}</span>
        <span class="stamp" onclick="navigator.clipboard.writeText('${e?e.hash:''}')">${stamp}</span></div>
        ${s.ok?'':`<div class="obs">${esc(s.observation)}</div>`}</div>`;
    }).join('');
    html+=`<div class="muted" style="font-size:11px;margin-bottom:6px">audit trail — signed</div>${stepRows||'<div class="muted">no tools used</div>'}`;
    html+=`<div class="muted" style="font-size:11px;margin-top:12px;font-family:var(--mono)">head ${t.run.ledger_head_hash.slice(0,12)}</div>`;
  } else if(t.status==='doing'){ html+=`<div class="muted">${esc(t.progress||'running…')}</div>`; }
  html+=`<div id="schedbox" style="margin-top:14px"><div class="muted" style="font-size:11px;margin-bottom:4px">repeat this task</div>
    <div class="row"><input id="pwhen" placeholder="every weekday at 9am" oninput="schedPreview('pwhen','pwhenprev')"><button onclick="scheduleTask('${id}',${JSON.stringify(t.title)})">Schedule</button></div>
    <div id="pwhenprev" class="sub"></div></div>`;
  html+=`<div class="row" style="margin-top:14px"><button onclick="delTask('${id}')" style="background:var(--surface-2);color:var(--danger)">Delete</button></div>`;
  body.innerHTML=html;
}
async function scheduleTask(id, title){
  const el=document.getElementById('pwhen'); const when=el.value.trim(); if(!when) return;
  const r=await J('/v1/schedule',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name:title,when,payload:{title}})});
  const box=document.getElementById('schedbox');
  box.innerHTML = r.error
    ? `<div class="sub" style="color:var(--danger)">${esc(r.error)}</div>`
    : `<div class="sub" style="color:var(--accent)">⟳ scheduled · next ${new Date(r.next_fire_ms).toLocaleString()}</div>`;
}
let previewTimer=null;
function schedPreview(inputId,outId){
  clearTimeout(previewTimer);
  previewTimer=setTimeout(async()=>{
    const el=document.getElementById(inputId), out=document.getElementById(outId); if(!el||!out) return;
    const when=el.value.trim(); if(!when){ out.textContent=''; return; }
    const r=await J('/v1/schedule/preview?when='+encodeURIComponent(when));
    out.textContent = r.ok&&r.next_fire_ms ? ('next: '+new Date(r.next_fire_ms).toLocaleString()) : (when?'not a time I understand':'');
    out.style.color = r.ok ? 'var(--accent)' : 'var(--text-muted)';
  },250);
}
function closePanel(){ panelId=null; document.getElementById('panel').classList.remove('open'); }
async function delTask(id){ await fetch('/v1/tasks/'+id,{method:'DELETE', headers:AUTH}); closePanel(); await loadTasks(); renderBoard(); }
async function approveShell(id){
  await J('/v1/policy',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({allow_shell:true})});
  runTask(id);
}

// ---- Chat ----
let chatLog=[];
async function renderChat(){
  document.getElementById('view').innerHTML = `<div class="chat">${offlineNotice()}
    <div class="feed" id="feed"></div>${composerHtml()}</div>`;
  document.getElementById('composer').placeholder='Ask Engram anything…';
  wireComposer();
  if(chatLog.length===0) await loadChatHistory();
  paintFeed();
}
let historyLoaded=false;
async function loadChatHistory(){
  if(historyLoaded) return; historyLoaded=true;
  try {
    const recs = await J('/v1/memory/recent?region=episodic&n=24');
    chatLog = (recs||[]).map(r => r.source==='assistant'
      ? { role:'engram', text:(r.text||'').replace(/^assistant said:\s*/,'') }
      : { role:'user', text:r.text });
  } catch(_){}
}
function paintFeed(){
  const f=document.getElementById('feed'); if(!f) return;
  f.innerHTML = chatLog.map(m=>{
    if(m.role==='user') return `<div class="msg user">${esc(m.text)}</div>`;
    const note=(m.recalled?.length||m.learned?.length)?`<div class="note">${m.recalled?.length?'recalled: '+m.recalled.slice(0,2).map(esc).join(' · '):''} ${m.learned?.length?'· learned: '+m.learned.map(esc).join(' · '):''}</div>`:'';
    return `<div><div class="msg engram">${esc(m.text)}</div>${note}</div>`;
  }).join('');
  f.scrollTop=f.scrollHeight;
}
async function chatSay(text){
  chatLog.push({role:'user',text}); paintFeed();
  const r = await J('/v1/converse',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({text})});
  chatLog.push({role:'engram',text:r.reply||r.error||'',recalled:r.recalled,learned:r.learned}); paintFeed();
}

// ---- Schedule ----
async function renderSchedule(){
  const jobs = await J('/v1/schedule');
  document.getElementById('view').innerHTML = `<div class="panes"><div class="pane">
    <h2>Schedule a recurring run</h2>
    <div class="row"><input id="sname" placeholder="name" style="flex:.5"><input id="swhen" placeholder="every Monday at 9am" oninput="schedPreview('swhen','swhenprev')"><button onclick="addJob()">Add</button></div>
    <div id="swhenprev" class="sub" style="margin:-4px 0 8px"></div>
    <div id="jobs">${(jobs||[]).length? jobs.map(j=>`<div class="item">${esc(j.name)}<div class="sub">next ${new Date(j.next_fire_ms).toLocaleString()}</div></div>`).join('') : '<div class="muted">Nothing scheduled. Try “every Monday at 9, summarize my week”.</div>'}</div>
  </div></div>`;
}
async function addJob(){ const name=document.getElementById('sname').value.trim()||'job'; const when=document.getElementById('swhen').value.trim(); if(!when)return;
  const r=await J('/v1/schedule',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name,when,payload:{}})});
  if(r.error) alert(r.error); else renderSchedule(); }

// ---- Memory ----
const REGION_LABEL = { identity:'Identity — who you are', semantic:'Semantic — knowledge',
  episodic:'Episodic — conversations', procedural:'Skills — how-to' };
async function renderMemory(){
  const stats = await J('/v1/memory/stats');
  const regions=['identity','semantic','episodic','procedural'];
  const maxR=Math.max(1,...regions.map(r=>stats.by_region?.[r]||0));
  const bars = regions.map(r=>{
    const n=stats.by_region?.[r]||0;
    return `<div style="display:flex;align-items:center;gap:10px;margin:5px 0">
      <span style="width:180px;color:var(--text-secondary)">${REGION_LABEL[r]}</span>
      <div style="flex:1;height:6px;background:var(--surface-2);border-radius:3px"><div style="height:6px;border-radius:3px;background:var(--accent);width:${100*n/maxR}%"></div></div>
      <span class="sub" style="width:30px;text-align:right">${n}</span></div>`;
  }).join('');
  const tiers=stats.by_tier||{};
  document.getElementById('view').innerHTML = `<div class="panes">
    <div class="pane"><h2>The brain — ${stats.total} memories across its regions</h2>
      ${bars}
      <div class="sub" style="margin-top:8px">${(tiers.warm||0)} warm · ${(tiers.cold||0)} cold (consolidated)</div>
    </div>
    <div class="pane"><h2>Recall &amp; teach</h2>
      <div class="row"><input id="q" placeholder="recall… try a paraphrase"><button onclick="recall()">Recall</button></div>
      <div class="row"><select id="region"><option>semantic</option><option>identity</option><option>episodic</option><option>procedural</option></select>
        <input id="fact" placeholder="remember a fact…"><button onclick="remember()">Remember</button></div>
      <div id="hits" class="muted">${stats.total? 'Search what Engram knows.' : 'Engram hasn’t learned anything yet — it will as you talk.'}</div>
    </div></div>`;
}
async function recall(){ const q=document.getElementById('q').value.trim(); if(!q)return;
  const hits=await J('/v1/recall?k=6&q='+encodeURIComponent(q));
  document.getElementById('hits').innerHTML = hits.length? hits.map(h=>`<div class="item">${esc(h.record.text)}<div class="sub">${h.record.region} · score ${h.score.toFixed(3)} ${h.semantic_rank?'· semantic':''}</div></div>`).join('') : '<div class="muted">no matches</div>'; }
async function remember(){ const text=document.getElementById('fact').value.trim(); if(!text)return;
  await J('/v1/remember',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({region:document.getElementById('region').value,text})});
  document.getElementById('fact').value=''; renderMemory(); }

// ---- Skills ----
async function renderSkills(){
  const sk = await J('/v1/skills');
  document.getElementById('view').innerHTML = `<div class="panes"><div class="pane"><h2>Skills — procedural memory</h2>
    ${(sk.skills||[]).map(s=>`<div class="item"><b>${esc(s.id)}</b> <span class="sub">active v${s.active??'—'} · ${s.versions.length} version(s)</span>
      <div class="row" style="margin-top:6px"><input id="in_${esc(s.id)}" placeholder="input"><button onclick="runSkill('${esc(s.id)}')">Run</button></div>
      <div id="out_${esc(s.id)}" class="sub"></div></div>`).join('')||'<div class="muted">no skills yet</div>'}</div></div>`;
}
async function runSkill(id){ const input=document.getElementById('in_'+id).value;
  const r=await J('/v1/skills/'+encodeURIComponent(id)+'/run',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({input})});
  document.getElementById('out_'+id).textContent = r.error?('error: '+r.error):('→ '+r.output); }

function renderView(){
  if(state.route==='Tasks') renderBoard();
  else if(state.route==='Chat') renderChat();
  else if(state.route==='Schedule') renderSchedule();
  else if(state.route==='Memory') renderMemory();
  else if(state.route==='Skills') renderSkills();
}

// Refresh the board only when tasks actually changed (so idle re-renders don't fight typing).
let lastTasksSig='', refreshTimer=null;
async function refreshTasks(){
  await loadTasks();
  const sig=JSON.stringify(state.tasks);
  if(sig!==lastTasksSig){ lastTasksSig=sig; if(state.route==='Tasks') renderBoard(); if(panelId) openTask(panelId); }
}
// Live updates over Server-Sent Events — instant board changes, no constant polling.
function connectEvents(){
  try {
    const es=new EventSource(tok('/v1/events'));
    es.addEventListener('spike', e=>{
      let topic=''; try { topic=JSON.parse(e.data).topic||''; } catch(_){}
      if(topic.indexOf('task')===0){ clearTimeout(refreshTimer); refreshTimer=setTimeout(refreshTasks,150); }
    });
  } catch(_){}
}
async function boot(){
  renderNav();
  await loadTasks(); lastTasksSig=JSON.stringify(state.tasks);
  // Deep link via #hash, else front door: Chat when the board is empty, Tasks once there's work.
  const hv=location.hash.slice(1);
  state.route = VIEWS.includes(hv) ? hv : (state.tasks.length ? 'Tasks' : 'Chat');
  document.getElementById('viewname').textContent=state.route; renderNav(); renderView();
  poll(); connectEvents();
  // Chips poll + a slow board fallback if SSE is unavailable.
  setInterval(async()=>{ await poll(); await refreshTasks(); }, 3000);
}
boot();
</script>
