// Only one settings category is mounted at a time, so collect just the fields that exist -
// the daemon merges a partial patch and leaves the rest untouched.
function collectSettings(){
  const has=id=>!!document.getElementById(id), patch={};
  if(has('pkind')){ patch.provider={ kind:gv('pkind'), model:gv('pmodel'), base_url:gv('pbase') }; const k=gv('pkey'); if(k) patch.provider.api_key=k; }
  if(has('ekind')) patch.embed={ kind:gv('ekind'), model_dir:gv('edir') };
  if(has('sshell')||has('stok')||has('ssec')||has('sbackend')||has('sworktree')||has('sskillauthor')||has('sautodistill')||has('toollist')){ patch.security={}; if(has('sshell')) patch.security.allow_shell=document.getElementById('sshell').checked;
    const t=gv('stok'); if(t) patch.security.api_token=t; const s=gv('ssec'); if(s) patch.security.channel_secret=s;
    if(has('sbackend')){ patch.security.shell_backend=gv('sbackend'); patch.security.shell_target=gv('starget'); }
    if(has('sworktree')) patch.security.enable_worktree_isolation=document.getElementById('sworktree').checked;
    if(has('sskillauthor')) patch.security.disable_skill_author=!document.getElementById('sskillauthor').checked;
    if(has('sautodistill')) patch.security.auto_distill_skills=document.getElementById('sautodistill').checked;
    // Only send disabled_tools once the toggle grid has ACTUALLY loaded (data-loaded='1'). Before
    // that (or after a /v1/tools failure) the querySelectorAll is empty, and sending [] would make
    // apply_config_patch replace the stored list wholesale — silently re-enabling every tool the
    // user had turned off. A missing key leaves it unchanged.
    { const tl=document.getElementById('toollist'); if(tl && tl.getAttribute('data-loaded')==='1'){ patch.security.disabled_tools=[...tl.querySelectorAll('input[data-tool]')].filter(i=>!i.checked).map(i=>i.getAttribute('data-tool')); } } }
  if(has('cbudget')) patch.cost={ task_token_budget: Math.max(1000, parseInt(gv('cbudget'),10)||250000) };
  if(has('wtav')||has('wbrave')||has('wsearx')||has('wtp')){ patch.web={};
    const tv=gv('wtav'); if(tv) patch.web.tavily_api_key=tv;
    const bv=gv('wbrave'); if(bv) patch.web.brave_api_key=bv;
    const tp=gv('wtp'); if(tp) patch.web.travelpayouts_token=tp;
    if(has('wsearx')) patch.web.searxng_url=gv('wsearx'); }
  if(has('mvision')) patch.media={ vision_model:gv('mvision'), image_model:gv('mimage'), tts_model:gv('mtts'), stt_model:gv('mstt') };
  if(has('bchrome')||has('bport')) patch.browser={ chrome_path:gv('bchrome'), cdp_port: Math.max(0, Math.min(65535, parseInt(gv('bport'),10)||0)) };
  if(has('mcplist')) patch.mcp=collectMcpV2();
  return patch;
}

    const mcpShort = typeof res.mcp_requested==='number' && res.mcp_connected<res.mcp_requested;
    let msg='Saved';

  _restarting=true; notify('Restarting...','ok');

  let n=0; const iv=setInterval(async()=>{

    try{ const h=await fetch('/health'); if(h.ok){ clearInterval(iv); _restarting=false; notify('Engram is back','ok'); ccReload(); poll(); return; } }catch(_){}

  }, 500);
}

  if((e.metaKey||e.ctrlKey) && k===','){ e.preventDefault(); document.getElementById('cc').hidden? openCC(): closeCC(); return; }

    const r=await J('/v1/shell',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({command:cmd, cwd:TERM.cwd})});
    if(r.denied){ TERM.busy=false; renderTerminal(); return; }

    if(r.cwd) TERM.cwd=r.cwd;
    if(r.stdout) TERM.log.push({k:'out',t:String(r.stdout).replace(/\n+$/,'')});
    if(r.stderr) TERM.log.push({k:'err',t:String(r.stderr).replace(/\n+$/,'')});

  let shown=items.filter(i=>(_artifacts.filter==='all'||i.kind===_artifacts.filter) && (!q || (i.name+' '+(i.title||'')).toLowerCase().includes(q)));
  const truncated = shown.length>400; if(truncated) shown=shown.slice(0,400);
  const cards=shown.map(i=>{
    const url=`/v1/artifact?task=${encodeURIComponent(i.task)}&path=${encodeURIComponent(i.path)}`;
    // Jump back to the conversation that made this artifact - the task panel (its run + answer).
    const origin=i.origin||'task';
    const chat=i.task?`<button class="af-chat" title="Open the ${origin==='chat'?'chat':'task'} that created this" aria-label="Open source" onclick="afOpenTask('${escAttr(i.task)}','${origin}',event)">${ICONS.Chat}</button>`:'';
    const del=`<button class="af-del" title="Delete artifact" aria-label="Delete artifact" onclick="afDelete(${escAttr(JSON.stringify(i.task))},${escAttr(JSON.stringify(i.path))},event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/><path d="M10 11v6M14 11v6"/></svg></button>`;
    const ctrls=`<div class="af-ctrls">${chat}${del}</div>`;
    const meta=`<div class="af-name" title="${escAttr(i.name)}">${esc(i.name)}</div><div class="af-sub">${esc(i.title||origin)} · ${afSize(i.size)} · ${afAge(i.mtime)}</div>`;
    if(i.kind==='image') return `<div class="af-card" onclick="imgLightbox('${escAttr(url)}')" title="${escAttr(i.name)}"><div class="af-thumb">${ctrls}<img loading="lazy" src="${escAttr(url)}" alt="" onerror="this.closest('.af-thumb').classList.add('broken')"></div>${meta}</div>`;
    // Non-image files get a proper document tile: a type-coloured glyph + the extension badge,
    // instead of a lone emoji floating in a grey box.
    const ext=(i.name.split('.').pop()||'').toUpperCase().slice(0,5);
    return `<div class="af-card" onclick="artOpenFile(${escAttr(JSON.stringify(i.task))},${escAttr(JSON.stringify(i.path))},${escAttr(JSON.stringify(i.name))})" title="Open ${escAttr(i.name)}"><div class="af-thumb fileic af-ft-${esc(i.kind||'other')}">${ctrls}<svg class="af-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2.8h7.5L19 8.3V21a1.2 1.2 0 0 1-1.2 1.2H6A1.2 1.2 0 0 1 4.8 21V4A1.2 1.2 0 0 1 6 2.8Z"/><path d="M13.5 2.8v5.5H19"/></svg><span class="af-ext">${esc(ext||i.kind)}</span></div>${meta}</div>`;
  }).join('');
  return shown.length
    ? `<div class="af-grid">${cards}</div>${truncated?'<div class="muted" style="text-align:center;padding:14px">Showing the first 400. Narrow with a filter or search.</div>':''}`
    : (items.length
        ? `<div class="muted" style="padding:52px;text-align:center">No artifacts match that filter or search.</div>`
        : `<div class="sched-empty"><span class="se-glyph">${ICONS.Artifacts}</span>
             <div class="se-title">No artifacts yet</div>
             <div class="se-hint">When a task or chat creates a file — a chart, a report, data — it collects here, linked back to the run that made it. Try asking for one: <code>write a comparison to report.md</code></div></div>`);
}

    return;

// Delete one artifact file, then refresh the gallery. Confined + ledgered server-side.
async function afDelete(task, path, ev){
  if(ev){ ev.preventDefault(); ev.stopPropagation(); }
  const name=String(path).split('/').pop();
  if(!await askConfirm({title:'Delete artifact?',message:'Permanently delete "'+name+'"? This removes the file from disk.',ok:'Delete'})) return;

    await J('/v1/artifact?task='+encodeURIComponent(task)+'&path='+encodeURIComponent(path),{method:'DELETE'});

    ${seal}

function actSetFilter(f){ ACT.filter=f; ACT.shown=120; document.querySelectorAll('.act-filters button').forEach(b=>b.classList.toggle('on', b.dataset.f===f)); actPaint(); }
// Lazy list: render in chunks and grow on scroll (an IntersectionObserver on a sentinel), so a
// 5,000-entry ledger doesn't paint 5,000 rows up front. "Load older" refetches a deeper tail.
function actPaint(){
  const list=document.getElementById('actList'); if(!list) return;
  const q=(document.getElementById('actSearch')?.value||'').toLowerCase();
  const match=ACT.entries.filter(e=>{
    if(ACT.filter!=='all' && (e.actor||'core')!==ACT.filter) return false;
    if(q){ const hay=((e.kind||'')+' '+actShortJson(e.payload||{})).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  const shown=match.slice(0, ACT.shown||120);
  const more = match.length>shown.length
    ? `<div class="act-more" id="actMore"><button class="sbtn ghost" onclick="ACT.shown+=200;actPaint()">Show ${Math.min(200,match.length-shown.length)} more</button></div>`
    : (ACT.entries.length>=ACT.limit
        ? `<div class="act-more"><button class="sbtn ghost" onclick="ACT.limit=Math.min(5000,ACT.limit*2);renderActivity()">Load older entries from the ledger</button></div>`
        : '');
  list.innerHTML = (shown.map(e=>{ const a=actEntry(e);
    return `<div class="act-row"><span class="act-dot" style="background:${a.color};color:${a.color}"></span>
      <div class="act-main"><div class="act-kind">${esc(a.label)}</div>${a.summary?`<div class="act-summary">${esc(a.summary.slice(0,220))}</div>`:''}
        <div class="act-meta2"><span class="act-time">${esc(fmtAgo(e.ts_ms))}</span><span class="act-by">${esc(a.actor)}</span><span>#${esc(String(e.seq))}</span>
          <span class="act-hash" title="signed hash - click to copy" onclick="navigator.clipboard&&navigator.clipboard.writeText('${escAttr(e.hash||'')}')">◇ ${esc((e.hash||'').slice(0,10))}</span></div></div></div>`;
  }).join('') || '<div class="ses-empty" style="padding:24px 2px">No matching entries.</div>') + more;
  // Auto-grow when the "Show more" sentinel scrolls into view - pagination without the clicking.
  const sent=document.getElementById('actMore');
  if(sent && 'IntersectionObserver' in window){
    const io=new IntersectionObserver(es=>{ if(es.some(x=>x.isIntersecting)){ io.disconnect(); ACT.shown+=200; actPaint(); } },{root:document.getElementById('view'),rootMargin:'240px'});
    io.observe(sent);
  }
}

// Checkpoints (workdir rewind): list saved snapshots, snapshot on demand, and restore one. The
// daemon also auto-snapshots before a non-git task run, so a run's file changes can be undone.
async function renderCheckpointsView(){
  let cps = null;
  try { cps = await J('/v1/checkpoints') || []; }
  catch(e){ cps = null; }
  let body;
  if(cps === null){
    body = `<div class="sched-empty"><span class="se-glyph">${ICONS.Checkpoints}</span>
      <div class="se-title">Couldn't reach checkpoints</div>
      <div class="se-hint">The daemon didn't answer. <button class="ghost" onclick="renderCheckpointsView()">Retry</button></div></div>`;
  } else if(!cps.length){
    body = `<div class="sched-empty"><span class="se-glyph">${ICONS.Checkpoints}</span>
      <div class="se-title">No checkpoints yet</div>
      <div class="se-hint">A checkpoint saves the working directory's files so you can rewind changes. Engram snapshots automatically before a task run — or snapshot now.</div></div>`;
  } else {
    body = `<div class="sched-list">${cps.map(cpCardHtml).join('')}</div>`;
  }
  const n = Array.isArray(cps) ? cps.length : 0;
  document.getElementById('view').innerHTML = `<div class="panes"><div class="pane">
    <div class="sched-head"><h2>Checkpoints</h2><span class="sched-count">${n} ${n===1?'checkpoint':'checkpoints'}</span></div>
    <div class="sched-compose"><div class="row" style="justify-content:space-between;align-items:center;gap:.6rem">
      <div class="se-hint" style="margin:0">Snapshot the working directory so you can restore it later. Restore reverts edits and un-deletes removed files; files created since a checkpoint are left in place.</div>
      <button onclick="snapshotNow()">Snapshot now</button>
    </div></div>
  </div>
  <div class="pane"><div class="sched-head"><h2>Saved</h2></div>${body}</div></div>`;
}

  const sub = [when, files+' file'+(files===1?'':'s'), cp.task?('task '+cp.task):''].filter(Boolean).join(' · ');

      <button class="sc-btn sc-text sc-del" onclick="deleteCheckpoint(${attrJson(cp.id)})" title="Delete this checkpoint">Delete</button></div>

async function deleteCheckpoint(id){

async function snapshotNow(){

async function restoreCheckpoint(id){
  if(!await askConfirm({title:'Restore this checkpoint?',message:'Saved files are written back — reverting edits and un-deleting removed files. Files created after the checkpoint are left in place.',ok:'Restore',danger:true})) return;
  try {

    const extra = (r && r.created_since && r.created_since.length) ? ' · '+r.created_since.length+' newer file(s) left in place' : '';
    notify('Restored '+((r&&r.restored)||0)+' file(s)'+extra, 'ok');

// Refresh the board only when tasks actually changed (so idle re-renders don't fight typing).
let lastTasksSig='', refreshTimer=null, _taskStatus={};
async function refreshTasks(){
  await loadTasks();
  // Surface a desktop notification when a task finishes while the window is backgrounded.
  for(const t of state.tasks){
    const prev=_taskStatus[t.id];
    if(prev && prev!=='done' && prev!=='failed' && (t.status==='done'||t.status==='failed') && !document.hasFocus()){
      engramNotifyDesktop(t.status==='done'?'Task complete':'Task stopped', t.title);
    }
    _taskStatus[t.id]=t.status;
  }
  const sig=JSON.stringify(state.tasks);
  if(sig!==lastTasksSig){ lastTasksSig=sig; if(state.route==='Tasks') renderBoard(); if(panelId) openTask(panelId, true); }
  if(typeof updateHaltBtn==='function') updateHaltBtn();
}
// Live updates over Server-Sent Events - instant board changes, no constant polling.
function connectEvents(){
  try {
    const es=new EventSource(tok('/v1/events'));
    es.addEventListener('spike', e=>{
      let d={}; try { d=JSON.parse(e.data)||{}; } catch(_){}
      const topic=d.topic||'';
      if(topic.indexOf('task')===0){ clearTimeout(refreshTimer); refreshTimer=setTimeout(refreshTasks,150); }
      // A reply landed in a session (this or another client finished a run). If it's the session
      // we're viewing and WE aren't the one streaming it, refetch so the answer actually appears —
      // the feed no longer permanently desyncs after a reload or a second-client write.
      else if(topic.indexOf('session')===0){
        const sid=(d.payload&&(d.payload.id||d.payload.session))||d.id||d.session;
        if(sid) onSessionSpike(sid);
      }
    });
  } catch(_){}
}
// A session's stored thread changed server-side. If it's the active chat and no LOCAL run is
// streaming into it, refetch and repaint so the reply shows up. Guarded so a burst coalesces.
let _sessRefetch=null;
function onSessionSpike(sid){
  if(sid!==WS.activeSession) return;
  if(_busySessions.has(sid)) return;   // our own live stream is authoritative; don't clobber it
  clearTimeout(_sessRefetch);
  _sessRefetch=setTimeout(()=>refetchSession(sid), 120);
}
async function refetchSession(sid){
  if(sid!==WS.activeSession || _busySessions.has(sid)) return;
  try{ const s=await J('/v1/sessions/'+encodeURIComponent(sid));
    if(sid===WS.activeSession && !_busySessions.has(sid)){
      // MERGE, don't clobber: the server copy is authoritative for text/steps/recalls, but it knows
      // nothing about client-side presentation state - timestamps, which model wrote a reply, how
      // long it took, and whether the user expanded an activity fold. Losing those on the 3s poll
      // made hover metadata and open folds silently vanish moments after an answer landed.
      const old=WS.byId[sid];
      if(old && old.messages && s.messages && old.messages.length===s.messages.length){
        s.messages.forEach((m,i)=>{ const o=old.messages[i];
          if(o && o.role===m.role){ for(const k of ['ts','model','dur','t0','_actOpen']) if(o[k]!=null && m[k]==null) m[k]=o[k]; } });
      }
      WS.byId[sid]=s; if(state.route==='Chat') paintFeedSticky();
    }
  }catch(_){}
}
// The desktop spawns the daemon a beat AFTER the window opens, so the very first fetches can race
// it. Poll /health until it answers (or give up after ~25s) before booting, so a cold start doesn't
// fire the global "Couldn't reach Engram" toast.
async function waitForDaemon(maxMs){
  const start=Date.now();
  while(Date.now()-start < (maxMs||25000)){
    try{ await J('/health'); return true; }catch(_){}
    await new Promise(r=>setTimeout(r,400));
  }
  return false;
}
// Open an external link in the user's real browser. The desktop WKWebView (served from the daemon
// origin) silently swallows target="_blank" navigations, so links in answers/tables went nowhere.
// Route them through the daemon's OS opener; fall back to window.open in a plain browser.
function openExternal(url){
  // /v1/open (and the OS opener) need an ABSOLUTE http(s) URL. Artifact links are relative
  // (/v1/artifact?…), so absolutize against the daemon origin — otherwise it was rejected and
  // nothing opened.
  const abs = /^https?:\/\//i.test(url) ? url : (location.origin + url);
  fetch('/v1/open',{method:'POST',headers:{...AUTH,'content-type':'application/json'},body:JSON.stringify({url:abs})})
    .then(r=>{ if(!r.ok) throw new Error('open failed'); })
    .catch(()=>{ try{ window.open(abs,'_blank','noopener'); }catch(_){} });
}
// Auto-hide scrollbars (Claude-style): reveal the thumb on whatever element is being scrolled, then
// fade it ~0.9s after scrolling stops. Capture-phase + on document so it covers dynamically-created
// scrollers (the chat feed, gallery, etc.). The thumb is transparent by default in CSS.
document.addEventListener('scroll', (e)=>{
  const el = e.target; if(!el || !el.classList) return;
  el.classList.add('sb-show'); clearTimeout(el._sbHide);
  el._sbHide = setTimeout(()=>{ try{ el.classList.remove('sb-show'); }catch(_){} }, 900);
  updateJumpBtn();   // recomputes from #feed directly, so it's correct regardless of scroll target
}, true);
// Delegated, capture-phase: any click on an http(s) link is opened externally. Internal links
// (href="#", hash routes) and onclick handlers are untouched.
let _extLinksWired=false;
function wireExternalLinks(){
  if(_extLinksWired) return; _extLinksWired=true;
  document.addEventListener('click', e=>{
    const a = e.target && e.target.closest && e.target.closest('a[href]');
    if(!a) return;
    const href = a.getAttribute('href')||'';
    if(/^https?:\/\//i.test(href)){ e.preventDefault(); openExternal(a.href); }
  }, true);
}

  try{ await loadTasks(); }catch(_){} lastTasksSig=JSON.stringify(state.tasks);
  // Deep link via #hash, else the front door is the Console (chat).

  document.getElementById('viewname').textContent=state.route; renderNav(); renderView();
  poll(); connectEvents();

  setInterval(async()=>{ try{ await poll(); await refreshTasks(); }catch(_){}
    // Eventual-consistency fallback for the chat feed: even if session spikes aren't emitted,
    // re-sync the viewed thread from the daemon so a reply that finished after a reload / on

    if(state.route==='Chat' && WS.activeSession && !_busySessions.has(WS.activeSession)){ try{ await refetchSession(WS.activeSession); }catch(_){} }
  }, 3000);

// so it can safely reference consts those modules declare. Calling it here would hit a

// ===== ARTIFACTS (Open in canvas) =====
// Client-side detection of substantial code/doc blocks in Engram replies, surfaced as an
// "Open in canvas" chip that splits the chat into a feed + right-hand artifact pane.
// No backend: we scan the rendered feed after each paintFeed() and reuse _cbStore raw code.
// Model output is untrusted, so everything rendered here goes through esc()/escAttr()/hl().
const ARTS = { open:false, current:null, byKey:{}, order:[], _sig:'' };

// codeBlock() renders an *unlabeled* fence's header as the literal word "code" (esc(lang||'code')),
// so when we read it back from .cb-head span we must fold "code"/"text" to '' - otherwise a
// heading-only markdown block (lang reported as "code") would never qualify and the language tag
// would read a bogus "CODE".
function artNormLang(l){ l=(l||'').toLowerCase().trim(); return (l==='code'||l==='text')?'':l; }

const ART_EXT = { js:'js',jsx:'jsx',ts:'ts',tsx:'tsx',rust:'rs',rs:'rs',python:'py',py:'py',bash:'sh',sh:'sh',shell:'sh',json:'json',yaml:'yml',yml:'yml',toml:'toml',html:'html',css:'css',sql:'sql',go:'go',ruby:'rb',rb:'rb',java:'java',c:'c',cpp:'cpp',md:'md',markdown:'md','':'txt' };
const ART_LANGNAME = { js:'JavaScript',jsx:'JSX',ts:'TypeScript',tsx:'TSX',rust:'Rust',rs:'Rust',python:'Python',py:'Python',bash:'Shell',sh:'Shell',shell:'Shell',json:'JSON',yaml:'YAML',yml:'YAML',toml:'TOML',html:'HTML',css:'CSS',sql:'SQL',go:'Go',ruby:'Ruby',rb:'Ruby',md:'Markdown',markdown:'Markdown' };

// Derive a human title from the content (leading comment / heading / declaration), else the language.
function artTitle(code, lang){
  const lines=String(code).split('\n').map(l=>l.trim()).filter(Boolean);
  for(const l of lines.slice(0,4)){
    let m=l.match(/^(?:\/\/|#|--|;)\s*(.+)$/);            // leading comment
    if(m && m[1].length<=64) return m[1].replace(/\s+/g,' ');
    m=l.match(/^#{1,3}\s+(.+)$/);                          // markdown heading
    if(m) return m[1].replace(/\s+/g,' ').slice(0,64);
    m=l.match(/^(?:export\s+)?(?:async\s+)?(?:fn|function|def|class|struct|interface|enum|impl|type)\s+([A-Za-z_$][\w$]*)/);
    if(m) return m[1];
  }
  const ln=artNormLang(lang);
  return ART_LANGNAME[ln] || (ln ? ln : 'Snippet');
}

// Does this code block clear the bar for an artifact? >=6 lines, or markdown w/ headings.
function artQualifies(code, lang){
  const lines=String(code).replace(/\n+$/,'').split('\n');
  if(lines.length>=6) return true;
  const l=artNormLang(lang);
  if((l==='md'||l==='markdown'||l==='') && /^#{1,3}\s+\S/m.test(code)) return true;
  return false;
}

// Register (or refresh) an artifact, returning its stable key.
function artRegister(code, lang, key){
  lang=artNormLang(lang);
  // key is a stable positional id passed by the caller (NOT a content hash) so a block streaming
  // token-by-token keeps the same identity and an open artifact isn't orphaned each repaint.
  const ext=ART_EXT[lang]!=null?ART_EXT[lang]:'txt';
  if(!ARTS.byKey[key]){ ARTS.order.push(key); }
  ARTS.byKey[key]={ key, code, lang, ext, title:artTitle(code,lang), langName:ART_LANGNAME[lang]||(lang?lang.toUpperCase():'Text'), lines:code.replace(/\n+$/,'').split('\n').length };
  return key;
}

// Mark the chip for the active artifact (without re-rendering the pane).
function artMarkChip(){
  document.querySelectorAll('.art-open.active').forEach(b=>b.classList.remove('active'));
  const a=ARTS.byKey[ARTS.current]; if(!a) return;
  const chip=document.querySelector('.art-open[data-k="'+a.key+'"]'); if(chip) chip.classList.add('active');
}

// Scan the freshly-painted feed: register qualifying blocks, inject "Open in canvas" chips.
// Called at the end of paintFeed(). Rebuilds the registry from on-screen blocks so it stays
// in sync with session switches and streaming repaints. Raw code is recovered from _cbStore via
// the per-block copyCode('cbN',...) onclick id, so it survives codeBlock() regenerating ids.
function artsAfterPaint(){
  const f=document.getElementById('feed'); if(!f) return;
  // Preserve file-preview artifacts opened from a card/chip; only the in-feed CODE blocks re-derive.
  const keepBy={}, keepOrder=[];
  for(const k of ARTS.order){ const a=ARTS.byKey[k]; if(a&&a.isFile){ keepBy[k]=a; keepOrder.push(k); } }
  ARTS.byKey=keepBy; ARTS.order=keepOrder; let artN=0;
  f.querySelectorAll('.cb').forEach(cb=>{
    const copyBtn=cb.querySelector('.cb-copy'); if(!copyBtn) return;
    const m=(copyBtn.getAttribute('onclick')||'').match(/copyCode\('([^']+)'/);
    const codeEl=cb.querySelector('code');
    const raw=(m && typeof _cbStore!=='undefined' && _cbStore[m[1]]!=null) ? _cbStore[m[1]] : (codeEl?codeEl.textContent:'');
    const langEl=cb.querySelector('.cb-head span');
    const lang=(langEl?langEl.textContent:'').trim();
    if(!artQualifies(raw,lang)) return;
    const key=artRegister(raw,lang,'art'+(artN++));
    if(cb.querySelector('.art-open')) return;
    const head=cb.querySelector('.cb-head'); if(!head) return;
    const btn=document.createElement('button');
    btn.className='art-open'; btn.type='button'; btn.dataset.k=key; btn.title='Open in canvas';
    btn.innerHTML='<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="14" y1="3" x2="14" y2="21"/></svg><span>Open in canvas</span>';
    btn.addEventListener('click',()=>artOpen(key));
    head.insertBefore(btn, copyBtn);
  });
  if(ARTS.open){
    if(ARTS.current && ARTS.byKey[ARTS.current]){
      // Only repaint the pane when the active artifact's content actually changed, so a
      // token-by-token streaming repaint doesn't clobber the Copy "Copied" state or tab focus.
      const a=ARTS.byKey[ARTS.current];
      const sig=ARTS.current+'#'+ARTS.order.length+'#'+a.code.length;
      if(sig!==ARTS._sig) artRenderPane(); else artMarkChip();
    }
    else if(ARTS.order.length) artOpen(ARTS.order[ARTS.order.length-1]);
    else artClose();
  }
}

function artShell(){ return document.querySelector('.chat-shell'); }

function artOpen(key){
  if(!ARTS.byKey[key]) return;
  ARTS.current=key; ARTS.open=true;
  const shell=artShell(); if(shell) shell.classList.add('arts-open');
  artRenderPane();
}

function artClose(){
  ARTS.open=false; ARTS.current=null; ARTS._sig='';
  const shell=artShell(); if(shell) shell.classList.remove('arts-open');
  const pane=document.getElementById('artPane'); if(pane) pane.innerHTML='';
  document.querySelectorAll('.art-open.active').forEach(b=>b.classList.remove('active'));
}

function artRenderPane(){
  const pane=document.getElementById('artPane'); if(!pane) return;
  const a=ARTS.byKey[ARTS.current]; if(!a){ artClose(); return; }
  ARTS._sig=ARTS.current+'#'+ARTS.order.length+'#'+a.code.length;
  const multi=ARTS.order.length>1;
  const tabs=multi ? `<div class="art-tabs">${ARTS.order.map(k=>{ const x=ARTS.byKey[k]; return `<button class="art-tab${k===ARTS.current?' on':''}" data-k="${escAttr(k)}" title="${escAttr(x.title)}"><span class="art-dot"></span><span>${esc(x.title)}</span></button>`; }).join('')}</div>` : '';
  pane.innerHTML = `
    <div class="art-bar">
      <div class="art-meta">
        <span class="art-tag">${esc(a.langName)}</span>
        <span class="art-title" title="${escAttr(a.title)}">${esc(a.title)}</span>
        <span class="art-sub">${a.lines} ${a.lines===1?'line':'lines'}</span>
      </div>
      <div class="art-actions">
        <button class="art-btn" id="artCopy" title="Copy contents">Copy</button>
        <button class="art-btn" id="artDl" title="Download file">Download</button>
        <button class="art-x" id="artX" title="Close canvas (Esc)" aria-label="Close canvas">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    ${tabs}
    <div class="art-body">${a.md ? `<div class="md-doc">${mdToHtml(a.code)}</div>` : `<pre><code>${hl(a.code, a.lang)}</code></pre>`}</div>`;
  pane.querySelector('#artX').addEventListener('click', artClose);
  pane.querySelector('#artCopy').addEventListener('click', e=>{
    const btn=e.currentTarget;
    (navigator.clipboard?navigator.clipboard.writeText(a.code):Promise.reject())
      .then(()=>{ btn.textContent='Copied'; btn.classList.add('ok'); setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('ok'); },1200); })
      .catch(()=>notify('Couldn\'t copy to clipboard'));
  });
  pane.querySelector('#artDl').addEventListener('click', ()=>artDownload(a));
  pane.querySelectorAll('.art-tab').forEach(t=> t.addEventListener('click',()=>artOpen(t.dataset.k)) );
  artMarkChip();
}

function artDownload(a){
  const safe=(a.title||'artifact').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40)||'artifact';
  const name=a.isFile&&a.title?a.title:(safe+'.'+(a.ext||'txt'));
  const blob=new Blob([a.code], {type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a'); el.href=url; el.download=name;
  document.body.appendChild(el); el.click(); el.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
  notify('Downloaded '+name,'ok');
}

// ── Opening WRITTEN FILES / artifacts for READING (never a forced download) ──
const _FILE_LANG={md:'md',markdown:'md',txt:'',text:'',log:'',csv:'',json:'json',js:'js',mjs:'js',cjs:'js',ts:'ts',tsx:'tsx',jsx:'jsx',py:'python',rs:'rust',sh:'bash',bash:'bash',zsh:'bash',html:'html',htm:'html',css:'css',yml:'yaml',yaml:'yaml',toml:'toml',sql:'sql',go:'go',rb:'ruby',c:'c',h:'c',cpp:'cpp',java:'java',php:'php',xml:'html'};
function fileLang(ext){ ext=(ext||'').toLowerCase(); return (_FILE_LANG[ext]!=null)?_FILE_LANG[ext]:''; }
const _IMG_EXT=['png','jpg','jpeg','gif','webp','bmp','svg','ico'];

// Open an artifact/file for reading. In chat we dock it in the right-hand canvas;
// elsewhere (gallery, task panel — no canvas) we use a centered viewer modal. Images → lightbox.
// Content is fetched as text and rendered (markdown as HTML, code highlighted). Replaces the old
// behaviour where every artifact click forced a download.
async function artOpenFile(task, path, name){
  name = name || String(path||'').split('/').pop() || 'file';
  const ext = (name.split('.').pop()||'').toLowerCase();
  const url = `/v1/artifact?task=${encodeURIComponent(task)}&path=${encodeURIComponent(path)}`;
  if(_IMG_EXT.includes(ext)){ imgLightbox(url); return; }
  // HTML/PDF are meant to be VIEWED, not read as source — open them in the default browser, served
  // inline so they render (view=1). The desktop webview can't render them in-place safely.
  if(ext==='html'||ext==='htm'||ext==='pdf'){ openExternal(url+'&view=1'); return; }
  let text='';
  try{ const r=await fetch(url,{headers:AUTH}); if(!r.ok) throw new Error('HTTP '+r.status); text=await r.text(); }
  catch(e){ notify('Couldn\'t open '+name+' — '+((e&&e.message)||'error')); return; }
  const lang=fileLang(ext), md=(ext==='md'||ext==='markdown');
  const pane=document.getElementById('artPane');
  if(pane){   // chat: dock in the canvas (persists across repaints via isFile)
    const key='file:'+task+'::'+path;
    if(!ARTS.order.includes(key)) ARTS.order.push(key);
    ARTS.byKey[key]={ key, code:text, lang, ext:ext||'txt', title:name, langName:(ART_LANGNAME[lang]||(ext?ext.toUpperCase():'Text')), lines:text.replace(/\n+$/,'').split('\n').length, isFile:true, md };
    artOpen(key);
  } else {    // gallery / task panel: a centered viewer modal
    fileViewer(name, ext, text, url);
  }
}

// A dismissible centered viewer for a file's contents (used where there's no chat canvas).
function fileViewer(name, ext, text, dlUrl){
  const md=(ext==='md'||ext==='markdown');
  const body = md ? `<div class="md-doc">${mdToHtml(text)}</div>` : `<pre class="fv-pre"><code>${hl(text, fileLang(ext))}</code></pre>`;
  const ov=document.createElement('div'); ov.className='fv-ov';
  ov.innerHTML=`<div class="fv-card"><div class="fv-head"><span class="fv-name">${esc(name)}</span><span class="grow"></span>${dlUrl?`<a class="fv-dl" href="${escAttr(dlUrl)}" download="${escAttr(name)}">Download</a>`:''}<button class="fv-x" aria-label="Close">&times;</button></div><div class="fv-body">${body}</div></div>`;
  ov.onclick=e=>{ if(e.target===ov||e.target.classList.contains('fv-x')) ov.remove(); };
  document.body.appendChild(ov);
  const onkey=e=>{ if(e.key==='Escape'){ ov.remove(); document.removeEventListener('keydown',onkey); } };
  document.addEventListener('keydown',onkey);
}

// ── Schedule: cadence + premium cards ────────────────────────────
// Glyphs on the 24px line grid (match the rail's stroke language).
const CAD_GLYPH = {
  once:     SVG('<circle cx="12" cy="12" r="8.5"/><path d="M12 8v4.2l2.8 1.7"/>'),
  interval: SVG('<path d="M3.5 12a8.5 8.5 0 0 1 14.5-6M20.5 12a8.5 8.5 0 0 1-14.5 6"/><path d="M18 3v3.2h-3.2M6 21v-3.2h3.2"/>'),
  daily:    SVG('<circle cx="12" cy="12" r="4"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5.2 5.2l1.4 1.4M17.4 17.4l1.4 1.4M5.2 18.8l1.4-1.4M17.4 6.6l1.4-1.4"/>'),
  weekdays: SVG('<rect x="3" y="5" width="18" height="16" rx="2.4"/><path d="M3 9.5h18M8 3v3.5M16 3v3.5"/><path d="M8.5 14h7"/>'),
  weekly:   SVG('<rect x="3" y="5" width="18" height="16" rx="2.4"/><path d="M3 9.5h18M8 3v3.5M16 3v3.5"/><circle cx="12" cy="15" r="1.7"/>'),
};
const CAD_DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];   // recur.rs: 0=Mon ... 6=Sun
function cadHM(h, m){
  h = (h|0); m = (m|0);
  // hour/min are the user's local wall-clock now (recur.rs schedules in local time), so the
  // badge shows exactly what was typed: '5pm' → '5:00 PM' and it fires at 5pm local.
  const ap = h < 12 ? 'AM' : 'PM';
  let hr = h % 12; if(hr === 0) hr = 12;
  return m ? `${hr}:${String(m).padStart(2,'0')} ${ap}` : `${hr}:00 ${ap}`;
}
function cadDur(secs){
  secs = Math.max(1, secs|0);
  if(secs % 86400 === 0){ const d = secs/86400; return d===1?'day':`${d} days`; }
  if(secs % 3600  === 0){ const h = secs/3600;  return h===1?'hour':`${h} hr`; }
  if(secs % 60    === 0){ const m = secs/60;    return m===1?'min':`${m} min`; }
  return `${secs} sec`;
}
// Turn a Recurrence (serde tag "kind", snake_case) into { label, glyph, kind }.
// Field names verified against crates/engram-sched/src/recur.rs.
function cadenceSchedule(rec){
  if(!rec || !rec.kind) return { kind:'once', label:'-', glyph:CAD_GLYPH.once };
  switch(rec.kind){
    case 'once': {
      const d = new Date(rec.at_ms);
      const label = 'Once ' + d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + (
        (d.getHours()||d.getMinutes()) ? ' ' + cadHM(d.getHours(), d.getMinutes()) : '');
      return { kind:'once', label, glyph:CAD_GLYPH.once };
    }
    case 'interval':
      return { kind:'interval', label:'Every ' + cadDur(rec.secs), glyph:CAD_GLYPH.interval };
    case 'daily':
      return { kind:'daily', label:'Daily ' + cadHM(rec.hour, rec.min), glyph:CAD_GLYPH.daily };
    case 'weekdays':
      return { kind:'weekdays', label:'Mon-Fri ' + cadHM(rec.hour, rec.min), glyph:CAD_GLYPH.weekdays };
    case 'weekly':
      return { kind:'weekly', label:(CAD_DOW[(rec.weekday|0)%7]) + ' ' + cadHM(rec.hour, rec.min), glyph:CAD_GLYPH.weekly };
    default:
      return { kind:String(rec.kind), label:String(rec.kind), glyph:CAD_GLYPH.once };
  }
}
// Compact relative duration: "4h 12m", "23h", "2d 3h", "now".
function schedRel(ms){
  ms = Math.abs(ms);
  const s = Math.round(ms/1000);
  if(s < 60) return s <= 1 ? 'now' : s + 's';
  const m = Math.floor(s/60);
  if(m < 60) return m + 'm';
  const h = Math.floor(m/60), rm = m % 60;
  if(h < 24) return rm ? `${h}h ${rm}m` : `${h}h`;
  const d = Math.floor(h/24), rh = h % 24;
  return rh ? `${d}d ${rh}h` : `${d}d`;
}
function schedNextLabel(job){
  const now = Date.now(), dt = job.next_fire_ms - now;
  if(dt <= 0) return '<b>due</b> now';
  return 'next in <b>' + schedRel(dt) + '</b>';
}
// Fraction of the cycle elapsed (last/created fire → next fire), clamped [0.04,1].
function schedProgress(job){
  const now = Date.now();
  const start = job.last_fire_ms || job.created_ms || (job.next_fire_ms - 60000);
  const span = job.next_fire_ms - start;
  if(span <= 0) return 1;
  return Math.max(0.04, Math.min(1, (now - start) / span));
}
const SCHED_RUNNING = new Set();   // job ids currently firing from the UI
// Countdown/meter tick: rendered-at-paint labels ("next in 2m") froze forever. A light in-place
// updater keeps them honest while the Schedule view is open - no re-render, drafts stay safe.
setInterval(()=>{
  if(state.route!=='Schedule') return;
  document.querySelectorAll('.sc-next[data-next]').forEach(el=>{
    const next=+el.dataset.next||0; if(!next) return;
    const dt=next-Date.now();
    el.innerHTML = dt<=0 ? '<b>due</b> now' : ('next in <b>'+schedRel(dt)+'</b>');
  });
  document.querySelectorAll('.sc-meter[data-next]').forEach(el=>{
    const next=+el.dataset.next||0, start=+el.dataset.start||(next-60000); if(!next) return;
    const span=next-start, pct=span<=0?100:Math.round(Math.max(0.04,Math.min(1,(Date.now()-start)/span))*100);
    const i=el.querySelector('i'); if(i) i.style.width=pct+'%';
    el.classList.toggle('sc-due', next<=Date.now());
  });
}, 30000);

function schedCardHtml(job){
  const cad = cadenceSchedule(job.recurrence);
  const soon = (job.next_fire_ms - Date.now()) < 3600000;   // within the hour
  const badge = `<span class="cadence-badge cad-${esc(cad.kind)}${soon?' cad-soon':''}" title="${escAttr(cad.label)}"><span class="cad-glyph">${cad.glyph}</span>${esc(cad.label)}</span>`;
  const running = SCHED_RUNNING.has(job.id);
  // attrJson() (= escAttr(JSON.stringify(x))) is the house idiom for passing values into an
  // inline handler: double-quote-safe and apostrophe-safe through HTML decoding, unlike a
  // bare '${escAttr(x)}' which a job name like "it's" would break out of (job.name is untrusted).
  const runBtn = running
    ? `<button class="sc-btn sc-run" disabled aria-label="Running"><span class="sc-spin"></span></button>`
    : `<button class="sc-btn sc-run" onclick="runJobNow(${attrJson(job.id)},event)" title="Run now" aria-label="Run now">${SVG('<path d="M7 5.5v13l11-6.5-11-6.5Z"/>')}</button>`;
  const editBtn = `<button class="sc-btn" onclick="editJob(${attrJson(job.id)},event)" title="Edit name, cadence, prompt, or agent" aria-label="Edit schedule">${SVG('<path d="M17 3.5 20.5 7 8.5 19H5v-3.5z"/>')}</button>`;
  const delBtn = `<button class="sc-btn sc-del" onclick="deleteJob(${attrJson(job.id)},${attrJson(job.name)},event)" title="Delete schedule" aria-label="Delete schedule">${SVG('<path d="M5 7h14M9.5 7V5.4A1.4 1.4 0 0 1 10.9 4h2.2a1.4 1.4 0 0 1 1.4 1.4V7M7 7l.8 11.3A1.6 1.6 0 0 0 9.4 20h5.2a1.6 1.6 0 0 0 1.6-1.5L17 7"/>')}</button>`;
  const pct = Math.round(schedProgress(job) * 100);
  const due = job.next_fire_ms <= Date.now();
  let last = '';
  if(job.last_fire_ms){
    const lbl = 'last run ' + schedRel(Date.now() - job.last_fire_ms) + ' ago';
    last = job.last_task_id
      ? `<span class="sc-last sc-link" title="open the signed receipt for the last run" onclick="openTaskReceipt(${attrJson(job.last_task_id)},event)">◇ ${esc(lbl)}</span>`
      : `<span class="sc-last">${esc(lbl)}</span>`;
  } else {
    last = `<span class="sc-last">never run</span>`;
  }
  return `<div class="sched-card${running?' is-running':''}" data-job="${escAttr(job.id)}">
    <div class="sc-top">
      <span class="sc-name">${esc(job.name)}</span>
      ${badge}
      <span class="sc-actions">${runBtn}${editBtn}${delBtn}</span>
    </div>
    <div class="sc-meter${due?' sc-due':''}" data-start="${job.last_fire_ms||job.created_ms||0}" data-next="${job.next_fire_ms||0}"><i style="width:${pct}%"></i></div>
    <div class="sc-foot"><span class="sc-next" data-next="${job.next_fire_ms||0}">${schedNextLabel(job)}</span>${last}</div>
  </div>`;
}

async function renderScheduleView(){
  let jobs = [];
  try { jobs = await J('/v1/schedule') || []; }
  catch(e){ notify('Couldn\'t load schedules - ' + e.message); jobs = []; }
  // Load the agent roster once so the "Run as" picker can offer a durable agent (whose signed
  // autonomy policy governs the unattended run); re-render when it arrives so the select fills.
  if(!window._agentsLoaded){ window._agentsLoaded=true; J('/v1/agents').then(a=>{ AGENTS=a||[]; if(state.route==='Schedule') renderScheduleView(); }).catch(()=>{}); }
  jobs.sort((a,b)=> (a.next_fire_ms||0) - (b.next_fire_ms||0));   // soonest first
  window._schedJobs=jobs;
  const n = jobs.length;
  const list = n
    ? `<div class="sched-list" id="schedListBox">${jobs.map(schedCardHtml).join('')}</div>`
    : `<div class="sched-empty">
        <span class="se-glyph">${ICONS.Schedule}</span>
        <div class="se-title">Nothing scheduled yet</div>
        <div class="se-hint">Engram can run a task on a cadence and wake itself to do it - even from sleep. Try <code>every Monday at 9am</code> or <code>every 30 minutes</code>.</div>
      </div>`;
  // With a long Upcoming list, search + a pinned way back to "create new" keep the view usable.
  const stick = n>=4 ? `<div class="sched-stick"><input class="act-search" style="flex:1" placeholder="Search schedules…" oninput="schedFilter(this.value)">
      <button class="sbtn" onclick="document.getElementById('view').scrollTo({top:0,behavior:'smooth'});setTimeout(()=>document.getElementById('sname')?.focus(),380)">+ New</button></div>` : '';
  // A re-render (Run-now, Delete, the async agents load) must NOT destroy an in-progress compose
  // draft - the prompt textarea is the agent's whole instruction set. Snapshot + restore.
  const keep={}; for(const id of ['sname','swhen','sprompt','sagent']){ const x=document.getElementById(id); if(x&&x.value) keep[id]=x.value; }
  document.getElementById('view').innerHTML = `<div class="panes"><div class="pane">
    <div class="sched-head"><h2>Schedule a recurring run</h2><span class="sched-count">${n} ${n===1?'job':'jobs'}</span></div>
    <div class="sched-compose">
      <div class="row">
        <input id="sname" placeholder="name (a short label)" style="flex:.5">
        <input id="swhen" placeholder="every Monday at 9am" oninput="schedPreviewCadence()" onkeydown="if(event.key==='Enter')document.getElementById('sprompt').focus()">
      </div>
      ${schedPickerHtml('swhen')}
      <textarea id="sprompt" class="sched-prompt" rows="2" placeholder="What should Engram do when this fires? e.g. Summarize my unread email and send me the top 5."></textarea>
      <div class="sched-runas">
        <div class="sr-field">
          <label for="sagent">Run as</label>
          <select id="sagent">${['<option value="">Default agent — egress stages for your review</option>'].concat((AGENTS||[]).map(a=>`<option value="${escAttr(a.id)}">${a.emoji?esc(a.emoji)+' ':''}${esc(a.name)}</option>`)).join('')}</select>
          <div class="sr-hint">A durable agent runs unattended under its own signed autonomy policy; the default agent stages any outbound action for your approval.</div>
        </div>
        <button class="sr-add" onclick="addJobPro()">Add schedule</button>
      </div>
      <div id="swhenprev" class="sched-preview empty"></div>
    </div>
  </div>
  ${stick}
  <div class="pane">
    <div class="sched-head"><h2>Upcoming</h2></div>
    ${list}
  </div></div>`;
  for(const id in keep){ const x=document.getElementById(id); if(x) x.value=keep[id]; }

// Client-side schedule search: repaints only the list (the compose draft is untouched).
function schedFilter(q){
  const box=document.getElementById('schedListBox'); if(!box) return;
  q=(q||'').trim().toLowerCase();
  const jobs=(window._schedJobs||[]).filter(j=>{

// A point-and-click cadence builder that COMPOSES the natural-language phrase - the phrase stays
// the visible, editable source of truth, so the picker teaches the grammar instead of hiding it.
// pfx is the id of the target "when" input ('swhen' in the composer, 'ejWhen' in the edit modal).
function schedPickerHtml(pfx){
  const days=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  return `<details class="sched-pick"><summary>… or pick date &amp; time</summary>
    <div class="sp-row">
      <select id="${pfx}_rep" onchange="schedPickApply('${pfx}')">
        <option value="daily">Every day</option>
        <option value="weekdays">Weekdays (Mon–Fri)</option>
        ${days.map(d=>`<option value="${d}">Every ${d[0].toUpperCase()+d.slice(1)}</option>`).join('')}
        <option value="date">Once, on a date</option>
        <option value="tomorrow">Once, tomorrow</option>
        <option value="interval">Every N minutes</option>
      </select>
      <input type="date" id="${pfx}_date" style="display:none" onchange="schedPickApply('${pfx}')">
      <input type="time" id="${pfx}_time" value="09:00" onchange="schedPickApply('${pfx}')">
      <input type="number" id="${pfx}_n" min="1" value="30" style="display:none;width:78px" title="minutes" onchange="schedPickApply('${pfx}')">
    </div></details>`;
}
function schedPickApply(pfx){
  const rep=document.getElementById(pfx+'_rep').value;
  const dateEl=document.getElementById(pfx+'_date'), timeEl=document.getElementById(pfx+'_time'), nEl=document.getElementById(pfx+'_n');
  dateEl.style.display = rep==='date' ? '' : 'none';
  nEl.style.display    = rep==='interval' ? '' : 'none';
  timeEl.style.display = rep==='interval' ? 'none' : '';
  const time=timeEl.value||'09:00';
  let phrase='';
  if(rep==='daily') phrase=`every day at ${time}`;
  else if(rep==='weekdays') phrase=`every weekday at ${time}`;
  else if(rep==='tomorrow') phrase=`tomorrow at ${time}`;
  else if(rep==='interval') phrase=`every ${Math.max(1,parseInt(nEl.value,10)||30)} minutes`;
  else if(rep==='date'){ if(!dateEl.value) return; phrase=`on ${dateEl.value} at ${time}`; }
  else phrase=`every ${rep} at ${time}`;
  const target=document.getElementById(pfx); if(!target) return;
  target.value=phrase;
  target.dispatchEvent(new Event('input',{bubbles:true}));   // fires the live cadence preview
}
// Live cadence preview in the composer: renders the parsed badge + glyph, not just a date.
let schedPrevTimer = null;
function schedPreviewCadence(){
  clearTimeout(schedPrevTimer);
  schedPrevTimer = setTimeout(async ()=>{
    const inp = document.getElementById('swhen'), out = document.getElementById('swhenprev');
    if(!inp || !out) return;
    const when = inp.value.trim();
    if(!when){ out.className = 'sched-preview empty'; out.innerHTML = ''; return; }
    let r;
    // /v1/schedule/preview answers 200 with {ok:false} for an unparseable phrase, so J() only
    // throws here on a real network error.
    try { r = await J('/v1/schedule/preview?when=' + encodeURIComponent(when)); }
    catch(_){ r = { ok:false }; }
    if(r.ok && r.recurrence){
      const cad = cadenceSchedule(r.recurrence);
      const next = r.next_fire_ms ? schedRel(r.next_fire_ms - Date.now()) : null;
      out.className = 'sched-preview';
      out.innerHTML = `<span class="cadence-badge cad-${esc(cad.kind)}"><span class="cad-glyph">${cad.glyph}</span>${esc(cad.label)}</span>`
        + (next ? `<span style="color:var(--text-muted)">first run in ${esc(next)}</span>` : '');
    } else {
      out.className = 'sched-preview';
      out.innerHTML = `<span style="color:var(--text-muted)">${esc(when)} - not a cadence I understand</span>`;
    }
  }, 200);
}

async function addJobPro(){
  const nameEl = document.getElementById('sname'), whenEl = document.getElementById('swhen'), promptEl = document.getElementById('sprompt');
  const when = whenEl?.value.trim();
  const prompt = (promptEl?.value || '').trim();
  // The task title IS the agent's prompt (schedule_run / --run-due / the tick all run the task with
  // an empty description), so the instructions must go into payload.title. Without them a job named
  // "Evening digest" ran with the whole prompt "Evening digest" — the "x"-prompt digest regression.
  if(!prompt){ notify('Tell Engram what to do when this job fires'); promptEl?.focus(); return; }
  if(!when){ whenEl?.focus(); return; }
  const name = (nameEl?.value.trim()) || prompt.replace(/\s+/g,' ').slice(0,42) || 'job';
  const agent = (document.getElementById('sagent')?.value || '').trim();
  try {
    // payload.title -> the run prompt (the daemon runs title, optionally + payload.detail). payload.agent
    // (when set) makes the unattended run adopt that durable agent's SIGNED autonomy policy, so egress
    // can proceed within the allowlist instead of always staging for review.
    const payload = { title:prompt, prompt, label:name };
    if(agent) payload.agent = agent;
    await J('/v1/schedule', { method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ name, when, payload }) });
    notify('Scheduled · ' + name, 'ok');
    renderScheduleView();
  } catch(e){ notify('Couldn\'t schedule - ' + e.message); }
}

// Run-now: create+run a task from the job payload via the new endpoint; opens its receipt.
async function runJobNow(id, e){
  if(e) e.stopPropagation();
  if(SCHED_RUNNING.has(id)) return;
  SCHED_RUNNING.add(id);
  const card = document.querySelector(`.sched-card[data-job="${CSS.escape(id)}"]`);
  if(card){ const b = card.querySelector('.sc-run'); if(b){ b.disabled = true; b.innerHTML = '<span class="sc-spin"></span>'; } card.classList.add('is-running'); }
  notify('Running now — the receipt opens when it lands', 'ok');   // before the await: the endpoint blocks for the whole run
  try {
    const r = await J('/v1/schedule/' + encodeURIComponent(id) + '/run', { method:'POST' });
    if(r && r.task_id) setTimeout(()=>openTaskReceipt(r.task_id), 250);
  } catch(err){ notify('Couldn\'t run job - ' + err.message); }
  finally { SCHED_RUNNING.delete(id); if(state.route === 'Schedule') renderScheduleView(); }
}

// Edit a scheduled job in place - name, cadence, prompt, and agent - via PATCH /v1/schedule/{id}.

    <div class="ask-actions"><button class="ask-ghost" data-act="x">Cancel</button><button class="ask-ok" data-act="ok">Save changes</button></div></div>`;

// ===================== VOICE: dictation + hands-free conversation =====================
// Browser-only v1: webkitSpeechRecognition (STT, may be missing in WKWebView) + speechSynthesis
// (TTS, available). Routes transcripts through the existing chat path. Graceful fallback when
// recognition is unavailable: TTS still speaks replies and a typed input keeps the loop usable.
// PREMIUM PATH (already wired in the backend): POST /v1/voice (audio_b64 -> transcript+reply+audio_b64)
// and the /v1/voice/stream WebSocket give server-side STT/TTS for WKWebView where the Web Speech
// API is absent; the frontend can later record mic audio and pump it through those endpoints.

const VOICE = {
  recog: null,            // active SpeechRecognition instance (dictation OR conversation)
  mode: null,             // 'dictate' | 'converse' | null
  supported: (typeof window !== 'undefined') && !!(window.SpeechRecognition || window.webkitSpeechRecognition),
  speakOn: true,          // speak replies in conversation mode
  voice: null,            // chosen SpeechSynthesisVoice
  open: false,
  phase: 'idle',          // idle | listening | thinking | speaking
  raf: 0,
  level: 0,               // smoothed input "loudness" proxy for the orb (0..1)
  finalText: '',
  interim: '',
};

function voiceSpeechCtor(){ return window.SpeechRecognition || window.webkitSpeechRecognition || null; }

// Pick a pleasant English voice once the list is ready (it loads async in some engines).
function voicePickVoice(){
  if(!('speechSynthesis' in window)) return;
  const vs = window.speechSynthesis.getVoices() || [];
  if(!vs.length) return;
  // An explicit choice from Settings -> Voice wins; otherwise pick the best English voice.
  const want=engramPrefs().voiceName;
  const chosen = want ? vs.find(v=>v.name===want) : null;
  const pref = chosen
            || vs.find(v=>/en[-_]US/i.test(v.lang) && /(Samantha|Ava|Allison|Google US|Natural)/i.test(v.name))
            || vs.find(v=>/en[-_]US/i.test(v.lang))
            || vs.find(v=>/^en/i.test(v.lang)) || vs[0];
  VOICE.voice = pref || null;
}
if(typeof window!=='undefined' && 'speechSynthesis' in window){
  try{ window.speechSynthesis.onvoiceschanged = voicePickVoice; voicePickVoice(); }catch(_){}
}

// --------------------------- (1) PUSH-TO-TALK DICTATION ---------------------------
function voiceToggleDictation(btn){
  const c = document.getElementById('composer');
  if(!c){ return; }
  if(VOICE.mode==='dictate'){ voiceStopRecog(); return; }
  if(!VOICE.supported){
    notify('Voice input isn\'t available in this window. You can still hear replies in voice chat.');
    return;
  }
  voiceStopRecog(); // ensure clean slate (e.g. a conversation session)
  const Ctor = voiceSpeechCtor(); const r = new Ctor();
  r.lang = 'en-US'; r.continuous = true; r.interimResults = true;
  // Preserve whatever (incl. newlines) is already typed; only the dictated tail is normalized.
  const base = c.value ? (c.value.replace(/[ \t]+$/,'') + (c.value.endsWith('\n')?'':' ')) : '';
  let settled = '';
  r.onresult = (e)=>{
    let interim = '';
    for(let i=e.resultIndex; i<e.results.length; i++){
      const txt = e.results[i][0].transcript;
      if(e.results[i].isFinal) settled += txt; else interim += txt;
    }
    const tail = (settled + interim).replace(/\s+/g,' ').replace(/^\s/,'');
    c.value = base + tail;
    c.style.height='auto'; c.style.height=Math.min(c.scrollHeight,160)+'px';
  };
  r.onerror = (e)=>{
    if(e.error==='not-allowed' || e.error==='service-not-allowed')
      notify('Microphone permission was denied. Allow it in System Settings → Privacy → Microphone.');
    else if(e.error!=='aborted' && e.error!=='no-speech')
      notify('Dictation stopped: '+(e.error||'unknown'));
  };
  r.onend = ()=>{ if(VOICE.mode==='dictate' && VOICE.recog===r){ VOICE.mode=null; VOICE.recog=null; voiceSyncDictateUI(); c.focus(); } };
  VOICE.recog = r; VOICE.mode='dictate';
  let started=true;
  try{ r.start(); }catch(_){ VOICE.mode=null; VOICE.recog=null; started=false; }
  voiceSyncDictateUI();
  if(started) notify('Listening... speak, then tap the mic to stop.', 'ok');
}

function voiceStopRecog(){
  const r = VOICE.recog; if(!r) return;
  VOICE.recog=null; const wasMode=VOICE.mode; VOICE.mode=null;
  try{ r.onend=null; r.onresult=null; r.onerror=null; r.stop(); }catch(_){ try{ r.abort(); }catch(__){} }
  if(wasMode==='dictate') voiceSyncDictateUI();
}

function voiceSyncDictateUI(){
  const b = document.getElementById('voiceMic');
  if(!b) return;
  const on = VOICE.mode==='dictate';
  b.classList.toggle('rec', on);
  b.setAttribute('aria-pressed', on ? 'true' : 'false');
  b.title = on ? 'Stop dictation' : (VOICE.supported ? 'Dictate (push to talk)' : 'Voice input unavailable in this window');
}

function voiceMicSvg(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>';
}
function voiceWaveSvg(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 13v-1a8 8 0 0 1 16 0v1"/><rect x="3" y="13" width="4" height="6" rx="1.6"/><rect x="17" y="13" width="4" height="6" rx="1.6"/><path d="M19 19v.5a3 3 0 0 1-3 3h-3"/></svg>';
}

// ------------------------- (2) HANDS-FREE CONVERSATION MODE -------------------------
function voiceOpenConversation(){
  if(VOICE.open) return;
  VOICE.open = true; VOICE.finalText=''; VOICE.interim='';
  const ov = document.createElement('div');
  ov.id = 'voiceOverlay'; ov.className = 'voice-ov';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true'); ov.setAttribute('aria-label','Voice conversation');
  const noStt = !VOICE.supported;
  ov.innerHTML = `
    <button class="voice-close" onclick="voiceCloseConversation()" aria-label="Close voice (Esc)">✕</button>
    <div class="voice-stage">
      <canvas id="voiceOrb" width="320" height="320" aria-hidden="true"></canvas>
      <div class="voice-status" id="voiceStatus">Connecting...</div>
      <div class="voice-transcript" id="voiceTranscript" aria-live="polite"></div>
      ${noStt ? `<div class="voice-fallnote">Speech input isn\'t available in this window - Engram will still <b>speak its replies</b>. Type below to talk.</div>` : ''}
      <div class="voice-controls">
        <button class="voice-mute" id="voiceMute" onclick="voiceToggleSpeak()" title="Mute replies" aria-label="Mute replies">${voiceSpeakerSvg(true)}</button>
        <button class="voice-orb-btn" id="voiceBarge" onclick="voiceBargeIn()" aria-label="${noStt?'Restart':'Tap to interrupt and talk'}" title="${noStt?'Restart':'Tap to interrupt / talk'}">${voiceMicSvg()}</button>
        <button class="voice-end" onclick="voiceCloseConversation()">End</button>
      </div>
      <form class="voice-typed" id="voiceTypedRow" onsubmit="voiceTypedSubmit(event)">
        <input id="voiceTypedInput" placeholder="${noStt?'Type your message...':'...or type instead'}" autocomplete="off" spellcheck="false">
        <button type="submit" aria-label="Send">↵</button>
      </form>
    </div>`;
  document.body.appendChild(ov);
  document.addEventListener('keydown', voiceOvKey);
  requestAnimationFrame(()=>ov.classList.add('in'));
  voiceOrbLoop();
  voiceSetPhase('idle');
  if(noStt){
    voiceSetStatus('Voice replies ready - type to begin.');
    const ti=document.getElementById('voiceTypedInput'); if(ti) ti.focus();
  } else {
    voiceStartListening();
  }
}

function voiceCloseConversation(){
  if(!VOICE.open) return;
  VOICE.open=false;
  voiceStopRecog();
  clearInterval(_voiceEndTimer); _voiceEndTimer=0;
  try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(_){}
  cancelAnimationFrame(VOICE.raf); VOICE.raf=0;
  document.removeEventListener('keydown', voiceOvKey);
  const ov=document.getElementById('voiceOverlay');
  if(ov){ ov.classList.remove('in'); setTimeout(()=>ov.remove(), 240); }
}

function voiceOvKey(e){
  if(e.key==='Escape'){ e.preventDefault(); voiceCloseConversation(); }
}

function voiceToggleSpeak(){
  VOICE.speakOn = !VOICE.speakOn;
  const b=document.getElementById('voiceMute');
  if(b) b.innerHTML = voiceSpeakerSvg(VOICE.speakOn);
  if(!VOICE.speakOn){ try{ window.speechSynthesis.cancel(); }catch(_){} if(VOICE.phase==='speaking') voiceAfterSpeak(); }
}

// Barge-in: tapping the orb interrupts whatever Engram is saying and re-opens the mic.
function voiceBargeIn(){
  try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(_){}
  clearInterval(_voiceEndTimer); _voiceEndTimer=0;
  if(!VOICE.supported){
    const ti=document.getElementById('voiceTypedInput'); if(ti) ti.focus();
    voiceSetStatus('Type your message...');
    return;
  }
  voiceStartListening();
}

function voiceStartListening(){
  if(!VOICE.open || !VOICE.supported) return;
  voiceStopRecog();
  const Ctor=voiceSpeechCtor(); const r=new Ctor();
  r.lang='en-US'; r.continuous=false; r.interimResults=true;
  VOICE.finalText=''; VOICE.interim='';
  r.onresult=(e)=>{
    let interim='', fin='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) fin+=t; else interim+=t;
    }
    if(fin) VOICE.finalText+=fin;
    VOICE.interim=interim;
    voiceRenderTranscript((VOICE.finalText+' '+interim).trim(), 'you');
  };
  r.onerror=(e)=>{
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      notify('Microphone permission denied - switch to typing.');
      voiceSetPhase('idle'); voiceSetStatus('Mic blocked - type below.');
      const ti=document.getElementById('voiceTypedInput'); if(ti) ti.focus();
    } else if(e.error==='no-speech'){
      if(VOICE.open && VOICE.phase==='listening') voiceStartListening();
    }
  };
  r.onend=()=>{
    if(VOICE.recog!==r) return;
    VOICE.recog=null; VOICE.mode=null;
    const said=(VOICE.finalText||VOICE.interim||'').trim();
    if(VOICE.open && VOICE.phase==='listening'){
      if(said) voiceSendTurn(said);
      else voiceStartListening();
    }
  };
  VOICE.recog=r; VOICE.mode='converse';
  try{ r.start(); voiceSetPhase('listening'); voiceSetStatus('Listening...'); }
  catch(_){ /* a start() race; ignore */ }
}

// Push a finished utterance through the existing streaming chat path, then speak the reply.
async function voiceSendTurn(text){
  voiceStopRecog();
  voiceSetPhase('thinking'); voiceSetStatus('Thinking...');
  voiceRenderTranscript(text, 'you');
  // Settle on a real session AND hydrate WS.byId[sid] the way chatSay does, so the turn-mirror
  // below can't silently no-op when the session object isn't loaded yet.
  if(!WS.activeSession){
    if(WS.sessions.length) WS.activeSession=WS.sessions[0].id;
    else { const s=await newSession(false); if(s) WS.activeSession=s.id; }
  }
  const sid = WS.activeSession;
  if(sid && !WS.byId[sid]){
    try{ WS.byId[sid]=await J('/v1/sessions/'+encodeURIComponent(sid)); }catch(_){ WS.byId[sid]={id:sid,messages:[]}; }
  }
  let reply=''; _voiceSpoken='';
  try{
    const r = await fetch('/v1/converse/stream',{method:'POST',headers:{...AUTH,'content-type':'application/json'},body:JSON.stringify({text, session:sid})});
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
    voiceSetPhase('speaking'); voiceSetStatus('Engram');
    for(;;){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        let ev='message'; const dl=[];
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')) dl.push(line.slice(5).replace(/^ /,''));
        }
        const data=dl.join('\n');
        if(ev==='token'){ reply+=data; voiceRenderTranscript(reply,'engram'); voiceSpeakStreaming(reply,false); }
        else if(ev==='done'){ try{const d=JSON.parse(data); if(d.reply) reply=d.reply;}catch(_){} voiceRenderTranscript(reply,'engram'); }
        else if(ev==='error'){ reply='(couldn\'t reach Engram - '+data+')'; voiceRenderTranscript(reply,'engram'); }
      }
    }
  }catch(e){
    reply = reply || '(couldn\'t reach Engram - '+(e.message||'try again')+')';
    voiceRenderTranscript(reply,'engram');
  }
  // Mirror the turn into the live in-memory session so the Chat feed stays in sync. (The server
  // already persists the turn via append_turn on /v1/converse/stream, so this is display-only.)
  try{
    const sess=WS.byId[sid];
    if(sess){ if(!sess.messages) sess.messages=[]; sess.messages.push({role:'user',text}); sess.messages.push({role:'engram',text:reply}); if(state.route==='Chat') paintFeed(); }
  }catch(_){}
  voiceSpeakStreaming(reply, true);
}

// Speak reply text as it streams: split on sentence boundaries and only queue the new tail.
let _voiceSpoken = '';
function voiceSpeakStreaming(full, flush){
  if(!VOICE.speakOn || !('speechSynthesis' in window)) { if(flush) voiceAfterSpeak(); return; }
  const pending = full.slice(_voiceSpoken.length);
  let upto = pending.length;
  if(!flush){
    const m = pending.match(/[\s\S]*[.!?...]\s/);
    upto = m ? m[0].length : 0;
  }
  const chunk = pending.slice(0, upto).replace(/\s+/g,' ').trim();
  if(!chunk){ if(flush){ _voiceSpoken=full; voiceWatchSpeechEnd(); } return; }
  _voiceSpoken += pending.slice(0, upto);
  const clean = chunk.replace(/```[\s\S]*?```/g,' code block ').replace(/[`*_#>\[\]()]/g,'').trim();
  if(clean){
    const u=new SpeechSynthesisUtterance(clean);
    if(VOICE.voice) u.voice=VOICE.voice;
    u.rate=(engramPrefs().voiceRate||1.02); u.pitch=1.0;
    try{ window.speechSynthesis.speak(u); }catch(_){}
  }
  if(flush){ _voiceSpoken=full; voiceWatchSpeechEnd(); }
}

let _voiceEndTimer=0;
function voiceWatchSpeechEnd(){
  clearInterval(_voiceEndTimer);
  if(!('speechSynthesis' in window)){ voiceAfterSpeak(); return; }
  _voiceEndTimer=setInterval(()=>{
    if(!VOICE.open){ clearInterval(_voiceEndTimer); _voiceEndTimer=0; return; }
    if(!window.speechSynthesis.speaking && !window.speechSynthesis.pending){
      clearInterval(_voiceEndTimer); _voiceEndTimer=0; voiceAfterSpeak();
    }
  }, 220);
}
function voiceAfterSpeak(){
  _voiceSpoken='';
  if(!VOICE.open) return;
  if(VOICE.supported){ voiceStartListening(); }
  else { voiceSetPhase('idle'); voiceSetStatus('Type your reply...'); const ti=document.getElementById('voiceTypedInput'); if(ti) ti.focus(); }
}

function voiceTypedSubmit(e){
  e.preventDefault();
  const inp=document.getElementById('voiceTypedInput'); if(!inp) return;
  const t=inp.value.trim(); if(!t) return;
  inp.value='';
  voiceStopRecog();
  try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(_){}
  clearInterval(_voiceEndTimer); _voiceEndTimer=0;
  voiceSendTurn(t);
}

// ---- the animated listening orb (hand-drawn Canvas, no libraries) ----
function voiceOrbLoop(){
  const cv=document.getElementById('voiceOrb'); if(!cv){ return; }
  const ctx=cv.getContext('2d'); const W=cv.width, H=cv.height, cx=W/2, cy=H/2;
  const accent='#45c8a8', web='#85b7eb', warn='#e0a23c';
  const draw=(t)=>{
    if(!VOICE.open) return;
    let target = VOICE.phase==='listening' ? (0.45+0.4*Math.abs(Math.sin(t/220)))
               : VOICE.phase==='speaking' ? (0.55+0.45*Math.abs(Math.sin(t/120)*Math.sin(t/77)))
               : VOICE.phase==='thinking' ? 0.3 : 0.18;
    VOICE.level += (target - VOICE.level)*0.12;
    const lvl=VOICE.level;
    const col = VOICE.phase==='speaking'?web : VOICE.phase==='thinking'?warn : accent;
    ctx.clearRect(0,0,W,H);
    const baseR=78;
    const g=ctx.createRadialGradient(cx,cy,baseR*0.4,cx,cy,baseR*2.0);
    g.addColorStop(0, col+'33'); g.addColorStop(1, col+'00');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,baseR*2.0,0,Math.PI*2); ctx.fill();
    for(let k=0;k<3;k++){
      const ph=(t/900 + k/3)%1;
      ctx.beginPath();
      ctx.arc(cx,cy, baseR + ph*(60+50*lvl), 0, Math.PI*2);
      ctx.strokeStyle = col + Math.round((1-ph)*120).toString(16).padStart(2,'0');
      ctx.lineWidth=1.4; ctx.stroke();
    }
    ctx.beginPath();
    const N=72;
    for(let i=0;i<=N;i++){
      const a=(i/N)*Math.PI*2;
      const wob = Math.sin(a*3 + t/260)*4 + Math.sin(a*5 - t/190)*3*lvl + Math.sin(a*2+t/140)*2;
      const rr = baseR + wob + lvl*16;
      const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr;
      i? ctx.lineTo(x,y) : ctx.moveTo(x,y);
    }
    ctx.closePath();
    const cg=ctx.createRadialGradient(cx-18,cy-18,8,cx,cy,baseR+18);
    cg.addColorStop(0, col); cg.addColorStop(1, col+'22');
    ctx.fillStyle=cg; ctx.globalAlpha=0.92; ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.stroke();
    if(VOICE.phase==='listening' || VOICE.phase==='speaking'){
      const bars=14;
      ctx.strokeStyle='#04342c'; ctx.lineWidth=2.4; ctx.lineCap='round';
      for(let i=0;i<bars;i++){
        const bx=cx-(bars-1)*4 + i*8;
        const amp=(8+ Math.abs(Math.sin(t/120 + i*0.7))*22*(0.4+lvl));
        ctx.beginPath(); ctx.moveTo(bx, cy-amp/2); ctx.lineTo(bx, cy+amp/2); ctx.stroke();
      }
    } else if(VOICE.phase==='thinking'){
      ctx.fillStyle='#04342c';
      for(let i=0;i<3;i++){ const a=t/300+i*2.1; ctx.beginPath(); ctx.arc(cx+(i-1)*14, cy+Math.sin(a)*5, 3.2,0,Math.PI*2); ctx.fill(); }
    }
    VOICE.raf=requestAnimationFrame(draw);
  };
  VOICE.raf=requestAnimationFrame(draw);
}

function engramPrefs(){
  try{ return JSON.parse(localStorage.getItem('engram.ui')||'{}'); }catch(_){ return {}; }

function engramSavePrefs(p){

function applyEngramAppearance(){
  const p = engramPrefs(), root = document.documentElement;
  root.setAttribute('data-engram-theme', p.theme==='light' ? 'light' : 'dark');
  root.setAttribute('data-engram-tone', ['warm','navy'].includes(p.tone) ? p.tone : 'graphite');
  root.setAttribute('data-engram-density', p.density==='compact' ? 'compact' : 'comfortable');
  const base = ENGRAM_ACCENTS[p.accent] || ENGRAM_ACCENTS.teal;
  const a = (p.theme==='light' && base.light) ? base.light : base;
  root.style.setProperty('--accent', a.hex);
  root.style.setProperty('--accent-ink', a.ink);
  root.style.setProperty('--accent-soft', a.soft);
  root.style.setProperty('--ring', a.ring);
  root.style.setProperty('--glow', a.glow);
  // Reading comfort: chat column width, overall text size, and a motion kill-switch.
  root.style.setProperty('--feed-w', (parseInt(p.feedWidth,10)||720)+'px');
  root.setAttribute('data-engram-motion', p.reduceMotion ? 'reduced' : 'full');
  if(document.body) document.body.style.zoom = (p.uiZoom && p.uiZoom!=='100') ? String(parseInt(p.uiZoom,10)/100) : '';

// Parse the per-row env textarea (KEY=value lines) into an object.
function mcpEnvFromRow(r){
  const env={};
  (r.querySelector('.mcp-env')?.value||'').split('\n').forEach(line=>{
    const eq=line.indexOf('='); if(eq<1) return;
    const k=line.slice(0,eq).trim(); const v=line.slice(eq+1).trim();
    if(k) env[k]=v;

async function toggleDesktopNotify(box){

    let perm = Notification.permission;
    if(perm!=='granted'){ try{ perm = await Notification.requestPermission(); }catch(_){ } }
    if(perm!=='granted'){ box.checked=false; notify('Notification permission not granted'); p.desktopNotify=false; engramSavePrefs(p); return; }

    try{ new Notification('Engram', {body:'Desktop notifications are on.'}); }catch(_){}

    p.desktopNotify=false; engramSavePrefs(p); notify('Desktop notifications off','ok');

}

const TOUR_STEPS=[
  { sel:'#composer',   title:'Ask anything',                 body:'↵ sends a chat message. ⌘↵ turns the same words into a background task that can browse, run code, and write files.' },
  { sel:'#ctxChip',    title:'See what ships with a message', body:'Project scope, working memory, persona, pinned files - the exact context, inspectable before you send.' },

function engramMaybeTour(){
  if(tourSeen()) return;
  const ob=document.getElementById('onboard');
  if(ob && !ob.hidden) return;                 // the connect-a-model wizard goes first
  if(state.route!=='Chat') return;             // anchors live in the chat view
  // A hidden window has no reliable layout (and rAF is suspended) - anchoring now would strand the
  // spotlight on a stale rect. Wait for visibility, then let a frame settle before measuring.
  if(document.visibilityState!=='visible'){

    return;

function tourShow(i){
  tourHide();

  if(i>=TOUR_STEPS.length){ tourEnd(); return; }
  _tourI=i;
  const st=TOUR_STEPS[i], r=document.querySelector(st.sel).getBoundingClientRect(), pad=6;
  const ov=document.createElement('div'); ov.id='tour';
  ov.innerHTML=`

// ===== Composer attachments: add-context + file upload ============================
// Context the user pins to their next message. Each item is {kind:'file'|'url'|'memory',
// name, text, size, ref}. On send it becomes the request's `attachments` array, which the
// daemon prepends to the model context as a "The user attached:" system message.
// Module-level only; no top-level code that can throw. boot() already runs after this.
// IMPORTANT: `text` is data sent verbatim to the model -- it is NEVER HTML-escaped here.
// Escaping is applied only at render time (attachRenderPills) for innerHTML safety.
const ATTACH = { items: [] };
const ATTACH_MAX_TEXT = 200000; // 200KB of inlined text per file is plenty of context
function attachIsTextType(file){
  const n=(file.name||'').toLowerCase(), t=(file.type||'').toLowerCase();
  if(t.startsWith('text/')) return true;
  if(/^(application\/(json|xml|javascript|x-sh|x-yaml|toml)|application\/.*\+xml)$/.test(t)) return true;
  return /\.(txt|md|markdown|csv|tsv|log|json|ya?ml|toml|ini|cfg|conf|env|rs|py|js|ts|tsx|jsx|go|java|c|h|cpp|hpp|rb|php|html?|css|scss|sh|bash|zsh|sql|xml|svg|diff|patch|gitignore|dockerfile)$/.test(n)
    || /^(dockerfile|makefile|readme|license)$/.test(n);
}
function attachSvg(kind){
  const S=p=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  if(kind==='url') return S('<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>');
  if(kind==='memory') return S('<path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M12 12v9"/><path d="M12 12L4 7.5"/><path d="M12 12l8-4.5"/>');
  if(kind==='image') return S('<rect x="3" y="4" width="18" height="16" rx="2.4"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="m4 17 4.5-4.5a1.6 1.6 0 0 1 2.2 0L16 18"/><path d="m14 16 2-2a1.6 1.6 0 0 1 2.2 0L20 15.5"/>');
  if(kind==='pdf') return S('<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M8.5 13.5h1.2a1.3 1.3 0 0 1 0 2.6H8.5zM8.5 13.5v4M13 13.5v4h.9a1.6 2 0 0 0 0-4zM16.5 13.5H18M16.5 15.4h1.2M16.5 13.5v4"/>');
  if(kind==='doc') return S('<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M8.5 13h7M8.5 16h7M8.5 10h3"/>');
  if(kind==='sheet') return S('<rect x="4" y="4" width="16" height="16" rx="2.2"/><path d="M4 9.5h16M4 14.5h16M9.5 4.5v15M14.5 4.5v15"/>');
  if(kind==='code') return S('<rect x="3" y="4.5" width="18" height="15" rx="2.4"/><path d="m9 10-2.2 2 2.2 2M15 10l2.2 2-2.2 2M13 9.5l-2 5"/>');
  if(kind==='text') return S('<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M8.5 13h7M8.5 16h4"/>');
  return S('<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/>');
}
function attachFmtSize(n){
  if(n==null) return '';
  if(n<1024) return n+' B';
  if(n<1048576) return (n/1024).toFixed(n<10240?1:0)+' KB';
  return (n/1048576).toFixed(1)+' MB';
}
// Render the removable pills above the textarea. Always escape names/meta (innerHTML).
function attachRenderPills(){
  const box=document.getElementById('attachPills'); if(!box) return;
  const TYPE_LABEL={image:'image',pdf:'PDF',doc:'document',sheet:'spreadsheet',code:'code',text:'text',file:'file'};
  box.innerHTML = ATTACH.items.map((it,i)=>{
    // type-aware meta: documents that extracted show "PDF · read", images show "image", etc.
    let meta;
    if(it.kind==='memory') meta='memory';
    else if(it.kind==='url') meta='link';
    else { const lbl=TYPE_LABEL[it.ftype]||attachFmtSize(it.size); meta = it.extracted ? `${lbl} · read` : (it.busy?'reading…':lbl); }
    const ic = it.thumb ? `<span class="ap-ic ap-img"><img src="${escAttr(it.thumb)}" alt=""></span>` : `<span class="ap-ic">${attachSvg(it.kind==='file'?(it.ftype||'file'):it.kind)}</span>`;
    return `<span class="attach-pill kind-${esc(it.kind)} ft-${esc(it.ftype||'')} ${it.busy?'busy':''}" title="${escAttr(it.name)}">
      ${ic}
      <span class="ap-name">${esc(it.name)}</span>
      ${meta?`<span class="ap-meta">${esc(meta)}</span>`:''}
      <button class="ap-x" type="button" aria-label="Remove" title="Remove" onclick="attachRemove(${i})">&times;</button></span>`;
  }).join('');
  if(typeof ctxChipSync==='function') ctxChipSync();
}
function attachRemove(i){ ATTACH.items.splice(i,1); attachRenderPills(); }
function attachClear(){ ATTACH.items.length=0; attachRenderPills(); }
// Snapshot of the pinned context to send with a message; called from converseInline.
function attachTake(){
  if(!ATTACH.items.length) return [];
  const out = ATTACH.items.map(it=>({
    kind: it.kind, name: it.name,
    text: (it.text||'').slice(0, ATTACH_MAX_TEXT),
    size: it.size, ref: it.ref||null,
  }));
  attachClear();
  return out;
}

function attachPickFiles(){ attachCloseMenu(); const inp=document.getElementById('attachFileInput'); if(inp){ inp.value=''; inp.click(); } }
// Classify an upload so the pill, the icon, and the handling all match the file type.
function attachFileType(f){
  const n=(f.name||'').toLowerCase(), t=(f.type||'').toLowerCase();
  if(t.startsWith('image/')||/\.(png|jpe?g|gif|webp|bmp|svg|avif|heic)$/.test(n)) return 'image';
  if(t==='application/pdf'||/\.pdf$/.test(n)) return 'pdf';
  if(/\.(docx?|odt|rtf|pages)$/.test(n)) return 'doc';
  if(/\.(xlsx?|ods|csv|tsv|numbers)$/.test(n)) return 'sheet';
  if(attachIsTextType(f)) return /\.(rs|py|js|ts|tsx|jsx|go|java|c|h|cpp|hpp|rb|php|html?|css|scss|sh|bash|zsh|sql|json|ya?ml|toml|xml|swift|kt)$/.test(n)?'code':'text';
  return 'file';
}
async function attachOnFiles(input){
  const files = Array.from(input.files||[]); if(!files.length) return;
  for(const f of files){
    const ftype = attachFileType(f);
    if(ftype==='image'){
      // Image: show a thumbnail, upload to get a ref, and reference it so a vision-capable run can read it.
      const it={ kind:'file', ftype, name:f.name, size:f.size, text:'', busy:true };
      try{ it.thumb = await uplFileToDataUrl(f); }catch(_){}
      ATTACH.items.push(it); attachRenderPills();
      try{
        const b64 = await uplFileToBase64(f);
        const res = await J('/v1/upload',{method:'POST',headers:{'content-type':'application/json'},
          body:JSON.stringify({ name:f.name, content_b64:b64, mime:f.type||'image/png' })});
        it.ref = res.ref || f.name;
        it.text = `[Image attached: ${f.name} (${attachFmtSize(f.size)}), stored as ref ${it.ref}. Use the vision tool to analyze it if the question is about the image.]`;
      }catch(e){ it.text=`(image ${f.name} - upload failed: ${(e&&e.message)||'error'})`; notify('Upload failed: '+((e&&e.message)||f.name)); }
      finally { it.busy=false; attachRenderPills(); }
      continue;
    }
    if(attachIsTextType(f)){
      try{
        const text = await f.text();
        ATTACH.items.push({ kind:'file', ftype, name:f.name, size:f.size, text });
      }catch(_){ notify('Couldn\'t read '+f.name); }
      attachRenderPills();
    } else {
      // Binary doc (PDF/DOCX/XLSX/...) or other: upload; the server extracts text for known docs.
      const it={ kind:'file', ftype, name:f.name, size:f.size, text:'', busy:true };
      ATTACH.items.push(it); attachRenderPills();
      try{
        const b64 = await uplFileToBase64(f);
        const res = await J('/v1/upload',{method:'POST',headers:{'content-type':'application/json'},
          body:JSON.stringify({ name:f.name, content_b64:b64, mime:f.type||'application/octet-stream' })});
        it.ref = res.ref || res.path || f.name;
        // NOTE: raw text for the model context -- do NOT esc() here, only at render time.
        if(res.extracted_text && res.extracted_text.trim()){
          it.text = `Contents of ${f.name}:\n\n${res.extracted_text}`;
          it.extracted = true;
          it.chars = res.extracted_text.length;
        } else {
          it.text = `(binary file uploaded - ${attachFmtSize(f.size)}, ${f.type||'unknown type'}, ref ${it.ref})`;
        }
      }catch(e){
        it.text = `(binary file ${f.name} - could not be uploaded: ${(e&&e.message)||'error'})`;
        notify('Upload failed: '+((e&&e.message)||f.name));
      } finally { it.busy=false; attachRenderPills(); }
    }
  }
  input.value='';
}
// FileReader -> full data: URL (kept for image thumbnails).
function uplFileToDataUrl(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result||'')); r.onerror=()=>rej(new Error('read failed')); r.readAsDataURL(file); });
}
// FileReader -> bare base64 (strip the data: prefix) for the JSON upload endpoint.
function uplFileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{ const s=String(r.result||''); const i=s.indexOf(','); resolve(i>=0?s.slice(i+1):s); };
    r.onerror=()=>reject(new Error('read failed'));
    r.readAsDataURL(file);
  });
}
