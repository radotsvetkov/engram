    { cmd:'/verify',   t:'Re-walk and verify the signed ledger',  ic:I.Settings, arg:false,
      run:async()=>{ slashClear(); try{ const r=await J('/v1/ledger/verify'); notify(r.ok?('Ledger intact · '+(r.entries||0)+' entries signed'):'Ledger verification FAILED','ok'); }catch(e){ notify('Could not verify the ledger','err'); } } },
    { cmd:'/stop',     t:'Emergency-halt running agents',     ic:I.Settings, arg:false,
      run:()=>{ slashClear(); if(typeof toggleHalt==='function') toggleHalt(); else notify('Halt unavailable here','warn'); } },
    { cmd:'/help',     t:'List slash commands',               ic:I.Chat,     arg:false,
      run:()=>{ if(typeof notify==='function') notify('Commands: '+slashCommands().map(c=>c.cmd).join('  '),'ok'); slashClear(); } },
  ];
}
// Mission: decompose a goal into independent subtasks, run them in PARALLEL as real, signed board
// cards, then synthesize one answer. Surfaces the flagship /v1/mission multi-agent orchestration.
function openMission(goal){
  const ov=document.createElement('div'); ov.className='overlay ask';
  ov.innerHTML=`<div class="ask-card" style="width:min(640px,94vw)">
    <div class="ask-title">Run a mission</div>
    <div class="ask-msg">Engram breaks the goal into independent subtasks, runs them in parallel as real board cards, then synthesizes one cohesive answer. Every step is signed to the ledger.</div>
    <textarea class="ask-input" id="msnGoal" rows="3" placeholder="Goal - e.g. Research the top 3 Rust web frameworks and recommend one for a small team" style="resize:vertical;font:inherit;line-height:1.5">${esc(goal||'')}</textarea>
    <label class="msn-row"><span>Max parallel subtasks</span><input type="range" id="msnMax" min="1" max="6" value="4" oninput="document.getElementById('msnMaxV').textContent=this.value"><b id="msnMaxV">4</b></label>
    <div id="msnResult" class="msn-result" hidden></div>
    <div class="ask-actions"><button class="ask-ghost" onclick="this.closest('.overlay').remove()">Close</button><button class="ask-ok" id="msnGo" onclick="missionGo(this)">Run mission</button></div>
  </div>`;
  document.body.appendChild(ov); setTimeout(()=>{ const g=ov.querySelector('#msnGoal'); if(g) g.focus(); },20);
}
async function missionGo(btn){
  const ov=btn.closest('.overlay');
  const goal=ov.querySelector('#msnGoal').value.trim();
  const max=+ov.querySelector('#msnMax').value||4;
  if(!goal){ notify('Enter a goal first'); return; }
  const res=ov.querySelector('#msnResult');
  btn.disabled=true; btn.textContent='Running...';
  res.hidden=false; res.innerHTML=`<div class="msn-running">${thinkingDots} planning, then running subtasks in parallel...</div>`;
  try{
    const r=await J('/v1/mission',{method:'POST',headers:MIND_JSON,body:JSON.stringify({goal,max_subtasks:max})});
    const subs=(r.subtasks||[]).map(s=>`<details class="msn-sub"><summary>${esc(s.title)}</summary><div class="msn-sub-a">${mdToHtml(String(s.answer||''))}</div></details>`).join('');
    res.innerHTML=`<div class="msn-summary"><div class="msn-lbl">Synthesized result</div><div class="msg engram" style="max-width:none">${mdToHtml(String(r.summary||''))}</div></div>
      <div class="msn-subs"><div class="msn-lbl">${(r.subtasks||[]).length} subtask${(r.subtasks||[]).length===1?'':'s'} (now on the board)</div>${subs}</div>`;
    if(typeof loadTasks==='function') loadTasks();
  }catch(e){ res.innerHTML=`<div class="msn-err">Mission failed - ${esc((e&&e.message)||'error')}</div>`; }
  finally{ btn.disabled=false; btn.textContent='Run again'; }
}
function slashEl(){ return document.getElementById('slashMenu'); }
function slashOpen(){ const m=slashEl(); return !!(m && !m.hidden); }
function slashClear(){ const c=document.getElementById('composer'); if(c){ c.value=''; c.style.height='auto'; } slashHide(); }
function slashHide(){ const m=slashEl(); if(m){ m.hidden=true; m.innerHTML=''; } _slashItems=[]; _slashSel=0; }
// Decide whether the current textarea text should drive the menu. Returns the query token
// (the part after "/") when the menu should be open, or null to keep it closed.
function slashToken(val){
  if(!val || val[0]!=='/') return null;        // must START with "/"
  if(val.indexOf(' ') !== -1) return null;      // a space ends command-name typing -> close
  return val.slice(1);                          // text after the leading "/"
}
function slashSync(){
  const c=document.getElementById('composer'); if(!c){ slashHide(); return; }
  const tok = slashToken(c.value);
  if(tok===null){ slashHide(); return; }
  slashRender(tok);
}
function slashRender(token){
  const q=(token||'').toLowerCase();
  const all=slashCommands();
  _slashItems = q ? all.filter(c=>c.cmd.slice(1).toLowerCase().startsWith(q)) : all;
  _slashSel=0;
  const m=slashEl(); if(!m) return;
  if(!_slashItems.length){ m.hidden=false; m.innerHTML='<div class="slash-empty">no command matches</div>'; return; }
  let html='<div class="slash-hd">Commands</div>';
  _slashItems.forEach((c,i)=>{
    html += `<div class="slash-item ${i===0?'sel':''}" data-i="${i}"`
         +  ` onmousemove="slashHover(${i})" onmousedown="event.preventDefault()" onclick="slashRun(${i})">`
         +  `<span class="slash-ic">${c.ic||''}</span>`
         +  `<span class="slash-cmd">${esc(c.cmd)}</span>`
         +  `<span class="slash-t">${esc(c.t)}</span></div>`;
  });
  m.innerHTML=html; m.hidden=false;
}
function slashHover(i){ _slashSel=i; document.querySelectorAll('#slashMenu .slash-item').forEach(el=>el.classList.toggle('sel', +el.dataset.i===i)); }
function slashMove(d){
  if(!_slashItems.length) return;
  _slashSel=(_slashSel+d+_slashItems.length)%_slashItems.length;
  document.querySelectorAll('#slashMenu .slash-item').forEach(el=>el.classList.toggle('sel', +el.dataset.i===_slashSel));
  document.querySelector('#slashMenu .slash-item.sel')?.scrollIntoView({block:'nearest'});
}
function slashRun(i){
  const c=_slashItems[i]; if(!c) return;
  const ta=document.getElementById('composer');
  if(c.arg){
    // Complete to "/cmd " and keep typing the argument; Enter then runs it via slashTrySubmit.
    if(ta){ ta.value=c.cmd+' '; ta.focus(); ta.dispatchEvent(new Event('input',{bubbles:true})); }
    slashHide();
    return;
  }
  slashHide();
  try{ c.run(''); }catch(err){ if(typeof notify==='function') notify('Command failed','err'); }
}
// Called from the composer keydown handler. Returns true if it consumed the event (menu open).
// When it consumes, it ALSO stops propagation so the window-level keydown (palette/Esc/panel
// handlers) does not double-act on the same key - otherwise Esc would close the menu AND any
// open side panel/modal in one press.
function slashKeydown(e){
  if(!slashOpen()) return false;
  const k=(e.key||'').toLowerCase();
  const eat=()=>{ e.preventDefault(); e.stopPropagation(); };
  if(k==='arrowdown'){ eat(); slashMove(1); return true; }
  if(k==='arrowup'){ eat(); slashMove(-1); return true; }
  if(k==='escape'){ eat(); slashHide(); return true; }
  if(k==='tab'){ eat(); if(_slashItems.length) slashRun(_slashSel); return true; }
  if(k==='enter' && !e.shiftKey && !e.isComposing){
    if(!_slashItems.length){ slashHide(); return false; }  // nothing to pick -> fall through to send
    eat(); slashRun(_slashSel); return true;
  }
  return false;
}
// When the composer holds "/cmd <arg>" and the user presses Enter, run that command instead
// of sending raw text. Returns true if handled. Called from the composer Enter path.
function slashTrySubmit(){
  const c=document.getElementById('composer'); if(!c) return false;
  const v=c.value; if(!v || v[0]!=='/') return false;
  const sp=v.indexOf(' ');
  const name = sp===-1 ? v : v.slice(0,sp);
  const arg  = sp===-1 ? '' : v.slice(sp+1).trim();
  const cmd  = slashCommands().find(x=>x.cmd===name);
  if(!cmd) return false;
  slashHide();
  try{ cmd.run(arg); }catch(err){ if(typeof notify==='function') notify('Command failed','err'); }
  return true;
}
</script>
