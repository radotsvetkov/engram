<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Engram</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5.4' fill='%23181c20'/%3E%3Cg fill='none' stroke='%23eef2f0' stroke-width='1.55' stroke-linecap='round' stroke-linejoin='round' transform='translate(2.4 4) scale(.8)'%3E%3Cpath d='M12 9V5.5'/%3E%3Cpath d='M14.6 13.5 17.6 15.2'/%3E%3Cpath d='M9.4 13.5 6.4 15.2'/%3E%3Ccircle cx='12' cy='12' r='3'/%3E%3Ccircle cx='12' cy='3.9' r='1.6'/%3E%3Ccircle cx='5' cy='16' r='1.6'/%3E%3C/g%3E%3Cg transform='translate(2.4 4) scale(.8)'%3E%3Ccircle cx='12' cy='12' r='.95' fill='%23eef2f0'/%3E%3Ccircle cx='19' cy='16' r='1.6' fill='%2345c8a8'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root {
    /* surfaces - cooled graphite, monotonic luminance steps; the rail is the darkest, so the
       three columns separate without relying on a hairline. */
    --rail:#08090b; --surface-0:#0c0d10; --surface-1:#111316; --surface-2:#181b1f; --surface-3:#21242a;
    --border:rgba(255,255,255,.10); --border-strong:rgba(255,255,255,.15);
    --border-hi:inset 0 1px 0 rgba(255,255,255,.05);
    --text-primary:#e8e9ec; --text-secondary:#b6bac4; --text-muted:#888d97;
    --accent:#45c8a8; --accent-ink:#04342c; --accent-soft:rgba(69,200,168,.16); --ring:rgba(69,200,168,.5);
    --glow:drop-shadow(0 0 6px rgba(69,200,168,.45));
    --hover:rgba(255,255,255,.045); --active:rgba(255,255,255,.075);
    --warning:#e0a23c; --danger:#e2675f;
    --web:#85b7eb; --web-bg:#101a24; --files:#ef9f27; --files-bg:#1a1812;
    /* elevation - deep, soft, top-lit */
    --e1:0 1px 2px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
    --e2:0 2px 8px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    --e3:0 8px 28px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    --e4:0 24px 70px rgba(0,0,0,.62), 0 2px 8px rgba(0,0,0,.4);
    --r-chip:7px; --r-card:12px; --r-modal:16px; --radius:8px;
    /* motion - calm and physical */
    --ease-out:cubic-bezier(.22,.61,.36,1); --ease-spring:cubic-bezier(.34,1.4,.5,1); --ease-inout:cubic-bezier(.65,0,.35,1);
    --dur-1:90ms; --dur-2:160ms; --dur-3:260ms; --dur-4:420ms;
    --font-voice:Georgia, 'Times New Roman', serif;
    --sans:-apple-system,'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden; }
  body { background:var(--surface-0); color:var(--text-primary); font:13px/1.5 var(--sans);
    -webkit-font-smoothing:antialiased; }
  button,input,textarea { font:inherit; color:inherit; }
  ::placeholder { color:var(--text-muted); }
  /* Thin, subtle, edge scrollbars: transparent track, slim faint thumb that darkens
     on hover, inset via a transparent border so it reads as a hairline, not a heavy bar. */
  ::-webkit-scrollbar { width:9px; height:9px; }
  ::-webkit-scrollbar-track { background:transparent; }
  /* Always visible but subtle (so it can be SEEN); brightens while scrolling (JS adds .sb-show to the
     scrolled element, removed ~0.9s after it stops) or on hover. ~5px thumb in a 9px track. */
  ::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:8px; border:2px solid transparent; background-clip:padding-box; min-height:28px; }
  .sb-show::-webkit-scrollbar-thumb, :hover::-webkit-scrollbar-thumb { background:var(--text-muted); }
  ::-webkit-scrollbar-thumb:hover { background:var(--text-secondary); }
  ::-webkit-scrollbar-corner { background:transparent; }
  * { scrollbar-width:thin; scrollbar-color:var(--border-strong) transparent; }

  /* grid-template-rows:minmax(0,1fr) bounds the row to the app height so a tall view (e.g. the
     Activity ledger) scrolls INSIDE .view instead of growing the grid and spilling over the
     statusbar. The 28px reserve matches the statusbar's exact height so nothing overflows. */
  .app { display:grid; grid-template-columns:56px 252px 1fr; grid-template-rows:minmax(0,1fr); height:calc(100vh - 28px); overflow:hidden; }

  /* Rail */
  .rail { background:var(--rail); display:flex; flex-direction:column; padding:14px 8px; }
  .brand { display:flex; align-items:center; gap:8px; padding:4px 8px 14px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); }
  .brand .mark { display:flex; color:var(--text-primary); }
  .brand .mark svg { width:21px; height:21px; }
  .brand b { font-weight:600; }
  .nav { display:flex; flex-direction:column; gap:2px; }
  .nav a { position:relative; display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:var(--radius);
    color:var(--text-secondary); cursor:pointer; text-decoration:none; }
  .nav a:hover { background:var(--hover); color:var(--text-primary); }
  .nav a.active { background:var(--active); color:var(--text-primary); }
  .nav a.active::before { content:''; position:absolute; left:-8px; top:50%; transform:translateY(-50%); width:3px; height:18px;
    background:var(--accent); border-radius:0 3px 3px 0; box-shadow:0 0 8px rgba(69,200,168,.5); }
  .nav a svg { width:16px; height:16px; opacity:.6; transition:opacity .15s, color .15s, filter .15s; }
  .nav a:hover svg { opacity:.9; }
  .nav a.active svg { opacity:1; color:var(--accent); filter:var(--glow); }
  .rail .spacer { flex:1; }
  .nav.tools::before { content:''; display:block; height:1px; background:var(--border); margin:0 7px 8px; }
  .status { font-size:11px; color:var(--text-muted); padding:8px; line-height:1.4; }
  .status .live { color:var(--accent); }

  /* Main */
  .main { display:flex; flex-direction:column; min-width:0; min-height:0; }
  .topbar { height:44px; flex:none; display:flex; align-items:center; gap:10px; padding:0 16px;
    border-bottom:1px solid var(--border); }
  .topbar h1 { font-size:15px; font-weight:500; margin:0; }
  .topbar .right { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .chip { font-size:12px; color:var(--text-secondary); background:var(--surface-2);
    border:1px solid var(--border); border-radius:var(--radius); padding:4px 9px; cursor:default; transition:color .4s; }
  .chip.ok b { color:var(--accent); font-weight:500; }
  .chip.bad { color:var(--danger); border-color:rgba(226,103,95,.4); }
  .stopbtn { display:inline-flex; align-items:center; gap:5px; background:var(--surface-2); color:var(--text-secondary);
    border:1px solid var(--border); border-radius:var(--radius); padding:4px 9px; font-size:12px; cursor:pointer; transition:.15s; }
  .stopbtn:hover { color:var(--danger); border-color:rgba(226,103,95,.45); background:rgba(226,103,95,.08); }
  .stopbtn svg { width:13px; height:13px; }
  .banner { background:rgba(226,103,95,.12); color:var(--danger); border-bottom:1px solid rgba(226,103,95,.3);
    padding:8px 16px; font-size:12px; }
  .offline { background:rgba(224,162,60,.1); color:var(--warning); border-bottom:1px solid rgba(224,162,60,.25);
    padding:7px 16px; font-size:12px; }
  .view { flex:1; min-height:0; overflow:auto; }

  /* Composer */
  .composer { background:var(--surface-1); border:1px solid var(--border-strong); border-radius:14px; padding:11px 13px;
    transition:border-color .16s, box-shadow .16s; }
  .composer:focus-within { border-color:rgba(69,200,168,.4); box-shadow:0 0 0 3px var(--accent-soft); }
  .composer textarea { width:100%; background:none; border:none; resize:none; outline:none; min-height:22px; max-height:160px; }
  .composer .hint { display:flex; align-items:center; margin-top:7px; gap:10px; }
  .composer .hint small { color:var(--text-muted); font-size:11px; display:inline-flex; align-items:center; gap:5px; }
  .composer .hint small kbd { font:10px var(--mono); background:var(--surface-2); border:1px solid var(--border); border-radius:4px; padding:1px 5px; color:var(--text-secondary); }
  .composer .comp-actions { margin-left:auto; display:flex; align-items:center; gap:7px; }
  .composer .send { background:var(--accent); color:var(--accent-ink); border:none;
    border-radius:20px; padding:6px 15px; font-weight:600; font-size:12px; cursor:pointer; transition:filter .15s, transform .1s; }
  .composer .send:active { transform:translateY(1px); }
  .composer .send:hover { filter:brightness(1.06); }
  .composer .send.is-stop { background:#c0533f; color:#fff; }
  .composer .send.is-stop:hover { filter:brightness(1.08); }
  .composer .send.send-icon { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; padding:0; border-radius:50%; }
  .composer .send.send-icon:disabled { opacity:.4; cursor:default; }

  /* Board */
  .board-wrap { display:flex; flex-direction:column; height:100%; }
  .board { flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:16px; overflow:auto; }
  .col { background:var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:10px;
    display:flex; flex-direction:column; gap:8px; min-height:0; }
  .col { transition:background var(--dur-1) var(--ease-out), box-shadow var(--dur-1) var(--ease-out), border-color var(--dur-1) var(--ease-out); }
  .col.drop-target { border-color:transparent; background:var(--accent-soft); box-shadow:inset 0 0 0 1.5px rgba(69,200,168,.45); }
  .col.drop-target h3, .col.drop-target h3 span { color:var(--accent); }
  .card { cursor:grab; }
  .card:active { cursor:grabbing; }
  .card.card-hidden { display:none; }                      /* original hides; the slot shows the landing spot */
  .card.card-slot { background:var(--accent-soft); border:1.5px dashed color-mix(in srgb, var(--accent) 45%, transparent);
    box-shadow:none; cursor:default; padding:0; transition:height var(--dur-1) var(--ease-out); }
  .col[data-col] .card.card-slot::before { display:none; }
  .card-ghost { position:fixed; left:0; top:0; z-index:300; margin:0; pointer-events:none;
    background:var(--surface-3); box-shadow:var(--e4); transform:rotate(2deg) scale(1.03);
    cursor:grabbing; will-change:left,top; }
  body.dragging-active { cursor:grabbing; user-select:none; }
  .card.just-dropped { animation:drop-in .4s var(--ease-out); }
  @keyframes drop-in { 0% { transform:scale(.95); box-shadow:0 0 0 2px var(--accent), var(--e2); } 100% { transform:scale(1); } }
  .rcpt-chip { margin-left:auto; display:inline-flex; align-items:center; gap:3px; font:11px var(--mono); color:var(--text-secondary);
    background:var(--surface-1); border:1px solid var(--border-strong); border-radius:6px; padding:1px 7px; cursor:pointer; transition:.12s; }
  .rcpt-chip:hover { border-color:var(--ring); color:var(--accent); }
  .col h3 { margin:2px 4px 6px; font-size:12px; color:var(--text-secondary); font-weight:500;
    text-transform:uppercase; letter-spacing:.06em; display:flex; gap:6px; }
  .col h3 span { color:var(--text-muted); }
  .cards { display:flex; flex-direction:column; gap:8px; overflow:auto; }
  .card { background:var(--surface-2); border:1px solid var(--border-strong); border-radius:var(--r-card); padding:11px 12px; cursor:pointer; box-shadow:var(--e1); }
  .card:hover { background:var(--surface-3); box-shadow:var(--e2); }
  .card.running { box-shadow:var(--e2), 0 0 0 1px var(--accent), 0 0 18px -4px rgba(69,200,168,.5); }
  .card.failed { border-left:3px solid var(--danger); }
  .card .t { line-height:1.35; }
  .card .meta { display:flex; gap:6px; align-items:center; margin-top:8px; flex-wrap:wrap; font-size:11px; color:var(--text-muted); }
  .tag { font-size:11px; padding:1px 6px; border-radius:6px; }
  .tag.web { color:var(--web); background:var(--web-bg); } .tag.files { color:var(--files); background:var(--files-bg); }
  .tag.browser { color:var(--web); background:var(--web-bg); } .tag.shell { color:var(--files); background:var(--files-bg); }
  /* Kanban polish: defined lanes, count-pill headers, a column-keyed status rail on each card, and a
     dashed empty-state placeholder so a 0-card column reads as "drop here", not dead space. */
  .board { padding:18px; gap:14px; }
  .col { border-radius:14px; padding:12px 11px; }
  .col h3 { margin:2px 4px 11px; font-size:11px; letter-spacing:.05em; align-items:center; gap:8px; }
  .col h3 span { color:var(--text-secondary); background:var(--surface-3); border:1px solid var(--border); border-radius:20px; padding:1px 8px; font-size:10.5px; font-weight:600; min-width:20px; text-align:center; line-height:1.5; }
  .cards { gap:9px; }
  .cards:empty::after { content:'Drop a card here'; display:flex; align-items:center; justify-content:center; min-height:74px; color:var(--text-muted); opacity:.55; font-size:12px; border:1.5px dashed var(--border); border-radius:11px; margin-top:2px; }
  .card { border-radius:12px; padding:12px 13px 12px 16px; position:relative;
    transition:transform var(--dur-1) var(--ease-out), box-shadow var(--dur-1) var(--ease-out), border-color var(--dur-1) var(--ease-out), background var(--dur-1) var(--ease-out); }
  .card:hover { transform:translateY(-1px); border-color:var(--border-strong); }
  body.dragging-active .card { transition:none; }            /* don't fight the drag ghost */
  .card .t { font-size:13.5px; font-weight:500; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .col[data-col] .card::before { content:''; position:absolute; left:0; top:11px; bottom:11px; width:2.5px; border-radius:2px; background:var(--border-strong); }
  /* One-click Run on a queued card - appears on hover, doesn't join the drag. */
  .card-run { position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:8px; display:inline-flex;
    align-items:center; justify-content:center; background:var(--surface-3); border:1px solid var(--border);
    color:var(--text-secondary); cursor:pointer; opacity:0; transition:opacity var(--dur-2) var(--ease-out), background var(--dur-1), color var(--dur-1), border-color var(--dur-1); }
  .card:hover .card-run, .card-run:focus-visible { opacity:1; }
  .card-run:hover { background:var(--accent); color:var(--accent-ink); border-color:transparent; }
  .card-run.card-stop:hover { background:var(--danger); color:#fff; }
  .card-run svg { width:13px; height:13px; margin-left:1px; }
  .col[data-col="doing"] .card::before { background:var(--accent); }
  .col[data-col="done"] .card::before { background:var(--text-muted); opacity:.5; }
  .pulse { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .bar { height:3px; border-radius:3px; background:linear-gradient(90deg,transparent,var(--accent),transparent);
    background-size:200% 100%; animation:shimmer 1.4s linear infinite; margin-top:8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .check { color:var(--accent); } .xmark { color:var(--danger); }
  .empty { text-align:center; color:var(--text-muted); padding:48px 16px; }
  .empty b { color:var(--text-secondary); font-weight:500; display:block; margin-bottom:12px; font-size:15px; }
  .empty .se-glyph svg { width:34px; height:34px; }
  .empty .empty-sub { font-size:12.5px; line-height:1.55; max-width:400px; margin:-4px auto 14px; }
  .examplechips { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .examplechips button { background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary);
    border-radius:16px; padding:5px 12px; cursor:pointer; transition:border-color var(--dur-1) var(--ease-out), color var(--dur-1), background var(--dur-1); }
  .examplechips button:hover { border-color:var(--ring); color:var(--text-primary); background:var(--surface-3); }

  /* Detail panel */
  /* Wide enough to READ a run's answer (tables, code) - 340px squeezed real results into a strip. */
  .panel { position:fixed; top:0; right:0; width:min(520px,94vw); height:100vh; background:var(--surface-1);
    border-left:1px solid var(--border-strong); transform:translateX(100%); transition:transform .2s ease-out;
    display:flex; flex-direction:column; z-index:20; }
  .panel.open { transform:translateX(0); }
  .panel header { display:flex; align-items:center; gap:8px; padding:14px; border-bottom:1px solid var(--border); }
  .panel header .x { margin-left:auto; cursor:pointer; color:var(--text-muted); background:none; border:none; font-size:16px; transition:color var(--dur-1); }
  .panel header .x:hover { color:var(--text-primary); }
  .panel .body { flex:1; overflow:auto; padding:14px; }
  .pill { font-size:11px; padding:2px 8px; border-radius:6px; background:var(--surface-2); color:var(--text-secondary); }
  .pill.done { color:var(--accent); } .pill.failed { color:var(--danger); } .pill.doing { color:var(--accent); }
  .approval { background:rgba(224,162,60,.1); border:1px solid rgba(224,162,60,.35); border-radius:10px; padding:11px 12px; margin-bottom:14px; }
  .approval b { color:var(--warning); }
  .approval button { background:var(--accent); color:var(--accent-ink); border:none; border-radius:6px; padding:6px 12px; font-weight:500; cursor:pointer; }
  .approval button.ghost { background:var(--surface-2); color:var(--text-secondary); }
  .answer { margin:14px 0; }
  .answer.msg.engram { font-size:13.5px; line-height:1.62; max-width:none; align-self:auto; }
  .artifact-grid { display:flex; flex-wrap:wrap; gap:9px; }
  .artifact { display:flex; flex-direction:column; gap:5px; width:104px; text-decoration:none; color:var(--text-secondary);
    border:1px solid var(--border-strong); border-radius:10px; padding:7px; background:var(--surface-2); transition:border-color .12s, background .12s; }
  .artifact:hover { border-color:var(--accent-soft); background:var(--surface-3); color:var(--text); }
  .artifact img { width:100%; height:74px; object-fit:cover; border-radius:6px; background:var(--surface); display:block; }
  .artifact.file { align-items:center; justify-content:center; min-height:90px; }
  .artifact .aicon { font-size:26px; line-height:1; opacity:.7; }
  .artifact .aname { font-size:10.5px; line-height:1.25; word-break:break-word; text-align:center; max-height:26px; overflow:hidden; }
  .step { padding:8px 0; border-bottom:1px solid var(--border); }
  .step .top { display:flex; gap:8px; align-items:center; }
  .step .verb { flex:1; } .step .stamp { font-family:var(--mono); font-size:11px; color:var(--text-muted); cursor:pointer; }
  .step.bad .verb { color:var(--danger); }
  .step .obs { margin-top:6px; font-size:12px; color:var(--text-secondary); white-space:pre-wrap;
    background:var(--surface-2); border-radius:6px; padding:8px; max-height:160px; overflow:auto; }
  /* live run - watch the agent work */
  .liverun { display:flex; flex-direction:column; gap:10px; }
  .lr-head { display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; color:var(--text-primary); }
  .lr-meter { margin-left:auto; font:11px var(--mono); font-weight:400; color:var(--text-muted); white-space:nowrap; }
  .lr-steps { display:flex; flex-direction:column; }
  .lr-step { animation:lr-in .26s var(--ease-out); }
  @keyframes lr-in { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
  .lr-step .lr-n { width:18px; height:18px; flex:none; display:inline-flex; align-items:center; justify-content:center;
    font:11px var(--mono); color:var(--text-muted); background:var(--surface-2); border:1px solid var(--border); border-radius:50%; }
  .lr-step .lr-ok { font-size:12px; color:var(--accent); }
  .lr-step.bad .lr-ok { color:var(--danger); }
  .lr-none { font-size:12px; color:var(--text-muted); padding:6px 0; }
  .lr-answer:not(:empty) { margin-top:6px; padding-top:12px; border-top:1px solid var(--border); font-size:14px; line-height:1.6; color:var(--text-primary); }
  /* activity - the signed ledger */
  /* No inner scroll: the full-width .view scrolls, so the scrollbar sits at the window's right edge
     (not inset at the right of this centered column). Content stays centered via max-width + auto. */
  .activity { max-width:840px; margin:0 auto; padding:22px 24px 60px; }
  .artifacts-view { max-width:980px; margin:0 auto; padding:22px 24px 60px; }
  .af-bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:4px 0 18px; }
  /* Sticky toolbars: on long lists the search/filters pin to the top of the scroller, so finding
     and filtering never means scrolling back up. SOLID surface + full-bleed over the view's side
     padding + a hairline: the earlier translucent blur let content ghost through and cards peek
     past the bar's edges - it read as broken, not layered. */
  .af-bar, .act-controls, .sk-filter, .sched-stick { position:sticky; top:0; z-index:12;
    background:var(--surface-0); border-bottom:1px solid var(--border); }
  .sk-filter   { margin:0 -30px 16px; padding:14px 30px 12px; }
  .af-bar      { margin:0 -24px 18px; padding:14px 24px 12px; }
  /* typed document tiles: a coloured glyph on its type's soft field + an extension badge */
  .af-thumb.fileic { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
  .af-thumb .af-glyph { width:34px; height:34px; opacity:.9; }
  .af-thumb .af-ext { font:600 9.5px var(--mono); letter-spacing:.08em; border:1px solid currentColor; border-radius:5px; padding:2px 7px; opacity:.85; }

  /* Generic chat/list */
  /* Full-width column so the feed's scrollbar reaches the window's right edge; the 720px reading
     column is recreated with symmetric auto side-padding on the feed + matching composer margins. */
  .chat { display:flex; flex-direction:column; height:100%; min-height:0; position:relative; }
  /* Only the feed scrolls in chat — stop .view from showing a second scrollbar behind it. */
  .view:has(.chat-shell) { overflow:hidden; }
  /* The feed is the ONLY scroll region in chat: flex:1 + min-height:0 lets it shrink below its
     content (a flex child defaults to min-height:auto, which floors it at content height and makes
     the whole .chat overflow -> .view scrolls feed+composer together, the "everything scrolls" bug).
     overscroll-behavior:contain stops a feed scroll from chaining out to the page. */
  .feed { flex:1 1 0; min-height:0; overflow-y:auto; overflow-x:hidden; overscroll-behavior:contain; display:flex; flex-direction:column; gap:14px; padding:24px max(16px, calc((100% - var(--feed-w,720px)) / 2)) 14px;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 26px, #000 calc(100% - 22px), transparent 100%);
    mask-image:linear-gradient(to bottom, transparent 0, #000 26px, #000 calc(100% - 22px), transparent 100%); }
  .chat > .composer { margin:0 max(16px, calc((100% - var(--feed-w,720px)) / 2)) 24px; }
  /* Jump-to-latest: a floating round button above the composer, shown only when scrolled up. */
  .jump-bottom { position:absolute; right:max(18px, calc((100% - var(--feed-w,720px)) / 2)); bottom:140px; z-index:7;
    width:34px; height:34px; border-radius:50%; background:var(--surface-2); border:1px solid var(--border-strong);
    color:var(--text-secondary); display:none; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:var(--e2,0 4px 14px rgba(0,0,0,.3)); opacity:0; transform:translateY(6px); transition:opacity .15s, transform .15s, color .12s, border-color .12s; }
  .jump-bottom.show { display:flex; opacity:1; transform:translateY(0); }
  .jump-bottom:hover { color:var(--text-primary); border-color:var(--ring); }
  .jump-bottom svg { width:18px; height:18px; }
  /* Loading state while waiting on the model: the Engram mark spins one turn CW then one turn CCW on
     repeat, a green dot blinks, and a live seconds counter ticks. All motion stops when the run ends
     (the element is replaced by the answer), so nothing animates at rest. */
  .cthinking { display:inline-flex; align-items:center; gap:9px; padding:5px 0; color:var(--text-secondary); font-size:13px; }
  .cthinking .ct-mark { width:21px; height:21px; flex:none; display:inline-flex; color:var(--text-secondary); animation:engram-spin 2.6s ease-in-out infinite; }
  .cthinking .ct-mark svg { width:100%; height:100%; }
  .cthinking .ct-dot { width:7px; height:7px; flex:none; border-radius:50%; background:#45c8a8; box-shadow:0 0 8px #45c8a8; animation:ct-blink 1.05s ease-in-out infinite; }
  .cthinking .ct-label { font-weight:500; }
  .cthinking .ct-secs { color:var(--text-muted); font:11px/1 var(--mono); }
  .cthinking .ct-hint { color:var(--text-muted); font-size:11px; opacity:.7; font-style:italic; }
  /* the persistent run footer sits just under the in-flight reply, set apart with a hairline */
  .cthinking.ct-foot { margin-top:8px; padding-top:9px; border-top:1px solid var(--border); width:100%; }
  @keyframes engram-spin { 0%{transform:rotate(0deg)} 50%{transform:rotate(360deg)} 100%{transform:rotate(0deg)} }
  @keyframes ct-blink { 0%,100%{opacity:1} 50%{opacity:.22} }
  /* Activity fold: the run's whole working trail (narration + tool steps + screenshots) lives in ONE
     calm, collapsible block above the answer — live and open while the agent works, folded into a
     one-line summary ("Worked for 43s · 8 steps") once the answer lands, so long agentic runs never
     bury the reply under a wall of chips. */
  .act-fold { border:1px solid var(--border); border-radius:11px; background:var(--surface-1); margin:0 0 10px; overflow:hidden; max-width:72ch; }
  .act-fold.live { border-color:rgba(69,200,168,.30); box-shadow:0 0 14px -8px rgba(69,200,168,.5); }
  .af-head { display:flex; align-items:center; gap:9px; width:100%; padding:8px 12px; background:none; border:none;
    color:var(--text-secondary); font-size:12.5px; text-align:left; font-family:inherit; }
  button.af-head { cursor:pointer; transition:background var(--dur-1) var(--ease-out), color var(--dur-1) var(--ease-out); }
  button.af-head:hover { background:var(--hover); color:var(--text-primary); }
  .af-head .ct-mark { width:18px; height:18px; }
  .af-title { font-weight:500; color:var(--text-primary); }
  .af-count { color:var(--text-muted); font-size:11.5px; }
  .af-now { color:var(--text-muted); font-size:11.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; flex:1; font-style:italic; }
  .af-ic { flex:none; font-size:11px; width:16px; text-align:center; }
  .af-ic.ok { color:var(--accent); } .af-ic.bad { color:var(--danger); }
  .af-badn { color:var(--warning); font-size:11.5px; }
  .af-chev { margin-left:auto; flex:none; color:var(--text-muted); display:inline-flex; transition:transform var(--dur-2) var(--ease-out); }
  .af-chev svg { width:13px; height:13px; }
  .act-fold.open .af-chev { transform:rotate(180deg); }
  .af-body { display:none; padding:9px 12px 10px; border-top:1px solid var(--border); }
  .act-fold.open .af-body { display:block; }
  .af-body .chat-steps { margin:0; } .af-body .chat-notes { margin:0 0 7px; }
  /* Message hover actions: quiet, only on hover, never shift layout (copy/retry affordances). */
  .turn { position:relative; }
  .turn.t-user { display:flex; flex-direction:column; align-items:flex-end; }
  .turn-acts { display:flex; align-items:center; gap:2px; margin-top:2px; height:22px;
    opacity:0; transition:opacity var(--dur-2) var(--ease-out); }
  .turn:hover .turn-acts, .turn:focus-within .turn-acts { opacity:1; }
  .turn-acts button { display:inline-flex; align-items:center; gap:4px; background:none; border:none; border-radius:6px;
    color:var(--text-muted); font-size:11px; padding:3px 7px; cursor:pointer; transition:background var(--dur-1), color var(--dur-1); }
  .turn-acts button:hover { background:var(--hover); color:var(--text-primary); }
  .turn-acts button svg { width:13px; height:13px; }
  .turn-acts button.done { color:var(--accent); }
  .turn-acts .turn-when { font-size:10.5px; color:var(--text-muted); opacity:.7; padding:0 5px; cursor:default; }
  /* Context chip: shows what ships with the next message (scope, working memory, pins, files) —
     click for the exact breakdown. The "glass box" applied to the prompt itself. */
  .ctx-wrap { position:relative; display:inline-flex; }
  .ctx-chip { display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); border:1px solid var(--border);
    border-radius:9px; padding:4px 10px; font-size:11.5px; color:var(--text-secondary); cursor:pointer;
    transition:border-color var(--dur-1) var(--ease-out), color var(--dur-1) var(--ease-out), background var(--dur-1) var(--ease-out); }
  .ctx-chip:hover { border-color:var(--border-strong); color:var(--text-primary); background:var(--surface-3); }
  .ctx-chip .cx-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px rgba(69,200,168,.5); flex:none; }
  .ctx-chip .cx-n { color:var(--text-muted); font:10.5px var(--mono); }
  .ctx-pop { position:absolute; bottom:calc(100% + 8px); left:0; z-index:40; width:340px; background:var(--surface-2);
    border:1px solid var(--border-strong); border-radius:12px; box-shadow:var(--e3); padding:6px; animation:menuIn .14s var(--ease-out); }
  .ctx-pop .cx-h { font-size:10.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; padding:7px 9px 3px; }
  .ctx-row { display:flex; align-items:flex-start; gap:9px; padding:7px 9px; border-radius:8px; font-size:12.5px; color:var(--text-secondary); }
  .ctx-row.clk { cursor:pointer; } .ctx-row.clk:hover { background:var(--hover); color:var(--text-primary); }
  .ctx-row .cx-ic { flex:none; width:15px; height:15px; color:var(--text-muted); margin-top:1px; }
  .ctx-row .cx-ic svg { width:15px; height:15px; }
  .ctx-row b { font-weight:500; color:var(--text-primary); }
  .ctx-row .cx-sub { display:block; font-size:11.5px; color:var(--text-muted); margin-top:1px; line-height:1.45; }
  .ctx-row .cx-badge { margin-left:auto; flex:none; font:10.5px var(--mono); color:var(--text-muted); background:var(--surface-3); border:1px solid var(--border); border-radius:5px; padding:1px 6px; }
  .ctx-foot { border-top:1px solid var(--border); margin-top:5px; padding:8px 9px 4px; font-size:11px; color:var(--text-muted); line-height:1.5; }
  @keyframes menuIn { from { opacity:0; transform:translateY(5px) scale(.985); } to { opacity:1; transform:none; } }
  /* First-run tour: spotlight ring + coach card. Non-blocking - only the card takes pointer events. */
  #tour { position:fixed; inset:0; z-index:209; pointer-events:none; }
  .tour-hole { position:fixed; border-radius:12px; box-shadow:0 0 0 9999px rgba(5,7,9,.62), 0 0 0 1.5px var(--ring); }
  .tour-card { position:fixed; width:310px; background:var(--surface-2); border:1px solid var(--border-strong);
    border-radius:13px; box-shadow:var(--e4); padding:14px 15px 11px; pointer-events:auto; animation:menuIn .16s var(--ease-out); }
  .tour-t { font-weight:600; font-size:13.5px; margin-bottom:5px; }
  .tour-b { font-size:12.5px; color:var(--text-secondary); line-height:1.55; }
  .tour-f { display:flex; align-items:center; gap:8px; margin-top:11px; }
  .tour-dots { display:inline-flex; gap:4px; margin-right:auto; }
  .tour-dots i { width:5px; height:5px; border-radius:50%; background:var(--border-strong); }
  .tour-dots i.on { background:var(--accent); }
  .tour-skip { background:none; border:none; color:var(--text-muted); font-size:12px; cursor:pointer; padding:5px 8px; border-radius:6px; }
  .tour-skip:hover { color:var(--text-primary); background:var(--hover); }
  .tour-next { background:var(--accent); color:var(--accent-ink); border:none; border-radius:7px; padding:5px 13px; font-weight:600; font-size:12px; cursor:pointer; }
  .tour-next:hover { filter:brightness(1.06); }
  /* Follow-ups typed while a run is busy: queued below the feed, sent when the run finishes. */
  .queued-strip { display:flex; flex-direction:column; gap:6px; padding:6px max(18px, calc((100% - var(--feed-w,720px)) / 2)) 0; }
  .queued-msg { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary);
    background:var(--surface-2); border:1px dashed var(--border); border-radius:9px; padding:6px 10px; }
  .queued-msg .q-dot { flex:none; font-size:12px; opacity:.8; }
  .queued-msg .q-txt { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .queued-msg .q-x { flex:none; background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px; padding:0 2px; }
  .queued-msg .q-x:hover { color:var(--danger); }
  /* Sidebar: a blinking green dot on a chat that's still being worked on; nothing once it's done. */
  .ses-busy { width:7px; height:7px; flex:none; border-radius:50%; background:#45c8a8; box-shadow:0 0 6px #45c8a8; animation:ct-blink 1s ease-in-out infinite; margin-right:1px; }
  /* Pin the composer: never let it shrink or scroll away when the feed fills. */
  .chat > .composer { flex:0 0 auto; }
  /* One reading size for the whole thread (user + assistant); long unbroken strings (URLs,
     hashes, file paths) wrap instead of overflowing the bubble/column. */
  .msg.user { align-self:flex-end; background:var(--surface-2); border:1px solid var(--border); border-radius:13px 13px 4px 13px; padding:10px 14px; max-width:78%; font-size:14.5px; line-height:1.55; white-space:pre-wrap; overflow-wrap:anywhere; }
  .msg.engram { font-family:var(--sans); font-size:14.5px; line-height:1.65; max-width:72ch; color:var(--text-primary); overflow-wrap:anywhere; }
  .msg.engram del { color:var(--text-muted); }
  .msg.engram .md-list li.task { list-style:none; margin-left:-16px; }
  .msg.engram .md-task { color:var(--text-muted); margin-right:2px; }
  .msg.engram .md-task.done { color:var(--accent); }
  /* rendered markdown in replies */
  .msg.engram > :first-child { margin-top:0; } .msg.engram > :last-child { margin-bottom:0; }
  .msg.engram p { margin:0 0 11px; }
  .msg.engram .md-h { font-weight:600; margin:16px 0 8px; line-height:1.3; }
  .msg.engram .md-h1 { font-size:19px; } .msg.engram .md-h2 { font-size:16px; } .msg.engram .md-h3 { font-size:14.5px; } .msg.engram .md-h4 { font-size:13px; color:var(--text-secondary); }
  .msg.engram .md-list { margin:0 0 11px; padding-left:22px; } .msg.engram .md-list li { margin:3px 0; }
  .msg.engram blockquote { margin:0 0 11px; padding:2px 0 2px 14px; border-left:2px solid var(--accent); color:var(--text-secondary); }
  .msg.engram hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
  .msg.engram a { color:var(--web); text-decoration:none; border-bottom:1px solid color-mix(in srgb, var(--web) 35%, transparent); }
  .msg.engram a:hover { border-bottom-color:var(--web); }
  .msg.engram code.ic { font:12.5px var(--mono); background:var(--surface-2); border:1px solid var(--border); border-radius:5px; padding:1px 5px; }
  .msg.engram strong { font-weight:650; } .msg.engram em { font-style:italic; }
  /* Browser screenshots shown inline in a run's step trail (click to view full-size). */
  .step-shot { margin:7px 0 2px; }
  .step-shot img { max-width:min(440px,100%); max-height:300px; border-radius:9px; border:1px solid var(--border-strong); cursor:zoom-in; display:block; box-shadow:var(--e1); transition:border-color var(--dur-1) var(--ease-out); }
  .step-shot img:hover { border-color:var(--ring); }
  .img-lb { position:fixed; inset:0; z-index:200; background:rgba(6,7,9,.82); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); display:flex; align-items:center; justify-content:center; padding:30px; animation:fade .12s ease-out; cursor:zoom-out; }

  /* terminal - the glass-box shell */

  /* task-panel Changes section */

  /* Centered like every other view (Skills/Artifacts/Activity) - Schedule and Checkpoints used to

  /* memory - the living brain graph */
  .brain-wrap { position:relative; height:100%; overflow:hidden;

  /* Recent-memories list panel (right side of the Memory view). */

  /* Surface palettes ("tone"): the same design system on differently-tempered surfaces. Graphite
     is the default; Warm tints toward candlelight, Navy toward deep blue. Each has a light-theme
     counterpart (paper -> cream / cool-white). Only the surface/rail tokens change - text, borders,
     and the accent system stay consistent, so every component keeps its contrast guarantees. */
  html[data-engram-tone="warm"] { --rail:#0b0907; --surface-0:#110d0a; --surface-1:#171210; --surface-2:#1f1915; --surface-3:#2a211b; }
  html[data-engram-tone="navy"] { --rail:#06090f; --surface-0:#0a0e17; --surface-1:#0f141f; --surface-2:#161c2a; --surface-3:#1e2638; }
  html[data-engram-theme="light"][data-engram-tone="warm"] { --rail:#ece4d8; --surface-0:#fbf7f0; --surface-1:#f5eee3; --surface-2:#ece2d3; --surface-3:#e0d3bf; }
  html[data-engram-theme="light"][data-engram-tone="navy"] { --rail:#e2e8f1; --surface-0:#f8fafd; --surface-1:#eff3f9; --surface-2:#e4eaf3; --surface-3:#d7dfec; }

    gap:6px; color:var(--text-muted); text-align:center; pointer-events:none; padding-top:34vh; }

    border:1px solid var(--border-strong); border-radius:8px; cursor:pointer; }

    background:var(--accent-soft); border:1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius:999px; padding:1px 8px; }

  .ses .ses-actions button:hover { color:var(--text-primary); background:var(--surface-1); }
  .ses .star { color:var(--warning); }
  .ses-empty { color:var(--text-muted); font-size:12px; padding:8px 9px; line-height:1.5; }
  .chat-welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:14px; padding:24px 16px; }
  .chat-welcome .cw-mark { color:var(--accent); filter:drop-shadow(0 0 14px rgba(69,200,168,.3)); }
  .chat-welcome .cw-mark svg { width:50px; height:50px; }
  .chat-welcome .cw-title { font-size:22px; font-weight:600; color:var(--text-primary); }
  .chat-welcome .cw-sub { max-width:450px; line-height:1.6; font-size:14px; color:var(--text-muted); }
  .chat-welcome .cw-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:540px; margin-top:8px; }
  .chat-welcome .cw-chips button { background:var(--surface-1); border:1px solid var(--border); color:var(--text-secondary);
    border-radius:999px; padding:8px 15px; font-size:13px; cursor:pointer; transition:border-color var(--dur-1) var(--ease-out), color var(--dur-1), background var(--dur-1); }
  .chat-welcome .cw-chips button:hover { border-color:var(--ring); color:var(--text-primary); background:var(--surface-2); }
  /* chat: composer model picker + recall ribbon */
  .composer-top { display:flex; align-items:center; gap:8px; margin-bottom:7px; flex-wrap:wrap; }
  .composer-top .modelpick { min-width:0; }
  .composer-top .modelpick .mp-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:38ch; }
  .modelpick { display:inline-flex; align-items:center; gap:7px; background:var(--surface-2); border:1px solid var(--border);
    color:var(--text-secondary); border-radius:9px; padding:5px 9px 5px 10px; font-size:12px; font-weight:500; cursor:pointer; line-height:1;
    transition:border-color var(--dur-1) var(--ease-out), color var(--dur-1), background var(--dur-1); }
  .modelpick:hover { border-color:var(--border-strong); color:var(--text-primary); background:var(--surface-3); }
  .modelpick .mp-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex:none; box-shadow:0 0 0 3px var(--accent-soft); }
  .modelpick .mp-name { font-variant-numeric:tabular-nums; }
  .modelpick .mp-chev { width:12px; height:12px; flex:none; color:var(--text-muted); transition:transform var(--dur-1) var(--ease-out); }
  .mp-wrap:has(.model-menu) .modelpick { border-color:var(--ring); color:var(--text-primary); background:var(--surface-3); }
  .mp-wrap:has(.model-menu) .modelpick .mp-chev { transform:rotate(180deg); color:var(--accent); }
  .model-menu { position:absolute; bottom:100%; left:0; margin-bottom:8px; background:var(--surface-2); border:1px solid var(--border-strong);
    border-radius:12px; width:312px; z-index:30; box-shadow:0 18px 48px rgba(0,0,0,.55); overflow:hidden; }
  .mm-search { width:100%; box-sizing:border-box; background:none; border:none; border-bottom:1px solid var(--border); outline:none;
    color:var(--text-primary); font-size:13px; padding:11px 13px; }
  .mm-list { max-height:320px; overflow:auto; padding:0 5px 5px; }
  /* Sticky section header: opaque bg + a hairline + z-index so rows scroll cleanly UNDER it (was
     transparent-ish and overlapped the rows on scroll). */
  .model-menu .mm-g { font:600 9.5px var(--mono); text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); padding:9px 9px 5px; position:sticky; top:0; z-index:2;
    background:var(--surface-2); box-shadow:0 1px 0 var(--border); }
  .model-menu div.mm-i { padding:7px 9px; border-radius:7px; font-size:13px; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; gap:9px; }
  .model-menu div.mm-i.sel { background:var(--surface-1); color:var(--text-primary); }
  .model-menu .mm-dot { width:7px; height:7px; border-radius:50%; flex:none; box-shadow:0 0 6px currentColor; }
  .model-menu .mm-name { font-family:var(--sans); font-weight:500; font-size:12.5px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .model-menu .mm-meta { font-size:11px; color:var(--text-muted); flex:none; }
  .model-menu .mm-chk { color:var(--accent); flex:none; }
  .model-menu div.mm-i.on .mm-name { color:var(--accent); }
  .mm-empty { padding:14px; text-align:center; color:var(--text-muted); font-size:12px; }
  .mm-effort { display:flex; flex-direction:column; align-items:stretch; gap:6px; padding:9px 12px; border-top:1px solid var(--border); }
  .mm-eff-lbl { font:600 9.5px var(--mono); text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }
  .mm-seg { display:flex; background:var(--surface-0); border:1px solid var(--border-strong); border-radius:8px; padding:2px; gap:2px; }
  .mm-seg button { flex:1; border:none; background:none; color:var(--text-secondary); font:500 11.5px var(--sans); padding:4px 0; border-radius:6px; cursor:pointer; text-align:center; transition:background var(--dur-1) var(--ease-out), color var(--dur-1); }
  .mm-seg button:hover { color:var(--text-primary); }
  .mm-seg button.on { background:var(--accent-soft); color:var(--accent); }
  .mm-foot { padding:9px 12px; border-top:1px solid var(--border); font-size:12px; color:var(--text-muted); cursor:pointer; }
  .mm-foot:hover { color:var(--text-primary); }
  /* the recall ribbon - a row of small physical "memory tokens" that assemble under an answer */
  /* Memory provenance recedes: quiet grey footnotes under a reply, not boxed chips. The region
     colour and the click-through stay, but they sit in the background until the reader looks. */
  .ribbon { display:flex; flex-wrap:wrap; align-items:center; gap:4px 11px; margin:9px 0 2px; }
  .recall { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; color:var(--text-muted);
    background:none; border:none; box-shadow:none; padding:0; position:relative; cursor:default;
    animation:recall-in var(--dur-3) var(--ease-out) backwards; }
  .recall::before { display:none; }
  .recall:hover { color:var(--text-secondary); }
  .recall.clk { cursor:pointer; }
  .recall.clk:hover { color:var(--text-secondary); text-decoration:underline; text-underline-offset:2px; text-decoration-color:var(--lc,var(--border-strong)); }
  .recall .rg { font-family:var(--mono); color:var(--lc,var(--accent)); opacity:.6; font-size:9px; font-variant-numeric:tabular-nums; }
  .rb-lbl { align-self:center; font:600 9px var(--mono); text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); opacity:.85; margin-right:1px; }
  /* Scope tag on a grounding chip: shows a memory is bound to THIS project / chat (no tag = a
     global fact about the user, which follows everywhere). This is where isolation becomes visible. */
  .sc-tag { font:600 8.5px var(--mono); text-transform:uppercase; letter-spacing:.05em; margin-left:5px; padding:1px 5px; border-radius:20px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-muted); }
  .sc-tag.sc-proj { color:var(--accent); border-color:rgba(69,200,168,.30); }
  .rp-glob { font:600 8.5px var(--mono); text-transform:uppercase; letter-spacing:.04em; margin:0 6px; padding:2px 7px; border-radius:20px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary); cursor:pointer; flex-shrink:0; }
  .rp-glob:hover { color:var(--accent); border-color:rgba(69,200,168,.35); }
  .recall:nth-child(2){ animation-delay:55ms } .recall:nth-child(3){ animation-delay:110ms }
  .recall:nth-child(4){ animation-delay:165ms } .recall:nth-child(5){ animation-delay:220ms }
  @keyframes recall-in { from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:none; } }
  .learned { font-size:11px; color:var(--text-muted); margin:5px 0 2px; display:flex; align-items:center; gap:6px; }
  .learned::before { content:''; width:4px; height:4px; border-radius:50%; background:var(--text-muted); opacity:.6; flex:none; }
  .chat-steps { display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 8px; align-items:center; }
  .cstep { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--text-secondary);
    background:var(--surface-2); border:1px solid var(--border-strong); border-radius:7px; padding:3px 9px; }
  .cstep .cs-ic { color:#2e9e6b; font-size:10px; }
  .cstep.bad { color:var(--text-muted); } .cstep.bad .cs-ic { color:#c0533f; }
  .cstep.clk { cursor:pointer; }
  .cstep.clk:hover { color:var(--text-primary); border-color:var(--accent); }
  .cstep .cs-open { margin-left:3px; opacity:.6; font-size:10px; }
  /* a short summary of what the step actually found/did, inline so the user sees substance not just "✓ searched the web" */
  .cstep .cs-obs { color:var(--text-muted); opacity:.85; margin-left:4px; max-width:min(60vw,340px); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chat-steps .step-shot { flex-basis:100%; margin:3px 0; }
  /* inline edit diffs: a quiet collapsed row per write/edit, expanding to the unified diff */
  .step-diff { flex-basis:100%; margin:2px 0 4px; }
  .step-diff summary { display:flex; align-items:center; gap:7px; list-style:none; cursor:pointer;
    padding:5px 9px; border:1px solid var(--border); border-radius:8px; background:var(--surface-1);
    font-size:11.5px; color:var(--text-secondary); transition:border-color var(--dur-1) var(--ease-out); }
  .step-diff summary:hover { border-color:var(--border-strong); color:var(--text-primary); }
  .step-diff summary svg { width:13px; height:13px; flex:none; color:var(--text-muted); }
  .step-diff .sd-path { font-family:var(--mono); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .step-diff .sd-counts { flex:none; font:10.5px var(--mono); }
  .step-diff .sd-counts .a { color:var(--accent); } .step-diff .sd-counts .d { color:var(--danger); }
  .step-diff .sd-hint { margin-left:auto; flex:none; font-size:10px; color:var(--text-muted); opacity:.8; }
  .step-diff[open] summary { border-bottom-left-radius:0; border-bottom-right-radius:0; }
  .step-diff[open] summary .sd-hint { opacity:0; }
  .step-diff .cb { margin:0; border-top-left-radius:0; border-top-right-radius:0; border-top:none; }
  /* Live narration: the model's "what I'm doing" commentary while it works */
  .chat-notes { display:flex; flex-direction:column; gap:4px; margin:2px 0 8px; }
  .cnote { font-size:12.5px; line-height:1.5; color:var(--text-secondary); font-style:italic; opacity:.92; }
  .cnote a { color:var(--accent,#45c8a8); font-style:normal; }
  /* File viewer modal (open an artifact/file for reading where there's no chat canvas) */
  .fv-ov { position:fixed; inset:0; z-index:1200; background:rgba(10,14,20,.55); display:flex; align-items:center; justify-content:center; padding:5vh 4vw; backdrop-filter:blur(2px); }
  .fv-card { background:var(--surface-1,#fff); border:1px solid var(--border,#2a2c34); border-radius:14px; width:min(900px,100%); max-height:90vh; display:flex; flex-direction:column; box-shadow:0 24px 64px rgba(0,0,0,.35); overflow:hidden; }
  .fv-head { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border,#2a2c34); }
  .fv-name { font-weight:600; font-size:13.5px; }
  .fv-dl { font-size:12px; color:var(--accent,#45c8a8); text-decoration:none; padding:4px 10px; border:1px solid var(--border,#2a2c34); border-radius:7px; }
  .fv-dl:hover { border-color:var(--accent,#45c8a8); }
  .fv-x { background:none; border:none; font-size:22px; line-height:1; color:var(--text-muted); cursor:pointer; padding:0 4px; }
  .fv-body { overflow:auto; padding:18px 22px; }
  .fv-pre { margin:0; } .fv-body code { font:12.5px/1.6 var(--mono); white-space:pre; }
  .md-doc { font-size:13.5px; line-height:1.65; color:var(--text-primary); }
  .md-doc .md-table { border-collapse:collapse; width:100%; margin:8px 0; }
  .md-doc .md-table th, .md-doc .md-table td { border:1px solid var(--border,#2a2c34); padding:6px 10px; text-align:left; }
  .md-doc a { color:var(--accent,#45c8a8); }
  /* finishing touches: calm focus rings, refined hovers, softer depth */
  * { -webkit-tap-highlight-color:transparent; }
  /* Keyboard focus is visible EVERYWHERE: the old 8-selector allowlist left most controls (send,
     attach, copy, skill actions, settings fields...) with no focus indicator at all. Mouse clicks
     stay ring-free via :focus-visible. */
  :focus { outline:none; }
  :focus-visible { outline:2px solid var(--ring); outline-offset:1px; }
  .nav a:focus-visible, .ses:focus-visible, .kbtn:focus-visible, .sbtn:focus-visible, .newchat:focus-visible,
  .proj-btn:focus-visible, .modelpick:focus-visible, .pal-item:focus-visible, .cc-cat:focus-visible { box-shadow:0 0 0 2px var(--ring); outline:none; }
  .kbtn:hover, .modelpick:hover, .proj-btn:hover, .newchat:hover { background:var(--active); }
  .palette .pal-box, .cc .cc-box { box-shadow:var(--e4); }
  .overlay { background:rgba(5,6,8,.58); }
  .card { transition:background var(--dur-1) var(--ease-out), box-shadow var(--dur-1) var(--ease-out); }
  ::-webkit-scrollbar-thumb:hover { background:#2c3036; }
  /* floating menus settle with a slight physical overshoot - Apple, not Material */
  .model-menu, .proj-menu { box-shadow:var(--e3); transform-origin:top left; animation:menu-in var(--dur-2) var(--ease-spring); }
  .model-menu { transform-origin:bottom left; }
  .palette .pal-box { animation:menu-in var(--dur-2) var(--ease-spring); transform-origin:top center; }
  @keyframes menu-in { from{ opacity:0; transform:scale(.97) translateY(4px); } to{ opacity:1; transform:none; } }
  .newchat { box-shadow:var(--e1); }
  /* the glass-box receipt - a signed slip that tears up from the trust spine */
  .receipt { position:fixed; left:50%; bottom:40px; transform:translateX(-50%); width:min(480px,93vw);
    background:var(--surface-2); border:1px solid var(--border-strong); border-top:2px solid var(--accent);
    border-radius:var(--r-card); box-shadow:var(--e4); transform-origin:bottom center; z-index:90; overflow:hidden;
    animation:receipt-in var(--dur-3) var(--ease-out); }
  .receipt[hidden] { display:none; }
  @keyframes receipt-in { from{ opacity:0; transform:translateX(-50%) translateY(14px) scale(.98); } to{ opacity:1; transform:translateX(-50%) translateY(0) scale(1); } }
  .receipt .r-head { display:flex; align-items:center; gap:9px; padding:13px 15px 11px; border-bottom:1px dashed var(--border-strong); }
  .receipt .r-seal { width:9px; height:9px; border-radius:50%; background:var(--accent); flex:none; animation:breath var(--dur-4) var(--ease-inout); }
  .receipt .r-title { font:600 13px/1.2 var(--sans); color:var(--text-primary); }
  .receipt .r-sub { font:11px var(--mono); color:var(--accent); margin-left:auto; font-variant-numeric:tabular-nums; }
  .receipt .r-x { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:0 2px; }
  .receipt .r-x:hover { color:var(--text-primary); }
  .receipt .r-body { max-height:44vh; overflow:auto; padding:7px 6px; }
  .receipt .r-row { display:grid; grid-template-columns:30px 1fr auto; gap:10px; align-items:center; padding:6px 9px; border-radius:7px; font:12px var(--mono); color:var(--text-secondary); }
  .receipt .r-row:hover { background:var(--hover); }
  .receipt .r-row .r-seq { color:var(--text-muted); text-align:right; font-variant-numeric:tabular-nums; }
  .receipt .r-row .r-kind { color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .receipt .r-row .r-kind small { color:var(--text-muted); }
  .receipt .r-row .r-hash { color:var(--accent); cursor:pointer; }
  .receipt .r-row .r-hash:hover { text-decoration:underline; text-underline-offset:2px; }
  .receipt .r-meta { padding:9px 15px; border-top:1px solid var(--border); font:11px var(--mono); color:var(--text-muted); display:flex; flex-direction:column; gap:3px; }
  .receipt .r-meta b { color:var(--text-secondary); font-weight:400; }
  .receipt .r-foot { display:flex; align-items:center; gap:11px; padding:11px 15px; border-top:1px solid var(--border); background:var(--surface-1); }
  .receipt .r-foot .hint { font:11px var(--mono); color:var(--text-muted); margin-left:auto; }
  @media (prefers-reduced-motion: reduce) { .recall, .model-menu, .proj-menu, .pal-box, .statusbar .seal, .receipt, .receipt .r-seal { animation:none !important; } }
  /* per-project persona editor */
  .proj-modal { width:min(540px,93vw); margin-top:13vh; background:var(--surface-1); border:1px solid var(--border-strong);
    border-radius:var(--r-modal); box-shadow:var(--e4); padding:22px 24px 20px; animation:menu-in var(--dur-2) var(--ease-spring); transform-origin:top center; }
  .proj-modal h2 { font-size:17px; font-weight:600; margin:0 0 4px; }
  .proj-modal .sub { color:var(--text-muted); font-size:12px; line-height:1.55; margin-bottom:16px; }
  /* ===== Artifacts (Open in canvas) ===== */
  .chat-shell { display:flex; height:100%; min-height:0; min-width:0; }
  .chat-shell > .chat { flex:1 1 auto; min-width:0; transition:max-width var(--dur-2,.16s) var(--ease-out,ease); }
  .chat-shell.arts-open > .chat { max-width:560px; margin:0 0 0 auto; padding-right:10px; }
  .art-pane { flex:0 0 0; width:0; min-width:0; overflow:hidden; display:flex; flex-direction:column;
    border-left:1px solid var(--border); background:var(--surface-1);
    transition:flex-basis var(--dur-2,.16s) var(--ease-out,ease); }
  .chat-shell.arts-open > .art-pane { flex:0 0 46%; width:auto; min-width:380px; }

  /* "Open in canvas" chip injected into a code block header */
  .art-open { display:inline-flex; align-items:center; gap:5px; margin-left:auto; margin-right:7px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary);
    border-radius:6px; padding:2px 8px; font:11px var(--sans); cursor:pointer; transition:.12s; }
  .art-open svg { opacity:.85; }
  .art-open:hover { border-color:var(--ring); color:var(--accent); background:var(--accent-soft); }
  .art-open.active { color:var(--accent); border-color:var(--ring); background:var(--accent-soft); }
  .cb-head .art-open + .cb-copy { margin-left:0; }

  /* Pane header */
  .art-bar { flex:none; display:flex; align-items:center; gap:10px; padding:10px 12px 10px 16px;
    border-bottom:1px solid var(--border); min-height:46px; }
  .art-meta { display:flex; align-items:center; gap:8px; min-width:0; }
  .art-tag { flex:none; font:10.5px var(--mono); text-transform:uppercase; letter-spacing:.04em;
    color:var(--accent); background:var(--accent-soft); border:1px solid var(--ring);
    border-radius:5px; padding:2px 7px; }
  .art-title { font-size:13.5px; font-weight:600; color:var(--text-primary);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
  .art-sub { flex:none; font-size:11px; color:var(--text-muted); }
  .art-actions { margin-left:auto; display:flex; align-items:center; gap:6px; }
  .art-btn { background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary);
    border-radius:7px; padding:4px 11px; font:12px var(--sans); cursor:pointer; transition:.12s; }
  .art-btn:hover { border-color:var(--border-strong); color:var(--text-primary); }
  .art-btn.ok { color:var(--accent); border-color:var(--ring); }
  .art-x { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
    background:none; border:1px solid transparent; border-radius:7px; color:var(--text-muted); cursor:pointer; transition:.12s; }
  .art-x:hover { color:var(--text-primary); background:var(--surface-2); border-color:var(--border); }

  /* Pane switcher (multiple artifacts) */
  .art-tabs { flex:none; display:flex; gap:4px; padding:8px 12px; overflow-x:auto;
    border-bottom:1px solid var(--border); }
  .art-tab { display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    background:none; border:1px solid transparent; color:var(--text-secondary);
    border-radius:7px; padding:4px 10px; font:12px var(--sans); cursor:pointer; transition:.12s; max-width:200px; }
  .art-tab span:last-child { overflow:hidden; text-overflow:ellipsis; }
  .art-tab:hover { background:var(--surface-2); color:var(--text-primary); }
  .art-tab.on { background:var(--accent-soft); border-color:var(--ring); color:var(--text-primary); }
  .art-dot { flex:none; width:6px; height:6px; border-radius:50%; background:var(--text-muted); }
  .art-tab.on .art-dot { background:var(--accent); }

  /* Pane body - re-scope the highlighter token classes (existing rules are scoped to .cb) */
  .art-body { flex:1; min-height:0; overflow:auto; padding:14px 16px; background:var(--surface-0); }
  .art-body pre { margin:0; }
  .art-body code { font:12.5px/1.6 var(--mono); color:var(--text-primary); white-space:pre; }
  .art-body .t-kw { color:var(--accent); } .art-body .t-st { color:var(--web); }
  .art-body .t-co { color:var(--text-muted); font-style:italic; } .art-body .t-nu { color:var(--warning); }

  /* Collapse the split on narrow widths: pane takes over, chat hides behind it. */
  @media (max-width: 900px){
    .chat-shell.arts-open > .chat { display:none; }
    .chat-shell.arts-open > .art-pane { flex:1 1 auto; width:auto; min-width:0; border-left:none; }
    .art-title { max-width:140px; }

.sched-head { display:flex; align-items:baseline; justify-content:space-between; gap:10px; }

.sched-prompt { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:6px;
  padding:7px 9px; outline:none; font:inherit; line-height:1.5; resize:vertical; min-height:52px; color:inherit; }
.sched-prompt:focus { border-color:var(--accent); }
.sched-preview { display:flex; align-items:center; gap:8px; min-height:22px; font-size:12px; color:var(--text-muted); }
.sched-preview.empty { display:none; }   /* opacity:0 still reserved phantom height under the form */
.sched-list { display:flex; flex-direction:column; gap:10px; }
.sched-stick { display:flex; gap:10px; align-items:center; }
/* the date/time cadence builder */
.sched-pick summary { cursor:pointer; font-size:11.5px; color:var(--text-muted); list-style:none; padding:1px 2px; }
.sched-pick summary:hover { color:var(--text-secondary); }
.sched-pick .sp-row { display:flex; gap:8px; align-items:center; margin:8px 0 2px; flex-wrap:wrap; }
.sched-pick .sp-row select, .sched-pick .sp-row input { background:var(--surface-2); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; color:var(--text-primary); outline:none; color-scheme:dark; }
html[data-engram-theme="light"] .sched-pick .sp-row select, html[data-engram-theme="light"] .sched-pick .sp-row input { color-scheme:light; }
.sched-pick .sp-row select:focus, .sched-pick .sp-row input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
/* "Run as" as a real form element: label above, control, explanation below, action aligned right. */

.sched-runas .sr-field { flex:1; min-width:0; }
.sched-runas label { display:block; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
.sched-runas select { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; outline:none; }
.sched-runas select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

.sched-runas .sr-add { background:var(--accent); color:var(--accent-ink); border:none; border-radius:9px; padding:9px 18px; font-weight:600; cursor:pointer; flex:none; margin-bottom:26px; }
.sched-runas .sr-add:hover { filter:brightness(1.06); }
.sched-card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r-card); box-shadow:var(--e1); padding:12px 13px; display:flex; flex-direction:column; gap:9px; transition:border-color var(--dur-2) var(--ease-out), transform var(--dur-2) var(--ease-out); }
.sched-card:hover { border-color:var(--border-strong); }
.sched-card.is-running { border-color:var(--ring); }
.sched-card .sc-top { display:flex; align-items:center; gap:10px; }

.cadence-badge { display:inline-flex; align-items:center; gap:6px; flex-shrink:0; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-chip); padding:3px 9px 3px 7px; font-size:11px; color:var(--text-secondary); white-space:nowrap; }
.cadence-badge .cad-glyph { display:inline-flex; color:var(--accent); }
.cadence-badge .cad-glyph svg { width:13px; height:13px; }

.cadence-badge.cad-soon { border-color:var(--ring); }
.sc-actions { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.sc-btn { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:8px; background:transparent; border:1px solid transparent; color:var(--text-muted); cursor:pointer; transition:background var(--dur-1) var(--ease-out), color var(--dur-1) var(--ease-out), border-color var(--dur-1) var(--ease-out); }
.sc-btn svg { width:16px; height:16px; }

/* sc-btn is a 28px ICON square; text actions (Checkpoints' Restore/Delete) need their own width

.sc-btn .sc-spin { width:13px; height:13px; border:2px solid var(--accent-soft); border-top-color:var(--accent); border-radius:50%; animation:scSpin .7s linear infinite; }
@keyframes scSpin { to { transform:rotate(360deg); } }
.sc-meter { height:3px; border-radius:3px; background:var(--surface-3); overflow:hidden; }
.sc-meter > i { display:block; height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent) 70%,rgba(69,200,168,.55)); transition:width var(--dur-3) var(--ease-out); }

.sched-empty { display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px; padding:34px 18px; color:var(--text-muted); }

/* ===================== VOICE: dictation mic + conversation overlay ===================== */

/* (1) composer dictation mic - matches the .send-icon 34px circle, secondary weight */
.composer .voice-mic {
  display:inline-flex; align-items:center; justify-content:center;
  width:34px; height:34px; padding:0; border-radius:50%;
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--text-secondary); cursor:pointer; position:relative;
  transition:background var(--dur-1) var(--ease-out), border-color var(--dur-1), color var(--dur-1);
}
.composer .voice-mic svg { width:17px; height:17px; }
.composer .voice-mic:hover { border-color:var(--border-strong); color:var(--text-primary); background:var(--active); }
.composer .voice-mic:active { transform:translateY(1px); }
.composer .voice-mic.rec { color:var(--accent); border-color:var(--ring); background:var(--accent-soft); }
.composer .voice-mic.rec::after {
  content:''; position:absolute; inset:-1px; border-radius:50%;
  border:1.5px solid var(--accent); animation:voice-pulse 1.4s var(--ease-out) infinite;
}
@keyframes voice-pulse {
  0%   { transform:scale(1);    opacity:.7; }
  70%  { transform:scale(1.35); opacity:0; }
  100% { transform:scale(1.35); opacity:0; }
}

/* Chat-header entry button (built on .kbtn; SVG needs explicit sizing) */
.voice-headbtn svg { width:15px; height:15px; }
.voice-headbtn .vhb-l { font-weight:500; }

/* (2) full-surface conversation overlay */
.voice-ov {
  position:fixed; inset:0; z-index:120;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(120% 120% at 50% 38%, rgba(18,21,25,.86), rgba(8,9,11,.97));

.voice-ov.in { opacity:1; }
.voice-close {
  position:absolute; top:16px; right:18px; width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface-2); border:1px solid var(--border); border-radius:50%;

.voice-stage {

}

#voiceOrb { width:300px; height:300px; max-width:74vw; max-height:74vw; }

.voice-status {

.voice-controls { display:flex; align-items:center; gap:16px; margin-top:4px; }
.voice-mute, .voice-end {

.voice-orb-btn {
  width:74px; height:74px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--accent-soft); border:1.5px solid var(--ring); color:var(--accent);
  cursor:pointer; box-shadow:var(--e3);

}

.voice-orb-btn:hover  { transform:scale(1.05); }

.voice-ov[data-phase="speaking"] .voice-orb-btn { background:var(--web-bg); border-color:var(--web); color:var(--web); }

.voice-typed {
  display:flex; gap:8px; align-items:center; width:min(420px,80vw); margin-top:2px;
}
.voice-typed input {
  flex:1; background:var(--surface-1); border:1px solid var(--border-strong);

.voice-typed button {

}
.voice-typed button:hover { filter:brightness(1.06); }
.voice-typed button:active { transform:translateY(1px); }

@media (prefers-reduced-motion: reduce) {
  .composer .voice-mic.rec::after { animation:none; }
  .voice-ov, .voice-stage { transition:none; }

  /* light theme - opt-in via data-engram-theme; reuses existing token names so every screen follows */
  html[data-engram-theme="light"] {
    --rail:#e9eaed; --surface-0:#fbfbfc; --surface-1:#f3f4f6; --surface-2:#e9eaed; --surface-3:#dfe1e5;
    --border:rgba(0,0,0,.10); --border-strong:rgba(0,0,0,.18);
    --border-hi:inset 0 1px 0 rgba(255,255,255,.6);
    --text-primary:#1a1c1f; --text-secondary:#4a4e56; --text-muted:#80858e;
    --hover:rgba(0,0,0,.04); --active:rgba(0,0,0,.07);
    --web-bg:#eaf2fb; --files-bg:#fdf4e3;
    /* Semantic text colours darkened for light surfaces: the dark theme's pastels (#85b7eb links,
       #e0a23c warnings) sit near 2:1 on white - unreadable at chat sizes. The accent itself is
       remapped by applyEngramAppearance (its inline vars would override anything set here). */
    --web:#2270c0; --warning:#8a5f00; --danger:#c03a31;
    --accent-soft:rgba(35,150,120,.12); --accent-ink:#0a3f34;
    /* Lighter elevation so cards don't carry heavy dark shadows on a light surface. */
    --e1:0 1px 2px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.6);
    --e2:0 2px 8px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.6);
    --e3:0 8px 28px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.6);
    --e4:0 24px 70px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.10);
    --glow:drop-shadow(0 0 5px rgba(35,150,120,.35));
  }
  /* The status bar paints a hardcoded dark gradient (not a var), so override it for light mode -
     otherwise the bottom strip stays black while the rest of the app is light. */
  html[data-engram-theme="light"] .statusbar { background:linear-gradient(#f4f5f7, #e7e9ec); }
  /* Responsive: below 860px the chats sidebar collapses so the work surface isn't crushed — but on
     Chat it's the ONLY list of conversations + the New-chat button, so a topbar toggle reopens it
     as an overlay drawer. Without this, a narrow window stranded the user in one session. */
  .sb-toggle { display:none; align-items:center; justify-content:center; width:30px; height:30px; border-radius:8px;
    background:none; border:1px solid var(--border); color:var(--text-secondary); cursor:pointer; }

  }
  @media (max-width: 620px) {
    .board { grid-template-columns: 1fr; }
  }

<script>
// The API token is kept in the browser, never embedded in the page the daemon serves (that
// "/" route is unauthenticated, so embedding the token would leak it). Set from Settings, it
// persists in localStorage and is sent on the dashboard's own calls; a fresh client is prompted.
let TOKEN = (()=>{ try{ return localStorage.getItem('engram.tok')||''; }catch(_){ return ''; } })();
let AUTH = TOKEN ? {Authorization:'Bearer '+TOKEN} : {};
const tok = u => TOKEN ? (u + (u.includes('?')?'&':'?') + 'token=' + encodeURIComponent(TOKEN)) : u;
function setClientToken(t){ TOKEN=t||''; AUTH = TOKEN ? {Authorization:'Bearer '+TOKEN} : {};
  try{ if(TOKEN) localStorage.setItem('engram.tok',TOKEN); else localStorage.removeItem('engram.tok'); }catch(_){} }
let _askedToken=false;
const J = async (u,o={}) => {
  let r;
  try { r = await fetch(u,{...o, headers:{...AUTH, ...(o.headers||{})}}); }
  catch(_){ throw new Error('network unreachable'); }
  if(r.status===401 && !TOKEN && !_askedToken){ _askedToken=true;
    const t=await askInput({title:'API token required',label:'This Engram requires an API token to continue.',placeholder:'paste your token',ok:'Continue'});
    if(t&&t.trim()){ setClientToken(t.trim()); location.reload(); return new Promise(()=>{}); } }
  if(!r.ok){ let m='HTTP '+r.status; try{ const b=await r.json(); if(b&&b.error) m=b.error; }catch(_){} throw new Error(m); }
  return r.json();
};
// Strip C0 control chars (except \t \n \r) FIRST: model/tool output can contain raw NUL, and
// mdInline uses a NUL-delimited placeholder for inline-code spans on the assumption NUL can't occur
// in escaped text. A forged NUL would otherwise substitute the wrong (or an undefined) code span,
// rendering the literal string "undefined" or corrupting the answer. Control chars have no visible
// rendering, so dropping them is safe across every esc() call site.
const esc = s => String(s??'').replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
// For values placed inside a double-quoted HTML attribute, quotes must be escaped too, or a
// stored config value (an MCP name, a model id) could break out of the attribute.
const escAttr = s => String(s??'').replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
// In-app input / confirm dialogs. The desktop shell is a WKWebView, where window.prompt() is
// unsupported and returns null - which silently broke "new project", rename, the Telegram connect
// flow, and more. These replace prompt()/confirm() with real, themed, awaitable modals.
function askInput(o){ o=o||{};
  return new Promise(resolve=>{
    const ov=document.createElement('div'); ov.className='overlay ask';
    ov.innerHTML=`<div class="ask-card"><div class="ask-title">${esc(o.title||'')}</div>${o.label?`<div class="ask-msg">${esc(o.label)}</div>`:''}
      <input class="ask-input" id="askInput" placeholder="${escAttr(o.placeholder||'')}" value="${escAttr(o.value||'')}" autocomplete="off">
      <div class="ask-actions"><button class="ask-ghost" data-act="x">Cancel</button><button class="ask-ok" data-act="ok">${esc(o.ok||'OK')}</button></div></div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector('#askInput'); setTimeout(()=>{ inp.focus(); inp.select(); },20);
    const done=v=>{ ov.remove(); document.removeEventListener('keydown',key,true); resolve(v); };
    // Enter must respect FOCUS: a keyboard user who tabbed to Cancel and pressed Enter was getting
    // the dialog CONFIRMED (the capture-phase handler ignored the focused button entirely).
    const key=e=>{ if(e.key==='Escape'){ e.preventDefault(); done(null); }
      else if(e.key==='Enter'){ e.preventDefault();
        const b=document.activeElement&&document.activeElement.closest&&document.activeElement.closest('[data-act]');
        done(b ? (b.dataset.act==='ok'?inp.value:null) : inp.value); } };
    document.addEventListener('keydown',key,true);
    ov.addEventListener('click',e=>{ if(e.target===ov) return done(null); const a=e.target.closest('[data-act]'); if(a) done(a.dataset.act==='ok'?inp.value:null); });
  });
}
function askConfirm(o){ o=o||{};
  return new Promise(resolve=>{
    const ov=document.createElement('div'); ov.className='overlay ask';
    ov.innerHTML=`<div class="ask-card"><div class="ask-title">${esc(o.title||'Are you sure?')}</div>${o.message?`<div class="ask-msg">${esc(o.message)}</div>`:''}
      <div class="ask-actions"><button class="ask-ghost" data-act="x">Cancel</button><button class="ask-ok ${o.danger?'danger':''}" data-act="ok">${esc(o.ok||'Confirm')}</button></div></div>`;
    document.body.appendChild(ov);
    // Destructive dialogs default-focus CANCEL: auto-focusing OK meant a held/double Enter from
    // the keystroke that OPENED the dialog could instantly confirm a deletion.
    setTimeout(()=>ov.querySelector(o.danger?'[data-act="x"]':'[data-act="ok"]').focus(),20);
    const done=v=>{ ov.remove(); document.removeEventListener('keydown',key,true); resolve(v); };
    // Enter follows FOCUS (Tab to Cancel + Enter must cancel, not confirm-and-delete).
    const key=e=>{ if(e.key==='Escape'){ e.preventDefault(); done(false); }
      else if(e.key==='Enter'){ e.preventDefault();
        const b=document.activeElement&&document.activeElement.closest&&document.activeElement.closest('[data-act]');
        done(b ? b.dataset.act==='ok' : true); } };
    document.addEventListener('keydown',key,true);
    ov.addEventListener('click',e=>{ if(e.target===ov) return done(false); const a=e.target.closest('[data-act]'); if(a) done(a.dataset.act==='ok'); });
  });
}
// Non-clobbering toast for action failures (keeps the persistent tamper/offline banner).
function notify(msg, kind){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface-2);color:var(--text-primary);padding:9px 14px;border-radius:8px;border:1px solid var(--danger);z-index:60;font-size:13px;transition:opacity .3s';
    document.body.appendChild(t); }
  t.style.borderColor = kind==='ok' ? 'var(--accent)' : 'var(--danger)';
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._h); t._h=setTimeout(()=>{ t.style.opacity='0'; }, 4000);
}
// Only alarm the user when the daemon is ACTUALLY unreachable. A bare unhandled rejection (a
// cancelled request, a poll that raced the daemon's idle-wake, a benign error) must not toast
// "Couldn't reach Engram" - that false alarm fired on every cold start. We re-check /health and
// only surface the toast if that also fails (and dedupe so a burst doesn't stack toasts).
let _reachToastAt=0;
window.addEventListener('unhandledrejection', ()=>{
  J('/health').catch(()=>{
    const now=Date.now(); if(now-_reachToastAt<8000) return; _reachToastAt=now;
    notify('Couldn\'t reach Engram - try again');
  });
});
// Emergency stop: halts every running task at its next step boundary; toggles to Resume.
let halted=false;
async function toggleHalt(){
  const next=!halted;
  try{ await J('/v1/halt',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({on:next})}); halted=next; }
  catch(_){ notify('Couldn\'t reach Engram'); return; }
  const lbl=document.getElementById('haltLabel'); if(lbl) lbl.textContent = halted?'Resume':'Stop';
  notify(halted?'Emergency stop engaged - running tasks will halt':'Resumed');
  updateHaltBtn();
}
// The topbar Stop control is status-aware: hidden when nothing is running (an always-on emergency
// stop reads as noise and implies something is wrong), shown with a live count while chats or tasks
// are in flight, and pinned visible while halted so Resume is always reachable.
function updateHaltBtn(){
  const n=((state&&state.tasks)||[]).filter(t=>t.status==='doing').length + _busySessions.size;
  // Passive heartbeat in the statusbar: a pulsing "N running" chip whenever anything is in flight.
  const sr=document.getElementById('sbRun');
  if(sr){ sr.style.display=n?'inline-flex':'none'; const sn=document.getElementById('sbRunN'); if(sn) sn.textContent=n===1?'1 running':(n+' running'); }
  const b=document.getElementById('haltBtn'); if(!b) return;
  const lbl=document.getElementById('haltLabel');
  if(halted){ b.style.display='inline-flex'; if(lbl) lbl.textContent='Resume'; b.title='Resume - let queued and running tasks continue'; return; }
  if(!n){ b.style.display='none'; return; }
  b.style.display='inline-flex';
  if(lbl) lbl.textContent = n>1 ? ('Stop · '+n) : 'Stop';
  b.title = n===1 ? 'One run in flight - emergency-stop it at its next step' : (n+' runs in flight - emergency-stop them at their next step');
}
// Clean, cohesive line icons: 24px grid, 1.75 stroke, round caps and joins.
const SVG = p => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
const ICONS = {

const VIEWS = ['Chat','Tasks','Schedule','Memory','Skills','Artifacts'];
const TOOLS = ['Activity','Terminal','Checkpoints'];       // power tools - pinned to the bottom of the rail
const ALL_VIEWS = [...VIEWS, ...TOOLS];
let state = { route:'Tasks', tasks:[], offline:false };

function renderNav(){
  // Real anchors with a hash href: keyboard-focusable and Enter-activatable for free; the
  // hashchange listener routes. aria-current marks the active view for screen readers. Primary
  // views sit up top; tools (Terminal) are pinned to the bottom of the rail.
  const item=v=>{ const i=ALL_VIEWS.indexOf(v); const kbd=i>=0&&i<9?` (⌘${i+1})`:'';
    return `<a class="${state.route===v?'active':''}" href="#${v}" title="${v}${kbd}"${state.route===v?' aria-current="page"':''}>${ICONS[v]}<span class="lbl">${v}</span></a>`; };
  document.getElementById('nav').innerHTML = VIEWS.map(item).join('');
  const tn=document.getElementById('navTools'); if(tn) tn.innerHTML = TOOLS.map(item).join('');
  if(typeof projTopSync==='function') projTopSync();
}
function go(v){ if(typeof voiceCloseConversation==='function' && v!=='Chat') voiceCloseConversation(); if(typeof voiceStopRecog==='function' && v!=='Chat') voiceStopRecog(); state.route=v; if(location.hash.slice(1)!==v) location.hash=v; document.getElementById('viewname').textContent=v; renderNav(); renderView(); }
// The chats sidebar is Chat's; other views take the full width. The topbar project switcher keeps
// scope visible (and switchable) everywhere, so leaving Chat never loses the project context.
function projTopSync(){
  document.body.classList.toggle('no-sb', state.route!=='Chat');
  if(state.route!=='Chat') document.body.classList.remove('sb-drawer');
  const vt=document.getElementById('viewTop'); if(vt) vt.classList.remove('show');   // fresh view starts at top
  const n=document.getElementById('projTopName'); if(n) n.textContent=curProject().name;

// Back-to-top for the list views: watch whichever element actually scrolls (Skills scrolls its own
// wrap; everything else scrolls #view). Chat has its own jump-to-latest control.
