<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Engram</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #11161f; --line: #1d2531; --txt: #c9d4e3;
    --dim: #6b7689; --accent: #5eead4; --accent2: #818cf8; --warn: #fbbf24; --bad: #fb7185;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
         background: var(--bg); color: var(--txt); }
  header { padding: 14px 20px; border-bottom: 1px solid var(--line); display: flex;
           align-items: baseline; gap: 14px; }
  header h1 { margin: 0; font-size: 18px; letter-spacing: 1px; }
  header h1 b { color: var(--accent); }
  header .sub { color: var(--dim); font-size: 12px; }
  header .right { margin-left: auto; color: var(--dim); font-size: 12px; }
  header .ok { color: var(--accent); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px 20px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
  .panel h2 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
              color: var(--dim); display: flex; align-items: center; gap: 8px; }
  .panel.wide { grid-column: 1 / 3; }
  input, button, select {
    font: inherit; background: #0d121b; color: var(--txt);
    border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px;
  }
  button { cursor: pointer; border-color: var(--accent2); color: #dfe3ff; }
  button:hover { background: #161d2b; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .row input { flex: 1; min-width: 120px; }
  .feed { max-height: 320px; overflow: auto; }
  .spike { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid #151b25; font-size: 12px; }
  .spike .k { color: var(--accent2); min-width: 130px; }
  .spike .a { color: var(--dim); }
  .hit { padding: 7px 0; border-bottom: 1px solid #151b25; }
  .hit .meta { color: var(--dim); font-size: 11px; }
  .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px;
         background: #182030; color: var(--accent); margin-right: 4px; }
  .pill { font-size: 11px; color: var(--dim); }
  .stat { display: inline-block; margin-right: 16px; }
  .stat b { color: var(--accent); font-size: 18px; }
  .muted { color: var(--dim); }
  .verify-ok { color: var(--accent); } .verify-bad { color: var(--bad); }
</style>
</head>
<body>
<header>
  <h1><b>engram</b> <span class="sub">a brain you can watch grow</span></h1>
  <div class="right">ledger <span id="verify" class="ok">…</span> · <span id="ver"></span></div>
</header>

<div class="grid">
  <div class="panel">
    <h2>Memory Atlas <span class="pill" id="memstats"></span></h2>
    <div class="row">
      <input id="q" placeholder="recall… (try a paraphrase)" />
      <button onclick="recall()">recall</button>
    </div>
    <div class="row">
      <select id="region">
        <option value="semantic">semantic</option>
        <option value="identity">identity</option>
        <option value="episodic">episodic</option>
        <option value="procedural">procedural</option>
      </select>
      <input id="newfact" placeholder="remember a fact…" />
      <button onclick="remember()">remember</button>
    </div>
    <div id="hits"></div>
  </div>

  <div class="panel">
    <h2>Live Cortex <span class="pill">audit stream</span></h2>
    <div id="feed" class="feed"></div>
  </div>

  <div class="panel">
    <h2>Skills <span class="pill">procedural memory</span></h2>
    <div id="skills" class="muted">no skills installed yet</div>
  </div>

  <div class="panel">
    <h2>Schedule <span class="pill">focused automation</span></h2>
    <div class="row">
      <input id="sname" placeholder="name" style="flex:.6" />
      <input id="swhen" placeholder="every weekday at 9am" />
      <button onclick="addJob()">add</button>
    </div>
    <div id="jobs" class="muted">no jobs</div>
  </div>

  <div class="panel wide">
    <h2>Gateway meter <span class="pill">tokens · cost · calls</span></h2>
    <div id="meter">
      <span class="stat"><b id="m_calls">0</b> calls</span>
      <span class="stat"><b id="m_in">0</b> tokens in</span>
      <span class="stat"><b id="m_out">0</b> tokens out</span>
      <span class="stat"><b id="m_cost">$0.00</b> cost</span>
    </div>
  </div>
</div>

<script>
const J = (u, o) => fetch(u, o).then(r => r.json());
const esc = s => String(s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));

async function recall() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const hits = await J('/v1/recall?k=6&q=' + encodeURIComponent(q));
  document.getElementById('hits').innerHTML = (hits.length ? hits : []).map(h =>
    `<div class="hit"><div>${esc(h.record.text)}</div>
     <div class="meta"><span class="tag">${h.record.region}</span>
     score ${h.score.toFixed(3)}
     ${h.keyword_rank ? '· kw#' + h.keyword_rank : ''}
     ${h.semantic_rank ? '· sem#' + h.semantic_rank : ''}</div></div>`).join('')
    || '<div class="muted">no matches</div>';
}
async function remember() {
  const el = document.getElementById('newfact');
  const text = el.value.trim(); if (!text) return;
  await J('/v1/remember', { method: 'POST', headers: {'content-type':'application/json'},
    body: JSON.stringify({ region: document.getElementById('region').value, text }) });
  el.value = ''; refresh();
}
async function addJob() {
  const name = document.getElementById('sname').value.trim() || 'job';
  const when = document.getElementById('swhen').value.trim(); if (!when) return;
  const r = await J('/v1/schedule', { method: 'POST', headers: {'content-type':'application/json'},
    body: JSON.stringify({ name, when, payload: {} }) });
  if (r.error) alert(r.error); else { document.getElementById('swhen').value=''; refresh(); }
}
async function delJob(id) { await fetch('/v1/schedule/' + encodeURIComponent(id), {method:'DELETE'}); refresh(); }
async function runSkill(id) {
  const input = document.getElementById('in_' + id).value;
  const r = await J('/v1/skills/' + encodeURIComponent(id) + '/run',
    { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify({ input }) });
  document.getElementById('out_' + id).textContent = r.error
    ? ('error: ' + r.error)
    : ('→ ' + r.output + '   (' + r.fuel_used + ' fuel · ' + r.host_calls + ' host calls)');
}
let skillsSig = '';
function renderSkills(sk) {
  const sig = JSON.stringify(sk.skills || []);
  if (sig === skillsSig) return; // don't clobber inputs mid-typing
  skillsSig = sig;
  document.getElementById('skills').innerHTML = (sk.skills || []).length
    ? sk.skills.map(s => `<div class="hit"><b>${esc(s.id)}</b>
        <span class="meta">active v${s.active ?? '—'} · ${s.versions.length} ver</span>
        <div class="row" style="margin-top:6px">
          <input id="in_${esc(s.id)}" placeholder="input text" />
          <button onclick="runSkill('${esc(s.id)}')">run</button>
        </div>
        <div id="out_${esc(s.id)}" class="meta"></div></div>`).join('')
    : '<div class="muted">no skills installed yet</div>';
}

const PRIO = { '0':'reflex','1':'high','2':'normal','3':'low' };
async function refresh() {
  const [feed, stats, sk, jobs, m, v, h] = await Promise.all([
    J('/v1/ledger/tail?n=40'), J('/v1/memory/stats'), J('/v1/skills'),
    J('/v1/schedule'), J('/v1/meter'), J('/v1/ledger/verify'), J('/health')
  ]);
  document.getElementById('ver').textContent = 'v' + h.version;
  document.getElementById('verify').textContent = v.ok ? ('✓ ' + v.entries + ' entries') : '✗ broken';
  document.getElementById('verify').className = v.ok ? 'verify-ok' : 'verify-bad';

  document.getElementById('feed').innerHTML = feed.slice().reverse().map(e =>
    `<div class="spike"><span class="k">${esc(e.kind)}</span>
     <span class="a">${esc(e.actor)}</span>
     <span class="muted">#${e.seq}</span></div>`).join('');

  document.getElementById('memstats').textContent =
    stats.total + ' facts · ' + Object.entries(stats.by_tier||{}).map(([k,v])=>v+' '+k).join(' / ');

  renderSkills(sk);

  document.getElementById('jobs').innerHTML = (jobs||[]).length
    ? jobs.map(j => `<div class="hit">${esc(j.name)}
        <span class="meta">next ${new Date(j.next_fire_ms).toLocaleString()}</span>
        <button onclick="delJob('${j.id}')" style="float:right;padding:2px 6px">×</button></div>`).join('')
    : '<div class="muted">no jobs</div>';

  m_calls.textContent = m.calls; m_in.textContent = m.tokens_in;
  m_out.textContent = m.tokens_out; m_cost.textContent = '$' + (m.cost_usd||0).toFixed(4);
}
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') recall(); });
refresh(); setInterval(refresh, 2000);
</script>
</body>
</html>
