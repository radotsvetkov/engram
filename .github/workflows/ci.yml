name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Fast gate: formatting + lint + the full test matrix the product actually ships with.
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: System deps (keyring secret-service + the Linux sandbox)
        # libdbus-1-dev: the keyring feature's secret-service backend.
        # bubblewrap: the built-in `sandbox` shell backend on Linux, exercised by the skill tests.
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config bubblewrap
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets
      - name: Clippy (http)
        run: cargo clippy -p engramd --features http --all-targets
      - name: Clippy (http, docs, keyring — the desktop/VPS feature shape)
        run: cargo clippy -p engramd --features http,docs,keyring --all-targets
      - name: Test (default features)
        run: cargo test --workspace
      - name: Test (engramd, http provider)
        run: cargo test -p engramd --features http
      - name: Test (engramd, docs — PDF/DOCX/XLSX ingest)
        run: cargo test -p engramd --features http,docs
      - name: Test (engram-agent, browser-cdp build path)
        run: cargo test -p engram-agent --features browser-cdp
      - name: Deterministic eval suite
        run: cargo run -p engram-eval

  # The VPS target: a single static musl binary with real providers. Tracks the size claim.
  musl:
    name: static musl build (VPS target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release (musl, http + docs — the shipped VPS/Docker shape)
        run: cargo build --release --target x86_64-unknown-linux-musl -p engramd --features http,docs
      - name: Report binary size
        run: |
          strip target/x86_64-unknown-linux-musl/release/engramd
          ls -lh target/x86_64-unknown-linux-musl/release/engramd

  # The Tauri desktop shell is workspace-excluded (heavy GUI deps), so it never gets built
  # by the jobs above. A type-check here catches a regression before it ships silently.
  desktop:
    name: desktop shell (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Install Tauri v2 system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libsoup-3.0-dev
      - name: Stage a placeholder sidecar for the type-check
        # tauri.conf.json declares `binaries/engramd` as an external binary; the real one is
        # staged at bundle time by scripts/desktop.sh. A placeholder lets `cargo check` validate
        # the desktop code without building the daemon in this job.
        run: |
          triple="$(rustc -vV | sed -n 's/host: //p')"
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/engramd-${triple}"
          chmod +x "desktop/src-tauri/binaries/engramd-${triple}"
      - name: Cargo check (desktop/src-tauri)
        working-directory: desktop/src-tauri
        run: cargo check
