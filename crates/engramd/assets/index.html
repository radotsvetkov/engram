  // beside it. The pane starts collapsed (width 0); artOpen()/artClose() toggle .arts-open.
  ARTS.open=false; ARTS.current=null; ARTS._sig='';
  document.getElementById('view').innerHTML = `<div class="chat-shell"><div class="chat">${offlineNotice()}
    <div class="feed" id="feed"></div><button class="jump-bottom" id="jumpBottom" onclick="feedToBottom()" title="Scroll to latest" aria-label="Scroll to latest"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg></button>${composerHtml('chat')}</div><div class="art-pane" id="artPane"></div></div>`;
  document.getElementById('composer').placeholder='Ask Engram anything...';
  wireComposer(); paintFeed();
}
// ---- markdown + code rendering for replies ----
// Engram's replies are model output, so they're untrusted: we escape EVERYTHING first, then
// transform the escaped text. Code fences are pulled out before escaping and re-inserted as
// highlighted blocks, so markdown inside them isn't mangled.
const HL_KW = {
  js:'const let var function return if else for while do class extends new await async import from export default try catch finally throw typeof instanceof of in this true false null undefined yield switch case break continue',
  ts:'const let var function return if else for while class interface type enum new await async import from export default try catch throw typeof of in this true false null undefined public private readonly extends implements',
  rust:'fn let mut pub use struct enum impl trait match if else for while loop return self Self async await move ref const static where as dyn box type mod crate true false Some None Ok Err unsafe',
  python:'def class return if elif else for while import from as with try except finally lambda True False None and or not in is pass yield async await raise global nonlocal',
  bash:'if then else elif fi for do done while case esac function echo export local return cd set source then',
  json:'true false null',
};
function hl(code, lang){
  const hashComment = ['python','py','bash','sh','shell','yaml','yml','toml','ruby','rb'].includes(lang);
  const cp = hashComment ? '(#[^\\n]*)' : '(\\/\\/[^\\n]*|\\/\\*[\\s\\S]*?\\*\\/)';
  const re = new RegExp(cp + '|("(?:[^"\\\\]|\\\\.)*"|\'(?:[^\'\\\\]|\\\\.)*\'|`(?:[^`\\\\]|\\\\.)*`)|(\\b\\d[\\d_.eExXa-fA-F]*\\b)|([A-Za-z_$][\\w$]*)|([\\s\\S])', 'g');
  const kw = new Set((HL_KW[lang]||HL_KW.js).split(' '));
  let out='';
  code.replace(re,(m,comment,str,num,word,other)=>{
    if(comment!=null) out+=`<span class="t-co">${esc(comment)}</span>`;
    else if(str!=null) out+=`<span class="t-st">${esc(str)}</span>`;
    else if(num!=null) out+=`<span class="t-nu">${esc(num)}</span>`;
    else if(word!=null) out+= kw.has(word)?`<span class="t-kw">${esc(word)}</span>`:esc(word);
    else out+=esc(other);
    return '';
  });
  return out;
}
let _cbN=0; const _cbStore={};
function codeBlock(code, lang){
  lang=(lang||'').toLowerCase(); const id='cb'+(_cbN++); _cbStore[id]=code;
  return `<div class="cb"><div class="cb-head"><span>${esc(lang||'code')}</span><button class="cb-copy" onclick="copyCode('${id}',this)">Copy</button></div><pre><code>${hl(code,lang)}</code></pre></div>`;
}
function copyCode(id,btn){ const t=_cbStore[id]||''; (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(()=>{ btn.textContent='Copied'; btn.classList.add('done'); setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('done'); },1200); }).catch(()=>{}); }
function mdInline(t){ // t is already escaped
  // Pull inline-code out FIRST (behind a NUL-delimited placeholder that cannot occur in escaped
  // text) so emphasis/link rules never run inside literal code spans, then restore it.
  const codes=[], S=String.fromCharCode(0);
  t = t.replace(/`([^`]+)`/g,(m,c)=>{ codes.push(c); return S+(codes.length-1)+S; });
  t = t
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,(m,txt,url)=>`<a href="${url.replace(/"/g,'%22').replace(/'/g,'%27')}" target="_blank" rel="noopener">${txt}</a>`);
  return t.replace(new RegExp(S+'(\\d+)'+S,'g'),(m,i)=>`<code class="ic">${codes[+i]}</code>`);
}
function mdToHtml(raw){
  const blocks=[];
  const text=String(raw).replace(/```([\w+#-]*)\n?([\s\S]*?)```/g,(m,lang,code)=>{ blocks.push(codeBlock(code.replace(/\n$/,''),lang)); return `␀B${blocks.length-1}␀`; });
  const lines=text.split('\n'); const out=[]; let i=0;
  // GFM table helpers: a header row, a |---|:--:|---| separator, then body rows.
  const tIsSep=l=>/^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(l);
  const tIsRow=l=>/\|/.test(l)&&/\S/.test(l);
  const tCells=l=>l.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
  const isBlock=l=>/^\s*$/.test(l)||/^␀B\d+␀$/.test(l)||/^#{1,4}\s/.test(l)||/^\s*([-*]|\d+\.)\s+/.test(l)||/^\s*>\s?/.test(l)||/^---+\s*$/.test(l)||tIsRow(l);
  while(i<lines.length){
    const ln=lines[i];
    const bm=ln.match(/^␀B(\d+)␀$/); if(bm){ out.push(blocks[+bm[1]]); i++; continue; }
    if(/^\s*$/.test(ln)){ i++; continue; }
    if(tIsRow(ln)&&i+1<lines.length&&tIsSep(lines[i+1])){
      const head=tCells(ln), sep=tCells(lines[i+1]);
      const al=sep.map(s=>{const l=s.startsWith(':'),r=s.endsWith(':');return l&&r?'center':r?'right':'left';});
      i+=2; const body=[];
      while(i<lines.length&&tIsRow(lines[i])&&!tIsSep(lines[i])){ body.push(tCells(lines[i])); i++; }
      const th=head.map((h,c)=>`<th style="text-align:${al[c]||'left'}">${mdInline(esc(h))}</th>`).join('');
      const tb=body.map(r=>`<tr>${head.map((_,c)=>`<td style="text-align:${al[c]||'left'}">${mdInline(esc(r[c]||''))}</td>`).join('')}</tr>`).join('');
      out.push(`<div class="md-table-wrap"><table class="md-table"><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table></div>`);
      continue;
    }
    const hm=ln.match(/^(#{1,4})\s+(.*)$/); if(hm){ out.push(`<div class="md-h md-h${hm[1].length}">${mdInline(esc(hm[2]))}</div>`); i++; continue; }
    if(/^---+\s*$/.test(ln)){ out.push('<hr>'); i++; continue; }
    if(/^\s*>\s?/.test(ln)){ const buf=[]; while(i<lines.length&&/^\s*>\s?/.test(lines[i])){ buf.push(mdInline(esc(lines[i].replace(/^\s*>\s?/,'')))); i++; } out.push(`<blockquote>${buf.join('<br>')}</blockquote>`); continue; }
    if(/^\s*([-*]|\d+\.)\s+/.test(ln)){ const ol=/^\s*\d+\./.test(ln); const buf=[]; while(i<lines.length&&/^\s*([-*]|\d+\.)\s+/.test(lines[i])){ buf.push(`<li>${mdInline(esc(lines[i].replace(/^\s*([-*]|\d+\.)\s+/,'')))}</li>`); i++; } out.push(`<${ol?'ol':'ul'} class="md-list">${buf.join('')}</${ol?'ol':'ul'}>`); continue; }
    const buf=[]; while(i<lines.length&&!isBlock(lines[i])){ buf.push(mdInline(esc(lines[i]))); i++; } out.push(`<p>${buf.join('<br>')}</p>`);
  }
  return out.join('');
}
const thinkingDots='<span class="thinking"><i></i><i></i><i></i></span>';
// A browser_screenshot step carries the saved image path in its args; render it inline so a task
// that drives the browser SHOWS what it saw, right in the run trail / chat. Served workdir-confined.
function stepShotHtml(s){
  if(!s || s.tool!=='browser_screenshot' || s.ok===false) return '';
  let p=(s.args&&(s.args.path))||'screenshot.png';
  if(typeof p!=='string') return '';
  const u=`/v1/screenshot?path=${encodeURIComponent(p)}&t=${Date.now()}`;
  return `<div class="step-shot"><img loading="lazy" src="${escAttr(u)}" alt="browser screenshot" onclick="imgLightbox('${escAttr(u)}')" onerror="this.closest('.step-shot').remove()"></div>`;
}
// Click a screenshot (or any image) to view it full-size in a dismissible overlay.
function imgLightbox(src){
  const ov=document.createElement('div'); ov.className='img-lb'; ov.onclick=()=>ov.remove();
  ov.innerHTML=`<img src="${escAttr(src)}" alt=""><button class="img-lb-x" aria-label="Close">&times;</button>`;
  document.body.appendChild(ov);
  const esc=e=>{ if(e.key==='Escape'){ ov.remove(); document.removeEventListener('keydown',esc); } };
  document.addEventListener('keydown',esc);
}
// The welcoming empty state for a fresh chat - the brand mark, what makes Engram different, and a
// few one-tap starters. Chips send through the normal chat path.
const CW_MARK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="19" cy="16" r="2.9" fill="#45c8a8" stroke="none" opacity=".16"/><path d="M12 9V5.5"/><path d="M14.6 13.5 17.6 15.2"/><path d="M9.4 13.5 6.4 15.2"/><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r=".95" fill="currentColor" stroke="none"/><circle cx="12" cy="3.9" r="1.6"/><circle cx="5" cy="16" r="1.6"/><circle cx="19" cy="16" r="1.6" fill="#45c8a8" stroke="#45c8a8"/></svg>';
const CW_STARTERS=['Summarize what you know about me','What did we talk about recently?','Draft a plan for my week','How does your memory work?'];
function chatWelcome(){
  return `<div class="chat-welcome">
    <div class="cw-mark">${CW_MARK}</div>

}
// Friendly labels for the agent's tool steps shown in chat (the glass box).
const CHAT_TOOL_LABEL={browser_open:'opened browser',browser_navigate:'opened browser',browser_screenshot:'took a screenshot',browser_click:'clicked',browser_type:'typed',browser_read:'read the page',browser_extract:'extracted from page',vision_analyze:'looked at the image',image_generate:'generated an image',text_to_speech:'spoke',web_fetch:'fetched a page',web_search:'searched the web',send_message:'sent a message',shell:'ran a command',read_file:'read a file',write_file:'wrote a file',edit_file:'edited a file',list_dir:'listed files',glob:'searched files',grep:'searched text',memory_recall:'recalled memory',memory_remember:'saved to memory',update_plan:'planned',delegate:'delegated'};
function paintFeed(toBottom=true){
  const f=document.getElementById('feed'); if(!f) return;
  _cbN=0; for(const k in _cbStore) delete _cbStore[k];   // rebuilt below; ids are per-paint, so clearing here bounds the store
  const s=WS.byId[WS.activeSession], log=s?(s.messages||[]):[];
  f.innerHTML = log.map(m=>{
    if(m.role==='user') return `<div class="msg user">${esc(m.text)}</div>`;
    const refs=(m.recalled_refs&&m.recalled_refs.length)?m.recalled_refs:null;
    const ribbon = refs
      ? `<div class="ribbon"><span class="rb-lbl">grounded on ${refs.length}</span>${refs.slice(0,6).map(r=>{const reg=BRAIN_REGIONS[r.region]||BRAIN_REGIONS.semantic; return `<span class="recall clk" style="--lc:${reg.color}" title="${escAttr(r.text)}" onclick="recallOpen(${r.id|0})"><span class="rg">◇</span> ${esc((r.text||'').replace(/\s+/g,' ').slice(0,48))}</span>`;}).join('')}</div>`
      : (m.recalled&&m.recalled.length)?`<div class="ribbon">${m.recalled.slice(0,5).map(r=>`<span class="recall" title="${escAttr(r)}"><span class="rg">◇</span> ${esc((r||'').replace(/\s+/g,' ').slice(0,54))}</span>`).join('')}</div>`:'';
    const learned=(m.learned&&m.learned.length)?`<div class="learned">learned about you · ${m.learned.map(esc).join(' · ')}</div>`:'';
    // The agent's tool activity (browse/shell/files/vision...) - the glass box, shown above the
    // answer with any screenshots inline. Empty for a plain conversational reply (no tools used).
    const steps=(m.steps&&m.steps.length)?`<div class="chat-steps">${m.steps.map(st=>{
      const lbl=CHAT_TOOL_LABEL[st.tool]||st.tool;
      // A file the agent wrote/edited is clickable: open it in the right-side canvas (like Claude).
      const fpath=(st.args&&(st.args.path||st.args.file))||'';
      const openable=st.ok && fpath && ['write_file','edit_file','append_file'].includes(st.tool);
      const clk=openable?` clk" data-open="1" onclick="artOpenFile(WS.activeSession, ${escAttr(JSON.stringify(fpath))})`:'';
      const chip=`<span class="cstep${st.ok?'':' bad'}${clk}" title="${escAttr(openable?('Open '+fpath):(st.observation||'').replace(/\s+/g,' ').slice(0,180))}"><span class="cs-ic">${st.ok?'✓':'✕'}</span>${esc(lbl)}${openable?'<span class="cs-open">↗</span>':''}</span>`;
      return chip+stepShotHtml(st);
    }).join('')}</div>`:'';
    // The model's live "what I'm doing" commentary (narration) — shown above the tool chips so a
    // long run reads as activity, not a silent wait.
    const notes=(m.notes&&m.notes.length)?`<div class="chat-notes">${m.notes.map(n=>`<div class="cnote">${mdInline(esc(n))}</div>`).join('')}</div>`:'';
    const body = m.text ? (mdToHtml(m.text) + (m.streaming?'<span class="caret"></span>':'')) : (m.streaming?(notes||steps?'':thinkingIndicator(m.t0)):'...');
    return `<div>${notes}${steps}<div class="msg engram"${m.streaming?' id="streamMsg"':''}>${body}</div>${ribbon}${learned}</div>`;
  }).join('') || chatWelcome();
  artsAfterPaint();   // detect substantial code/doc blocks, inject "Open in canvas" chips, sync the pane
  if(toBottom) f.scrollTop=f.scrollHeight;
  updateJumpBtn();
}
// A coalesced, sticky-bottom repaint for streaming step events: rebuild at most once per frame, and
// only auto-scroll if the reader is already near the bottom — so a long multi-step run no longer
// yanks the view up/down on every tool step (the "jumpy/klinky" chat).
let _feedRAF=0;
function paintFeedSticky(){
  if(_feedRAF) return;
  _feedRAF=requestAnimationFrame(()=>{
    _feedRAF=0;
    const f=document.getElementById('feed');
    const stick = !f || (f.scrollHeight - f.scrollTop - f.clientHeight) < 160;
    paintFeed(stick);
  });
}
// During streaming we update ONLY the in-flight message node (not the whole feed) and coalesce
// token bursts into one paint per animation frame. Rebuilding the entire feed per token - re-running
// markdown on every prior message plus the code-block scan - was the source of the flicker, the
// lost text selection, and the scroll thrash.
let _streamRAF=0;
function streamTick(msg){
  if(_streamRAF) return;                       // coalesce: at most one DOM write per frame
  _streamRAF=requestAnimationFrame(()=>{
    _streamRAF=0;
    if(!msg.streaming) return;                 // the final full paint already ran
    const el=document.getElementById('streamMsg'), f=document.getElementById('feed');
    if(!el){ paintFeed(); return; }            // structure changed (e.g. session switch) -> full paint
    // Sticky bottom: only auto-scroll when the reader is already near the end, so a long reply
    // doesn't yank them back down while they've scrolled up to read.
    const stick = !f || (f.scrollHeight - f.scrollTop - f.clientHeight) < 160;
    el.innerHTML = mdToHtml(msg.text||'') + '<span class="caret"></span>';
    if(stick && f) f.scrollTop=f.scrollHeight;
    updateJumpBtn();
  });
}
async function chatSay(text, attachments){
  attachments = Array.isArray(attachments) ? attachments : [];
  let sid=WS.activeSession, sess=WS.byId[sid];
  if(!sess){ const s=await newSession(false); if(!s) return; sid=s.id; sess=WS.byId[sid]; }
  if(!sess.messages) sess.messages=[];
  sess.messages.push({role:'user',text});
  const meta=WS.sessions.find(x=>x.id===sid);
  if(meta && (!meta.title || meta.title==='New chat')){ meta.title=text.replace(/\s+/g,' ').slice(0,42); document.getElementById('viewname').textContent=curProject().name+' / '+meta.title; }
  if(meta){ WS.sessions=[meta, ...WS.sessions.filter(x=>x.id!==sid)]; }   // bump to top
  _busySessions.add(sid); renderSidebar();
  const msg={role:'engram',text:'',streaming:true,t0:Date.now()}; sess.messages.push(msg); paintFeed();
  _chatAbort=new AbortController(); setChatBusy(true);
  try {
    const r = await fetch('/v1/converse/stream',{method:'POST',headers:{...AUTH,'content-type':'application/json'},body:JSON.stringify({text, session:sid, attachments}), signal:_chatAbort.signal});
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
    for(;;){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        let ev='message'; const dl=[];
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')) dl.push(line.slice(5).replace(/^ /,''));
        }
        const data=dl.join('\n');
        // The reply text always lands in its own session's object; only repaint if that session
        // is still on screen (so a mid-stream switch doesn't render into the wrong feed).
        const live = WS.activeSession===sid;
        if(ev==='token'){ msg.text+=data; if(live) streamTick(msg); }
        else if(ev==='step'){ try{ const d=JSON.parse(data); (msg.steps=msg.steps||[]).push(d); if(live) paintFeedSticky(); }catch(_){} }
        else if(ev==='narration'){ try{ const d=JSON.parse(data); if(d.text&&d.text.trim()){ (msg.notes=msg.notes||[]).push(d.text.trim()); if(live) paintFeedSticky(); } }catch(_){} }
        else if(ev==='done'){ try{const d=JSON.parse(data); if(d.reply) msg.text=d.reply; msg.recalled=d.recalled; msg.recalled_refs=d.recalled_refs; msg.learned=d.learned; if(d.steps) msg.steps=d.steps;}catch(_){} if(typeof _artifacts==='object') _artifacts.items=null; if(live) paintFeed(); }
        else if(ev==='error'){ msg.text=friendlyChatError(data); if(live) paintFeed(); }
      }
    }
    if(!msg.text) msg.text='(no reply)';
    msg.streaming=false; if(typeof _artifacts==='object') _artifacts.items=null; if(WS.activeSession===sid) paintFeed();
  } catch(e){
    const stopped = e && e.name==='AbortError';
    msg.text = stopped ? (msg.text || '(stopped)') : (msg.text || friendlyChatError(e.message||'try again'));
    msg.streaming=false; if(WS.activeSession===sid) paintFeed();
  } finally {
    setChatBusy(false); _chatAbort=null;
    _busySessions.delete(sid); renderSidebar();   // stop the sidebar blink once this run finishes
  }
}
// Turn a raw provider/transport error into a clear, actionable message instead of a scary dump.
function friendlyChatError(data){
  const s=String(data||'');
  if(/429|rate.?limit|too many requests/i.test(s)) return '⚠️ Your model provider is rate-limiting requests (429). Wait a few seconds and try again — or switch to a less limited model in Settings (e.g. a paid Anthropic key). Mistral\'s free tier limits requests per minute.';
  if(/\b401\b|\b403\b|invalid.*key|unauthor/i.test(s)) return '⚠️ The provider rejected the API key. Check it in Settings › Keys & security.';
  if(/timeout|timed out/i.test(s)) return '⚠️ The model took too long to respond. Try again, or pick a faster model.';
  return '⚠️ Couldn\'t complete the request — '+s;
}

function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
// 3D brain: a force-directed graph in space you can ORBIT (drag) and ZOOM (wheel). The layout
// SETTLES - forces cool to rest (alpha decay) so nodes stop moving: no eye-jitter, and they stay put
// to click. Anatomy is not claimed: regions cluster and depth is for exploration, not a lobe map.
const BRAIN_ANCH = {            // unit tetrahedron - four well-separated region anchors in 3D space
  identity:   [0, 0.9, 0],
  semantic:   [0.92, -0.32, 0.10],
  episodic:   [-0.46, -0.32, 0.80],
  procedural: [-0.46, -0.32, -0.80],
};
// Respect the OS "reduce motion" setting: skip the formation/birth animation (nodes appear at rest).
const BRAIN_REDUCED = (()=>{ try{ return matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(_){ return false; } })();
function brainNode(n, born){
  const reg=BRAIN_REGIONS[n.region]?n.region:'semantic', a=BRAIN_ANCH[reg];
  const tierA=n.tier==='hot'?1:n.tier==='warm'?0.72:0.5;
  const r=3.2+(n.importance||0.3)*4.5+Math.min(6,Math.log2((n.access||0)+1)*1.4);
  const h=n.id*2.3999632;       // stable pseudo-random offset around the anchor (not re-random per load)
  return { ...n, reg, r, tierA, born,
    x:a[0]+Math.cos(h)*0.32, y:a[1]+Math.sin(h*1.7)*0.32, z:a[2]+Math.cos(h*2.3)*0.32,
    vx:0, vy:0, vz:0, sx:0, sy:0, depth:0, ps:1 };
}
function brainInit(raw){
  if(BRAIN && BRAIN.raf) cancelAnimationFrame(BRAIN.raf);
  const canvas=document.getElementById('brainCanvas'); if(!canvas) return;
  const B = BRAIN = { canvas, ctx:canvas.getContext('2d'), nodes:[], hover:null, sel:null,
    mouse:{x:-1,y:-1}, dim:new Set(), matched:null, t:0, raf:0, w:0,h:0,cx:0,cy:0, R:200,
    dpr:Math.min(2,window.devicePixelRatio||1), cam:{yaw:0.6, pitch:-0.30, zoom:1}, drag:null, alpha:1 };
  B.nodes = raw.map((n,i)=>brainNode(n, BRAIN_REDUCED?1:-i*0.016));   // stagger the birth so the brain assembles (unless reduce-motion)
  brainResize();
  brainWireInput(canvas);
  if(!window._brainResizeWired){ window._brainResizeWired=true; window.addEventListener('resize', ()=>brainResize()); }
  if(!window._brainPollWired){ window._brainPollWired=true; setInterval(brainPoll, 3500); }

// Merge a fresh graph into the LIVE brain without resetting it: new memories arrive with born:0 (so
// they animate in), existing nodes refresh their tier/size, and forgotten nodes drop.
function brainMergeGraph(raw){
  const B=BRAIN; if(!B) return 0;
  const byId=new Map(B.nodes.map(n=>[n.id,n])); const fresh=new Set(); let added=0;
  for(const n of raw){ fresh.add(n.id);
    const tierA=n.tier==='hot'?1:n.tier==='warm'?0.72:0.5;
    const r=3.2+(n.importance||0.3)*4.5+Math.min(6,Math.log2((n.access||0)+1)*1.4);
    const ex=byId.get(n.id);
    if(ex){ ex.tier=n.tier; ex.access=n.access; ex.importance=n.importance; ex.tierA=tierA; ex.r=r; continue; }
    B.nodes.push(brainNode(n, BRAIN_REDUCED?1:0)); added++;
  }
  const before=B.nodes.length;
  if(raw.length) B.nodes=B.nodes.filter(n=>fresh.has(n.id));
  // The synapse cache (B.edges) stores node ARRAY INDICES; adding or removing a node shifts them, so
  // any change to the node set must invalidate the cache or the next frame draws edges to wrong/gone
  // nodes. (brainForget already resets it; this covers the live poll's merges.)
  if(added>0 || B.nodes.length!==before) B.edges=null;
  // Deliberately do NOT re-warm the settled layout: a new memory appears at its own anchor spot
  // (with the birth animation) without shaking every other node - the brain stays calm to read.
  return added;
}
async function brainPoll(){

function brainResize(){

function brainLoop(){ const B=BRAIN; if(!B) return;

function brainStep(){
  const B=BRAIN, ns=B.nodes;

  if(B.alpha>0.015){ const al=B.alpha;                                  // forces fade out -> settle
    for(let i=0;i<ns.length;i++){ const n=ns[i], a=BRAIN_ANCH[n.reg];
      let fx=(a[0]-n.x)*0.022, fy=(a[1]-n.y)*0.022, fz=(a[2]-n.z)*0.022;
      for(let j=0;j<ns.length;j++){ if(i===j)continue; const m=ns[j];
        let dx=n.x-m.x,dy=n.y-m.y,dz=n.z-m.z,d2=dx*dx+dy*dy+dz*dz; if(d2<0.0004)d2=0.0004;
        if(d2<0.55){ const f=(n.reg===m.reg?0.00035:0.00062)/d2; fx+=dx*f; fy+=dy*f; fz+=dz*f; } }
      n.vx=(n.vx+fx)*0.80; n.vy=(n.vy+fy)*0.80; n.vz=(n.vz+fz)*0.80;

    const dep=(na.depth+nb.depth)/2, da=0.55+0.45*((dep+1.2)/2.4);
    ctx.strokeStyle=hexA(reg.color, dim?0.03:0.18*da); ctx.lineWidth=Math.max(0.5, 0.85*Math.min(na.ps,nb.ps));
    ctx.beginPath(); ctx.moveTo(na.sx,na.sy); ctx.lineTo(nb.sx,nb.sy); ctx.stroke(); }
  for(const n of order){ const a=ap[n.reg], reg=BRAIN_REGIONS[n.reg], dim=B.dim.has(n.reg)||(B.matched&&!B.matched.has(n.id));
    ctx.strokeStyle=hexA(reg.color, dim?0.015:0.04); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(n.sx,n.sy); ctx.lineTo(a[0],a[1]); ctx.stroke(); }
  for(const k in BRAIN_REGIONS){ const a=ap[k], reg=BRAIN_REGIONS[k], dim=B.dim.has(k);
    ctx.beginPath(); ctx.arc(a[0],a[1],5*a[3],0,7); ctx.fillStyle=hexA(reg.color,dim?0.3:0.9); ctx.fill();
    ctx.fillStyle=hexA(reg.color,dim?0.3:0.72); ctx.font='600 11px ui-sans-serif,system-ui'; ctx.textAlign='center'; ctx.fillText(reg.label.toUpperCase(), a[0], a[1]-13); }
  for(const n of order){ const reg=BRAIN_REGIONS[n.reg], dim=B.dim.has(n.reg)||(B.matched&&!B.matched.has(n.id)), hit=B.matched&&B.matched.has(n.id);
    const b=Math.max(0,Math.min(1,n.born==null?1:n.born)), grow=1-Math.pow(1-b,3);
    const da=0.42+0.58*((n.depth+1.2)/2.4), rr=Math.max(1.3, n.r*grow*Math.min(2,n.ps)*0.82);
    if(b<1){ ctx.beginPath(); ctx.arc(n.sx,n.sy, rr+4+(1-b)*16,0,7); ctx.strokeStyle=hexA(reg.color,0.5*(1-b)); ctx.lineWidth=1.5; ctx.stroke(); }
    if(hit||n===B.hover){ const pulse=hit?(0.55+0.45*Math.sin(B.t*0.12)):1; ctx.beginPath(); ctx.arc(n.sx,n.sy,rr+5+(hit?3*pulse:2),0,7); ctx.fillStyle=hexA(reg.color,0.16*(hit?pulse:1)); ctx.fill(); }
    // Neural glow: each node casts a soft halo in its region colour, brighter for hot/active and
    // matched nodes, so the cloud reads as luminous synapses rather than flat dots.
    if(!dim){ ctx.shadowColor=reg.color; ctx.shadowBlur=(hit?15:(n.tier==='hot'?10:5))*Math.min(1.6,n.ps); } else { ctx.shadowBlur=0; }
    ctx.beginPath(); ctx.arc(n.sx,n.sy,rr,0,7); ctx.fillStyle=hexA(reg.color,(dim?0.1:n.tierA)*da); ctx.fill();
    ctx.shadowBlur=0;
    if(n.tier==='hot'&&!dim){ ctx.strokeStyle=hexA(reg.color,0.5*da); ctx.lineWidth=1; ctx.stroke(); }
    if(n===B.hover||n===B.sel){ ctx.strokeStyle='#fff'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(n.sx,n.sy,rr+2.5,0,7); ctx.stroke(); } }
  brainTip();
}
function brainTip(){
  const tip=document.getElementById('brainTip'); if(!tip) return; const B=BRAIN, n=B.hover;
  if(!n){ tip.hidden=true; return; } const reg=BRAIN_REGIONS[n.reg];
  tip.innerHTML=`<div class="r" style="color:${reg.color}">${reg.label} · ${n.tier}</div>${esc(n.text)}<div class="m">accessed ${n.access||0}× · click to open</div>`;
  tip.hidden=false; let x=B.mouse.x+16, y=B.mouse.y+14;

}
// Orbit (drag), zoom (wheel), click-to-open. A drag rotates the camera; a press that barely moves is
// treated as a click on the node under the cursor.
function brainWireInput(canvas){
  canvas.onmousemove=e=>{ const r=canvas.getBoundingClientRect(); BRAIN.mouse.x=e.clientX-r.left; BRAIN.mouse.y=e.clientY-r.top; };
  canvas.onmouseleave=()=>{ if(BRAIN && !BRAIN.drag){ BRAIN.mouse.x=-1; BRAIN.mouse.y=-1; } };
  canvas.onmousedown=e=>{ if(BRAIN) BRAIN.drag={lx:e.clientX, ly:e.clientY, moved:0}; brainFadeHint(); };
  canvas.onwheel=e=>{ e.preventDefault(); if(!BRAIN) return; const z=BRAIN.cam.zoom*(1-e.deltaY*0.0014); BRAIN.cam.zoom=Math.max(0.45,Math.min(4,z)); brainFadeHint(); };
  canvas.style.cursor='grab';
  function brainFadeHint(){ document.querySelector('.brain-hint')?.classList.add('faded'); }
  if(!window._brainDragWired){ window._brainDragWired=true;
    window.addEventListener('mousemove', e=>{ const B=BRAIN; if(!B||!B.drag) return;
      const dx=e.clientX-B.drag.lx, dy=e.clientY-B.drag.ly; B.drag.moved+=Math.abs(dx)+Math.abs(dy); B.drag.lx=e.clientX; B.drag.ly=e.clientY;
      B.cam.yaw+=dx*0.008; B.cam.pitch=Math.max(-1.4,Math.min(1.4, B.cam.pitch+dy*0.008));
      if(B.canvas) B.canvas.style.cursor='grabbing'; });
    window.addEventListener('mouseup', ()=>{ const B=BRAIN; if(!B||!B.drag) return; const wasClick=B.drag.moved<5; B.drag=null;
      if(B.canvas) B.canvas.style.cursor='grab';
      if(wasClick){ B.hover?brainShowDetail(B.hover):brainCloseDetail(); } });
  }
}

async function brainRecentLoad(){
  const p=document.getElementById('brainRecent'); if(!p) return;
  const regs=[['','All'],['identity','Identity'],['semantic','Semantic'],['episodic','Episodic'],['procedural','Procedural']];
  const tabs=regs.map(([v,l])=>`<button class="${_recentRegion===v?'on':''}" onclick="_recentRegion='${v}';brainRecentLoad()">${esc(l)}</button>`).join('');

    else {
      const all=await Promise.all(['identity','semantic','episodic','procedural'].map(r=>J('/v1/memory/recent?n=15&region='+r).catch(()=>[])));
      recs=all.flat().sort((a,b)=>(b.created_ms||b.id||0)-(a.created_ms||a.id||0)).slice(0,40);
    }

      : '<div class="rp-empty">no memories in this region yet</div>';
  }catch(e){ const list=document.getElementById('rpList'); if(list) list.innerHTML='<div class="rp-empty">could not load</div>'; }
}
// Forget (delete) a memory from the brain - it stops being recalled; the removal is itself signed
// to the ledger (auditable, not a silent erase).
async function brainForget(id){
  if(!await askConfirm({title:'Forget this memory?',message:'It will stop being recalled. The removal is appended to the signed ledger, so it stays auditable.',ok:'Forget',danger:true})) return;

    if(typeof renderMemory==='function') renderMemory();   // refresh the graph + region counts
  }catch(e){ notify('Couldn\'t forget - '+((e&&e.message)||'error')); }
}

      ? `<span class="sk-pill ok" title="Improvements are scored by exact match against ${runs} recorded (input, accepted-output) pair${runs===1?'':'s'}.">verified · ${runs} scored run${runs===1?'':'s'}</span>`
      : `<span class="sk-pill warn" title="No recorded (input, accepted-output) pairs to score against yet - so an improvement can't be measured. Honest signal, not a guess.">unverified - no scored runs yet</span>`;

      </div>
    </div>`;

async function skillImproveSave(id,btn){

  if(!wat){ notify('Paste the new version as WAT source'); return; }
  const ok=ov.querySelector('.ask-ok'); if(ok){ ok.disabled=true; ok.textContent='Replaying...'; }
  try{ const r=await J('/v1/skills/'+encodeURIComponent(id)+'/improve',{method:'POST',headers:MIND_JSON,body:JSON.stringify({wat})}); ov.remove();

// Skill pipeline (swarm): chain skills so each one's output feeds the next. POSTs /v1/swarm.
let _pipeline=[];
async function openPipeline(){
  _pipeline=[];
  let ids=[]; try{ const sk=await J('/v1/skills'); ids=(sk.skills||[]).map(s=>s.id); }catch(_){}
  const ov=document.createElement('div'); ov.className='overlay ask';
  ov.innerHTML=`<div class="ask-card" style="width:min(560px,93vw)">
    <div class="ask-title">Run a skill pipeline</div>
    <div class="ask-msg">Chain skills so each one's output feeds the next. Click skills to build the chain, give it an input, and run - every step signed.</div>
    <div class="pl-pool">${ids.length?ids.map(id=>`<button class="pl-chip" onclick="pipelineAdd('${escAttr(id)}')">${esc(id)}</button>`).join(''):'<span class="rp-empty">no skills yet</span>'}</div>
    <div class="pl-chain" id="plChain"><span class="pl-empty">click skills above to build the chain</span></div>
    <textarea class="ask-input" id="plInput" rows="2" placeholder="input for the first skill" style="resize:vertical;font:inherit"></textarea>
    <div id="plOut" class="pl-out" hidden></div>
    <div class="ask-actions"><button class="ask-ghost" onclick="this.closest('.overlay').remove()">Close</button><button class="ask-ok" onclick="pipelineRun(this)">Run pipeline</button></div>
  </div>`;
  document.body.appendChild(ov);
}
function pipelineAdd(id){ _pipeline.push(id); pipelineRender(); }
function pipelineDel(i){ _pipeline.splice(i,1); pipelineRender(); }
function pipelineRender(){ const c=document.getElementById('plChain'); if(!c) return;
  c.innerHTML = _pipeline.length ? _pipeline.map((id,i)=>`<span class="pl-step">${esc(id)}<button onclick="pipelineDel(${i})" aria-label="remove">×</button></span>`).join('<span class="pl-arr">→</span>') : '<span class="pl-empty">click skills above to build the chain</span>';
}
async function pipelineRun(btn){
  if(!_pipeline.length){ notify('Add at least one skill to the chain'); return; }
  const ov=btn.closest('.overlay'); const input=ov.querySelector('#plInput').value;
  const out=ov.querySelector('#plOut'); btn.disabled=true; btn.textContent='Running...';
  out.hidden=false; out.innerHTML=`<div class="pl-running">${thinkingDots} running pipeline...</div>`;
  try{ const r=await J('/v1/swarm',{method:'POST',headers:MIND_JSON,body:JSON.stringify({steps:_pipeline,input})});
    out.innerHTML=`<div class="pl-lbl">Output after ${(_pipeline.length)} step${_pipeline.length===1?'':'s'}</div><pre class="pl-pre">${esc(String(r.output||''))}</pre>`;
  }catch(e){ out.innerHTML=`<div class="pl-err">Pipeline failed - ${esc((e&&e.message)||'error')}</div>`; }
  finally{ btn.disabled=false; btn.textContent='Run again'; }
}

// Author this agent's signed standing autonomy policy — the allowlist + budget it may egress within
// while running unattended. Signed server-side with the brain key; thereafter scheduled runs need no

async function agentSavePolicy(id, btn){
  const ov=btn.closest('.overlay');
  const lines = sel => ov.querySelector(sel).value.split('\n').map(s=>s.trim()).filter(Boolean);
  const body = JSON.stringify({
    enabled: true,
    allowed_egress: lines('#apAllow'),
    hardline_floor: lines('#apFloor'),
    allowed_actions: ['send','post','pay'].filter(c=>ov.querySelector('#apAct_'+c).checked),

// Export the non-secret settings as a portable JSON file. The /v1/config view is already
// redacted (no keys), so a backup can never leak a secret; restoring re-enters keys by hand.
async function exportSettings(){
  try{
    const c = await J('/v1/config');

      _engram_settings: 1,

      embed: c.embed, cost: c.cost, mcp: c.mcp || [],
    };
    const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'engram-settings.json';
    document.body.appendChild(a); a.click(); a.remove();

async function importSettings(input){
  const file = input.files && input.files[0]; input.value='';
  if(!file) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    // Only ever apply the known non-secret fields - never trust arbitrary keys from a file.
    const patch = {};
    if(data.provider && typeof data.provider==='object'){
      patch.provider = { kind:data.provider.kind||'mock', base_url:data.provider.base_url||'', model:data.provider.model||'' };
    }
    if(data.embed && typeof data.embed==='object') patch.embed = { kind:data.embed.kind||'trigram', model_dir:data.embed.model_dir||'' };
    if(data.cost && typeof data.cost==='object' && data.cost.task_token_budget) patch.cost = { task_token_budget: parseInt(data.cost.task_token_budget,10)||250000 };
    if(Array.isArray(data.mcp)) patch.mcp = data.mcp.filter(s=>s&&s.name&&s.command).map(s=>({name:String(s.name),command:String(s.command),args:Array.isArray(s.args)?s.args.map(String):[]}));
    if(!Object.keys(patch).length){ notify('No recognizable settings in that file'); return; }
    await J('/v1/config',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(patch)});
    await ccReload();
    notify('Settings imported - re-enter any API keys','ok');
  }catch(e){ notify('Import failed: '+e.message); }
}

  if(has('ekind')) patch.embed={ kind:gv('ekind'), model_dir:gv('edir') };
  if(has('sshell')||has('stok')||has('ssec')||has('sbackend')||has('sworktree')||has('sskillauthor')||has('sautodistill')||has('toollist')){ patch.security={}; if(has('sshell')) patch.security.allow_shell=document.getElementById('sshell').checked;
    const t=gv('stok'); if(t) patch.security.api_token=t; const s=gv('ssec'); if(s) patch.security.channel_secret=s;
    if(has('sbackend')){ patch.security.shell_backend=gv('sbackend'); patch.security.shell_target=gv('starget'); }
    if(has('sworktree')) patch.security.enable_worktree_isolation=document.getElementById('sworktree').checked;
    if(has('sskillauthor')) patch.security.disable_skill_author=!document.getElementById('sskillauthor').checked;
    if(has('sautodistill')) patch.security.auto_distill_skills=document.getElementById('sautodistill').checked;
    if(has('toollist')) patch.security.disabled_tools=[...document.querySelectorAll('#toollist input[data-tool]')].filter(i=>!i.checked).map(i=>i.getAttribute('data-tool')); }
  if(has('cbudget')) patch.cost={ task_token_budget: Math.max(1000, parseInt(gv('cbudget'),10)||250000) };
  if(has('mvision')) patch.media={ vision_model:gv('mvision'), image_model:gv('mimage'), tts_model:gv('mtts'), stt_model:gv('mstt') };
  if(has('bchrome')||has('bport')) patch.browser={ chrome_path:gv('bchrome'), cdp_port: Math.max(0, Math.min(65535, parseInt(gv('bport'),10)||0)) };
  if(has('mcplist')) patch.mcp=collectMcpV2();
  return patch;
}

  _restarting=true; notify('Restarting...','ok');
  try{ await J('/v1/restart',{method:'POST',headers:{'content-type':'application/json'},body:'{}'}); }catch(_){/* the connection drops as it exits - expected */}
  let n=0; const iv=setInterval(async()=>{
    n++;
    try{ const h=await fetch('/health'); if(h.ok){ clearInterval(iv); _restarting=false; notify('Engram is back','ok'); ccReload(); poll(); return; } }catch(_){}
    if(n>40){ clearInterval(iv); _restarting=false; notify('Engram didn\'t come back on its own - relaunch the app or start the daemon.'); }
  }, 500);
}

  el.innerHTML='<div class="r-head"><span class="r-seal"></span><span class="r-title">Ledger receipt</span><span class="r-sub">reading...</span><button class="r-x" onclick="closeReceipt()">✕</button></div><div class="r-body"><div class="r-row"><span></span><span class="r-kind">walking the signed chain...</span><span></span></div></div>';
  try{ const [tail,pk,v]=await Promise.all([J('/v1/ledger/tail?n=8'),J('/v1/ledger/pubkey'),J('/v1/ledger/verify')]); renderReceipt(tail,pk,v); }
  catch(e){ const s=el.querySelector('.r-sub'); if(s){ s.textContent='unreachable'; s.style.color='var(--danger)'; } }
}
function renderReceipt(tail,pk,v){
  const el=document.getElementById('receipt');
  const head=(tail&&tail.length)?tail[tail.length-1].hash:'';
  const rows=(tail||[]).slice().reverse().map(e=>{
    const act=e.actor?`<small>· ${esc(e.actor)}</small>`:'';
    return `<div class="r-row"><span class="r-seq">${e.seq}</span><span class="r-kind">${esc(e.kind||'')} ${act}</span>`+
      `<span class="r-hash" title="copy ${esc(e.hash||'')}" onclick="copyHash('${esc(e.hash||'')}')">${esc((e.hash||'').slice(0,10))}...</span></div>`;
  }).join('');
  el.innerHTML=`
    <div class="r-head"><span class="r-seal"></span><span class="r-title">Ledger receipt</span>
      <span class="r-sub" style="color:${v&&v.ok?'var(--accent)':'var(--danger)'}">${v&&v.ok?('✓ verified · '+v.entries):'⚠ tamper'}</span>
      <button class="r-x" onclick="closeReceipt()" title="Close (Esc)">✕</button></div>
    <div class="r-body">${rows||'<div class="r-row"><span></span><span class="r-kind">no entries yet</span><span></span></div>'}</div>
    <div class="r-meta"><span>head&nbsp; <b>${esc(head.slice(0,18))}...</b></span><span>key&nbsp;&nbsp; <b>${esc((pk&&pk.pubkey||'').slice(0,18))}...</b> · ${esc((pk&&pk.alg)||'ed25519')}</span></div>
    <div class="r-foot"><button class="sbtn" onclick="reverify()">Re-verify offline</button><span class="hint">engramd verify ~/.engram</span></div>`;
}
function closeReceipt(){ const el=document.getElementById('receipt'); if(el) el.hidden=true; }
async function reverify(){
  const el=document.getElementById('receipt'), sub=el.querySelector('.r-sub'), seal=el.querySelector('.r-seal');
  if(sub){ sub.textContent='re-walking...'; sub.style.color='var(--text-muted)'; }
  try{ const v=await J('/v1/ledger/verify');
    if(sub){ sub.textContent=v.ok?('✓ verified · '+v.entries):'⚠ tamper detected'; sub.style.color=v.ok?'var(--accent)':'var(--danger)'; }
    if(v.ok&&seal){ seal.style.animation='none'; void seal.offsetWidth; seal.style.animation='breath var(--dur-4) var(--ease-inout)'; }
    notify(v.ok?('Re-verified offline · '+v.entries+' entries, the chain is intact'):'Tamper detected', v.ok?'ok':'bad'); poll();
  }catch(e){ notify('Couldn\'t verify - '+e.message); }
}

function renderTaskReceipt(r){

function palHover(i){ palSel=i; document.querySelectorAll('.pal-item').forEach(el=>el.classList.toggle('sel', +el.dataset.i===i)); }
function palRun(i){ const c=palItems[i]; closePalette(); if(c&&c.run) c.run(); }
function palMove(d){ if(!palItems.length) return; palSel=(palSel+d+palItems.length)%palItems.length;
  document.querySelectorAll('.pal-item').forEach(el=>el.classList.toggle('sel', +el.dataset.i===palSel));
  document.querySelector('.pal-item.sel')?.scrollIntoView({block:'nearest'}); }
document.addEventListener('input', e=>{ if(e.target&&e.target.id==='palInput') renderPalette(e.target.value); });
window.addEventListener('keydown', e=>{
  const k=(e.key||'').toLowerCase();
  if((e.metaKey||e.ctrlKey) && k==='k'){ e.preventDefault(); document.getElementById('palette').hidden? openPalette(): closePalette(); return; }
  if((e.metaKey||e.ctrlKey) && k===','){ e.preventDefault(); document.getElementById('cc').hidden? openCC(): closeCC(); return; }
  if((e.metaKey||e.ctrlKey) && k==='m' && document.getElementById('modelMenu')){ e.preventDefault(); toggleModelMenu(); return; }
  if((e.metaKey||e.ctrlKey) && k==='u' && document.getElementById('attachFileInput')){ e.preventDefault(); attachPickFiles(); return; }
  if(!document.getElementById('palette').hidden){
    if(k==='escape'){ e.preventDefault(); closePalette(); }
    else if(k==='arrowdown'){ e.preventDefault(); palMove(1); }
    else if(k==='arrowup'){ e.preventDefault(); palMove(-1); }
    else if(k==='enter'){ e.preventDefault(); palRun(palSel); }
    return;
  }
  if(k==='escape' && typeof ARTS!=='undefined' && ARTS.open && document.getElementById('artPane')){ e.preventDefault(); artClose(); return; }
  if(k==='escape' && !document.getElementById('cc').hidden){ e.preventDefault(); closeCC(); return; }
  if(k==='escape' && !document.getElementById('receipt').hidden){ e.preventDefault(); closeReceipt(); return; }
  if(k==='escape' && !document.getElementById('projModal').hidden){ e.preventDefault(); closeProjModal(); return; }
  if(k==='escape' && document.getElementById('panel').classList.contains('open')){ e.preventDefault(); closePanel(); }
});

// ---- Terminal - the glass-box shell (your commands signed into the ledger, like the agent's) ----
let TERM = { cwd:null, parent:null, tree:[], log:[], hist:[], hi:-1, busy:false };
function termShort(p){ if(!p) return ''; const s=p.split('/').filter(Boolean); return (s.length>2?'.../':'/')+s.slice(-2).join('/'); }
const attrJson = x => escAttr(JSON.stringify(x));
async function loadTree(path){
  try{ return await J(tok('/v1/fs'+(path?('?path='+encodeURIComponent(path)):''))); }catch(_){ return null; }
}
async function renderTerminal(){
  const v=document.getElementById('view'); if(!v) return;
  document.getElementById('viewname').textContent='Terminal';
  const fs=await loadTree(TERM.cwd);
  if(!fs || fs.denied){
    v.innerHTML=`<div class="term-gate"><div class="tg-card">
      <div class="tg-ic">${ICONS.Terminal}</div>
      <h2>A terminal that keeps no secrets</h2>
      <p>Engram signs every command - the agent's and your own - into one tamper-evident ledger, so even the lines you type by hand stay auditable. No human-shaped hole in the glass box.</p>
      <button class="primary" onclick="enableShell()">Enable shell access</button>
      <div class="tg-fine">You can turn this off any time in Settings › Security.</div>
    </div></div>`;
    return;
  }
  TERM.cwd=fs.path; TERM.parent=fs.parent; TERM.tree=fs.entries||[];
  if(!TERM.log.length) TERM.log=[{k:'sys',t:'Engram terminal - every command you run is signed into the ledger. Try ls, git status, pwd. Type clear to reset.'}];
  v.innerHTML=`<div class="term-wrap">
    <aside class="ftree" id="ftree"></aside>
    <div class="term" id="term">
      <div class="term-out" id="termOut"></div>
      <div class="term-in"><span class="term-prompt" id="termPrompt">${esc(termShort(TERM.cwd))} $</span><input id="termCmd" class="term-cmd" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="run a command..."></div>
    </div></div>`;
  renderTree(); paintTerm();
  const inp=document.getElementById('termCmd'); inp.onkeydown=termKey; inp.focus();
  document.getElementById('term').addEventListener('mousedown', e=>{ if(e.target.tagName!=='INPUT' && (''+window.getSelection()).length===0) setTimeout(()=>inp.focus(),0); });
}
function renderTree(){
  const el=document.getElementById('ftree'); if(!el) return;
  const up = TERM.parent ? `<div class="ft-row dir" onclick="termCd(${attrJson(TERM.parent)})"><span class="fi">↰</span><span class="fname">..</span></div>` : '';
  const rows = (TERM.tree||[]).map(e=>{
    const full=(TERM.cwd.endsWith('/')?TERM.cwd:TERM.cwd+'/')+e.name;
    return e.dir
      ? `<div class="ft-row dir" onclick="termCd(${attrJson(full)})"><span class="fi">▸</span><span class="fname">${esc(e.name)}</span></div>`
      : `<div class="ft-row file" onclick="termInsert(${attrJson(e.name)})"><span class="fi">·</span><span class="fname">${esc(e.name)}</span></div>`;
  }).join('') || '<div class="ft-row" style="color:var(--text-muted);cursor:default">empty</div>';
  el.innerHTML=`<div class="ft-head" title="${escAttr(TERM.cwd)}">Files</div>${up}${rows}`;
}
function paintTerm(){
  const o=document.getElementById('termOut'); if(!o) return;
  o.innerHTML=TERM.log.map(e=>{
    if(e.k==='sys') return `<div class="t-sys">${esc(e.t)}</div>`;
    if(e.k==='cmd'){ const sig=e.hash?`<span class="t-sig" onclick="openReceipt()" title="signed into the ledger · seq ${esc(String(e.seq))}">◇ ${esc(String(e.hash).slice(0,8))}</span>`:''; return `<div class="t-cmd"><span class="t-prompt">${esc(termShort(e.cwd))} $</span><span class="t-text">${esc(e.t)}</span>${sig}</div>`; }
    if(e.k==='out' && e.t) return `<pre class="t-out">${esc(e.t)}</pre>`;
    if(e.k==='err' && e.t) return `<pre class="t-out t-err">${esc(e.t)}</pre>`;
    return '';
  }).join('');
  o.scrollTop=o.scrollHeight;
}
function termKey(e){
  if(e.key==='Enter'){ e.preventDefault(); if(TERM.busy) return; const c=e.target.value; e.target.value=''; runTermCmd(c); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); if(TERM.hist.length){ TERM.hi=Math.min(TERM.hi+1,TERM.hist.length-1); e.target.value=TERM.hist[TERM.hist.length-1-TERM.hi]||''; } }
  else if(e.key==='ArrowDown'){ e.preventDefault(); if(TERM.hi>0){ TERM.hi--; e.target.value=TERM.hist[TERM.hist.length-1-TERM.hi]||''; } else { TERM.hi=-1; e.target.value=''; } }
}
async function runTermCmd(cmd){
  cmd=(cmd||'').trim(); if(!cmd) return;
  TERM.hist.push(cmd); TERM.hi=-1;
  if(cmd==='clear'){ TERM.log=[]; paintTerm(); return; }
  TERM.log.push({k:'cmd', cwd:TERM.cwd, t:cmd}); const entry=TERM.log[TERM.log.length-1]; paintTerm();
  TERM.busy=true; const inp=document.getElementById('termCmd'); if(inp) inp.classList.add('term-busy');
  try{
    const r=await J('/v1/shell',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({command:cmd, cwd:TERM.cwd})});
    if(r.denied){ TERM.busy=false; renderTerminal(); return; }
    entry.seq=r.seq; entry.hash=r.hash;
    if(r.cwd) TERM.cwd=r.cwd;
    if(r.stdout) TERM.log.push({k:'out',t:String(r.stdout).replace(/\n+$/,'')});
    if(r.stderr) TERM.log.push({k:'err',t:String(r.stderr).replace(/\n+$/,'')});
    const pr=document.getElementById('termPrompt'); if(pr) pr.textContent=termShort(TERM.cwd)+' $';
    const fs=await loadTree(TERM.cwd); if(fs && !fs.denied){ TERM.parent=fs.parent; TERM.tree=fs.entries||[]; renderTree(); }
    paintTerm();
  }catch(e){ TERM.log.push({k:'err',t:'(could not run - '+(e.message||'error')+')'}); paintTerm(); }
  finally{ TERM.busy=false; const i2=document.getElementById('termCmd'); if(i2){ i2.classList.remove('term-busy'); i2.focus(); } }
}
async function termCd(path){
  // Browsing the tree changes the working directory (a read, not a recorded command); typing
  // `cd` is what lands a signed line. Keeps the ledger about intent, not every folder click.
  const fs=await loadTree(path); if(!fs || fs.denied) return;
  TERM.cwd=fs.path; TERM.parent=fs.parent; TERM.tree=fs.entries||[]; renderTree();
  const pr=document.getElementById('termPrompt'); if(pr) pr.textContent=termShort(TERM.cwd)+' $';
  const inp=document.getElementById('termCmd'); if(inp) inp.focus();
}
function termInsert(name){ const inp=document.getElementById('termCmd'); if(!inp) return; inp.value=(inp.value?inp.value+' ':'')+name; inp.focus(); }

}
// ---- Activity: the full, browsable, verifiable signed ledger ----
const ACT={ entries:[], filter:'all', verify:{}, pubkey:{} };
const ACT_SEAL_OK='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.4-7 8.9C8 17.4 5 14.4 5 10V6l7-3Z"/><path d="m9 11.7 2 2 4-4.2"/></svg>';
const ACT_SEAL_BAD='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.4-7 8.9C8 17.4 5 14.4 5 10V6l7-3Z"/><path d="M9.5 9.5l5 5M14.5 9.5l-5 5"/></svg>';
function actShortJson(p){ try{ const s=JSON.stringify(p); return s==='{}'?'':s; }catch(_){ return ''; } }
function fmtAgo(ms){ const d=Date.now()-ms; const s=Math.max(0,Math.floor(d/1000));
  if(s<60) return s+'s ago'; const m=Math.floor(s/60); if(m<60) return m+'m ago';
  const h=Math.floor(m/60); if(h<24) return h+'h ago'; const dy=Math.floor(h/24);
  return dy<7 ? dy+'d ago' : new Date(ms).toLocaleDateString(); }
function actEntry(e){
  const k=e.kind||'', p=e.payload||{}; let label=k, summary='';
  if(k==='core.boot'){ label='Daemon started'; summary='v'+(p.version||'')+(p.addr?(' · '+p.addr):''); }
  else if(k==='core.sleep'){ label='Daemon slept to zero'; summary='idle - released to nothing'; }
  else if(k==='llm.call'){ label='Model call'; summary=(p.model||'model')+' · '+((p.tokens_in||0)+(p.tokens_out||0))+' tok · $'+(+(p.cost_usd||0)).toFixed(4); }
  else if(k==='policy.set'){ label='Policy changed'; summary='shell access '+(p.allow_shell?'enabled':'disabled'); }
  else if(k==='terminal.exec'){ label='Terminal command'; summary='$ '+(p.command||''); }
  else if(k.startsWith('agent.')){ label='Agent · '+(k.slice(6)||'step'); summary=p.command||p.tool||actShortJson(p); }
  else if(k==='channel.in'){ label='Inbound message'; summary='via '+(p.platform||'a channel'); }
  else if(k==='config.set'){ label='Settings updated'; summary=Object.keys(p).join(', ')||'config'; }
  else if(k.startsWith('task.')){ label='Task '+(k.slice(5)); summary=(p.id||'')+(p.status?(' · '+p.status):''); }
  else if(['memory','identity','episodic','semantic','procedural'].some(x=>k.startsWith(x))){ label='Memory'; summary=p.text||actShortJson(p); }
  else { summary=actShortJson(p); }
  const actor=e.actor||'core';
  const color = actor==='agent'?'#45c8a8':(actor==='user'?'#85b7eb':'#b58cff');
  return { label, summary, actor, color };
}

  let shown=items.filter(i=>(_artifacts.filter==='all'||i.kind===_artifacts.filter) && (!q || (i.name+' '+(i.title||'')).toLowerCase().includes(q)));

  const cards=shown.map(i=>{
    const url=`/v1/artifact?task=${encodeURIComponent(i.task)}&path=${encodeURIComponent(i.path)}`;
    // Jump back to the conversation that made this artifact - the task panel (its run + answer).

// ===== ARTIFACTS (Open in canvas) =====
// Client-side detection of substantial code/doc blocks in Engram replies, surfaced as an
// "Open in canvas" chip that splits the chat into a feed + right-hand artifact pane.
// No backend: we scan the rendered feed after each paintFeed() and reuse _cbStore raw code.
// Model output is untrusted, so everything rendered here goes through esc()/escAttr()/hl().
const ARTS = { open:false, current:null, byKey:{}, order:[], _sig:'' };

// Stable identity for an artifact across streaming repaints: short FNV-1a hash of lang+content.

// codeBlock() renders an *unlabeled* fence's header as the literal word "code" (esc(lang||'code')),
// so when we read it back from .cb-head span we must fold "code"/"text" to '' - otherwise a
// heading-only markdown block (lang reported as "code") would never qualify and the language tag
// would read a bogus "CODE".
function artNormLang(l){ l=(l||'').toLowerCase().trim(); return (l==='code'||l==='text')?'':l; }

const ART_EXT = { js:'js',jsx:'jsx',ts:'ts',tsx:'tsx',rust:'rs',rs:'rs',python:'py',py:'py',bash:'sh',sh:'sh',shell:'sh',json:'json',yaml:'yml',yml:'yml',toml:'toml',html:'html',css:'css',sql:'sql',go:'go',ruby:'rb',rb:'rb',java:'java',c:'c',cpp:'cpp',md:'md',markdown:'md','':'txt' };
const ART_LANGNAME = { js:'JavaScript',jsx:'JSX',ts:'TypeScript',tsx:'TSX',rust:'Rust',rs:'Rust',python:'Python',py:'Python',bash:'Shell',sh:'Shell',shell:'Shell',json:'JSON',yaml:'YAML',yml:'YAML',toml:'TOML',html:'HTML',css:'CSS',sql:'SQL',go:'Go',ruby:'Ruby',rb:'Ruby',md:'Markdown',markdown:'Markdown' };

// Derive a human title from the content (leading comment / heading / declaration), else the language.
function artTitle(code, lang){
  const lines=String(code).split('\n').map(l=>l.trim()).filter(Boolean);
  for(const l of lines.slice(0,4)){
    let m=l.match(/^(?:\/\/|#|--|;)\s*(.+)$/);            // leading comment
    if(m && m[1].length<=64) return m[1].replace(/\s+/g,' ');
    m=l.match(/^#{1,3}\s+(.+)$/);                          // markdown heading
    if(m) return m[1].replace(/\s+/g,' ').slice(0,64);
    m=l.match(/^(?:export\s+)?(?:async\s+)?(?:fn|function|def|class|struct|interface|enum|impl|type)\s+([A-Za-z_$][\w$]*)/);
    if(m) return m[1];
  }
  const ln=artNormLang(lang);
  return ART_LANGNAME[ln] || (ln ? ln : 'Snippet');
}

// Does this code block clear the bar for an artifact? >=6 lines, or markdown w/ headings.
function artQualifies(code, lang){
  const lines=String(code).replace(/\n+$/,'').split('\n');
  if(lines.length>=6) return true;
  const l=artNormLang(lang);
  if((l==='md'||l==='markdown'||l==='') && /^#{1,3}\s+\S/m.test(code)) return true;
  return false;
}

// Register (or refresh) an artifact, returning its stable key.
function artRegister(code, lang, key){
  lang=artNormLang(lang);
  // key is a stable positional id passed by the caller (NOT a content hash) so a block streaming
  // token-by-token keeps the same identity and an open artifact isn't orphaned each repaint.
  const ext=ART_EXT[lang]!=null?ART_EXT[lang]:'txt';
  if(!ARTS.byKey[key]){ ARTS.order.push(key); }
  ARTS.byKey[key]={ key, code, lang, ext, title:artTitle(code,lang), langName:ART_LANGNAME[lang]||(lang?lang.toUpperCase():'Text'), lines:code.replace(/\n+$/,'').split('\n').length };

}

// Mark the chip for the active artifact (without re-rendering the pane).
function artMarkChip(){

// Scan the freshly-painted feed: register qualifying blocks, inject "Open in canvas" chips.

  // Preserve file-preview artifacts opened from a card/chip; only the in-feed CODE blocks re-derive.

const _FILE_LANG={md:'md',markdown:'md',txt:'',text:'',log:'',csv:'',json:'json',js:'js',mjs:'js',cjs:'js',ts:'ts',tsx:'tsx',jsx:'jsx',py:'python',rs:'rust',sh:'bash',bash:'bash',zsh:'bash',html:'html',htm:'html',css:'css',yml:'yaml',yaml:'yaml',toml:'toml',sql:'sql',go:'go',rb:'ruby',c:'c',h:'c',cpp:'cpp',java:'java',php:'php',xml:'html'};

// Open an artifact/file for reading. In chat we dock it in the right-hand canvas (like Claude);

// Content is fetched as text and rendered (markdown as HTML, code highlighted). Replaces the old

async function artOpenFile(task, path, name){
