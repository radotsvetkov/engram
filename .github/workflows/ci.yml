name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Fast gate: formatting + lint + the full test matrix the product actually ships with.
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets
      - name: Clippy (http)
        run: cargo clippy -p engramd --features http --all-targets
      - name: Test (default features)
        run: cargo test --workspace
      - name: Test (engramd, http provider)
        run: cargo test -p engramd --features http
      - name: Test (engram-agent, browser-cdp build path)
        run: cargo test -p engram-agent --features browser-cdp
      - name: Deterministic eval suite
        run: cargo run -p engram-eval

  # The VPS target: a single static musl binary with real providers. Tracks the size claim.
  musl:
    name: static musl build (VPS target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release (musl, http)
        run: cargo build --release --target x86_64-unknown-linux-musl -p engramd --features http
      - name: Report binary size
        run: |
          strip target/x86_64-unknown-linux-musl/release/engramd
          ls -lh target/x86_64-unknown-linux-musl/release/engramd
