name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case first, please — the "why" before the "what".
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough sketches and API ideas welcome.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Anything you tried or ruled out, and why.
