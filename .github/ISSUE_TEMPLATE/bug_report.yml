name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please include enough detail to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, expected vs. actual behaviour.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run with `RUST_LOG=debug` and paste anything useful. This is automatically formatted as code.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `engramd --version` (or the commit you built from).
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: features
    attributes:
      label: Build features
      description: Which cargo features were enabled (e.g. http, docs, browser-cdp)?
      placeholder: default (offline)
