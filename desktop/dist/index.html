<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Engram</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0c0d0f; color: #6c7078;
      font: 13px -apple-system, 'Inter', system-ui, sans-serif; display: grid; place-items: center; }
    .wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .mark { width: 64px; height: 64px; color: #e8e9ec; }
    .fire { animation: pulse 1.8s ease-in-out infinite; transform-origin: 19px 16px; }
    @keyframes pulse { 0%, 100% { opacity: .9; } 50% { opacity: .35; } }
    @media (prefers-reduced-motion: reduce) { .fire { animation: none; } }
    .name { font-size: 16px; font-weight: 600; letter-spacing: .3px; color: #e8e9ec; }
    .sub { font-size: 12px; }
  </style>
</head>
<body>
  <!-- The shell opens the daemon's own dashboard in this window; this branded page only
       shows during the brief moment before the local agent is reachable. -->
  <div class="wrap">
    <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">
      <circle class="fire" cx="19" cy="16" r="2.9" fill="#45c8a8" stroke="none" opacity=".16"/>
      <path d="M12 9V5.5"/>
      <path d="M14.6 13.5 17.6 15.2"/>
      <path d="M9.4 13.5 6.4 15.2"/>
      <circle cx="12" cy="12" r="3"/>
      <circle cx="12" cy="12" r=".95" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="3.9" r="1.6"/>
      <circle cx="5" cy="16" r="1.6"/>
      <circle class="fire" cx="19" cy="16" r="1.6" fill="#45c8a8" stroke="#45c8a8"/>
    </svg>
    <div class="name">Engram</div>
    <div class="sub">Waking the local agent…</div>
  </div>
</body>
</html>
